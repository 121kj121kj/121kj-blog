<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24点游戏 - 121KJ</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0a0a0f;color:#e4e4ec;min-height:100vh;display:flex;justify-content:center;align-items:center}
  .game{background:#14141f;border:1px solid #1e1e30;border-radius:16px;padding:32px;max-width:500px;width:90%;text-align:center}
  h1{font-size:1.6rem;margin-bottom:4px}
  .sub{color:#787890;font-size:.9rem;margin-bottom:24px}
  .nums{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
  .nums .n{width:64px;height:80px;background:#1a1a2e;border:2px solid #6366f1;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:#818cf8}
  .input{display:flex;gap:8px;margin-bottom:12px}
  .input input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid #2a2a3a;background:#1a1a23;color:#e4e4ec;font-size:1rem;outline:none;transition:border-color .2s}
  .input input:focus{border-color:#6366f1}
  .btn{padding:10px 20px;border-radius:8px;border:none;font-size:.95rem;font-weight:600;cursor:pointer;transition:opacity .2s}
  .btn:hover{opacity:.85}
  .primary{background:#6366f1;color:#fff}
  .green{background:#22c55e;color:#fff}
  .red{background:#ef4444;color:#fff}
  .gray{background:#2a2a3a;color:#e4e4ec}
  .btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .op-btn{padding:8px 16px;border-radius:8px;border:1px solid #2a2a3a;background:#1a1a23;color:#818cf8;font-size:1.1rem;font-weight:700;cursor:pointer;transition:border-color .15s;min-width:42px}
  .op-btn:hover{border-color:#6366f1}
  .msg{padding:12px;border-radius:8px;margin-bottom:16px;font-size:.95rem;min-height:44px;display:flex;align-items:center;justify-content:center}
  .msg.ok{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
  .msg.err{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
  .msg.info{background:rgba(99,102,241,.12);color:#818cf8;border:1px solid rgba(99,102,241,.3)}
  .hint{font-size:.85rem;color:#787890;margin-top:8px}
  .back{margin-top:20px;display:inline-block;color:#787890;text-decoration:none;font-size:.85rem}
  .back:hover{color:#818cf8}
</style>
</head>
<body>
<div class="game">
  <h1>🎲 24 点</h1>
  <p class="sub">用四张牌通过 + − × ÷ 算出 24</p>
  <div id="msg" class="msg info">点击数字/符号按钮输入算式</div>
  <div class="nums" id="cards"></div>
  <div class="input">
    <input type="text" id="expression" placeholder="输入算式..." autofocus>
  </div>
  <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:8px">
    <button class="op-btn" onclick="insert('(')">(</button>
    <button class="op-btn" onclick="insert(')')">)</button>
    <button class="op-btn" onclick="insert('+')">+</button>
    <button class="op-btn" onclick="insert('-')">−</button>
    <button class="op-btn" onclick="insert('×')">×</button>
    <button class="op-btn" onclick="insert('÷')">÷</button>
  </div>
  <div class="btns">
    <button class="btn primary" onclick="check()">验证</button>
    <button class="btn gray" onclick="newGame()">换一题</button>
    <button class="btn gray" onclick="showHint()">提示</button>
  </div>
  <div id="hintArea" class="hint"></div>
  <a class="back" href="/">← 返回首页</a>
</div>
<script>
let cards=[],solutions=[];

function insert(s){
  const inp=document.getElementById('expression');
  const pos=inp.selectionStart;
  const val=inp.value;
  inp.value=val.slice(0,pos)+s+val.slice(pos);
  inp.focus();
  inp.selectionStart=inp.selectionEnd=pos+s.length;
}

function rand(n,m){return Math.floor(Math.random()*(m-n+1))+n}

function newGame(){
  cards=[rand(1,13),rand(1,13),rand(1,13),rand(1,13)];
  document.getElementById('cards').innerHTML=cards.map(n=>'<div class="n">'+(n===1?'A':n===11?'J':n===12?'Q':n===13?'K':n)+'</div>').join('');
  document.getElementById('expression').value='';
  document.getElementById('hintArea').textContent='';
  setMsg('info','点击符号按钮或键盘输入算式');
  solutions=calc24(cards);
}

function setMsg(t,m){const e=document.getElementById('msg');e.className='msg '+t;e.textContent=m}

function check(){
  const exp=document.getElementById('expression').value.trim();
  if(!exp){setMsg('err','请输入算式');return}
  try{
    const used=extractNums(exp);
    if(used.length!==4||!matchCards(used)){setMsg('err','必须使用全部四张牌，每张只用一次');return}
    const r=eval(exp.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-'));
    if(Math.abs(r-24)<0.001){setMsg('ok','✅ 正确！太棒了！');setTimeout(newGame,1500)}else{setMsg('err','❌ 结果是 '+r+'，不是 24')}
  }catch(e){setMsg('err','算式格式有误，请检查')}
}

function extractNums(s){return(s.match(/\d+/g)||[]).map(Number).filter(n=>n>0)}

function matchCards(used){const c=[...cards];return used.every(n=>{const i=c.indexOf(n);if(i<0)return false;c.splice(i,1);return true})}

function showHint(){
  if(solutions.length===0){document.getElementById('hintArea').textContent='这道题无解 😅 换一题吧';return}
  document.getElementById('hintArea').textContent='💡 提示: '+solutions[rand(0,solutions.length-1)];
}

function calc24(nums){
  const ops=['+','-','×','÷'];const res=[];
  function calc(a,o,b){return o==='+'?a+b:o==='-'?a-b:o==='×'?a*b:o==='÷'?(b===0?NaN:a/b):NaN}
  function perm(arr){if(arr.length<=1)return[arr];const r=[];for(let i=0;i<arr.length;i++){const rest=[...arr.slice(0,i),...arr.slice(i+1)];for(const p of perm(rest))r.push([arr[i],...p])}return r}
  function expr(a,b,c,d,o1,o2,o3,p){
    const p2=m=>{if(m===0)return calc(calc(a,o1,b),o2,calc(c,o3,d));if(m===1)return calc(calc(calc(a,o1,b),o2,c),o3,d);if(m===2)return calc(calc(a,o1,calc(b,o2,c)),o3,d);if(m===3)return calc(calc(a,o1,b),o2,calc(c,o3,d));if(m===4)return calc(a,o1,calc(calc(b,o2,c),o3,d));return calc(a,o1,calc(b,o2,calc(c,o3,d)))};
    const v=p2(p);if(isNaN(v)||v===Infinity)return null;
    const fm=m=>{if(m===0)return`(${a} ${o1} ${b}) ${o2} (${c} ${o3} ${d})`;if(m===1)return`((${a} ${o1} ${b}) ${o2} ${c}) ${o3} ${d}`;if(m===2)return`(${a} ${o1} (${b} ${o2} ${c})) ${o3} ${d}`;if(m===3)return`(${a} ${o1} ${b}) ${o2} (${c} ${o3} ${d})`;if(m===4)return`${a} ${o1} ((${b} ${o2} ${c}) ${o3} ${d})`;return`${a} ${o1} (${b} ${o2} (${c} ${o3} ${d}))`};
    return Math.abs(v-24)<0.001?fm(p):null;
  }
  for(const[a,b,c,d] of perm(nums))
    for(let i=0;i<4;i++)for(let j=0;j<4;j++)for(let k=0;k<4;k++)
      for(let p=0;p<6;p++){const r=expr(a,b,c,d,ops[i],ops[j],ops[k],p);if(r&&!res.includes(r))res.push(r)}
  return res;
}
newGame();
</script>
</body>
</html>
