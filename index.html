<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex 汉化参考</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #f5f5f5;
    --card: #fff;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --text-secondary: #666;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --zh-color: #dc2626;
    --cat-color: #1d4ed8;
    --search-bg: #fff;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    user-select: none;
  }
  /* ── 顶部栏 ── */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 16px;
    font-weight: 700;
    white-space: nowrap;
  }
  .header .subtitle {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
  }
  .search-wrap {
    flex: 1;
    position: relative;
    max-width: 360px;
  }
  .search-wrap input {
    width: 100%;
    padding: 7px 12px 7px 32px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    outline: none;
    background: var(--search-bg);
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: #999;
    font-size: 14px;
    pointer-events: none;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .count-badge {
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--bg);
    padding: 3px 10px;
    border-radius: 12px;
    white-space: nowrap;
  }
  .top-toggle {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .top-toggle:hover { background: var(--bg); }
  .top-toggle input { accent-color: var(--accent); }
  .copy-btn {
    font-size: 12px;
    color: var(--accent);
    background: none;
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 3px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn:hover { background: var(--accent-light); }
  /* ── 内容区 ── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px 24px;
  }
  .category { margin-bottom: 20px; }
  .category-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--cat-color);
    margin-bottom: 6px;
    padding: 0 8px;
  }
  .items {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .item {
    display: flex;
    align-items: center;
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .item:hover { background: var(--accent-light); }
  .item .en {
    color: var(--text);
    font-weight: 500;
    min-width: 140px;
  }
  .item .arrow {
    color: #bbb;
    margin: 0 10px;
    flex-shrink: 0;
  }
  .item .zh {
    color: var(--zh-color);
    font-weight: 500;
  }
  .item .copy-hint {
    margin-left: auto;
    font-size: 11px;
    color: #bbb;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .item:hover .copy-hint { opacity: 1; }
  /* ── 空状态 ── */
  .empty {
    text-align: center;
    color: #999;
    padding: 60px 20px;
    font-size: 14px;
  }
  .empty .big { font-size: 36px; display: block; margin-bottom: 8px; }
  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a1a;
    color: #fff;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <h1>🀄️ Codex 汉化参考</h1>
  <span class="subtitle">中英对照 · 点击即复制</span>
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input id="search" type="text" placeholder="搜索英文或中文…" autofocus>
  </div>
  <div class="header-actions">
    <span class="count-badge" id="count">共 0 条</span>
    <label class="top-toggle">
      <input type="checkbox" id="topCheck" checked> 置顶
    </label>
    <button class="copy-btn" onclick="copyAllVisible()">复制全部</button>
  </div>
</div>

<div class="content" id="content"></div>
<div class="toast" id="toast"></div>

<script>
// ── 翻译数据 ──
const DATA = [
  { cat: "主菜单", items: [
    ["File", "文件"], ["Edit", "编辑"], ["View", "视图"], ["Help", "帮助"],
    ["New Thread", "新建线程"], ["Close Tab", "关闭标签页"],
    ["Close Window", "关闭窗口"], ["Exit", "退出"],
  ]},
  { cat: "编辑操作", items: [
    ["Undo", "撤销"], ["Redo", "重做"], ["Cut", "剪切"],
    ["Copy", "复制"], ["Paste", "粘贴"], ["Select All", "全选"],
    ["Find", "查找"], ["Replace", "替换"],
  ]},
  { cat: "对话区", items: [
    ["Thread", "线程 / 对话"], ["New Thread", "新建对话"],
    ["Send", "发送"], ["Cancel", "取消"],
    ["Stop Generating", "停止生成"], ["Continue", "继续"],
    ["Retry", "重试"], ["Edit Message", "编辑消息"],
    ["Delete Message", "删除消息"], ["Copy Message", "复制消息"],
    ["Insert Code", "插入代码"],
    ["Commentary", "备注 / 过程记录"], ["Final Answer", "最终回答"],
  ]},
  { cat: "工作区", items: [
    ["Workspace", "工作区"], ["Files", "文件"],
    ["Open File", "打开文件"], ["Save File", "保存文件"],
    ["Search Files", "搜索文件"], ["Terminal", "终端"],
    ["New Terminal", "新建终端"], ["Run Command", "运行命令"],
  ]},
  { cat: "设置与配置", items: [
    ["Settings", "设置"], ["Preferences", "偏好设置"],
    ["Keyboard Shortcuts", "键盘快捷键"], ["Account", "账户"],
    ["API Configuration", "API 配置"], ["Theme", "主题"],
    ["Light Mode", "浅色模式"], ["Dark Mode", "深色模式"],
    ["Font Size", "字体大小"], ["Language", "语言"],
    ["Proxy Settings", "代理设置"],
  ]},
  { cat: "工具与功能", items: [
    ["Tools", "工具"], ["Skills", "技能"], ["Plugins", "插件"],
    ["Goal", "目标"], ["Search", "搜索"], ["Browse", "浏览"],
    ["Image Generation", "图片生成"], ["Code Analysis", "代码分析"],
    ["Run Tests", "运行测试"],
  ]},
  { cat: "视图与导航", items: [
    ["Sidebar", "侧边栏"], ["Panel", "面板"],
    ["Split View", "分屏视图"], ["Zoom In", "放大"],
    ["Zoom Out", "缩小"], ["Reset Zoom", "重置缩放"],
    ["Full Screen", "全屏"], ["Minimize", "最小化"],
    ["Maximize", "最大化"],
  ]},
  { cat: "对话框 / 弹窗", items: [
    ["Confirm", "确认"], ["Cancel", "取消"], ["OK", "确定"],
    ["Apply", "应用"], ["Save", "保存"], ["Discard", "放弃更改"],
    ["Yes", "是"], ["No", "否"], ["Close", "关闭"],
    ["Loading…", "加载中…"], ["Error", "错误"],
    ["Warning", "警告"], ["Info", "提示信息"], ["Success", "成功"],
  ]},
  { cat: "状态与通知", items: [
    ["Connected", "已连接"], ["Disconnected", "未连接"],
    ["Running", "运行中"], ["Completed", "已完成"],
    ["Failed", "失败"], ["Pending", "等待中"],
    ["Idle", "空闲"], ["Processing…", "处理中…"],
    ["Ready", "就绪"],
  ]},
  { cat: "快捷键", items: [
    ["Ctrl+Enter", "发送消息"], ["Ctrl+Shift+Enter", "换行"],
    ["Ctrl+C", "复制"], ["Ctrl+V", "粘贴"],
    ["Ctrl+Z", "撤销"], ["Ctrl+Shift+Z / Ctrl+Y", "重做"],
    ["Ctrl+S", "保存"], ["Ctrl+F", "查找"],
    ["Ctrl+N", "新建对话"], ["Ctrl+W", "关闭标签页"],
    ["Ctrl+Tab", "切换标签页"], ["Ctrl+`", "切换终端"],
    ["Escape", "取消 / 关闭"],
  ]},
];

// ── 渲染 ──
const $ = s => document.querySelector(s);
const content = $('#content');
const searchInput = $('#search');
const countEl = $('#count');

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showToast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1500);
}

function render(kw) {
  kw = (kw || '').trim().toLowerCase();
  let total = 0, visible = 0;
  let html = '';

  for (const cat of DATA) {
    const filtered = cat.items.filter(([en, zh]) => {
      total++;
      return !kw || en.toLowerCase().includes(kw) || zh.includes(kw);
    });
    if (!filtered.length) continue;
    visible += filtered.length;

    html += `<div class="category"><div class="category-title">${escapeHtml(cat.cat)}</div><div class="items">`;
    for (const [en, zh] of filtered) {
      const attr = `data-zh="${escapeHtml(zh)}"`;
      html += `<div class="item" onclick="copyZh(this)" ${attr}>
        <span class="en">${escapeHtml(en)}</span>
        <span class="arrow">→</span>
        <span class="zh">${escapeHtml(zh)}</span>
        <span class="copy-hint">点击复制</span>
      </div>`;
    }
    html += '</div></div>';
  }

  if (visible === 0) {
    html = `<div class="empty"><span class="big">🔍</span>没有匹配结果，试试其他关键词</div>`;
  }

  content.innerHTML = html;
  countEl.textContent = `共 ${total} 条，显示 ${visible} 条`;
}

window.copyZh = function(el) {
  const zh = el.dataset.zh;
  navigator.clipboard.writeText(zh).then(() => {
    showToast(`✓ 已复制: ${zh}`);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = zh;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(`✓ 已复制: ${zh}`);
  });
};

function copyAllVisible() {
  const items = content.querySelectorAll('.item');
  if (!items.length) return;
  const texts = Array.from(items).map(el => el.dataset.zh);
  const text = texts.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    showToast(`✓ 已复制 ${texts.length} 条中文`);
  });
}

// ── 搜索事件 ──
searchInput.addEventListener('input', () => render(searchInput.value));
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
});
// 记住置顶
$('#topCheck').addEventListener('change', () => {
  // 浏览器窗口本身不支持置顶，但保持 UI 反馈
  localStorage.setItem('codex_zh_pin', $('#topCheck').checked);
});
$('#topCheck').checked = localStorage.getItem('codex_zh_pin') !== 'false';

// ── 首次渲染 ──
render('');
</script>
</body>
</html>
