号了。”", "张小辉沉默了。", "他不知道平台要封他的账号。但他也知道，马胜利的消息比他灵通。", "“你觉得呢，诗涵？”他问。", "林诗涵犹豫了一下：“我觉得……老马说的有道理。”", "“你也觉得应该换平台？”张小辉有些意外。", "“不是换平台，”林诗涵说，“是……我觉得我们应该走不同的路。”", "“不同的路？”", "“小辉，”林诗涵说，“我们合作快一年了。这一年里，我们做了很多事情，也取得了一些成绩。但我觉得，我们三个人的目标，好像不太一样。”", "“什么意思？”", "“我想做品牌，”林诗涵说，“我想有自己的产品，自己的公司，自己的团队。但你的模式是课程，课程的天花板很低，很难做大。”", "张小辉愣住了。", "他没想到林诗涵会这么说。", "“那你当初为什么不说？”他问。", "“因为当初我也不知道自己想要什么，”林诗涵说，“但现在我知道了。我想要更多。”", "群里沉默了很久。", "然后，马胜利说了一句话：“诗涵，你想要什么样的更多？”", "林诗涵想了想：“我想有自己的公司。我想有自己的产品线。我想成为这个行业里真正的大佬。”"], ["马胜利说：“那我呢？你觉得我们还应该继续合作吗？”", "林诗涵说：“老马，我不想再当MCN下面的一个主播了。我想独立。”", "马胜利沉默了很久。", "他知道自己留不住林诗涵。他也知道，张小辉可能也想离开。", "他们三个人的合作关系，从一开始就是松散的。现在，随着各自的成长，这种松散的合作关系，已经越来越难维持了。", "“好吧，”马胜利说，“既然大家都有各自的想法，那我们就好聚好散吧。”", "“老马……”张小辉想说什么。", "“不用说了，”马胜利打断他，“我知道你们在想什么。没关系，分开就分开，我们还是朋友。”", "那天晚上，三个人在视频里沉默了很久。", "最后，他们说了再见。", "然后，视频通话结束了。", "张小辉一个人坐在出租屋里，看着电脑屏幕发呆。", "他不知道该怎么形容此刻的心情。", "他很难过。他觉得他们三个人不应该分开。他们一起经历了那么多，一起扛过了那么多困难。", "但他也知道，林诗涵说的是对的。他们三个人的目标，确实不太一样。", "他想做教育。他想把知识传递给更多人。他想帮助那些像他一样的人。", "但林诗涵想做品牌。马胜利想做MCN。", "他们的路，本来就不是同一条路。", "他叹了口气，关掉了电脑。", "他知道自己必须往前走。", "他不知道前面是什么。", "但他只能往前走。", "三个人分开之后，各自走上了不同的路。", "张小辉换了一个平台。", "他去了抖音。", "抖音和慢手的逻辑完全不同。抖音是算法驱动的，内容为王。只要你的内容好，就一定会被推荐。", "他花了一个月时间，研究抖音的算法和用户喜好。然后，他开始做内容。", "他的第一条抖音视频，是讲”英语学习的三个误区”。", "那条视频发出去之后，播放量只有两千。", "两千。他发视频的账号，是刚刚注册的，没有任何粉丝基础。两千播放，几乎全是算法推荐的陌生人。", "他分析了一下数据，发现用户流失率很高。前三秒留不住人，用户就划走了。", "他开始调整。他的视频开头一定要有一个”钩子”——一个让人想看下去的问题，或者一个让人惊讶的结论。", "第二个月，他的视频播放量稳定在了十万。"], ["第三个月，他的视频播放量稳定在五十万。", "半年后，他的抖音账号粉丝突破了百万。", "他重新站起来了。", "林诗涵离开了慢手，自己开了公司。", "她的公司叫”氧气文化”，专注女性消费市场。", "她做的第一个产品，是一款女性护肤套装。", "这款套装是她自己设计的，成分表是她自己研究的，包装是她自己找工厂定制的。", "第一款产品上线的时候，她紧张得一晚上没睡着。", "她不知道会不会有人买。她不知道自己的粉丝会不会支持她。她不知道自己能不能做好。", "结果，第一天，这款套装就卖出了一千套。", "一千套乘以一百九十九，等于将近二十万。", "她在手机屏幕前愣了很久，然后一个人躲进卫生间里哭了。", "她不知道自己在哭什么。她只是觉得，这一路走来太不容易了。", "马胜利继续做MCN。", "三个人分开之后，他消沉了很长一段时间。", "他不知道自己做得对不对。他不知道自己是不是应该挽留他们。他不知道自己一个人还能走多远。", "但他还是坚持下来了。", "他继续签约主播，继续做内容，继续帮那些有梦想的人实现梦想。", "他的公司慢慢稳定了下来，虽然没有大爆发，但也没有倒闭。", "有一天，他收到了一封粉丝的来信。", "那是一个来自贵州山区的男孩写的。男孩说，他是一个留守儿童，从小跟着奶奶长大。他很喜欢看马胜利的视频，因为马胜利的视频让他觉得，这个世界上还有人关心像他这样的普通人。", "男孩说：“马老师，谢谢您。我将来也要像您一样，帮助更多的人。”", "马胜利看到那封信的时候，眼泪差点掉下来。", "他知道自己做的是对的。", "他不需要成为什么大佬，不需要赚什么大钱。他只需要做好自己该做的事情，帮助那些需要帮助的人。", "这就够了。", "一年后。", "2022年的夏天，又是一个燥热的夜晚。", "马胜利坐在杭州的办公室里，看着窗外的夜景发呆。", "他的公司这一年发展得不错。签约的主播超过了一百个，每个月的流水稳定在三千万以上。他不再是那个建材城的小老板了，他现在是圈内小有名气的MCN老板。", "但他觉得空虚。", "他已经很久没有跟林诗涵和张小辉联系了。"], ["他们分开之后，就再也没有见过面。偶尔在群里聊几句，但都是客套话，再也没有以前那种交心的感觉。", "他不知道自己是不是做错了什么。", "他只是觉得，他们三个人的路，本来就不是同一条路。分开，也许是必然的。", "他叹了口气，正准备关灯回家，突然手机响了。", "是林诗涵发来的消息。", "“老马，下个月是我们相识两周年。你有没有空？我们三个聚一聚吧。”", "马胜利盯着那条消息，愣了很久。", "两年了。", "两年前的夏天，他们三个在慢手年度盛典上第一次见面。那时候，他们什么都不是，只是三个普普通通的、在时代洪流里挣扎求生的人。", "现在，他们各自有了一些成绩，但好像也失去了一些东西。", "他想了想，回复道：“好。时间地点你定。”", "林诗涵秒回：“深圳。我请你们吃火锅。”", "聚会的地点是深圳一家很普通的火锅店。", "马胜利到的时候，张小辉已经在那里了。", "张小辉这一年变化很大。他剪短了头发，整个人看起来精神了很多。他的抖音账号已经有一百五十万粉丝了，每个月的收入稳定在五十万以上。他用赚来的钱，在深圳买了一套两居室，把妈和妹妹都接了过来。", "“老马！”张小辉看到他，站起来打招呼，“好久不见！”", "“好久不见。”马胜利走过去，跟他握了握手。", "他们两个人的手握在一起的时候，都愣了一下。", "那是他们分开一年后，第一次见面。", "林诗涵是最后一个到的。", "她穿了一条白色的连衣裙，踩着一双银色的高跟鞋，整个人看起来比以前更漂亮了。", "她的公司这一年发展得很好。“氧气文化”已经成为圈内小有名气的品牌，每个月的GMV稳定在五百万以上。她不再是那个在小出租屋里直播的女孩了，她现在是真正的老板。", "“涵涵！”张小辉站起来，“你变漂亮了！”", "“你也是啊，”林诗涵笑着说，“剪了头发，年轻了十岁。”", "三个人坐下来，点了一锅红油火锅。", "热气腾腾的锅里，翻滚着红色的辣椒和花椒。整个火锅店的空气里，都弥漫着一股麻辣的味道。", "“来，”马胜利举起饮料，“敬我们的相识。”", "“敬相识！”林诗涵和张小辉同时举杯。", "他们碰了碰杯，然后一饮而尽。"], ["“说说这一年吧，”林诗涵夹了一块毛肚放进锅里，“你们都怎么样？”", "“我吗？”马胜利笑了笑，“就那样呗，做MCN，做内容，做运营。很忙，但也很充实。”", "“充实吗？”林诗涵问。", "“充实，”马胜利说，“虽然我们分开了，但我一直记得我们当初一起做的那些事情。知识带货，星火计划——这些都在。”", "张小辉点点头：“我也是。这一年，我一直在想当初我们一起合作的日子。虽然我们分开了，但那些日子对我来说，永远都是最珍贵的。”", "林诗涵听着他们的话，眼眶有些湿润。", "她想起了两年前的夏天，他们三个在年度盛典上第一次见面的情景。", "那时候，她是一个被职场PUA逼得差点跳楼的女孩。她不知道自己还能做什么，不知道自己的未来在哪里。", "她坐在角落里，看着来来往往的人群，觉得自己特别渺小。", "但就在这时，一个穿藏蓝色西装的中年男人走了过来。", "“你好，请问你是’氧气诗涵’吗？”", "那是她第一次见到马胜利。", "也是她人生的转折点。", "“老马，”林诗涵说，“你知道吗，我最感谢的人是你。”", "“感谢我？”马胜利有些意外，“为什么？”", "“因为你是第一个愿意帮我的人，”林诗涵说，“在我被华星传媒围剿的时候，是你站出来帮我的。”", "“那不是应该的吗？”马胜利说，“我们是朋友啊。”", "“可是当时我们认识才多久？”林诗涵说，“才几个月。但你还是帮了我。”", "马胜利想了想：“也许这就是缘分吧。”", "“缘分……”林诗涵念叨着这两个字，突然笑了，“对，缘分。”", "那天晚上，三个人聊了很久。", "他们聊各自这一年的经历，聊各自的收获和困惑，聊各自对未来的规划。", "他们没有聊太多过去的事情。他们知道，过去的事情已经过去了，他们不需要一直沉溺在里面。", "他们只聊未来。", "“你们有什么打算？”马胜利问。", "“我？”林诗涵想了想，“我想把’氧气文化’做成一个真正的品牌。不只是卖货，还要做内容，做价值观。”", "“我？”张小辉说，“我想继续做教育。我想做更多的课程，帮助更多的人。还有——我想把’星火计划’做大。”", "马胜利听完，点了点头。"], ["“你们都很棒，”他说，“你们都找到了自己的路。”", "“那你呢，老马？”林诗涵问，“你的路是什么？”", "马胜利想了想：“我的路啊……我还是继续做MCN吧。继续帮助那些有梦想的人。”", "“就这样？”", "“就这样，”马胜利笑了，“简单的事情重复做，这就是我的路。”", "三个人相视一笑。", "他们知道，他们已经走上了不同的路。但他们的心，还是连在一起的。", "聚会结束的时候，已经是凌晨一点了。", "三个人站在火锅店门口，看着深圳的夜景。", "城市的灯光很亮，车流不息。这是一个永远不会停下来的城市。", "“我们还会再见面吗？”林诗涵突然问。", "“当然会，”张小辉说，“我们又不是不见了。”", "“那就好，”林诗涵笑了，“我不想失去你们这两个朋友。”", "“不会的，”马胜利说，“我们是朋友。一辈子的朋友。”", "三个人站在那里，看着深圳的夜空。", "夜空中没有星星，只有来来往往的车灯和远处写字楼的霓虹。", "但他们觉得，这个夜晚，比任何星星都要明亮。", "“再见。”林诗涵说。", "“再见。”张小辉说。", "“再见。”马胜利说。", "他们各自转身，走向不同的方向。", "但他们知道，这不是永别。", "这是新的开始。", "很多年后，当人们谈起直播时代的故事，总会提到这三个人的名字。", "马胜利，后来成为业内知名的MCN老板。他的公司签约了超过五百个主播，帮助无数普通人实现了梦想。他的故事被写进了很多教材，成为商学院经典案例。", "林诗涵，后来成为女性消费领域的领军人物。她的”氧气文化”成为行业标杆，她本人也成为无数年轻女孩的偶像。她经常说一句话：“不要害怕失败，不要害怕重来。只要你足够努力，就一定能改变命运。”", "张小辉，后来成为教育赛道的头部达人。他的英语课程影响了超过一百万学生，他的”星火计划”资助了超过一千个贫困学生。他后来出了一本书，叫《直播时代的追梦人》，成为当年的畅销书。", "但每当有人问他们，这辈子最骄傲的事情是什么的时候，他们总会说同一句话：", "“我从来没有忘记，自己是从哪里来的。”", "这是他们的答案。"], ["也是这个时代，给他们的最好的礼物。", "《直播时代》全文完", "第40章 大结局 完", "舆论风暴来临的那天晚上，马胜利做了一个梦。", "他梦见自己站在一个十字路口，四面八方都是人。有人在喊他的名字，有人在骂他，有人举着手机拍他。他想跑，但腿像灌了铅一样，一步都迈不出去。", "他惊醒的时候，全身都是汗。", "窗外，杭州的夜色很安静。但他的手机屏幕亮着——后台消息99+。", "他拿起手机，看到了一条新闻推送：", "“网曝知名主播’张小辉教英语’涉嫌学术造假，平台回应：正在调查”", "他的心一下子沉到了谷底。", "他立刻给张小辉打电话。电话响了很久，没人接。", "他又给林诗涵发微信。消息发出去，显示”对方已读”，但没有回复。", "他突然意识到，这三个人，可能都出事了。", "他做了一个决定。", "他打开电脑，开始写一份声明。", "声明的内容很简单：他愿意用自己的人品和账号信誉，为张小辉和林诗涵担保。如果他们两个有任何问题，他愿意承担连带责任。", "王二蛋看到那份声明的时候，整个人都傻了。", "“老马，你疯了吗？”王二蛋说，“你知不知道你在干什么？你这是把自己往火坑里推！”", "“我知道。”马胜利说。", "“那你为什么还要这么做？”", "马胜利沉默了很久，然后说：“因为他们是我的朋友。”", "“朋友？”王二蛋说，“你们认识才多久？半年？一年？你们算什么朋友？”", "“够了。”马胜利说，“他们在我最难的时候帮过我。现在轮到我了。”", "王二蛋看着他，突然说不出话来。", "他认识马胜利二十年。他知道马胜利是个什么样的人——实在、重情义、不爱说话。但他也知道，马胜利不是一个会冲动做事的人。", "“你真的想清楚了吗？”他问。", "“想清楚了。”马胜利说，“我这辈子做对了很多事，也做错了很多事。但有一件事我从来没做错——我对得起我的朋友。”", "他点击了”发布”按钮。", "那份声明，在网上炸开了锅。", "张小辉看到马胜利的那份声明的时候，正坐在出租屋里，对着一面镜子发呆。", "镜子里的人，脸色苍白，眼窝深陷，胡子拉碴，像一个刚从战场上爬下来的士兵。"], ["他已经三天没有睡觉了。", "那三天里，他经历了这辈子最黑暗的时刻——账号被封、粉丝被攻击、有人甚至人肉搜索了他的家庭地址，发到了网上。", "他不知道自己还能做什么。", "他想过放弃。他想过认输。他想过就此消失，从此不再出现在网络上。", "但就在他快要彻底绝望的时候，他看到了马胜利的那份声明。", "“我愿意用我的人品和账号信誉，为张小辉和林诗涵担保。如果他们有任何问题，我愿意承担连带责任。”", "他看着那句话，愣了很久。", "然后，他站起来，走到电脑前，打开了摄像头。", "那场直播，是他这辈子做过的最重要的一场直播。", "他没有任何准备，没有任何稿子。他就那样坐在镜头前，对着那些还在涌入直播间的黑粉，开始说话。", "“我知道你们想看什么。”他说，“你们想看我被骂，想看我认输，想看我消失。”", "“但我不会。”", "他的声音很平静，平静得不像是在面对一场网暴。", "“我今天不辩解。我只讲事实。”", "然后他开始展示证据——他的教师资格证、他的学历证书、他的从业经历、他的所有学生的好评截图。", "他把这些证据一个一个地念出来，每一个证据都配上原始链接。", "“你们说我没有教师资质，这是我的教师资格证，编号是……”", "“你们说我学历造假，这是我的大学毕业证，编号是……”", "“你们说我骗钱，这是我所有学生的评价截图，你们可以自己去核实……”", "他念了两个小时。", "直播间的观众从一开始的几千人，慢慢涨到了几万人。", "那些黑粉还在骂，但慢慢地，弹幕里开始出现了不同的声音——", "“我查了，张老师的教师资格证是真的。”", "“我也是张老师的学生，他讲课真的很好。”", "“那些黑粉到底是谁派来的？”", "“支持张老师！”", "那天晚上，张小辉的直播间同时在线人数突破了十万。", "直播结束之后，他做了一件事。", "他拿出那封他珍藏了很久的信——那封农村女孩寄来的感谢信，那封写着”张老师的免费视频帮我高考英语考了130分”的信。", "他把这封信的内容，一个字一个字地念了出来。"], ["“我不知道那些黑我的人是谁，”他说，“但我知道我是谁。我是一个老师，一个想让更多孩子学好英语的老师。这就够了。”", "他说完这句话，关闭了直播。", "他一个人坐在那个空荡荡的出租屋里，泪流满面。", "但这一次，不是绝望的泪，而是释然的泪。", "他知道自己赢了。", "不是因为粉丝涨了多少，不是因为收入涨了多少，而是因为他证明了一件事：", "好内容，永远不会被埋没。", "林诗涵没有辩解。", "她知道，在这个时代，辩解是没有用的。越辩解，争议越大；争议越大，热度越高；热度越高，真相越容易被淹没。", "她选择了一个更聪明的方式——她做了一期视频，标题是：", "《我是如何从职场PUA中走出来的》", "视频里，她讲了一个故事。", "一个普通女孩的故事。", "她讲了自己怎么来到杭州，怎么进入一家互联网公司，怎么遇到一个上司，怎么被骚扰，怎么选择反抗，怎么被迫离职。", "她没有点名。没有提到任何具体的名字，没有提到任何具体的公司。", "她只是把那段经历，像撕开一道旧伤疤一样，当着所有人的面，一点一点地讲了出来。", "“我知道你们想看什么。”她在视频里说，“你们想看我被骂，想看我消失，想看一个’绿茶’被打倒。”", "“但我今天不讲那些。”", "“我今天只讲一件事：我为什么要做主播。”", "她停顿了一下，然后说：", "“因为我不想让更多女孩经历我经历过的事情。”", "“我做主播，不是为了赚钱，不是为了出名。我是想告诉那些跟我一样的女孩：你们不是一个人。”", "“有人在陪着你们。”", "那期视频发出去之后，整个行业都安静了。", "那些曾经骂她的人，突然不知道该说什么了。", "那些曾经支持她的人，开始疯狂转发。", "那期视频在24小时内的播放量突破了一千万。", "评论区里，无数女孩留下了自己的故事——", "“涵涵姐，我也是被上司骚扰过的，我能理解你的感受。”", "“涵涵姐，谢谢你讲出来。我一直不敢说，但你让我觉得，我可以说。”", "“涵涵姐，加油！我们支持你！”", "林诗涵看着那些评论，一个人坐在电脑前，哭了很久。", "她知道，这不仅仅是一场舆论的胜利。", "这是一次真正的觉醒。"], ["官方媒体介入调查的消息，是在一周后传来的。", "那篇报道的标题是：《“网暴产业链”调查：揭秘MCN行业的水军乱象》", "报道里详细披露了涛哥团队的操作模式——他们有2000多个账号，专门接单造谣、人肉搜索、舆论操控。半个直播圈都是他们的客户。", "报道里还提到了韩冰冰的名字。", "韩冰冰是业内知名的MCN老板，靠签约和收购积累了上百个账号。但他的口碑很差——很多被他签约的主播，最后都跟他闹翻了。", "报道发出后，平台立刻采取了行动。", "涛哥的团队被端了。二十多个水军头子被抓。", "韩冰冰的账号被永久封禁。", "而林诗涵和张小辉的账号，在经过官方审核之后，正式解封。", "解封那天，张小辉发了一条视频。", "视频里，他站在镜头前，对着所有人鞠了一躬。", "“谢谢你们。”他说，“谢谢每一个相信我的人。”", "评论区里，粉丝们留下了上万条留言——", "“张老师，我们等你好久了！”", "“欢迎回来！”", "“那些黑粉滚蛋！”", "林诗涵也在同一时间发了一条视频。", "“谢谢你们。”她说，“这一路走来，有太多人在支持我。你们让我知道，我做的事情是有意义的。”", "评论区里，有人说：“涵涵姐，你是我们的国民姐姐！”", "从那天起，“国民姐姐”这个称号，正式落在了林诗涵头上。", "而马胜利，因为那份声明，口碑暴涨。", "很多人开始关注他——不是因为他的建材内容，而是因为他在那场舆论风暴中展现出来的人格魅力。", "“马哥，你是真汉子！”", "“马哥，仗义！”", "“马哥，以后你的课我全买！”", "马胜利看着那些评论，一个人坐在办公室里，笑了。", "他想起了自己在建材城站柜台的那些年。那时候，他以为自己这辈子就这样了——每天卖瓷砖，每天跟客户讨价还价，每天为了几百块钱的提成跑断腿。", "他没想到，十年后，他成了行业内公认的”最仗义的人”。", "他没想到，人生可以有这样的可能。", "那场舆论风暴之后，整个直播行业迎来了一场大洗牌。", "国家出台了《网络直播营销管理办法》，对主播的资质、内容、带货行为都做了严格的规定。很多不合规的MCN公司，一夜之间倒闭了三分之一。"], ["马胜利的公司也受到了冲击。", "但他没有慌。", "他关了MCN公司，转型做”直播培训”。", "他开始教那些传统行业的人做直播——有农民，有工厂老板，有下岗工人，有刚毕业的大学生。", "他的第一期培训班，只有十个人。", "但他认真教。每一节课，他都精心准备，每一个案例，都来自他这几年的实战经验。", "第一期培训班结束后，十个人里，有六个成功开启了直播账号，其中两个，月流水突破了十万。", "消息传出去之后，第二期培训班，来了五十个人。", "第三期，一百个人。", "第四期，两百个人。", "马胜利站在讲台上，看着台下那些求知若渴的眼睛，突然想起了自己当年在建材城站柜台的日子。", "那时候，他以为自己这辈子就这样了。", "但现在，他站在讲台上，给别人讲课。", "人生，真的是一场奇妙的旅程。", "转型做培训之后，马胜利的生活发生了很大的变化。", "他不再需要每天盯直播数据，不再需要为了一个广告跟品牌方讨价还价，不再需要为了流量熬夜到凌晨三点。", "他开始有时间陪家人了。", "每周六，他都会去前妻那里，接儿子小浩出来玩。他们一起去公园，一起去游乐场，一起去吃麦当劳。", "小浩最喜欢的是麦当劳的薯条。每次去，小浩都会点一大份薯条，然后一根一根地慢慢吃。", "“爸爸，”有一次小浩突然问，“你为什么不住在家里了？”", "马胜利愣了一下，不知道该怎么回答。", "“因为爸爸和妈妈，有些事情不太合。”他说。", "“什么事不合？”", "“就是……不太合。”马胜利说，“但爸爸和妈妈都爱你，这一点永远不会变。”", "小浩想了想，然后说：“那你为什么不给妈妈买个大房子？这样你们就能住在一起了。”", "马胜利笑了。", "“好，”他说，“等爸爸赚够了钱，就给妈妈买个大房子。”", "他不知道自己能不能做到。但他知道自己要努力。", "离开华星传媒的那一天，林诗涵整理了自己的办公桌。", "桌上有一个相框，是她入职那天拍的。照片里，她穿着公司的工服，笑得很开心。", "她拿起相框，看了很久，然后把它放进了抽屉里。", "她没有带走。", "不是因为不想纪念，而是因为她知道，有些东西，放下就是放下了。"], ["她成立了自己的工作室。", "工作室的名字叫”氧气文化”。", "她在自己的账号里发了一条视频，解释了为什么要叫这个名字：", "“氧气，看不见，摸不着，但每个人都离不开。我希望我做的内容，就像氧气一样——在你们最难的时候，给你们一点力量。”", "她还在那条视频里，做了一个决定：", "公开所有合作分成。", "“这个行业的很多规则，都是不透明的。”她说，“品牌方给多少钱，抽成多少，主播拿多少，从来没有公开过。但我觉得，透明才是这个行业应该有的样子。”", "“所以，从今天开始，我的每一个合作，都会公开分成比例。让你们知道，你们买的每一件东西，有多少是给我的，有多少是给品牌的。”", "那条视频发出去之后，整个行业都炸了。", "有人说她是”搅局者”，有人说她是”理想主义者”，还有人说她是”行业的良心”。", "但不管别人怎么说，她知道自己做的是对的。", "张小辉关掉了带货频道的那一天，很多粉丝不理解。", "“张老师，你带货带得好好的，为什么要关？”", "“张老师，你是不是被人威胁了？”", "“张老师，我们支持你，别放弃带货啊！”", "他看着那些评论，在电脑前坐了很久。", "他想跟粉丝们说：不是放弃，是回归。", "他关掉带货频道，是因为他想明白了一件事。", "他是一个老师，不是商人。", "他这辈子最想做的，不是卖东西，而是教书。", "他推出了一个全新的项目——《给农村孩子的英语课》。", "这个课程，完全免费。", "他联系了十几所农村学校，把他的课程视频发给了那些学校的孩子。那些孩子，很多都是第一次接触真正的英语教育。", "他还在自己的直播间里，专门开设了一个”答疑时间”。每周三晚上八点，他会在直播间里免费回答学生们的英语问题。", "这个直播间，最多的时候，同时在线人数突破了五十万。", "五十万人，同时听他讲英语。", "这是一个他从来没有想过的数字。", "但他最高兴的，不是这个数字。", "而是那些来自农村的孩子，给他发来的消息——", "“张老师，我英语考了90分！”", "“张老师，谢谢你，我终于听懂英语课了！”", "“张老师，我以后也要当英语老师，像你一样！”"], ["他看着那些消息，一个人坐在电脑前，笑了。", "他知道，这才是他这辈子最想做的事情。", "一年后，三人再次相聚。", "地点是杭州西湖边的一家茶馆。那是当初他们第一次线下见面时约定的地方——每年这个时候，都要在这里聚一次。", "林诗涵先到。", "她穿了一条白色的长裙，头发扎成一个低马尾，整个人看起来比以前更从容了。", "她的工作室已经走上了正轨。“氧气文化”每个月GMV稳定在五百万以上，但她已经不再亲自带货了。她把更多的精力放在了内容创作和公益项目上。", "她发起了一个叫”氧气计划”的公益项目，专门资助那些在大城市里漂泊的女孩。到目前为止，已经帮助了一百多个女孩。", "“涵涵！”身后传来一个熟悉的声音。", "她转过头，看到马胜利和张小辉一起走了过来。", "马胜利穿着一件深蓝色的Polo衫，身材比一年前瘦了一圈，但精神了很多。他的眼角有了一些细纹，但眼神比以前更坚定了。", "张小辉穿着一件白色的衬衫，袖子卷到手肘，戴着一副黑框眼镜，整个人看起来斯斯文文的。他的眼角有一点湿润，但脸上带着笑。", "“你们两个怎么一起来的？”林诗涵笑着问。", "“在地铁上碰到的。”马胜利说。", "“缘分啊。”林诗涵说。", "三个人坐下来，点了一壶龙井茶。", "他们聊了各自这一年的经历——马胜利的培训班，张小辉的公益课，林诗涵的工作室。", "他们也聊了各自遇到的一些困难——培训班招不到好老师，公益课经费不足，工作室团队不稳定。", "但不管遇到什么困难，他们都知道，自己不是一个人在战斗。", "“来，”马胜利举起茶杯，“敬我们的友情。”", "“敬友情！”林诗涵和张小辉同时举杯。", "三只茶杯碰在一起，发出清脆的响声。", "那一刻，西湖的波光粼粼，远处的雷峰塔在夕阳下闪着金光。", "三个普通人的故事，在这个时代里，写下了属于他们的一页。", "行业大洗牌的那一年，淘汰了很多，但也留下了很多。", "马胜利的培训班，已经培训了超过一万名学员。他的学员里，有农民，有工人，有大学生，有下岗工人。他们用学到的技能，在直播时代找到了自己的位置。"], ["林诗涵的”氧气文化”，成为了行业内公认的标杆。她公开分成的做法，被越来越多的主播效仿。行业正在一点一点地变得更透明、更公平。", "张小辉的免费公益课，已经惠及超过十万名农村学生。他的课程被教育部收录，成为了农村英语教学的参考材料。", "他们都找到了自己新的方向。", "他们都知道，这不是终点，而是新的起点。", "那天晚上，三个人在茶馆里聊到了很晚。", "临别的时候，林诗涵说了一句话：", "“不管这个行业怎么变，我们都不能变。”", "“不能变成什么？”张小辉问。", "“不能变成我们当初讨厌的那种人。”林诗涵说。", "马胜利点点头：“说得好。”", "三个人相视一笑，各自踏上了回家的路。", "杭州的夜色很美。西湖边的路灯一盏一盏地亮着，像一条闪烁的银河。", "他们知道，明天又是新的一天。", "而他们，已经准备好了。", "赵公子第一次见到林诗涵的时候，是在她的直播间里。", "他刷了三十个嘉年华。", "三十个嘉年华，等于九万块。", "那是林诗涵做主播以来，收到的最大一笔打赏。", "她当时吓了一跳。她不知道为什么有人会这么大方。她私信赵公子，想问问他是谁，为什么要给她刷这么多。", "赵公子的回复很简短：“喜欢你的内容，仅此而已。”", "林诗涵不太信。她觉得世界上没有无缘无故的好意。", "但她也没有多问。她只是继续做自己的直播，继续发自己的视频，继续帮那些需要帮助的女孩。", "赵公子一直在背后默默支持她。", "他帮她拿到了第一笔投资，条件是”不求回报”。", "他说：“我不需要你回报我。我只是觉得，你做的事情是对的。”", "林诗涵问他：“你为什么要帮我？”", "他想了想，说：“因为你让我相信，这个世界上还有真诚的人。”", "林诗涵愣了很久，不知道该说什么。", "她最后说了一句话：“谢谢你。”", "赵公子笑了：“不用谢。我只是做了我应该做的事情。”", "从那以后，他们成了朋友。", "不是那种轰轰烈烈的友情，而是一种淡淡的、彼此信任的友情。", "有时候，赵公子会在林诗涵的直播间里刷一个小礼物。不是嘉年华，只是一个小心心，一块钱。", "林诗涵会笑着说：“谢谢赵公子。”"], ["赵公子会回一个表情：“应该的。”", "这就够了。", "离婚三年后的一个晚上，王二蛋找到马胜利，两个人喝到天亮。", "王二蛋是马胜利的发小，从小一起长大的哥们儿。当年是王二蛋拉马胜利刷慢手，才有了后来的故事。", "那天晚上，王二蛋终于说出了那句憋了十年的话。", "“老马，”他举着酒杯，眼睛红红的，“那年我拉你刷慢手，你知道我最初的想法是什么吗？”", "“什么？”马胜利问。", "“我想让你开心点。”王二蛋说，“那段时间你状态太差了。跟陈芳天天吵架，工作也不顺，整个人像行尸走肉一样。我怕你出事。”", "他顿了顿，声音有点哽咽。", "“我没想到，一个刷慢手的念头，彻底改写了你的人生。”", "马胜利看着他，突然笑了。", "“是啊，”他说，“我这辈子做对了很多事，也做错了很多事。但有一件事我从来没后悔过——我遇到了你们这些朋友。”", "“老马……”王二蛋的眼眶更红了。", "“别煽情了，”马胜利举起酒杯，“来，喝酒。”", "两个人碰了杯，一口闷了。", "窗外，杭州的夜色很安静。远处的钱塘江在月光下闪着波光。", "两个中年男人，坐在小酒馆里，喝着便宜的啤酒，聊着那些年一起走过的日子。", "人生得一知己，足矣。", "林诗涵把妈妈接到城里买房子那天，是她这辈子最高兴的一天。", "妈妈站在那个八十平米的新房子里，看着窗外的城市夜景，愣了很久。", "“涵涵，”她说，“这都是你买的？”", "“是啊，妈。”林诗涵说。", "“花了多少钱？”", "“一百二十万。”", "妈妈的眼睛瞪得圆圆的：“一百二十万？！涵涵，你怎么会有这么多钱？”", "林诗涵笑了：“妈，你女儿有本事呗。”", "妈妈看着她，眼眶红了。", "她想起自己一个人把女儿拉扯大的那些年。那些艰难的日子，那些被人说闲话的日子，那些咬着牙熬过来的日子。", "“涵涵，”她说，“妈这辈子最骄傲的事情，就是养了你这个女儿。”", "林诗涵抱住妈妈，眼泪在眼眶里打转。", "“妈，”她说，“谢谢你。”", "“谢什么？”", "“谢谢你当年没有放弃我。”", "妈妈愣了一下，然后紧紧地抱住了她。"], ["那天晚上，林诗涵在自己的账号里发了一条视频。她第一次在镜头前讲起了自己的原生家庭——单亲、牌头镇、母女相依为命的日子。", "“我不是没有软弱过，”她说，“但我选择了站起来。”", "评论区里，无数人被感动了。", "有人说：“涵涵姐，你是我们的榜样。”", "有人说：“我也来自单亲家庭，我懂你的感受。”", "有人说：“涵涵姐，加油！”", "林诗涵看着那些评论，笑了。", "她知道，这才是她真正想做的事情。", "不是为了赚钱，不是为了出名，而是为了告诉那些跟她一样的女孩：", "你们不是一个人。", "妹妹的手术成功那天，张小辉跪在了镜头前。", "那是一个普通的下午。他正在直播，跟粉丝们分享他这一路走来的故事。", "他讲了自己来自甘肃定西的小村子，讲了爸妈供他读书的艰辛，讲了妹妹生病后他一个人扛下来的日子。", "他讲着讲着，眼泪就流了下来。", "“很多人问我，”他说，“小辉，你带货赚了这么多钱，妹妹的手术费是不是靠带货赚的？”", "“不是。”", "“手术费不是带货赚的。是央视报道了我的故事之后，无数好心人主动捐款。他们不认识我，不了解我，但他们愿意相信我。”", "“是他们救了我妹妹，也救了我的初心。”", "他说完这句话，跪在了镜头前，对着所有观众，重重地磕了一个头。", "“谢谢你们。”", "弹幕里，评论区里，全是”张老师加油”、“张老师不哭”、“支持张老师”。", "那天晚上，他从杭州坐了三十个小时的绿皮火车回老家。", "他把直播设备留在了城市里。", "他只想回家，见妹妹一面。", "马胜利和苏小暖领证那天，没有办婚礼。", "他们只是去民政局领了一张证，然后在附近的小饭馆吃了一顿火锅。", "苏小暖穿着一条红色的连衣裙，马胜利穿着一件白衬衫。两个人看起来都很朴素，但都很开心。", "“小暖，”马胜利说，“委屈你了。”", "“委屈什么？”苏小暖问。", "“没有婚礼，没有钻戒，什么都没有……”", "“我要那些干什么？”苏小暖笑了，“我要的是你这个人，不是那些东西。”", "马胜利看着她，突然觉得鼻子有点酸。"], ["他想起了第一次在直播间里看到她的那个夜晚。那时候，他刚刚离婚，一个人躺在黑暗的客厅里，不知道明天在哪里。", "然后他看到了她。", "她穿着一件白色的T恤，扎着一个马尾辫，在镜头前跳一支简单的舞。", "她说：“你们看看窗外，今天的月亮很亮。”", "他看着那句话，眼泪一下子就涌了出来。", "“你什么时候开始喜欢我的？”苏小暖突然问。", "“就是那一晚，”他说，“你说’今天的月亮很亮’那一晚。”", "苏小暖愣了一下，然后笑了。", "“那是我直播以来最敷衍的一期内容，”她说，“我那天状态很差，跳得乱七八糟的。”", "“可那是我离婚后，听过的最温暖的一句话。”马胜利说。", "苏小暖看着他，眼眶红了。", "“马胜利，”她说，“你这辈子没说过几句情话，这是最动听的一句。”", "两个人相视一笑，继续吃火锅。", "窗外的夜色很美。今晚的月亮，真的很亮。", "马胜利给儿子小浩写信那天，是小浩的生日。", "他坐在书桌前，对着台灯，想了很久，不知道该怎么开头。", "他想起了小浩三岁时搭积木的场景。那是一座火神山医院——那座积木火神山，是他人生的转折点。如果没有那座积木，他可能永远都不会开始做视频。", "他提笔，写下了第一行字。", "“小浩：”", "“你三岁的时候，用积木搭了一座火神山医院。那座火神山，是爸爸人生的转折点。”", "“如果没有那座火神山，爸爸可能永远都不会开始做视频，不会遇到那些帮助我的人，也不会有今天的一切。”", "“爸爸做错过事。爸爸和妈妈离婚了，让你小小年纪就承受了不该承受的东西。爸爸对不起你。”", "“但爸爸一直在努力。努力成为一个更好的人，努力成为你值得骄傲的爸爸。”", "“小浩，爸爸希望你以后也能找到属于自己的’火神山’。不管是什么，只要是你真正热爱的东西，就去追求它。”", "“不要管别人怎么说，不要管别人怎么看。只要你觉得是对的，就去做。”", "“爸爸永远爱你。”", "他写完信，把它装进信封，递给了前妻陈芳。", "“帮我转交给小浩，”他说，“等他长大了再给他看。”", "陈芳接过信，看了他一眼，没有说话。"], ["她知道，这封信里装的，是一个父亲最深沉的爱。", "三人受邀参加一档访谈节目那天，演播厅里坐满了观众。", "主持人问了很多问题，关于直播，关于流量，关于这个时代。", "但让观众印象最深刻的，是最后一个问题。", "“如果用一个词来形容这个时代给你们带来了什么，你们会用什么词？”", "马胜利想了想：“机会。”", "“机会？”", "“是的，”他说，“这个时代给了我们这些普通人一个机会。一个被看见的机会，一个改变命运的机会。我以前在建材城站柜台，没有人知道我是谁。但现在，我可以用我的经验，帮助更多的人。这是我以前想都不敢想的事情。”", "主持人点点头，转向林诗涵：“林诗涵呢？”", "林诗涵说：“勇气。”", "“勇气？”", "“是的，”她说，“这个时代给了我勇气。让我敢于站出来，说出我经历的事情。让我敢于告诉那些跟我一样的女孩：你们不是一个人。”", "主持人又转向张小辉：“张小辉呢？”", "张小辉想了想：“被看见的可能。”", "“被看见的可能？”", "“是的，”他说，“我来自甘肃定西的一个小村子。在以前，像我这样的人，永远不会被大城市的人看见。但这个时代，给了我一个被看见的可能。我可以通过直播，把我的知识传递给山区的孩子。他们也可以看见我。”", "演播厅里响起了掌声。", "主持人说：“谢谢三位。你们的回答，让我想起了一句话——不是时代选择了我们，是我们选择了这个时代。”", "三个人对视了一眼，然后一起笑了。", "马胜利接到那个电话的时候，正在给学员上课。", "电话是一个陌生号码打来的。他看了一眼，没接，继续上课。", "下课后，他回拨了那个号码。", "“您好，请问是马胜利先生吗？”", "“是的，我是。请问您是？”", "“您好，我是慢星平台创始人李明的助理。我们李总想约您见一面，不知道您方便吗？”", "马胜利愣了一下。", "慢星平台的创始人？那可是互联网圈的大佬，身价几百亿的那种人。他为什么会找自己？", "“李总找我有事吗？”他问。", "“李总说，他对您的培训业务很感兴趣，想谈谈合作。”", "“什么合作？”", "“这个……李总说想当面聊。”"], ["马胜利想了想，说：“好。什么时候？”", "“明天上午十点，可以吗？”", "“可以。”", "挂掉电话，马胜利站在原地愣了很久。", "他不知道等待他的会是什么。", "但他隐隐觉得，这可能是一个很大的机会。", "李明的办公室在杭州最贵的写字楼里，落地窗可以俯瞰整个钱塘江。", "马胜利坐在他对面，听他说完收购方案。", "“我们出价五千万，收购您百分之百的股份。”李明说，“您以后就是我们的职业经理人，负责整个平台的直播培训业务。”", "五千万。", "这个数字，是马胜利这辈子都没有想过的。", "他可以拿这五千万，买一套大房子，给儿子和前妻一个安稳的生活。他可以拿这五千万，实现财务自由，想干什么就干什么。", "他可以拿这五千万，退休，再也不用这么辛苦。", "他沉默了很久。", "“李总，”他终于开口，“谢谢您的好意。但我不能接受。”", "李明愣了一下：“为什么？”", "“因为我想做一件更慢、更久的事。”马胜利说，“真正的教育，不是靠钱能堆出来的。我要的东西，资本给不了我。”", "“你要的是什么？”", "“我想要，”马胜利说，“让更多普通人，学会直播这门技能。不是为了赚快钱，而是为了让他们有一技之长，能在这个时代站稳脚跟。”", "李明看着他，突然笑了。", "“马胜利，”他说，“你知道吗？我找你，不是为了买你的公司。”", "“那是为什么？”", "“我是想投资你这个人。”李明说，“你的价值观，你的理念，正是这个行业需要的。”", "他从桌上拿起一张名片，递给马胜利。", "“这是我的私人联系方式。如果有一天你需要帮助，打这个电话。”", "马胜利接过名片，愣了很久。", "“谢谢您，李总。”他说。", "“不用谢。”李明站起来，跟他握手，“中国需要更多像你这样的人。”", "那天晚上，马胜利一个人走在回家的路上，看着杭州的夜景，心里很平静。", "他知道自己做了一个对的决定。", "五年后，三人再次相聚。", "地点是一所偏远的乡村小学。", "那所小学在贵州的大山里，只有一百多个学生，大多是留守儿童。他们的父母都在沿海城市打工，一年回来一次。", "三人在那里建了一个”直播梦想教室”。"], ["教室里配备了电脑、网络摄像头、麦克风，还有一个大屏幕。", "林诗涵负责教孩子们怎么用镜头表达自己。她的课程叫”发现你的美”——教那些山里的女孩，发现自己的优点，建立自信。", "张小辉负责教孩子们学英语。他的课程叫”让世界听见你”——让那些山里的孩子，也能接触到外面的世界。", "马胜利负责教孩子们基础的市场营销技能。他的课程叫”把你的故事卖出去”——教那些山里的孩子，怎么把自己的家乡、自己的文化，介绍给更多的人。", "开学那天，三个人的直播间同时开播。", "那一天，全国有超过一千万观众，通过直播，看到了这所大山里的小学，看到了那些留守儿童的笑脸。", "很多人在评论区里说：“我想给这些孩子捐点什么。”", "三个人相视一笑。", "这就是他们想要做的事情。", "回望2020年除夕那个随手一拍的视频，马胜利感慨万千。", "那个视频里，三岁的小浩用积木搭了一座火神山医院，然后对着镜头说：“爸爸，火神山，搭好了！”", "那个视频的播放量只有几百，没有任何人关注。", "但那是改变他人生的第一个视频。", "如果那个晚上，他没有拍下那个视频……", "他不敢想。", "“时代给了我们一扇门，”他在一次演讲中说，“推开它，需要勇气。但真正重要的，不是推开门的那一刻，而是在门后，你选择做什么。”", "“你可以选择追名逐利，可以选择急功近利，可以选择随波逐流。”", "“但你也可以选择——做一个对社会有用的人。”", "“这就是我选择了的路。”", "演讲结束后，一个年轻人走到他面前。", "“马老师，”年轻人说，“我是一个来自农村的大学生。我看了您的演讲，很感动。我想问您一个问题。”", "“什么问题？”", "“如果我什么都没有，我能成功吗？”", "马胜利看着他，笑了。", "“没有人是什么都有的，”他说，“每个人都是从什么都没有开始的。”", "“关键不是你有什么，而是你想要什么，以及你愿意为此付出多少。”", "“你愿意付出多少？”", "年轻人想了想，说：“一切。”", "马胜利拍了拍他的肩膀：“那就够了。”", "镜头缓缓拉远。"], ["在那片乡村小学的操场上，三个人的身影渐渐变小。但他们的声音，越来越清晰——", "那是林诗涵在教孩子们唱歌。", "“你们知道吗？你们是这个世界上最棒的。”", "那是张小辉在纠正孩子们的英语发音。", "“发音要标准，但更重要的是，要有自信。”", "那是马胜利在调试直播设备。", "“让更多人看到你们，让世界听见你们的声音。”", "三个普通人的声音，在这个时代里，交汇成了一束光。", "那年除夕，马胜利随手拍了一个视频。", "三岁的小浩用积木搭了一座火神山医院，对着镜头说：“爸爸，火神山，搭好了！”", "那个视频只有几百播放量，没有任何人关注。", "但那是改变一切的开始。", "从那个视频开始，他踏入了直播时代。", "他遇到了张小辉，遇到了林诗涵，遇到了苏小暖，遇到了王二蛋，遇到了无数帮助他的人，也遇到了无数他想要帮助的人。", "他失去过，也得到过。", "他迷茫过，也坚定过。", "他失败过，也成功过。", "但最重要的是，他从来没有忘记自己是谁。", "很多年后，有人问马胜利：“你觉得这个时代给你带来了什么？”", "他想了很久，然后说：", "“它给了我一个机会。”", "“一个被看见的机会。”", "“一个改变命运的机会。”", "“但更重要的是，它让我明白了——”", "“真正的成功，不是赚了多少钱，不是出了多大的名。”", "“而是你帮助了多少人，你影响了多少人，你让这个世界变得好了多少。”", "“这才是衡量一个人价值的真正标准。”", "镜头继续拉远。", "在那片操场上，三个人的身影越来越小，但他们的故事，正在被更多的人传颂。", "林诗涵后来成为了女性成长领域的标杆人物。她的”氧气计划”帮助了超过一万名在大城市漂泊的女孩。", "张小辉后来出了一本书，叫《直播时代的追梦人》。这本书被翻译成十几种语言，在全世界发行。", "马胜利后来被邀请到大学做演讲。他的故事被写进了商学院教材，成为了无数年轻人的激励。", "但他们三个人从来没有忘记自己来自哪里。", "每次重聚，他们都会回到那所乡村小学，回到那个”直播梦想教室”，跟那些孩子们待几天。", "因为他们知道，这才是他们做这些事情的真正意义。"], ["「不是时代选择了我们，是我们选择了这个时代。」", "那一天，在那所乡村小学的操场上，三个人的声音汇聚在一起，对着镜头说：", "“我们都是普通人。”", "“我们都来自普通的地方。”", "“我们都做过普通的工作。”", "“但在这个时代里，我们找到了自己的光。”", "“你也可以。”", "“因为我们相信——”", "“每一个普通人，都值得被看见。”", "《直播时代》全文完"]];var c=0;function r(){document.getElementById("content").innerHTML=p[c].map(function(x){return"<p>"+x+"</p>"}).join("");document.getElementById("pi").innerHTML="第 "+(c+1)+" 页 / 共 "+p.length+" 页";document.getElementById("pb").disabled=c===0;document.getElementById("nb").disabled=c===p.length-1;document.getElementById("reader").scrollTop=0}function np(){if(c<p.length-1){c++;r()}}function pp(){if(c>0){c--;r()}}document.addEventListener("keydown",function(e){if(e.key==="ArrowLeft")pp();if(e.key==="ArrowRight")np()})r();</script></body></html>
