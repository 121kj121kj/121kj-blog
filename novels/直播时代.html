<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>直播时代 - 121KJ</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Noto Serif SC","Source Han Serif SC","方正书宋",serif;background:#f5f0e8;color:#2c2c2c;line-height:2;font-size:1.05rem;overflow:hidden}.top-bar{background:#0a0a0f;padding:10px 0;text-align:center;position:fixed;top:0;left:0;right:0;z-index:10}.top-bar a{color:#818cf8;text-decoration:none;font-size:.85rem}.reader{max-width:700px;margin:0 auto;padding:50px 20px 80px;height:100vh;overflow-y:auto}.reader .title{text-align:center;font-size:1.1rem;font-weight:600;padding-top:10px;margin-bottom:8px}.reader p{text-indent:2em;margin-bottom:6px;text-align:justify;font-size:1.02rem;line-height:2}.nav-bar{position:fixed;bottom:0;left:0;right:0;background:#f5f0e8;border-top:1px solid #ddd;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;z-index:10}.nav-bar span{font-size:.8rem;color:#888}.nav-btn{padding:8px 20px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#333;font-size:.9rem;cursor:pointer}.nav-btn:disabled{opacity:.3;cursor:default}.tap-area{position:fixed;top:50px;bottom:60px;left:0;right:0;z-index:5}.tap-left,.tap-right{position:absolute;top:0;bottom:0;width:40%}.tap-left{left:0}.tap-right{right:0}</style></head><body><div class="top-bar"><a href="/">← 返回首页</a></div><div class="reader" id="reader"><div class="title">《直播时代》</div><div id="content"></div></div><div class="nav-bar"><button class="nav-btn" id="pb" onclick="pp()">← 上一页</button><span id="pi"></span><button class="nav-btn" id="nb" onclick="np()">下一页 →</button></div><div class="tap-area"><div class="tap-left" onclick="pp()"></div><div class="tap-right" onclick="np()"></div></div><script>var p=[["二〇二〇年除夕。", "寒潮从北边压过来的时候，马胜利正坐在老家客厅的旧皮沙发上。那张沙发是他结婚时买的，布艺面料早已磨出了白印子，坐垫塌陷出一个浅浅的弧度，整个人窝进去，像是陷在一块发霉的海绵里。窗外没有一声炮仗。没有一盏礼花。这个年，和往年任何一个年都不一样。", "手机屏幕亮起来的那一刻，整个客厅的空气都凝固了。", "武汉封城的消息，像一颗炸弹扔进了这个普通的三线城市的除夕夜。马胜利盯着手机屏幕上那些滚动的数字——确诊、疑似、死亡——每一个词都像一把钝刀子，一下一下地割着这个国家所有人的神经。数字还在涨。不是一百，不是一千，而是那种让人看了就头皮发麻的指数级增长。", "他下意识地抬起头，看了一眼窗外。天已经暗了，路灯的光在玻璃上投下一层昏黄，什么都看不清。", "手机又震了一下。是朋友圈的刷屏——不是新年的祝福，而是蜡烛，是一个又一个蜡烛表情，配着”武汉加油”四个字。有人转发官方通告，有人分享不知道是真是假的”内部消息”，有人发语音，声音里带着颤。马胜利把这些页面翻了个遍，然后烦躁地把手机扣在茶几上。", "电视还开着。央视的春晚正在热热闹闹地上演，舞台上五颜六色的灯光打在主持人的脸上，朱军那张熟悉的脸笑得一如既往。但没有人看。没有人能笑得出来。", "厨房里传来陈芳的声音：“马胜利，吃饭了。”", "他没有动。", "马胜利今年三十岁。三十岁，是一个男人最尴尬的年纪——上有老，下有小，中间还压着一份还到2035年的房贷。他的脸是那种典型的北方汉子的脸：颧骨高，下巴方，皮肤被十年建材生意晒得黧黑发亮，额头上有两条浅浅的抬头纹，那是长年累月皱眉谈价格留下的痕迹。他的眼睛不大，但眼神里总是带着一种精明劲儿——那是在无数次讨价还价中练出来的，一眼就能扫出对方是真心买还是来比价的。", "但今天这双眼睛里，没有精明。只有茫然。"], ["他坐在这张旧沙发上，看着窗外黑漆漆的夜色，觉得自己像是被什么东西困住了。不是被疫情困住，是被人生困住。他三十岁，有老婆有儿子，有一个压在身上的房贷，有一仓库卖不动的瓷砖。建材城因为疫情不知道什么时候才能开门，老婆陈芳每个月工资还完房贷就剩个零头，儿子的奶粉钱、尿布钱、一家三口的吃喝拉撒，全靠他那点不知道什么时候才能到账的货款。", "他想起年前去盘点仓库的那个下午。仓库里堆满了瓷砖样品，花色各异，堆得像座小山，但没有一个人来看货。保安老张坐在门口抽烟，看见马胜利走过，喊了一声：“马总，今年生意不行啊。”他笑了笑，没说话。他能说什么呢？说”是啊不行”？还是说”没事会好的”？他知道，那些话说出来，连自己都不信。", "手机又亮了。", "他把手机拿起来，下意识地想看看是不是催债的——但屏幕上弹出来的不是债务信息，而是一条慢手（快手）的推送。那个App他手机里一直有，但几乎从来不打开。他不知道为什么它今天会给他推送消息。", "算法推荐的第一个视频，是一个武汉的女孩在空荡荡的街头唱歌。", "她大概二十出头，穿着一件粉色的棉服，戴着口罩，但眼睛露在外面——那是一双很大的眼睛，黑白分明，眼尾微微上挑，看起来很有灵气。她的声音有点抖，背景是灰蒙蒙的长江大桥，江面上没有一条船，桥上没有人，只有风声和她的歌声。唱的是《武汉伢》，那首歌他听说过，是武汉人自己写的歌，里面有一句”我的城市生病了，但我依然爱它”。", "评论区里，有人说：“加油，武汉。”有人说：“小心被封号。”也有人说：“都什么时候了还唱歌，心真大。”还有人说：“这女孩长得挺好看的。”——什么样的声音都有。有暖心的，有恶意的，有看热闹的，有假正经的。"], ["马胜利盯着那条视频看了很久。他不知道自己为什么一直在看。他只是一个卖建材的，三十岁，有老婆有儿子，有一个压在身上的房贷，有一仓库卖不动的瓷砖。他跟武汉那个唱歌的女孩没有任何关系，甚至可能永远都不会见面。但不知道为什么，他觉得那个女孩的眼神让他心里很难受。那是一种什么样的眼神呢？不是恐惧，不是绝望，而是一种……他说不上来的东西。像是在黑暗里还想要发光的那种眼神。", "他划到了下一条视频。", "再下一条。再下一条。", "算法越来越懂他——推荐给他的，全是普通人拍自己的生活。有人拍封城期间的做饭日常，一块豆腐切成几十片，穷讲究；有人拍戴着口罩出门买菜的过程，口罩把脸勒出深深的印痕；还有人直播自己在家里做运动，跳绳、俯卧撑、平板支撑，对着手机喘粗气，评论区里有人说”加油”有人说”傻逼”。", "马胜利一条一条地划下去。", "他不知道自己看了多久。电视里的春晚不知道什么时候换成了零点倒计时的预告，厨房里的陈芳已经把饭菜热好又凉掉又热好，小浩在沙发上睡着了，裹着一条薄毯，嘴唇微微张开，呼吸均匀而轻浅。", "三岁的小浩，是马胜利在这个世界上最在乎的人。", "儿子继承了陈芳的好基因，皮肤白净，脸颊圆润得像一个小苹果。睡着的时候，眼睛眯成两道弯弯的缝，睫毛很长，安静得像一幅画。马胜利每次看着儿子，心里都会涌出一种奇怪的感觉——那种感觉不是爱，不是责任，而是某种更深的东西。像是自己的人生有了意义，又像是自己的人生正在被消耗。他说不清楚。", "他只知道，他不能让儿子过他这样的日子。", "但他能给儿子什么呢？他只有一仓库卖不动的瓷砖。", "手机屏幕还亮着。他已经划到第几十条视频了，他已经不记得了。算法推荐的内容开始重复——又是做饭日常，又是戴口罩买菜，又是直播做运动——仿佛中国人民在这场突如其来的灾难面前，能做的就只剩下这三件事。", "他突然想：为什么没有人拍点别的？", "为什么没有人在这个时刻，去记录一些真正的东西？"], ["他把这个念头想了一遍，然后笑了一下——笑自己多管闲事。他又不是什么大人物，他只是一个卖建材的，想这些干什么？", "但那个念头没有消失。它像一个种子，埋在他心里某个他自己都不知道的角落里，等着生根发芽。", "就在这个时候，他注意到了一件事。", "三岁的儿子小浩，不知道什么时候醒了。", "小浩从沙发上坐起来的时候，动作很轻，轻得像一只刚刚睡醒的小猫。他的头发乱蓬蓬的，有几根翘起来立着，像两根天线。他揉了揉眼睛，然后从毯子下面摸出一个小盒子——那是他从家里带来的积木玩具，塑料的，红的黄的蓝的绿的，拼起来能变成各种形状。", "马胜利看着儿子。", "小浩没有看他。小浩低着头，两只小手飞快地动着，把积木一块一块地拼起来。他的手指很短，指节圆润，动作笨拙但认真，那是一种孩子特有的专注——整个世界都被他关在门外，他眼里只有那堆积木。", "马胜利没有说话。他就那样看着儿子，看着他拼了一个不知道什么东西。", "“小浩，”他突然开口，“你搭的是什么啊？”", "小浩抬起头，看了他一眼。他的眼睛很亮，像两颗刚刚洗过的黑葡萄，里面有一种马胜利从来没见过的光芒。", "“火神山医院！”儿子奶声奶气地说，手里举着一块蓝色的积木，“爸爸，火神山是不是很厉害？”", "马胜利愣了一下。", "火神山医院——那座在电视上被反复提及的、正在武汉拔地而起的专门收治新冠肺炎患者的医院。十天平建奇迹，直播里的”基建狂魔”，几千万网友在线”监工”——这些他都知道。但从一个三岁孩子的嘴里说出来，它突然变得不一样了。", "他看着儿子举着积木的样子，看着儿子眼睛里那种光芒，心里有什么东西被猛地撞了一下。", "“厉害，”他说，声音有点哑，“特别厉害。”", "小浩笑了。他的笑容很干净，没有一丝杂质，那种笑是孩子才有的笑——他想什么就是什么，说什么就是什么，不用在意任何人的眼光，不用担心任何事情的后果。他只是觉得火神山厉害，所以他说了，所以他笑了。", "马胜利看着儿子的笑容，突然想起自己小时候的样子。"], ["他小时候也搭过积木。在甘肃定西的农村老家，用的是木头块，爷爷给削的，没有颜色，没有形状，粗糙得能把手指磨出泡。但他记得他搭了一个”城堡”——他那时候甚至不知道”城堡”是什么意思，只知道那是一个很大很厉害的房子。他搭完之后，举给爷爷看，爷爷笑了，拍了拍他的头，说：“好好好，我孙子有出息。”", "那是马胜利人生中第一次，也是最后一次，因为”搭东西”被夸”有出息”。", "后来他长大了，搭的东西变成了瓷砖展示墙，变成了建材仓库的货架，变成了贷款买的九十平米三室一厅的隔断。他搭的那些东西，没有人再夸他”有出息”了。客户只会问：“能不能便宜点？”老板只会说：“今年目标再加一成。”银行只会发短信：“您的房贷还款日为每月15日，请确保账户余额充足。”", "他搭的一切，都是为了还债。为了活着。为了让老婆孩子有地方住，有饭吃，有学上。", "他从来没有为自己搭过一样东西。", "他三十岁了，却从来没有为自己搭过一样东西。", "但三岁的儿子做到了——小浩搭了一座火神山医院，然后奶声奶气地告诉全世界：我搭的东西很厉害。", "马胜利看着儿子，看着儿子手里的积木，看着儿子眼睛里的那道光。", "他突然想起了什么。", "他拿起手机，打开了摄像头。", "客厅的灯光昏黄。手机屏幕的光打在马胜利的脸上，让他的五官显得有些模糊。他把手机架在茶几上，用一本书垫着，调整了一下角度——这是他以前试着拍视频时学到的笨办法。没有专业的支架，没有补光灯，只有一部用了三年的旧手机和一个不知道哪里翻出来的书。", "“小浩，”他说，“你继续搭。”", "小浩看了他一眼，没有说话，继续低头搭积木。", "马胜利看着手机屏幕，看着那个小小的画面——画面里，他的儿子低着头，专注地拼着积木，茶几上堆着红色的塑料块，客厅的背景有些杂乱，沙发套起球了，地上的拖鞋歪歪扭扭，茶几上还放着一杯凉掉的茶。一切都很普通。普通到没有什么值得被记录的。", "但他还是按下了录制按钮。", "他把镜头对准儿子，然后问了一句：“小浩，你搭的是什么啊？”"], ["然后他听到了那个回答。", "“火神山医院！爸爸，火神山是不是很厉害？”", "他看着儿子举着那块蓝色积木的样子，看着儿子眼睛里那道纯净的光。他没有犹豫，直接按下了发送。", "那条视频发出去的时候，他没有抱任何期望。", "他以为这条视频会像他以前发的那几条一样——石沉大海，毫无回音，几千个粉丝里没有一个人愿意多看一眼。那些视频讲的是瓷砖验收标准、防水涂料选购指南、装修合同避坑要点——每一条他都认真做了，每一条都花了几个小时剪辑，但每一条的播放量都只有几百。那些视频像是被什么东西封印住了，无论他怎么推，都推不出去。", "他有时候会想：是不是自己不适合做这个？是不是自己长得太土了？是不是自己说话太无聊了？是不是自己根本就不是吃这碗饭的料？", "但每次这么想完，他又会告诉自己：再试试。万一呢？", "万一呢？", "他不知道的是，这一次，命运没有让他失望。", "第二天早上。", "马胜利是被手机震醒的。", "那种震动不是普通的微信消息提示，而是一种急促的、持续的、像心跳一样的震动——他知道那是什么。那是慢手平台的”作品被推荐”通知。", "他猛地坐起来，差点把旁边的陈芳撞醒。", "“怎么了？”陈芳迷迷糊糊地问。", "“没事，你继续睡。”", "他拿着手机，躲进了厕所，把门关上，然后打开通知栏。", "屏幕上显示着一条消息：", "您的作品已被推荐至同城热门", "他愣了一下，然后点进去看数据。", "10086个赞。", "马胜利坐在马桶盖上，手机差点掉在地上。", "一万。他的一条视频，有一万个赞。", "一万个人，在昨天那个特殊的夜晚，看到了他三岁的儿子举着一块积木说”火神山是不是很厉害”。", "一万个人。", "他从来没见过这么多人为他的任何东西点赞。他卖瓷砖卖十年，卖了几千单，从来没有哪个客户对他说过”你真棒”——客户只会说”能不能再便宜点”。他发视频发了几个月，从来没有哪条视频播放量超过两千——算法就是不喜欢他，行业就是不看好的他的内容，流量就是不给他的视频推。", "但这一条，一夜之间，一万赞。"], ["他盯着那个数字看了很久。那不是一万，那是一个证据——一个证明他不是废物的证据，一个证明他的生活不是毫无价值的证据，一个证明他搭的那些乱七八糟的东西里，至少有一个，是值得被看见的证据。", "“老婆……”他转头看向厕所门的方向，“老婆！”", "陈芳迷迷糊糊地睁开眼，看了一眼他的手机屏幕，翻了个身：“大清早的吵什么吵，不就是个赞吗，有啥好激动的。”", "马胜利没有反驳。他知道老婆说的都是实话——在她眼里，那只是一个数字。但在马胜利眼里，那不是数字。那是一万个人，对他说了一句话。", "他不知道那句话是什么。但他想，那句话一定是暖的。", "他坐在床上，把那条消息翻来覆去看了十几遍。然后他把手机放下，看着窗外。天已经亮了，窗外的阳光打在玻璃上，投下一道金灿灿的光。", "他把手机拿起来，又看了一遍那条消息。", "心里那股被压抑了很久的东西，突然之间，像地底的岩浆一样，开始涌动。", "他不知道这股岩浆会把他带向哪里。他甚至不知道它是什么。但他能感觉到它在流动，在升温，在积蓄力量。像是有什么东西正在苏醒，正在挣扎，正在寻找一个出口。", "窗外，阳光正好。新年的第一天，武汉封城的第二天，中国大地上无数个普通人，正在以各自的方式，度过这个他们永远不会忘记的春节。", "而马胜利——一个三十岁的建材商，一个丈夫，一个父亲，一个在人生里挣扎了三十年的普通人——第一次感觉到，有什么东西正在改变。", "那条视频下面，有一条评论，他还没来得及仔细看。但那条评论的标题，他记住了——", "“看到最后我哭了，这个孩子太可爱了。”", "同一时间，三个城市，三个人，在同一天，做出了改变人生轨迹的选择。", "——杭州。", "林诗涵站在公司写字楼的走廊尽头，手里攥着那张刚打印出来的辞职信。走廊的灯是感应灯，她站的位置刚好不在感应范围内，灰暗的光线让她的影子拉得很长。"], ["她26岁，老家是浙江诸暨牌头镇——一个在浙江省GDP排行榜上永远垫底的小镇。那里没有高铁站，没有像样的商场，唯一出名的是每年清明节会堵车，因为在外打工的人都要回来上坟。", "她妈一个人在镇上开着一家小理发店，靠那门手艺供她读完了杭州的大学。她是牌头镇那几年唯一考上本科的女孩，整个镇子的人都觉得她有出息。", "但有出息又怎样呢？", "她在互联网公司干了三年，换来的不是升职加薪，而是陈总监一次又一次的”单独谈话”。", "“小林啊，你这个报告写得不错，晚上跟我去见个客户？”", "“小林啊，你家在外地，周末也回不去吧？正好陪我加个班。”", "“小林，你看你一个人租房子也不方便，我那儿有个空房间……”", "每一次，她都笑着拒绝了。每一次拒绝之后，她都能感觉到陈总监看她的眼神变了——那种眼神，像在看一块捂不热的石头，又像在看一只早晚会落入陷阱的猎物。", "今天，她终于把辞职信甩在了他脸上。", "“陈总，我想清楚了。”她说这话的时候，声音出奇地平静，“我不是来跟你商量，是来通知你的。明天开始，我不上班了。”", "她转身离开的时候，手是抖的。但她没有回头。", "——深圳。", "张小辉坐在出租屋的窗边，面前是一台破旧的笔记本电脑。屏幕上显示的是一张解约协议，密密麻麻的字，但他一个字都看不进去。", "他是甘肃定西农村出来的全村第一个大学生。定西在甘肃中部，属于黄土高原边缘，风沙大，土地贫瘠，一年的收成刚够糊口。他爸在工地上摔断了腿，干不了重活；他妈在家里种地，勉强维持着一家人的口粮。妹妹今年二十出头，但从小就体弱多病，每个月的药费是一笔不小的开销。", "他是靠着助学贷款读完的大学。四年下来，身上背着四万块钱的债。毕业之后，他进了这家英语培训机构，从最基础的课程讲起，一讲就是五年。五年里，他教过的学生超过三千人，好评率一直是全机构第一名。", "但双减政策来了。", "一夜之间，培训机构裁员80%。他所在的分校，只剩下三个人。他不在三个人里面。"], ["解约协议上写得很清楚：双方协商解除劳动合同，经济补偿N+1。他的工龄是五年，N+1就是六个月的平均工资。而他这五年的工资，每个月到手不到八千块。", "六八四万八。这就是他五年的全部价值。", "他关上电脑，给老家打了个电话。妈在那头说：“娃，妹妹的病又犯了，医生说再不换肾就不行了，要三十万……”", "张小辉握着手机，一句话都说不出来。三十万。他身上只有不到两万块。还差二十八万。", "他看了一眼手机桌面上那个他一直舍不得删的App——慢手。他其实很早就注册过，但从来没发过任何内容。那时候他觉得自己是个老师，不应该做那种”抛头露面”的事情。", "但现在，他还有什么可以失去的呢？", "他点开了直播按钮。", "——北京。", "封城第三天。马胜利已经连续三天，每天晚上刷慢手刷到凌晨两点。", "那条儿子搭火神山的视频，最终定格在十三万赞。这是他这辈子获得过的最大关注。", "但赞再多，也变不成钱。建材城不知道什么时候才开门，老婆的工资每个月还完房贷就剩个零头，儿子的奶粉尿布都是开销。他开始认真研究慢手到底是什么，为什么一条视频能爆成这样。", "他打开了创作者学院，一章一章地看。那些课程讲得很系统：怎么起标题，怎么选封面，怎么蹭热点，怎么让粉丝关注你，怎么把粉丝变成钱。每一个知识点都像一把钥匙，打开了他脑子里某扇一直紧闭的门。", "他决定：白天卖建材，晚上做视频。", "老婆陈芳听完他的计划，眉头皱得能夹死苍蝇：“你是不是被那些网红洗脑了？你看看那些人，整天对着手机傻笑，有什么出息？”", "马胜利没有反驳。他知道自己说不清楚。就像当年他决定辞职下海卖建材的时候，也没有人支持过他。那一次他赌赢了。这一次，他想再赌一次。", "他打开手机，给自己取了一个名字：老马说建材。", "简介写着：卖建材的老马，有娃有家有梦想。", "他开始了。", "“老马说建材”这个账号，在沉寂了整整三个月之后，终于等来了它的第一个真正意义上的爆发。", "那是一条标题叫《装修中最容易踩的5个坑，看完少花3万冤枉钱》的视频。"], ["马胜利在拍这条视频之前，花了整整三天时间做准备。", "那三天里，他把过去十年卖建材过程中遇到的真实案例，全部整理成了文字稿。十年。三千多个日夜。无数个客户的笑脸、投诉、后悔、感谢——这些东西堆在他脑子里，像一座乱糟糟的仓库，从来没有人帮他整理过。", "他用Word文档把这些案例一个一个写下来：", "案例一： 2012年，汉口某小区，李先生。贪便宜买了”广东砖”，结果是本地小厂冒充的，质量差到瓷砖表面能刮出粉来。返工花了三万。", "案例二： 2015年，武昌某业主，王大姐。签合同的时候没看清楚”按实际面积结算”这一条，结果铺砖铺到一半被告知面积超标，要加钱。不加钱就停工，加了钱又超预算。最后哭着接受。", "案例三： 2018年，汉阳某工装，甲方张总。防水涂料选错了牌子，结果卫生间刚用半年就开始渗水，楼下邻居找上门来，赔了两万。", "他写了整整十页Word文档。三号字体，单倍行距，每一个案例都写得清清楚楚——谁、什么时候、因为什么、吃了什么亏、损失了多少钱。", "写完之后，他把这十页文档打印出来，又看了三遍。", "他想把这些东西讲出来。他想让更多人不要重蹈覆辙。", "这种感觉在他心里憋了很久了。作为一个卖建材的，他见过太多人吃亏。上当的人里面，有钱的没钱的、有文化的没文化的、有经验的没经验的，各式各样。但他发现，所有吃亏的人都有一个共同点：他们不懂。", "他们不懂瓷砖怎么分辨真假，不懂合同怎么签才不会被坑，不懂防水涂料有几个等级，不懂地板的含水率是什么意思。他们来到建材市场，就像一只羊走进狼群，浑身上下写满了”我很好骗”四个字。", "马胜利以前从来不觉得这是问题。他只是个卖货的，客户来买东西，他报价，客户砍价，他让步，成交，走人。他从来不管客户出去之后会不会后悔。", "但那天晚上，他躺在床上，盯着天花板想了很久。", "他问自己：马胜利，你做了十年建材，你到底给这个社会创造了什么价值？"], ["卖出去的那些瓷砖？那些瓷砖放在别人家里，两三年之后谁还记得是从哪家店买的？", "赚到的那些钱？那些钱还完房贷、付完儿子的学费、交完一家的生活费，还剩多少？", "他想了很久，想不出答案。", "他觉得自己这辈子好像什么都没做。卖建材这件事，他做了十年，但他从来不是一个”解决问题”的人。他只是一个”卖东西”的人。", "但那条视频，也许可以不一样。", "他想做一条真正能”解决问题”的视频。让那些不懂装修的人，看完之后至少知道该怎么问问题、该注意什么、该相信什么不该相信什么。", "他想做一条有价值的视频。", "哪怕只是一条。", "拍摄那天是三月中旬的一个下午。", "天气阴沉沉的，像是要下雨又一直憋着不下。客厅里的光线不太好，马胜利把窗帘拉开，又拉上，觉得怎么都不对。最后他干脆把客厅的灯全部打开——三盏吊灯、两盏落地灯、一盏台灯，全部开着，屋里亮得有些刺眼。", "他坐在餐桌前，把打印好的文字稿摊在面前。那张餐桌是结婚的时候买的，桌面是复合板，上面压了一层仿大理石纹的塑料贴纸。十年过去了，贴纸的边角已经翘起来，露出下面灰白色的板芯。", "“算了，”他想，“土就土吧。反正我就是个土人。”", "他拿出手机，架在餐桌上那本垫了好几次的书下面，调整了一下角度。", "然后他深吸一口气。", "他的脸在镜头里。三十岁，颧骨高，下巴方，皮肤因为长年在建材城里晒着，带着一种不均匀的黧黑色——脸颊和额头最黑，鼻梁两侧和下巴稍微白一点，看起来像一张没擦干净的地图。额头上的抬头纹很深，一共有两道，像是两道浅浅的沟壑。他不笑的时候，这两道纹路让他的脸显得严肃而疲惫。", "但今天他的眼睛里有一种不一样的光。那种光不强烈，不张扬，但它在眼睛深处亮着，像一盏还没熄灭的灯。", "“装修中最容易踩的5个坑，”他对着镜头说，声音有点紧，“看完少花3万冤枉钱。”", "他看了一眼文字稿。第一行写着：第一个坑，贪便宜。"], ["“第一个坑，贪便宜。”他说，“你是不是经常看到那种广告？‘广东砖，厂家直销，全场五折’？你一看价格，心动了。但是你有没有想过一个问题——为什么这么便宜？”", "他停顿了一下。这句停顿是他在文字稿里标注过的。意思是”让观众有反应的时间”。", "“因为那些砖，根本就不是广东砖。”", "他继续讲。第二个坑，合同陷阱。第三个坑，防水。第四个坑，送货掉包。第五个坑，安装费增项。", "他讲得磕磕巴巴的，中间还忘词重来了两次——第二次讲到”防水”那个案例的时候，他突然想不起来王大姐是姓王还是姓李了。他盯着文字稿看了三秒钟，然后把那个案例的名字改成了”张先生”。", "一条过。", "拍完之后，他回放了一遍。", "视频里，他坐在那张旧餐桌前，背后是杂乱的客厅，沙发套起了球，茶几上堆着儿子的玩具，地上有几双拖鞋。灯光太亮了，把他脸上的每一个毛孔都照得一清二楚——包括那两道抬头纹。", "他讲得确实不好。语速太快，停顿不对，表情僵硬，手势也很别扭。", "但他还是发了出去。", "“发都发了，”他想，“大不了没人看。”", "那天晚上，他失眠了。", "他躺在床上，翻来覆去睡不着。不是因为紧张，而是因为心里有一种说不清楚的感觉。那种感觉像是有什么东西在胸口里涨着，不上不下，堵得他很难受。", "他拿起手机，看了一眼后台。", "没有新消息。没有新粉丝。没有新评论。", "那条视频的播放量只有两百多。", "“果然，”他想，“还是没人看。”", "他把手机放下，闭上眼睛。", "但他睡不着。", "他翻了个身，又把手机拿起来。", "还是两百多。", "他把手机放下。", "又拿起来。", "还是两百多。", "他骂了自己一句：“马胜利你是不是有病？”", "但骂完之后，他还是睡不着。", "他想：我是不是应该标题起得更好一点？是不是应该封面做得更吸引人一点？是不是应该再多练几遍再拍？是不是应该买点流量推一下？", "他想了很久，想不出答案。", "最后他放弃了。他把手机塞到枕头底下，闭上眼睛，强迫自己睡觉。", "第二天早上，他是八点钟醒的。", "但他是被手机震醒的。"], ["那种震动不是普通的微信消息提示，而是一种急促的、持续的、像心跳一样的震动——那是慢手平台的”作品被推荐”通知。", "他猛地坐起来，差点把旁边的陈芳撞醒。", "“怎么了？”陈芳迷迷糊糊地问。", "“没事，你继续睡。”", "他拿着手机躲进了厕所，把门关上。", "然后他打开了后台。", " 丝们反而很喜欢它，有人在评论区里说：“马哥，下次让旺财出镜！”", "马胜利笑了一下。他发现自己做视频的时候，笑容变多了。", "那天晚上，他给自己买了一条红烧牛肉味的泡面，坐在电脑前，一边吃一边笑。", "泡面吃到一半，老婆陈芳从卧室探出头来，看了他一眼，什么都没说，转身回去了。", "但他注意到，她的嘴角好像也勾了一下。", "马胜利做视频的热情像一团火，烧得他每天只睡三四个小时。但火太旺了，容易烧到自己。", "那段时间，他白天在建材城上班的时候，脑子里全是视频脚本——“这个案例怎么讲更清楚”、“那个比喻是不是能让小白听懂”、“片头那三秒钟怎么抓人眼球”。他人在店里，心在手机里，客户说话他要反应三秒才能接上茬，老板问话他要愣一下才能回答。", "他的精神状态肉眼可见地变差了。眼圈发黑，脸色发灰，整个人瘦了一圈，颧骨更高了，显得那张脸更方、更硬、更没有血色。他以前在建材城的时候，虽然也不算精神，但至少看着还像个人。现在他每天顶着两个黑眼圈去上班，同事开玩笑说：“老马，你这是去建材城上班还是去夜店上班啊？”", "他只能打着哈哈糊弄过去。", "晚上回家，他更是把整个晚上都献给了视频。"], ["他买了补光灯、支架、麦克风，把客厅的餐桌改造成了”直播间”。陈芳下班回来，看到的是这样一幅景象：餐桌上堆满了道具——瓷砖样品、地板切片、卷尺、油性笔、一叠厚厚的资料；手机架在支架上，灯光从左边打过来，把他半边脸照得惨白；旁边蹲着旺财，柴犬用它那双永远睡不醒的眼睛，困惑地看着这个每天晚上对着手机自言自语的人类。", "陈芳站在客厅门口，看了他一眼。", "那一眼里，有疲惫，有不解，有愤怒，也有心疼。但她什么都没说，转身进了厨房。", "马胜利以为她只是不想搭理他。", "他不知道的是，那天晚上，陈芳一个人在厨房里站了很久。她把手撑在灶台上，低着头，肩膀微微发抖。", "她不是不支持他。她只是害怕。", "她怕他放弃建材城的工作，怕他把家底全赔进去，怕他做了一场梦醒来之后什么都没有。她是农村出来的女人，她信的是”手里有粮心里不慌”，她不信什么”流量红利”、“内容创业”。她只知道，老公每个月三千五的工资，虽然不多，但至少是看得见摸得着的。而那些视频里的人给他刷的赞，能当饭吃吗？", "但她没说。她把那些话全咽回去了。", "因为她也看到了——她老公笑了。", "他做视频的时候会笑。那种笑跟他平时在家里的笑不一样。他平时在家里不怎么笑，偶尔笑一下，也像是应付差事。但他做视频的时候，那种笑是真的——眼睛会亮，嘴角会翘，甚至连那两道抬头纹都会舒展开来。", "她已经很久没看到他笑成那个样子了。", "但好景不长。", "事情爆发在三月的一个晚上。", "那天他正在拍一条视频，老婆陈芳突然推门进来。", "她穿着睡衣，头发散着，脸上还残留着白天上班时的疲惫。但她的眼睛里没有疲惫，只有怒火。", "她看了一眼他架在餐桌上的手机、灯光、支架，还有满桌子的道具——她的脸色瞬间就变了。", "“你又在拍？”", "“嗯，快拍完了——”", "“你知不知道你今天又迟到了？老板打电话到家里来了，你接了吗？”"], ["马胜利心里咯噔一下。他确实迟到了，因为他昨晚剪视频剪到凌晨四点，早上闹钟响了三遍他都没听见。醒来的时候已经八点半了，老板发了四条微信催他。", "“我……我手机没听见——”", "“没听见？”陈芳的声音突然尖锐起来，“马胜利，你是不是想当网红想疯了？你一个月那点工资，还完房贷就什么都不剩了，你哪来的底气不务正业？你看看你现在这个样子，像不像一个正经人？”", "马胜利低着头，一句话都说不出来。", "他知道老婆说得对。他现在的状态确实太疯狂了——每天三点睡七点起，白天行尸走肉，晚上像打了鸡血。他知道自己这样下去迟早要出问题。他白天上班的时候经常走神，有两个客户因为他报价报错了，直接转身去了隔壁店。老板已经暗示他不止一次了：“小马啊，最近是不是有什么事？精神状态不太好啊。”", "但问题是，那团火在他心里烧着，烧得他根本停不下来。", "他每天晚上坐在餐桌前，打开补光灯，面对镜头，那种感觉就像一个溺水的人终于抓到了一根浮木。他不想松手。他不能松手。他知道，如果他松了手，他就会重新沉下去——沉回那个每天在建材城里跟客户讨价还价、跟老板看脸色、跟房贷做斗争的泥潭里。", "他不想回去。", "但他不知道该怎么跟老婆解释这件事。", "他不知道该怎么告诉她：我不只是想当网红，我是想活下去。我是想活得像一个人。我是想让你和小浩过上不用每天算钱的日子。", "他说不出口。因为说出来，就连他自己都觉得这些话太假了、太大了、太不像一个卖建材的人该说的话了。", "“从今天开始，”陈芳扔下这句话，“你那个账号，要么关掉，要么设成私密。你自己选。”", "说完，她转身进了卧室，门摔得砰的一声响。", "马胜利坐在餐桌前，灯光还亮着，支架还架着，手机屏幕上还显示着那条没发出去的草稿——标题是《瓷砖选购三大误区，第五条90%的人都不知道》。他已经拍了三遍，剪了两遍，就差最后一步了。", "他看了那条草稿很久。", "然后他打开了账号后台，把账号设成了私密。", "那条视频存进了草稿箱。他不知道什么时候会再打开它。"], ["但他知道，那团火，没有熄灭。", "它只是，被暂时埋起来了。", "那天晚上，他躺在床上，睁着眼睛，盯着天花板。", "陈芳已经睡着了。她背对着他，呼吸均匀而轻浅。他能听到她的呼吸声，能闻到她身上那股洗衣液的味道——那是他们一直用的那款，蓝色瓶子，薰衣草味，超市打折的时候一买就是三瓶。", "他想起他们刚结婚的时候。那时候他们住在城中村的一间出租屋里，十平米，一张床一张桌，连窗帘都没有，用报纸贴在窗户上凑合。陈芳每天下班回来，先做饭，然后洗碗，然后拖地，然后坐在床边，一边看电视一边给他剪指甲。", "“马胜利，你的脚趾甲怎么这么硬？跟石头似的。”", "“卖建材的，脚板底都是茧。”", "“以后咱们买了房子，我就不让你卖建材了。”", "“行，听你的。”", "他们后来真的买了房子。九十平米，三室一厅，月供三千五，还到2035年。但买了房子之后，他还是在卖建材。他说不出”不卖建材了”这种话。因为他不知道不卖建材了之后，他还能做什么。", "直到那天，他拍了第一条视频。", "那一刻，他突然觉得，也许除了卖建材，他还能做点别的。", "但现在，那个”别的”，被老婆一句话关掉了。", "他翻了个身，看着陈芳的背影。", "她的肩膀很窄，睡衣的领子歪了，露出一截后颈。她的头发散在枕头上，有几根粘在了嘴角。她睡着的样子，比醒着的时候好看。醒着的时候，她的脸上总是挂着一层焦虑——房贷、孩子的学费、老公的工资、菜市场的价格——这些东西像一层灰，蒙在她脸上，让她看起来比实际年龄老了十岁。", "她今年才二十八岁。", "马胜利看着她的背影，心里涌起一种复杂的情绪。他不知道那是愧疚、是心疼、是无奈，还是别的什么。他只知道，他不想让她担心。但他也不知道该怎么让她不担心。", "他闭上眼睛，在黑暗中，对自己说了一句话：", "“会好的。”", "他不知道这句话是说给谁听的。", "离婚前的最后三个月，是马胜利人生中最灰暗的一段日子。"], ["他每天晚上等陈芳和儿子睡熟之后，就一个人躺在客厅的沙发上，把手机举在脸前，一刷就是三四个小时。窗帘拉得死死的，电视关着，屋子里黑漆漆的，只有手机屏幕的蓝光打在他脸上，把他的脸照得像一具苍白的浮雕。", "他不发视频了。他也不发评论。他就只是刷。", "算法越来越懂他。它知道他最近心情不好，所以推荐给他的内容，从一开始的建材、装修，渐渐变成了各种各样的主播——有唱歌的，有跳舞的，有聊天说话的，有分享生活的。", "大多数内容他看完就忘。划过去，划过去，再划过去。", "但有一个跳舞的女孩，跟别人不太一样。", "大多数跳舞的主播，穿得很清凉，跳得很热辣，说话的时候眼睛里有一种”你们快来看我”的急切。但这个女孩不一样。她跳舞的时候是笑着的，那种笑不是表演，是真的在笑。而且她从来不卖弄，从来不故意走光，说话的时候声音轻轻的，像在跟一个老朋友聊天。", "她的账号名字叫：小暖很暖。", "马胜利第一次刷到她的时候，是一个深夜凌晨一点。屏幕上，一个女孩穿着简单的家居服——白色的宽松T恤，灰色的运动裤，头发扎成一个松松的马尾，脸上有淡淡的妆，但看起来更像是素颜——在镜头前跳一支轻柔的舞蹈。", "她大概二十五六岁的样子，个子不高，但身材比例很好，手臂长，腿也长，跳起舞来有一种行云流水的感觉。她的五官不是那种惊艳的漂亮，而是越看越舒服的那种——眼睛不大，但弯弯的，笑起来的时候会眯成两道月牙；鼻子小巧，嘴唇薄薄的，说话的时候嘴角总是微微上翘，好像永远在笑。", "她跳的舞不是那种热辣的、卖弄的舞蹈，而是一种很舒服的、让人放松的舞。动作不大，幅度很小，但每一个动作都很流畅，像水在流淌。", "马胜利关注了她。但他没有发过任何评论。他只是每天晚上刷到她的直播，就停下来，看一会儿，然后继续刷。", "有时候她跳完舞，会对着镜头说几句话。有一天的内容，他记得很清楚——", "“我知道你们很多人今天也不开心，没关系，我跳一支舞给你们看。你们看看窗外，今天的月亮很亮。”"], ["那是一个再普通不过的夜晚。马胜利躺在黑暗的客厅里，手机屏幕上是那个叫小暖的女孩在跳舞。窗外其实什么都看不见——他把窗帘拉得死死的，连路灯的光都透不进来。", "但不知道为什么，那句”今天的月亮很亮”，让他突然泪流满面。", "他不知道自己为什么哭。", "他只知道，这四个字，好像就是专门说给他听的。", "他想起很多年前，在他甘肃老家，夏天的晚上，妈妈抱着他坐在院子里，指着天上的月亮说：“娃，你看，月亮多亮。”那是多久以前的事了？二十年？三十年？他记不清了。他只记得那个夜晚，月亮很亮，风很轻，他躺在妈妈怀里，什么都不用想。", "现在他躺在这张沙发上，老婆孩子在卧室里睡着，房贷压在身上，工作摇摇欲坠，他什么都想不了，什么都做不了，只能刷手机。", "他点了一下屏幕右上角的小心心。", "这是他在这三个月里，对任何人做过的唯一一件”主动”的事。", "一个陌生女孩的直播，让一个深夜失眠的中年人，第一次给主播刷了一个小心心。", "他关注了她。但他没有发过任何评论。他只是每天晚上刷到她的直播，就停下来，看一会儿，然后继续刷。", "有时候她跳完舞，会对着镜头说几句话。那些话都很轻很轻，像风吹过水面。", "“你们有没有人今天也很累？我今天也很累，累到不想说话。但我还是想播一会儿，因为我知道你们中有些人可能也睡不着。”", "“没关系，睡不着就睡不着。不强迫自己，睡得着就睡，睡不着就刷手机，看我直播，都行。”", "“你们看我直播的时候，有没有觉得舒服一点？如果有的话，我就没有白播。”", "马胜利看着她说这些话，看着她对着镜头微微笑的样子，心里有一种奇怪的感觉。", "他觉得她很真实。", "不是那种”表演出来的”真实，而是一种从骨子里透出来的真实。她不像那些卖货的主播，满嘴跑火车；她也不像那些聊天的主播，说着说着就开始要打赏。她就只是跳跳舞，说说话，偶尔唱一首歌。", "她好像只是单纯地想让你开心一点。"], ["马胜利不知道她叫什么名字，不知道她是哪里人。他只知道，每天晚上刷到她的直播，他会有那么几分钟，感觉心里轻一点。", "那段时间，他每天晚上都等她开播。", "他把这个秘密藏在心里，没有告诉任何人。", "他不知道的是，这个女孩叫苏小暖。她不会想到，在千里之外的某个城市，有一个叫马胜利的男人，在那段最灰暗的日子里，是她每晚准时出现的直播，帮他熬过了那些睡不着的夜。", "王二蛋是从深圳回来的。", "马胜利见到他的时候，差点没认出来——这个从深圳回来的发小，和他记忆里的王二蛋完全不一样了。以前的王二蛋是个瘦高个，绰号”猴子”，整天嘻嘻哈哈，没个正形。但眼前这个人，壮了一圈，肚子微微隆起，脸也圆润了不少，活脱脱一副”深圳中产”的派头。只有那双眼睛还是一样的——机灵、闪亮，像两颗不安分的黑珠子。", "王二蛋是那种”别人家的孩子”——虽然名字土得掉渣，但脑子是真的好使。他在深圳一家互联网公司干了五年，做运营，从月薪三千一路干到了月薪三万。在深圳那种地方，月薪三万不算多，但也不算少了，至少能租个像样的一居室，周末还能去海岸城吃顿日料。", "但他回来的原因，比张小辉被裁员还要荒诞：他的老板退休了，新老板上任第一件事就是清洗老员工，他被”优化”了。三十五岁，在深圳买不起房，在老家没脸见人，于是他拿赔偿金回来，想看看有没有什么机会。", "两个发小在老家县城的一家小酒馆里见了面。", "酒馆很旧，墙皮剥落，露出下面灰色的水泥。门口挂着一个红灯笼，灯笼的穗子已经掉了半截，随风晃荡。老板是个五十多岁的老头，脸上皱纹深得能夹死蚊子，见人就笑，笑起来露出一口黄牙。", "他们点了两个菜：一盘花生米，一盘拍黄瓜，然后要了一瓶牛栏山。", "“你那个建材生意怎么样？”王二蛋问。", "“还活着。”马胜利说，“勉强活着。”", "“我听说你现在在做那个什么……短视频？”", "马胜利愣了一下。“你怎么知道的？”"], ["“你那条视频，点赞十三万，我能看到。”王二蛋笑了，“我虽然不在老家，但县城的微信群里全是转发的——‘咱县马胜利的儿子，火神山积木，点赞破十万了’，你知道吗？”", "马胜利的脸上有点挂不住。他没想到这事居然传回了老家。", "“别害臊。”王二蛋拍了拍他的肩膀，“你知道我这次回来，最后悔的是什么吗？”", "“什么？”", "“后悔自己回来晚了。”王二蛋把杯子里的酒一口闷了，“你知道这波叫什么吗？叫流量红利。什么叫流量红利？就是猪站在风口上都能飞起来的那种机会。再晚两年，汤都喝不上了。”", "马胜利没有说话。他把那杯酒也闷了。", "“你那条视频为什么能爆？我分析过，”王二蛋竖起手指，“第一，时机对。疫情刚爆发，所有人都在刷手机，信息过载，但大多数人看的是负面消息。你那条视频是温情的、向上的，跟别人的内容不一样。”", "“第二，内容真。你拍的是你儿子，是你儿子搭的积木，是你儿子说的话。没有任何表演的痕迹，一看就是真的。”", "“第三，情感共鸣。火神山医院是全国热点，但你从一个小孩子的视角切入，没有喊口号，没有煽情，就是一个孩子说’火神山很厉害’。这个画面，打动了所有人。”", "王二蛋说完，顿了一下。", "“你知道你的问题是什么吗？”", "“什么？”", "“你的问题是你只发了一条。”王二蛋说，“一条视频能火是运气，但想持续火，必须靠体系。你接下来要做的，是把’真实’变成你的标签，变成你的方法论，变成你的账号定位。每一条视频都要真实，每一个案例都要真实，每一个细节都要真实。真实，才是你的护城河。”", "马胜利听着，眼睛慢慢亮了起来。", "他从来没有听过这么系统地分析”做视频”这件事。他以前只是凭感觉在拍，觉得什么好就拍什么，从来没有想过什么”定位”、“标签”、“护城河”这些概念。但王二蛋说的每一个字，都像是敲在他心里的一面鼓上，咚咚作响。", "那天晚上，两个人喝到凌晨一点。最后王二蛋醉醺醺地说：“老马，你要是再不做，这辈子就真的只能卖瓷砖了。”", "马胜利笑了笑，没有反驳他。"], ["但第二天早上，他做的第一件事，是把那个私密的账号重新打开了。", "他把那条存着的草稿发了出去。", "然后他给王二蛋发了一条微信：“说干就干。你别跑，我需要你。”", "“老马说建材”接到了第一个广告。", "报价五百块。", "那个广告主是一个本地不知名瓷砖品牌的老板，姓赵，四十多岁，圆圆的脸上永远挂着笑，看起来像个弥勒佛。马胜利第一次见他的时候，是在他那个堆满瓷砖样品的仓库里。赵老板穿着一件格子衬衫，戴着老花镜，站在样品墙前面，像一个正在检阅军队的将军。", "“小马啊，我刷到你的视频，觉得你这个人不实在——”马胜利的心一下子悬了起来——“不对，实在，你这个人不实在——哎呀说错了，”赵老板被自己的话绕晕了，急得脸都红了，“我是说你这个人实在！”", "马胜利憋着笑，差点岔了气。", "赵老板是个实在人，说话直来直去。他不玩虚的，上来就问：“你帮我卖一单，提成怎么算？”", "马胜利拿出早就准备好的报价单：“单品类视频，基础500块；如果带到了线下到店，每人给10块；如果成交了，每单再给5%提成。”", "赵老板想了想：“行。你先发一条，我看看效果。”", "马胜利当天就拍了。那条视频他准备了很久——他花了一整个下午去佳安居的仓库里挑瓷砖，选了一款性价比最高的，然后再花了两个晚上剪片子。他第一次认真研究了”剪辑”这件事——节奏、镜头、配乐、字幕，每一个细节他都仔细琢磨过。", "视频发出去那天，播放量只有八千。", "比那条爆款差了很多。但他知道，这是正常的。爆款视频靠的是运气，是时机，是算法的随机推荐。但日常的视频，靠的是积累，是信任，是持续输出。", "评论区里有人说：“马哥，这款砖看着不错，但我在外地，能发货吗？”", "马胜利灵机一动，在评论区里回了一句：“人在哪不重要，加我微信，视频看砖，满意再定！”", "那天晚上，他的微信加了三十七个人。", "成交了两单。", "两单的提成加上基础费用，他赚了八百六十块。", "八百六十块。"], ["他在建材城卖一单瓷砖，提成最多也就一两百块。大多数时候，他卖一单瓷砖，提成是五十块。一千单瓷砖，才能赚到五万块。", "但现在，他一条视频，两天时间，赚了八百六十块。", "他在朋友圈里发了一条消息：“我有团队了！”", "所谓的团队，就是他一个人，加一条养了三年名叫”旺财”的柴犬。", "旺财在视频里出现过两次，每次都懒洋洋地趴在建材堆旁边，用一种”人类真奇怪”的眼神看着镜头。粉丝们反而很喜欢它，有人在评论区里说：“马哥，下次让旺财出镜！”", "马胜利笑了一下。他发现自己做视频的时候，笑容变多了。", "那天晚上，他给自己买了一条红烧牛肉味的泡面，坐在电脑前，一边吃一边笑。", "泡面吃到一半，老婆陈芳从卧室探出头来，看了他一眼，什么都没说，转身回去了。", "但他注意到，她的嘴角好像也勾了一下。", "赵老板后来又找他做了三期视频，每期播放量都在稳步上升。最后一次合作结束之后，赵老板给他打了个电话。", "“小马啊，我一个朋友想见见你。”", "“谁啊？”", "“见了你就知道了。”", "见面约在县城最大的建材城——“永盛建材广场”。马胜利第一次走进这个地方的时候，感觉自己像是刘姥姥进了大观园。这哪里是建材城，简直就是一个小型Shopping Mall，瓷砖、地板、卫浴、灯具，五花八门，样样齐全。大厅里铺着大理石地面，灯光从水晶吊灯上洒下来，照得整个空间亮堂堂的。销售员穿着统一的黑色西装，胸前别着工牌，脸上挂着训练有素的微笑。", "赵老板带他走进一间办公室。办公室很大，至少有五十平米，落地窗对着建材城的正门，可以把整个大厅尽收眼底。办公桌是红木的，上面摆着一台大屏幕的Mac电脑和一盆修剪得体的盆栽。"], ["坐在老板桌后面的，是一个五十多岁的男人，头发梳得一丝不苟，手指上戴着一枚硕大的玉扳指，一看就不是普通人。他穿着一件深蓝色的polo衫，领子竖起来，手腕上戴着一块金色的劳力士。他的脸很圆，下巴很宽，笑起来的时候，眼睛会眯成一条缝，看起来很和气。但马胜利注意到，他那双眯起来的眼睛里，有一种让人看不透的东西——那是一种经过大风大浪之后沉淀下来的精明。", "“这是李永盛，永盛建材广场的老板。”赵老板介绍道。", "李总上下打量了马胜利一番，然后笑了：“小马，我关注你很久了。”", "马胜利有点懵。他怎么也没想到，县城里最大建材城的老总，居然会关注他的账号。", "“你的内容很朴实，不玩虚的，这就是你的优势。”李总说，“我想跟你谈一个合作——你帮我卖货，我给你分成。卖多少，分多少。不设上限。”", "“真的？”马胜利脱口而出。", "“我老李说话，什么时候不算数过？”李总拍了拍桌子，“但我有一个条件。”", "“什么条件？”", "“从现在开始，你那个账号，只做建材。不准跨界，不准今天卖建材明天卖食品后天卖衣服。你能不能做到？”", "马胜利几乎想都没想：“能！”", "那天晚上回家之后，他躺在床上，对着天花板发呆。脑子里一直在回响李总那句话：“卖多少，分多少，不设上限。”", "他突然觉得，流量这件事，好像真的可以改变一个人的命运。", "但他不知道的是，命运在给他打开一扇门的同时，也在悄悄关上一扇窗。", "林诗涵把辞职信甩在陈总监桌上的那一天，杭州的天空灰蒙蒙的，像要下雨又一直憋着不下。", "那封辞职信她写了一个星期。", "每天晚上下班回家，她打开电脑，对着空白文档发呆。写写删删，删删写写。每一次删掉的时候，她就告诉自己：再忍忍吧，工作不好找，大城市压力大，回老家更没有出路。牌头镇那种地方，回去能干什么？继承妈妈的小理发店？找个老实人嫁了？过那种一眼就能望到头的人生？", "她不想。", "但每一次想”不辞职”的时候，那个周五晚上的画面就会自动浮现在脑海里。"], ["那是周五晚上九点多。办公室的灯已经灭了大半，只剩下她工位这一片还亮着。整个楼层空荡荡的，空调已经关了，空气有些闷热。窗外是杭州的夜景，高架桥上的车流像一条发光的河。", "陈总监不知道什么时候出现在她身后。", "他走路没有声音。或者说，他刻意没有发出声音。他像一只猫一样，悄无声息地溜到了她的背后。", "“小林，还在加班啊？辛苦了。”", "“嗯，快弄完了。”她下意识地往后退了半步。", "“那个项目的事，不着急。”陈总监的手搭在了她的椅背上。", "那个动作让她浑身的汗毛都竖了起来。她能感觉到他的手离她的肩膀很近——近到她几乎能感受到他手掌的温度。", "她想站起来，但椅背挡住了她。她想往右躲，但右边是隔板。她只能坐在原地，感觉到陈总监的存在像一团阴影笼罩着她。", "“小林，你来公司多久了？”", "“三年。”", "“三年了啊。”陈总监的声音里有某种让她毛骨悚然的意味，“你知道吗，我对你一直……”", "接下来的三分钟，是林诗涵人生中最漫长的三分钟。", "她不记得陈总监具体说了什么。她只记得那个声音，那种气息，还有她死死抓住椅子扶手的力度——指关节都泛白了。她的脑子里一片空白，只有一个念头在反复回响：我要离开这里。我要离开这里。我要离开这里。", "“小林，你觉得呢？”陈总监的声音里带着一种理所当然的亲昵。", "“陈总，您说完了吗？”她站起身来，抓起桌上的包，“我要回家了。”", "“这么着急——”", "“陈总，我家里还有事。”她打断他，声音平静得可怕，“再见。”", "她走出办公室的时候，背后传来陈总监的声音：“林诗涵，你想清楚后果。”", "她没有回头。", "走出公司大楼的那一刻，她才发现自己的腿在抖。她站在路边打车，等了十五分钟才有车停下来。上车之后，她才发现自己的脸是湿的——不知道什么时候，她已经哭了。", "她在出租屋里坐了一整夜。天亮的时候，她打开电脑，写了那封辞职信。", "辞职信打印出来的时候，她的手是抖的。", "但她没有犹豫。", "辞职信甩在陈总监桌上那一刻，林诗涵其实并没有想好接下来该怎么办。"], ["她只是想逃。从那个办公室逃出去，从陈总监的眼神里逃出去，从那种让她窒息的氛围里逃出去。逃出来之后怎么办，她不知道。也不想管了。先逃再说。", "回到出租屋的时候，天已经黑了。", "杭州的夜色从窗外透进来，灰蒙蒙的，远处高架桥上的车流像一条永远不会停歇的光带。楼下有人在遛狗，远处的酒吧街传来隐约的音乐声。一切都很正常。一切都在继续。但她的世界，在那一刻，好像停下来了。", "她站在窗前，看着自己的倒影。", "玻璃上映出一张年轻的脸——二十六岁，瓜子脸，皮肤白净，眉毛修长，眼睛很大，是那种让人看了会记住的眼睛。但此刻那双眼睛里没有光，只有疲惫和茫然。她的嘴唇抿得很紧，下唇微微颤抖——那是她紧张或者难过的时候才会有的小动作。", "她看着自己的倒影，突然觉得陌生。", "这张脸，是她吗？这个站在出租屋窗前、刚刚甩了辞职信、不知道接下来该怎么办的女人，是她吗？", "她想起三年前大学毕业的时候，她站在校门口拍照，穿着学士服，笑得眼睛弯弯的。那时候她觉得，未来是光明的，前途是无限的，她一定能在大城市里闯出一片天。", "三年过去了。她闯出了什么？", "一份被骚扰的工作，一封被迫写下的辞职信，和一个不知道明天在哪里的未来。", "她拿起手机，给妈妈打了个电话。", "电话响了三声，那头传来熟悉的声音：“涵涵？这么晚了怎么打电话，出什么事了？”", "她想说”没事”，但话到嘴边，变成了”妈，我辞职了”。", "电话那头，沉默了很长时间。", "林诗涵的妈妈叫林秀芬，今年五十三岁。二十多年前，老公跟别人跑了，她一个人把女儿拉扯大。牌头镇没有大企业，她也没什么文化，唯一的手艺就是给人理发。一把剪刀剪了二十多年，供出了一个大学生。", "在那个小镇上，一个女人独自把孩子养大，供她读大学，是一件非常不容易的事。镇上的闲言碎语从来就没断过：“一个离婚女人，能教出什么好孩子？”“你看她整天打扮得花枝招展的，说不定早就有人了。”“她女儿以后能有什么出息？”"], ["但林诗涵高考那年，她成了整个牌头镇唯一考上本科的女孩。录取通知书送到家里的那一天，林秀芬哭了很久。那是林诗涵第一次看见妈妈哭。她那时候不明白妈妈为什么哭。后来她明白了——妈妈是高兴的。", "“涵涵，你想清楚了吗？”", "这是妈妈问的第一句话。没有责备，没有追问，只是确认。", "“妈，我想清楚了。”她说。", "电话那头又沉默了一会儿，然后林秀芬说：“涵涵，大城市不好混，就回来。妈的小店还开着呢，饿不着你。”", "林诗涵攥着手机，眼泪突然就下来了。", "“妈，我不想回去过那种日子。”她说，“我不想回到牌头，然后找个人嫁了，然后一辈子就在那个小镇上。我不想。”", "“那你想怎样？”", "“我不知道。”她说，“但我想试试自己。”", "电话那头传来妈妈轻轻的笑声：“行。那你就试试呗。反正你从小到大，想做的事，没有做不成的。”", "挂掉电话的时候，林诗涵抱着被子哭了一整夜。", "但哭完之后，她擦干眼泪，打开了手机。", "她看到了一条新闻：慢手平台宣布推出”全民直播计划”，零门槛入驻，流量扶持。", "那一刻，她心里那个一直在萌芽的念头，突然清晰了。", "林诗涵的第一场直播，是在一个星期之后的晚上。", "苏小小帮她布置了场地：出租屋的小桌子上，架了一盏花了八百块买的补光灯，旁边放了一个九块九包邮的麦克风，还有一个从二手市场淘来的手机支架。一切都很简陋，但一切都是新的开始。", "她给自己取了一个名字：诗涵不哭。", "开播前十分钟，她的心跳已经快到了一百三。", "“你紧张什么啊！”苏小小坐在旁边的床上，“你就当是在跟我聊天！”", "“跟你聊天我不紧张，但跟摄像头聊天我真的……”", "“那你就当摄像头是我！”苏小小指着手机屏幕，“你就盯着那个小红点看，当它是姐们的眼睛！”", "林诗涵深吸一口气，按下了开播按钮。", "“大家好，我是诗涵，今天是第一场直播……”她说，声音有点抖。", "然后她唱了一首歌——《起风了》。", "唱完之后，她看了一眼后台：12个人。其中8个，是苏小小发动她所有小号灌进去的。真实在线人数：4个。"], ["但她没有灰心。她知道，万事开头难。", "第二天，她收到了一条评论。", "那条评论是凌晨一点发来的，措辞很认真：", "“你唱得挺好的，但歌词第三句’以爱之名你还愿意’唱错了，应该是’以爱之名你还愿意’，你把重音放在了’愿意’上，实际上这句的’愿意’是连读的，不需要重音停顿。另外，’买了账号’那句完全不在调上——不过敢于开口就是最好的开始，加油。”", "林诗涵愣住了。", "她翻了一下这个评论者的主页：头像是一个戴眼镜的年轻男人，主页简介写着”张小辉教英语，让学习更简单”，粉丝3000人，全是干货型的英语语法讲解视频。", "她不知道为什么，鬼使神差地点了关注，然后在私信里留了一句：“张老师，你批评得对，但那天我真的太紧张了。”", "她没想到，对方居然秒回了。", "“没关系，能开口就是勇气。” 那个人回复道，“很多人第一步都迈不出去，你已经迈出去了。”", "林诗涵看着这条回复，笑了。", "这是她做主播以来，收到的第一条真正意义上的”鼓励”。", "三年之后，当他们再次相遇在同一个颁奖典礼的红毯上，林诗涵说：“张老师，我们的缘分，开始于一场跑调的直播。”", "张小辉笑着回答：“你那场直播，我全程看完了的。说实话，能听完的人不多——但我是从头听到尾的。”", "苏小小是第二天中午到的。", "她从牌头镇坐了六个小时大巴，一路上没吃东西，下车的时候脸色蜡黄，眼眶发红，但手里拎着一个巨大的行李袋——里面全是老家的东西：自家腌的霉干菜、妈妈做的清明果、牌头米糖、还有一罐妈妈熬的辣酱。", "林诗涵看到她的时候，先是愣了一下，然后眼泪就掉下来了。", "她一把抱住了苏小小。", "“你怎么来了？”", "“我给你妈打电话了。”苏小小说，声音有点闷，“你辞职这么大的事，你不告诉我，你还有没有把我当朋友？”", "两个人站在林诗涵那个十平米的出租屋里，拥抱了很久。"], ["苏小小是林诗涵的高中同学，也是最好的朋友。高中毕业后，林诗涵考上了杭州的大学，苏小小没考上，回了老家，在镇上开了一家服装店。几年下来，服装店居然开得还不错，在诸暨市区开了分店。", "苏小小和林诗涵是完全不同的两种人。林诗涵安静、内敛、做什么事都要想很久；苏小小风风火火、敢想敢干、先做了再说。但偏偏这两种性格，搭在一起却格外和谐——林诗涵负责想，苏小小负责干。", "苏小小今天的打扮一如既往地鲜艳：大红色的指甲油，金色的耳环，一件豹纹的外套搭在肩上，脚上踩着一双亮片拖鞋——那是她从大巴上下来之后换的，高跟鞋塞在行李袋里。她的脸圆圆的，眼睛圆圆的，笑起来的时候，两个酒窝深得能盛水。", "“涵涵，你接下来打算怎么办？”苏小小问。", "“我想做主播。”林诗涵说，“我想试试。”", "“主播？”苏小小眼睛一亮，“就是那种在网上直播的？”", "“嗯。”", "“那感情好！”苏小小一拍大腿，“你长得这么好看，不当主播可惜了！”", "“当主播又不是只要长得好看——”", "“那你长得好看加上有脑子，那不是更厉害？”苏小小打断她，“涵涵，你知道我最佩服你什么吗？我最佩服你的是，你敢想敢做。你高三那年说要考杭州的大学，所有人都说你不行，结果呢？你是那年整个牌头唯一一个考上本科的。”", "林诗涵笑了。她知道苏小小说的是实话。", "“大不了我养你！”苏小小举起酒杯，“涵涵，姐们挺你！”", "两个人碰了杯，一口闷了。", "那天晚上，苏小小说的那句话，改变了林诗涵的人生：“你不是一直想当主播吗？重新开始！”", "第二天，苏小小就去银行取了五千块钱，拍在林诗涵的桌上：“这是你的启动资金。买设备，买灯，买电脑，不够再跟我说。”", "“小小，这钱我不能——”", "“闭嘴。你什么时候学会跟我客气了？”", "林诗涵看着她，眼眶红了。", "五千块。对于苏小小来说，那可能是她服装店一个月的利润。对于林诗涵来说，那是她重新开始的全部底气。", "“谢谢。”", "“谢什么谢。等你以后红了，还我十倍。”苏小小笑着说。"], ["苏小小帮她买的那盏补光灯，是林诗涵收到的第一份礼物。", "那盏灯花了她八百块。", "八百块。那是她当时能承受的最贵的设备。她在购物车里放了很久，一直舍不得点付款，直到苏小小发来一条消息：“涵涵，我已经下单了，你查收一下快递。”", "她愣了很久。", "八百块。对苏小小来说，那可能是她服装店两三天的利润。对林诗涵来说，那几乎是她半个月的伙食费。她想拒绝，但苏小小紧接着又发了一条：“别跟我客气，你以后红了，十倍还我。”", "她把那个快递拆开的时候，手是抖的。", "灯的包装盒是白色的，上面印着一个她不认识的品牌 logo。她按照说明书把灯组装好，插上电源，按下开关——那一刻，灯光打在她脸上，暖黄色的光晕温柔地包裹着她，让她整个人看起来都柔和了几分。", "她对着镜子看了很久。", "镜子里的那张脸，是二十六岁的林诗涵。瓜子脸，皮肤白净，但眼角有一圈淡淡的青色——那是连续失眠留下的痕迹。眉毛是她自己修的，眉峰稍微有点高，显得整张脸有些凌厉。但她的眼睛很好看——大而黑，瞳仁像是两颗浸在水里的黑葡萄，清亮而干净。", "她开始化妆。", "眉毛、眼线、口红，一个不少。她平时在公司上班的时候不怎么化妆，因为陈总监总会在她化妆之后多看她几眼，那目光让她浑身不自在。但今天，她想认真对待这件事。她拿出那支从超市买来的平价口红，涂在嘴唇上，是那种淡淡的豆沙色，显得整个人温柔而干净。", "开播前五分钟，她的心跳已经快到了一百二。", "那种心跳不是害羞，不是紧张，而是一种更复杂的东西——像是站在悬崖边上，准备往下跳的那一刻。她知道，一旦按下那个按钮，她的人生就会分成两个阶段：直播前，和直播后。", "“你紧张什么啊！”苏小小坐在旁边的床上，盘着腿，手里捧着一袋薯片，咔嚓咔嚓地嚼着，“你就当是在跟我聊天！”", "“跟你聊天我不紧张，”林诗涵看了一眼手机屏幕，那个前置摄像头像一只黑色的眼睛，沉默地盯着她，“但跟摄像头聊天我真的……”"], ["“那你把摄像头当成我！”苏小小指着手机屏幕，“你就盯着那个小红点看，当它是姐们的眼睛！”", "林诗涵笑了一下。那种笑很勉强，嘴角勾着，但眼底还是紧张的。", "她深吸了一口气。", "手指悬在那个”开播”按钮上，迟迟没有按下去。", "苏小小在旁边喊：“涵涵，按啊！你按不按？不按我替你按了啊！”", "“等一下，”林诗涵说，“让我再准备一下。”", "她站起来，走到镜子前，又看了一遍自己的妆容。然后她走回来，坐下，又站起来，又坐下。", "苏小小把薯片袋往床上一扔，叹了口气：“林诗涵，你要是再不按，我就在旁边喊’这是林诗涵的第一场直播，林诗涵唱歌跑调，林诗涵跳舞踩脚，林诗涵——’”", "“行了行了！”林诗涵打断她，“我按了！”", "她按下了那个按钮。", "屏幕亮了起来。", "那一刻，林诗涵觉得整个世界都安静了。", "她盯着屏幕，屏幕上显示着一个画面——画面里是她自己。一张二十六岁的脸，穿着白色的棉质T恤，头发扎成一个松松的马尾，化了淡淡的妆，灯光从右边打过来，把她的半边脸照得柔和而温暖。", "这就是她。这就是她在别人眼中的样子。", "屏幕上显示：1人。", "那个人是苏小小的小号，ID叫”诸暨小小”。林诗涵知道，那个人正在屏幕后面，冲她挤眉弄眼。", "“大家好，”她的声音从手机里传出来，有一点点抖，“我是诗涵，今天是第一场直播……”", "她看了一眼屏幕。1人。", "“呃……”她不知道该说什么了。她提前准备了台词，但此刻脑子里一片空白，“我今天……唱首歌给大家听吧。”", "她点开了那首她练了很多遍的歌——《起风了》。", "这首歌她听了不下一百遍。每一个音符，每一句歌词，她都烂熟于心。但当她真正对着摄像头唱的时候，她发现自己的声音是抖的——不是紧张的那种抖，而是一种更深层的东西。", "她唱得很慢，很认真，每一个字都咬得很清楚。但她的声音确实有一点点跑调——不是那种灾难性的跑调，而是那种”差一点点”的跑调，像是船偏离了航道一点点，如果不仔细听，根本听不出来。"], ["她不知道唱了多久。三分钟？五分钟？她只记得自己唱完之后，长长地舒了一口气，像是卸下了什么很重的东西。", "然后她看了一眼屏幕。", "屏幕上显示：12人。", "十二个人。", "她不认识他们中的任何一个。但这十二个人，愿意花时间，听她唱一首走调的歌。", "“谢谢大家，”她说，声音有点哑，“我是诗涵，今天是第一场直播，以后会经常播……”", "她不知道该说什么了。她准备的台词已经说完了。她对着摄像头愣了三秒钟，然后说：“那我……再唱一首？”", "屏幕上有弹幕飘过——是苏小小的小号发的：“好听！”“再来一首！”“涵涵加油！”", "她笑了。", "那是她人生中，第一次对着手机摄像头笑。", "下播之后，她坐在床上，看着后台数据发呆。", "直播时长47分钟。累计观看人数82人。留存率23%。新增关注3人。", "“怎么样？”苏小小凑过来，“数据怎么样？”", "“数据很烂。”林诗涵说。", "“那是当然的啦！”苏小小一拍大腿，“你第一场，数据烂才正常！重要的是，你开始了！”", "林诗涵笑了一下。她知道苏小小说得对。", "重要的是，她开始了。", "她打开张小辉的主页，看了他的第一条视频。那条视频讲的是一个英语语法难点——“虚拟语气”，只有两分钟，但讲得非常清楚。他站在镜头前，穿着一件深蓝色的衬衫，袖子卷到手肘，手里拿着一支白色的马克笔，一边画语法树，一边讲解。他的声音很好听，低沉而清晰，每一个字都像是被仔细打磨过的。", "林诗涵作为一个英语六级过了的人，居然从这个老师的讲解里学到了一些新东西。比如”if I were you”为什么用”were”而不是”was”，这个问题她以前从来没想过，但看完视频之后，她豁然开朗。", "她在心里默默记下了这个名字：张小辉。", "她不知道的是，在同一个夜晚，在千里之外的深圳，一个叫马胜利的男人，刚刚发布了那条”老马说建材”的第一条广告视频；而在杭州的另一个角落，一个叫张小辉的年轻人，刚刚结束了他今天的直播课程，对着空荡荡的屏幕说了一句”谢谢大家，晚安”。"], ["三个城市的三个普通人，在同一个夜晚，各自开始了他们人生的新篇章。", "而命运的齿轮，正在悄悄转动。", "直播第三十天，林诗涵的粉丝从12人涨到了300人。", "三百人。", "这个数字听起来不多。但对于林诗涵来说，那是三百个活生生的人——三百个愿意在茫茫人海中多看她一眼的人。三百个愿意在刷到她的直播时，点进来听她唱一首跑调的歌、说几句有的没的废话的人。", "三百人，就是三百份信任。", "她每天晚上十点准时开播，雷打不动。", "她发现，直播这件事，看起来简单，其实藏着很多学问。怎么跟粉丝互动？什么时候该唱歌，什么时候该聊天？怎样说话才不让人觉得尴尬？这些问题，她以前从来没有想过。但现在，她每天都在琢磨。", "她开始研究那些大主播是怎么说话的。", "她关注的第一个标杆是”疯狂小杨哥”——那个在抖音上靠搞笑短视频起家、后来转型做直播带货的安徽兄弟。她把小杨哥的直播看了不下五十遍，研究他怎么开场、怎么互动、怎么在冷场的时候把气氛重新点燃。她发现，那些真正做得好的主播，都有一个共同特点：真实。", "粉丝们不在乎你有多漂亮，他们在乎的是你有多真实。", "她开始调整自己的风格。", "不再只是唱歌——虽然她还是会唱，但不再把唱歌当成主要内容。而是开始跟粉丝聊天，分享自己今天吃了什么、吐槽天气有多热、抱怨找不到工作有多焦虑。", "有一天，她甚至在直播里哭了一场。", "那天是因为她收到了一条私信——一个粉丝在私信里说：“涵涵姐，我也是一个正在找工作的人，我已经失业三个月了，每天都很焦虑。但看你的直播的时候，我会觉得好一点。谢谢你。”", "她看到这条消息的时候，眼泪一下子就涌了出来。", "那天晚上直播的时候，她把这件事跟粉丝们说了。她说：“我今天收到了一条私信，是一个粉丝发来的，他说看我的直播会觉得好一点……”她的声音越说越哽咽，最后说不下去了，直接对着摄像头哭了起来。", "她哭的时候，弹幕刷得飞快。", "“涵涵别哭！”“加油涵涵！”“我们都在！”“诗涵不哭，诗涵最棒！”"], ["她一边哭，一边看着那些弹幕，心里涌起一种奇怪的感觉。", "她在这个城市里，没有亲人，没有朋友，孤身一人。但此刻，有这么多人关心她。虽然他们只是屏幕上的文字，虽然他们远在千里之外，但她能感觉到，他们是真的在乎她。", "她擦了擦眼泪，对着摄像头笑了笑：“好了好了，不哭了。我们继续聊天吧。”", "慢慢地，她的直播间开始有了一些固定的面孔。", "有一个ID叫”橙子味的夏天”的粉丝，每天都会来她的直播间待一会儿。", "橙子味的夏天从来不说话，也从来不刷礼物，但每次她唱歌的时候，橙子味的夏天都会给她刷一个小心心。", "一个小心心，价值一分钱。但林诗涵知道，那一分钱的背后，是一份心意。", "“橙子味的夏天是谁啊？”苏小小有一次问她。", "“不知道。”林诗涵说，“但我觉得TA应该是个很温柔的人。”", "她不知道橙子味的夏天是谁，但她知道，这个人每天都会来。这种感觉让她觉得很安心。", "还有一个人，ID叫”张小辉教英语”。", "林诗涵第一次看到这个ID出现在她直播间的时候，心跳漏了一拍。", "张小辉——那个批评她唱歌跑调、但又鼓励她”能开口就是勇气”的人，居然来她的直播间了。", "他没有刷礼物，也没有说话。他就那样静静地待在她的直播间里，像一个沉默的旁观者。", "那天晚上，林诗涵唱了三首歌。每首歌唱完之后，她都会下意识地看一眼弹幕，看看有没有”张小辉教英语”的消息。", "他一条弹幕都没有发。", "但她知道他在。这让她觉得安心。", "慢慢地，她找到了镜头感。", "她不再把摄像头当做一个冷冰冰的设备，而是当做一个朋友的眼睛。她对那个小红点说话，就像对苏小小说话一样自然。", "她开始有了自己的口头禅：“老铁们”、“家人们”、“点关注不迷路”——这些词她以前觉得很俗，但现在说出来，觉得特别亲切。"], ["她开始有自己的风格：清新、真实、有一点点正能量，但也不回避生活的苦涩。她会分享自己的焦虑——找不到工作的焦虑、房租快要到期的焦虑、对未来迷茫的焦虑；但她也会分享自己的快乐——吃到好吃的东西的快乐、粉丝给她刷礼物时的快乐、收到暖心私信时的快乐。", "有一天，一个粉丝在评论里说：“涵涵姐，你笑起来真好看。”", "林诗涵看到这条评论，突然意识到，自己已经很久没有被人夸过”好看”了。", "在那家互联网公司的时候，她的漂亮是一种负担——它招来了陈总监的觊觎，也招来了女同事们的孤立。有人说她是”靠脸吃饭”，有人说她是”狐狸精”，有人说她是”绿茶婊”。那些话传到她耳朵里的时候，她只能装作没听见。", "但在直播间里，她的漂亮是一件武器——是她跟这个世界对话的第一张名片。", "她开始化妆出境。每天开播前，认真护肤、化妆、搭配衣服。她的衣服大多是平价的——来自苏小小店里的样品，或者是淘宝上几十块钱的爆款。但她会把它们搭配得很好看——一件简单的白T恤，配一条高腰牛仔裤，再加一双小白鞋，看起来清新又干净。", "她的粉丝开始叫她”氧气女神”。", "她听到这个称呼的时候，笑了很久。", "一个月后，她的粉丝破了500。", "三个月后，破了5000。", "而她和张小辉的”互动”，也在这个过程中悄悄发生着变化——从一开始的偶尔点赞，到后来开始互相在对方的评论区里留言。", "他们从来没见过面。但不知道为什么，她觉得，这个人应该是个好人。", "因为好人，会在别人跑调的时候批评你；但也会在你继续开口的时候，给你一句”能开口就是勇气”。", "2021年夏天，“双减”政策落地。", "张小辉记得那个日子：7月24日。", "那天下午，天气热得要命。杭州的天空像一块烧红的铁板，云层厚得透不过气，连风都是烫的。知了在窗外嘶哑地叫着，一声接一声，像是在喊”热死了热死了”。"], ["张小辉坐在培训机构的教室里，正在给一个初中毕业班做考前冲刺辅导。讲台上放着投影仪，屏幕上显示着一张语法树图——他把”定语从句”的所有知识点都画在了这张图上，每一个分支、每一种情况、每一个例外，全部标得清清楚楚。", "他的学生坐满了整个教室，有人在认真记笔记，有人在偷偷打瞌睡，有人盯着窗外的天空发呆。", "他看了一眼墙上的钟——下午两点四十五分。还有十五分钟就下课了。", "就在这时，他的裤子口袋里，手机震动了一下。", "他下意识地掏出来，瞥了一眼。是工作群里的通知：", "“请所有老师立即到会议室集合。”", "他皱了皱眉。这个时间点开全员大会，从来不是好事。", "他把笔放下，对学生们说：“大家先自习，把这张语法图背下来，下节课我来检查。”", "他走出教室，穿过长长的走廊。走廊两侧是玻璃窗，阳光从外面照进来，在地上投下一道道光影。他的影子被拉得很长，像一个孤独的剪影。", "会议室在大楼的顶层。他走进去的时候，里面已经坐满了人。", "所有人都是一脸懵的表情。", "机构校长站在讲台上，手里拿着一份文件。他的脸很白——不是正常的白，而是一种灰白，像一张被水泡过的纸。", "“各位老师，”校长开口了，声音很轻，轻到几乎听不见，“刚刚……收到了一份文件。”", "他顿了顿，把文件举起来。那份文件有二十多页，A4纸打印，上面密密麻麻的字。", "“双减政策。”", "会议室里鸦雀无声。", "“学科类培训机构必须转为非营利性机构，或者……”校长又顿了顿，“或者直接注销。”", "这句话像一颗炸弹扔进了水里。", "会议室里一下子炸开了锅。老师们开始窃窃私语，有人说”不会吧”，有人说”这怎么可能”，有人说”这是要我们的命啊”。", "张小辉坐在角落里，一句话都没有说。", "他只是静静地听着，听着同事们的议论，听着窗外的蝉鸣，听着自己心跳的声音。", "他想起自己刚毕业那会儿，找工作四处碰壁的场景。很多培训机构一听他是农村出来的，没有背景，没有资源，直接就把他拒了。最后是这家机构收留了他——老板说：“我看重的是能力，不是背景。”"], ["他在这个行业干了五年。五年的青春，五年的心血，五年的积累。他从一个什么都不懂的新人，变成了全机构好评率最高的老师。他的续班率是最高的，他的学生数量是最多的，他的好评率是百分之百。", "但现在，这一切都没用了。", "他想起那四万块的助学贷款——那是他在大学四年欠下的债。他用了五年才还清。现在，他又要开始欠债了吗？", "那场会议开了三个小时。机构校长在台上念文件，声音越念越小，到最后几乎听不见了。", "会议结束的时候，没有人说话。老师们一个一个地走出会议室，脸上带着一种空洞的表情——像是失去了灵魂的木偶。", "张小辉是最后一个走出会议室的。", "他走到窗边，看着窗外的天空。天还是那么蓝，云还是那么白，阳光还是那么刺眼。这个世界，好像什么都没有变。", "但他知道，一切都变了。", "走出公司大楼的时候，阳光打在他脸上，刺得他睁不开眼睛。", "他在路边站了很久，不知道该往哪里走。", "他想起自己在甘肃定西老家的那个夜晚。", "母亲坐在院子里，借着月光，给他听写英语单词。那是他第一次接触英语，他觉得那些字母像天书一样复杂。二十六个字母，他背了一个星期都没背下来。他急得哭，他妈也急得哭。", "但他妈不识字，她只能看着他课本上的字母，一个一个地念：“A、B、C、D……娃，你教妈念，妈学会了，明天就能帮你听写了。”", "他花了整整一个晚上，才把二十六个字母教会了他妈。", "那是他人生中第一次当”老师”。", "他不知道的是，那个夜晚，在他心里种下了一颗种子。那颗种子，后来长成了一棵树。", "但现在，那棵树好像要倒了。", "他掏出手机，看了一眼时间。", "下午五点二十三分。", "他拿出手机，打了一辆车，回到了出租屋。", "他坐在窗边，看着手机上的赔偿金额发呆。", "六个月平均工资。四万八千块。", "这就是他五年的全部价值。", "四万八千块，在杭州，能租几个月房子？能还几个月的债？能给他妹妹交几个月的医药费？", "他不知道。", "他只知道他刚刚失去了工作，失去了收入，失去了他五年来建立的一切。"], ["他靠在窗边，看着窗外的天空。天慢慢暗了下来，城市的灯光一盏一盏地亮起来，像星星一样。", "他突然想起他妈说过的话：“娃，你是我们全家的希望。”", "他闭上眼睛，深吸了一口气。", "然后他睁开眼睛，打开了手机。", "他点开了那个App——慢手。", "那个他注册了很久、但从来没有发过任何内容的App。", "他点击了”开直播”按钮。", "老家打来电话的时候，是下午三点。", "张小辉刚签完解约协议，一个人坐在出租屋的窗边，看着手机上那条”您的离职手续已办理完成”的提示发呆。", "窗外的阳光很刺眼。杭州的夏天，从来都是这么热，热得人喘不过气来。空调已经关了好几天了——他怕电费太高，舍不得开。他就那样坐在窗边，任凭汗水顺着额头往下淌，滴在手机屏幕上。", "赔偿金已经到账了。四万八千块。", "他盯着那个数字看了很久。四万八。他不吃不喝工作五年，攒下来的钱，全部加起来都没有这么多。", "但这笔钱，他不能动。", "他欠着妹妹的命。", "手机响的时候，他正在发呆。", "他看了一眼来电显示——是妈打来的。他的心突然揪了一下。", "妈很少在这个时间打电话。妈知道他在上班，除非有急事，否则不会在这个时候打扰他。", "他接起电话：“喂，妈。”", "“娃……”妈的声音从电话那头传来，带着一种压抑了很久的悲伤。", "张小辉的心一下子沉了下去。", "“怎么了？”", "“你妹妹……你妹妹的病又犯了。”", "电话那头，传来一阵压抑的抽泣声。不是妈一个人在哭，是妈和妹妹，两个人在一起哭。", "张小辉攥着手机，指关节泛白。", "他妹妹叫张晓燕，今年二十二岁。从小体弱多病，免疫力差，经常感冒发烧。村里的赤脚医生一直说没什么大问题，养养就好了。但去年去省城医院检查，结果是——", "先天性肾功能不全。", "需要长期透析。唯一的根治方案是换肾。手术费三十万。", "三十万。", "他不吃不喝工作五年，都不一定能攒下三十万。", "“医生说什么了？”他问。", "“医生说……”妈在电话那头哭得更厉害了，“医生说，再不换肾就不行了……娃，你说怎么办啊……”", "张小辉攥着手机，一句话都说不出来。"], ["他刚刚失业。身上只有不到两万块的存款。妹妹需要三十万手术费。三十万减两万，还差二十八万。", "二十八万。", "他从哪里弄到二十八万？", "他卖房？他没有房。他在老家县城的那个家，是爸留下的唯一财产，但那个房子连两万块都不值。", "他卖肾？他想过去卖。他甚至在网上搜过价格——据说能卖二十万。但那是违法的，被抓到了要坐牢。他要是坐牢了，妹妹怎么办？妈怎么办？", "他只能打工。但他现在失业了。没有工作，就意味着没有收入。没有收入，就意味着妹妹的病一天拖一天。", "“妈，我来想办法。”他说。", "“你能有什么办法啊……”妈的声音里带着绝望。", "“你别管了，我来想办法。”他说完这句话，挂掉了电话。", "他一个人坐在出租屋里，一根接一根地抽烟。", "窗外的天很蓝，阳光很好，但他觉得自己的世界一片灰暗。", "他看着窗外，看着远处的云，看着云后面的天空。他的目光穿过云层，穿过天空，好像在看一个很远很远的地方。", "那是甘肃定西的方向。", "他在那里出生，在那里长大，在那里第一次学英语，在那里第一次被人叫”老师”。", "他想起小时候，他妈坐在院子里的样子。妈的脸被太阳晒得黝黑，皱纹很深，但眼睛很亮。每次他考试考得好，妈都会笑，笑得眼睛眯成两道缝：“我家娃真争气！”", "他想起他高考成绩出来那天，妈坐在门槛上哭了整整一个下午。爸去世的时候她没哭，他考上大学的时候她哭了。他问她为什么哭，她说：“你爸要是能看见，该多高兴啊。”", "他想起他离开家的那天早上，妈站在村口的老槐树下，一直看着他走。他走了很远，回头一看，妈还站在那里，一动不动，像一尊雕像。", "那是八年前的事了。", "八年来，他只回过三次家。每一次回家，他都能看到妈又老了一点，头发又白了一点，背又驼了一点。", "他想给妈一个好的晚年。他想让妹妹的病治好。他想让这个家，重新有笑声。", "但现在，他连工作都没有了。", "他看了一眼手机桌面上那个App——慢手。", "那个他注册了很久、但从来没有发过任何内容的App。"], ["他其实很早就注册过账号。那时候他刚毕业，在网上搜”怎么当老师”，搜到了慢手上的一个主播。那个主播讲数学，讲得特别好，深入浅出，幽默风趣。他把那个主播的视频全部看了一遍，觉得受益匪浅。", "他当时想：原来还可以这样讲课。", "但他从来没有想过，自己也要做这件事。", "因为他觉得自己是个老师。老师应该站在讲台上，面对学生，面对黑板，面对粉笔灰。老师不应该对着手机摄像头，像个小丑一样。", "但现在……", "他还能有什么选择呢？", "他点开了直播按钮。", "这是他人生中，第一次真正意义上的”直播”。", "他没有做任何准备。没有PPT，没有讲义，没有课程大纲。他就那样坐在出租屋的窗边，面对着手机摄像头，开始讲课。", "“大家好，我叫张小辉。今天……我们来讲一个语法难点：虚拟语气。”", "他的声音很平静。没有紧张，没有颤抖，像是在给一个班的学生上课一样自然。", "但直播间里，没有一个人。", "屏幕上显示着”0人”。", "他看了一眼，继续讲：“虚拟语气是英语语法里最难的部分之一。但其实，只要掌握一个核心原则，就很好理解……”", "他讲得很认真，每一个知识点都掰开了揉碎了讲。他把”if I were you”为什么用”were”而不是”was”这个问题，讲了整整十分钟。", "讲完之后，他看了一眼屏幕。", "还是0人。", "他笑了笑，说：“看来今天没有人来。那我就当自己在练习吧。谢谢大家。”", "他关闭了直播。", "他不知道的是，那场直播，被一个人截图存了下来。", "那个人叫小雨。", "小雨是一个初二的女生，家住杭州郊区。她的妈妈给她报了无数个培训班，但没有一个老师能让她对英语感兴趣。直到那天晚上，她无意中刷到了张小辉的直播。", "她不知道他是谁。她只知道，这个人讲课的时候，声音很好听，说话很耐心，分析问题很清晰。", "她把直播录屏截了下来，发给了她妈妈。", "“妈，你看这个老师，讲得比那些培训班的老师好多啦！”", "她妈妈看了之后，说：“这老师叫什么？我去网上搜搜看。”", "小雨说：“不知道，好像叫张小辉。”"], ["那天晚上，张小辉不知道，自己的人生，已经悄悄被改变。", "那场”没有观众”的直播结束之后，张小辉以为这件事就这么过去了。", "第二天早上，他是被手机震醒的。", "他昨晚又失眠了。凌晨三点才睡着，七点就醒了。他躺在那张一米二的单人床上，盯着天花板发呆。天花板上有一块水渍，形状像一只蝴蝶。他不知道这只”蝴蝶”在这里待了多久了——从他搬进来到现在，他从来没有擦过天花板。", "手机震了一下。", "他拿起来看了一眼。是微信上有一条未读消息。", "他点开一看，是一个陌生人的头像。头像是一朵向日葵，背景是金色的麦田。", "他仔细看了一下备注——“小雨妈妈”。", "他愣了一下。小雨妈妈？那是谁？", "他往上翻了翻聊天记录，发现这个小雨妈妈是半年前加的。他当时教过的一个学生，家长想要他的微信，方便沟通孩子的学习情况。那孩子叫什么他记得，是个很机灵的男孩，但后来因为搬家，换了一个学区，就没再继续上课了。", "小雨妈妈找他什么事？", "他点开消息：", "“张老师，我是小雨的妈妈，昨天晚上我在慢手上刷到你直播了。”", "张小辉愣住了。", "她在慢手上刷到他直播了？昨天那场只有0人的直播？", "他继续往下看：", "“你讲课讲得真好，比我们报的那些培训班强多了。张老师，你现在还有空吗？我想让孩子跟着你学。”", "然后，她转了500块钱过来。", "500块。", "张小辉盯着那个数字看了很久。", "500块。对于他现在的经济状况来说，是杯水车薪。但对于他的精神状态来说，是一个巨大的支撑。", "有人在看。他不是在对着一片虚空自言自语。", "他立刻回复：“小雨妈妈，你好。钱我先不收，您让孩子来听一节课，如果觉得好，咱们再谈。”", "消息发出去之后，他的心跳加速了。", "五分钟之后，对方回复了：“好的张老师，那这周末有时间吗？”", "“有。”", "他放下手机，长长地舒了一口气。", "窗外的阳光照进来，打在那块水渍”蝴蝶”上，让它看起来好像真的在发光。", "后来他才知道，小雨就是那天晚上在慢手上刷到他直播的女孩。"], ["小雨今年上初二，英语成绩一直不太好。她妈给她报过无数个培训班，新东方、学而思、VIPKID，能报的都报了，但小雨的英语成绩就是上不去。", "“我妈给我请的那些老师，上课的时候特别无聊，”小雨后来跟他说，“他们讲的东西，我一个字都听不进去。但你讲课的时候，我觉得英语好像没那么难了。”", "张小辉问她：“为什么？”", "小雨想了想，说：“因为你的声音很好听。你讲课的时候，我觉得你好像就在我身边。”", "他笑了。", "他想起自己当年在甘肃定西老家的那个夜晚。", "母亲坐在院子里，借着月光，给他听写英语单词。那是他第一次接触英语，他觉得那些字母像天书一样复杂。二十六个字母，他背了一个星期都没背下来。", "他妈不识字。她只能看着他课本上的字母，一个一个地念：“A、B、C、D……娃，你教妈念，妈学会了，明天就能帮你听写了。”", "那是他人生中第一次当”老师”。", "他不知道自己这辈子能帮助多少人。但至少，他能让一个像小雨这样的孩子，觉得学习是一件开心的事情。", "“张老师，你讲得那么好，为什么不去试试直播？”", "小雨妈妈的第二条消息弹了出来。", "张小辉看着这句话，愣住了。", "直播？他从来没想过这件事。", "他觉得自己是个老师。老师应该站在讲台上，面对学生，面对黑板，面对粉笔灰。老师不应该对着手机摄像头，像个小丑一样。", "但小雨妈妈说的没错。他现在失业了，没有收入来源。弟弟的学费、妹妹的医药费、家里的开销……全靠他那点赔偿金撑着。四万八千块，能撑多久？三个月？半年？", "他想起自己刚毕业那会儿，找工作四处碰壁的场景。很多培训机构一听他是农村出来的，没有背景，没有资源，直接就把他拒了。最后是这家机构收留了他——老板说：“我看重的是能力，不是背景。”", "他在这个行业干了五年，从来没有对不起任何一个学生。他上课从来不迟到，讲义从来不敷衍，对学生从来不懈怠。他的好评率是全机构最高的，他的续班率也是最高的。", "但这些，在政策面前，毫无意义。", "他想了一整夜。"], ["第二天早上，他打开了电脑，开始研究慢手的运营规则。", "他花了三天时间，研究了慢手的运营规则。", "他发现，慢手上有很多老师——有讲数学的，有讲物理的，有讲化学的，也有讲英语的。那些做得好的老师，粉丝数量都在几十万甚至上百万。", "他看了很多头部英语主播的视频，分析他们的内容风格、讲课方式、互动技巧。他发现，那些做得好的主播，都有一个共同特点：他们不是在”教英语”，而是在”讲故事”。", "他们把枯燥的语法知识，变成了一个个有趣的故事。学生在听故事的同时，不知不觉就学会了语法。", "他决定用同样的方式做内容。", "第四天，他做了一场直播——这一次，他认真准备了PPT，认真设计了课程结构，认真安排了一个小时的讲课内容。", "他讲的是英语语法的核心体系：句子成分、时态、从句、非谓语动词。他把这些内容用自己的方式重新组织了一遍，用最通俗易懂的语言讲出来。他讲”be动词”的时候，会用一个比喻：“be动词就像空气，你看不着它，但它无处不在。没有空气你会死，没有be动词句子就死了。”", "那场直播，他讲了整整一个小时。", "直播结束之后，他看了一眼数据：47个人。", "四十七个人。", "比第一次好多了。虽然还是不多，但至少有进步。", "他一条一条地看那些弹幕。有人问：“老师，这个从句怎么区分？”有人答：“老师，我听懂了！”还有人说：“张老师，我是你以前的学生！”", "他看到最后一条弹幕的时候，眼眶红了。", "“张老师，我们想你了。”", "那是以前他教过的学生。", "他没想到，在这个他以为自己已经被”抛弃”的时刻，还有人记得他。", "那天晚上，他坐在出租屋里，对着那条”张老师，我们想你了”的弹幕，坐了很久。", "然后他打开了一个新的文档，开始写自己的第一节付费课程。", "课程名字叫：《张小辉英语语法体系课》。", "定价199元，终身免费更新。", "他在课程介绍里写了一段话：", "“我叫张小辉，来自甘肃定西的一个小村子。我没有显赫的背景，没有光鲜的履历，但我有一颗想把英语讲清楚的心。如果你觉得我的课有用，那就够了。”"], ["他不知道有没有人会买。", "但他知道，他必须试试。", "他用了两个星期，把第一节付费课程做完了。", "那两个星期里，他每天工作超过十六个小时。白天做直播，晚上录课程。他把课程拆分成三十节课，每节课十五到二十分钟。他从头开始讲，从字母发音讲起，一直讲到复杂从句。他把每一个知识点都讲透了，每一个例句都精心挑选，每一个练习题都亲自做一遍。", "他住在深圳南山区一个十五平米的出租屋里。房间里只有一张床、一张桌子、一把椅子。桌子是他从二手市场淘来的，花了五十块钱。椅子是买桌子的时候店家送的，破了个洞，坐上去会发出吱呀吱呀的响声。", "他把手机架在桌上，调整好角度，然后开始录课。", "录课的流程是这样的：先在纸上写好讲稿，然后对着手机念。念错了就重来，一遍不行两遍，两遍不行三遍，有时候一句话要录十几遍才能满意。", "录完之后，他用剪映剪辑。剪辑是个技术活——要把废话剪掉，要把停顿修整，要加上字幕，要配上背景音乐。他以前从来没做过剪辑，硬是看教程自学了半个月。", "那两个星期，他瘦了五斤。", "不是减肥，是真的累。每天录完课，他都觉得自己被掏空了。但他还是咬着牙，一节课一节课地做。", "因为他知道，这是他唯一的出路。", "第一节课发出去的时候，他的手是抖的。", "他把课程定价199元。199块。这个价格在英语语法课里算是中等偏低的——那些大主播的课，动辄299、399、甚至599。", "他在想：有人会买吗？有人会相信一个没有任何名气的无名小卒吗？", "发出去的那一刻，他的心提到了嗓子眼。", "然后他打开了后台，开始刷新。", "一分钟。五分钟。十分钟。", "没有订单。", "他盯着屏幕，心一点一点地沉下去。", "半小时后，第一笔订单来了。", "他的心跳漏了一拍。", "然后是第二笔、第三笔、第四笔……", "那天晚上，他一共卖出了127份课程。", "127乘以199，等于25273块。", "扣掉平台的手续费，到手大概有23000左右。", "张小辉看到这笔收入的时候，在出租屋里跳了起来。"], ["他立刻给妹妹转了一万块，然后给妈打了个电话：“妈，这个月先打一万，下个月打更多。”", "“娃，你哪来这么多钱？”他妈问。", "“我在网上讲课，有人买。”他说，“你别担心，我有收入了。”", "他挂掉电话的时候，眼泪流了下来。", "不是难过的泪，是高兴的泪。", "他想起他妈在他高考成绩出来那天说的话：“娃，你是全家的希望。”", "他现在，终于可以成为这个家的希望了。", "他继续做直播，继续更新课程。", "他的粉丝从47人，慢慢涨到了500人，又从500人涨到了3000人。三个月之后，他的付费学员突破了1000人。", "一千个学生。每个月给他带来稳定的收入。", "更重要的是，他在这件事里，找到了某种久违的东西——成就感。", "他不是那种”只会教书”的老师。他开始研究平台规则，研究用户需求，研究怎么让自己的课程更有价值。他发现，很多英语学习者最困惑的不是语法本身，而是不知道该怎么学习语法。", "他调整了自己的课程体系，从”讲语法”变成”教学习方法”。他告诉学生：“语法不是用来背的，是用来理解的。你理解了规则，自然就会用了。”", "他的课程口碑越来越好。很多人自发地在朋友圈、在微信群里推荐他的课。", "“我同事的孩子在学，说讲得特别好，你也让孩子去听听。”", "张小辉开始频繁地收到这类消息。每一次收到，他都觉得自己做了一件正确的事。", "那天晚上，是他最普通的一个直播日。", "他像往常一样，打开摄像头，开始讲课。他讲的是”非谓语动词”——这是一个让很多学生头疼的语法点。但他把它讲得深入浅出，用了大量的例子和比喻。", "直播结束之后，他收到了一个学生发来的私信。", "那个学生叫小雨，就是之前给他发微信的那个妈妈的孩子，今年上初二。她在私信里写了一段话：", "“张老师，我家里条件不好，我妈给我报不起培训班，我一直在网上找免费的课程学，但那些课程讲得都不清楚，我越学越迷糊。直到昨天晚上，我看到你的直播，我突然觉得，英语好像没有那么难了。你的声音很好听，你讲课的时候，我觉得你好像就在我身边。”"], ["“张老师，我很喜欢你。”", "“不是那种喜欢，是那种……你让我觉得，学习是一件很开心的事情的那种喜欢。”", "“谢谢你，张老师。”", "张小辉看完这条私信，一个人在出租屋里坐了很久。", "他想起自己在甘肃定西老家的那个夜晚。", "母亲坐在院子里，借着月光，给他听写英语单词。那是他第一次接触英语，他觉得那些字母像天书一样复杂。但他妈不识字，她只能看着他课本上的字母，一个一个地念：“A、B、C、D……娃，你教妈念，妈学会了，明天就能帮你听写了。”", "他不知道自己这辈子能帮助多少人。但至少，他能让一个像小雨这样的孩子，觉得学习是一件开心的事情。", "那天晚上，他把小雨的那条私信截图，存了下来。", "他告诉自己：这就是他做这件事的意义。", "第一周，127个人购买了他的课程。", "张小辉看着后台的数据，愣了很久。", "他做这一行五年了，从来没有想过，有一天，他会靠”卖课”赚钱。在他的认知里，知识应该是免费的——他自己就是靠免费的资源长大的。他没有钱上培训班，没有钱请家教，所有的学习资料都是他从网上一点一点搜来的。所以他一直觉得，让别人为知识付费，是一件很”剥削”的事情。", "但现在，他不得不接受这个现实：他需要钱。", "他需要钱给妹妹治病。他需要钱给家里寄生活费。他需要钱还债。他需要钱让自己活下去。", "在这个现实面前，“面子”算什么呢？", "他打开微信，给小雨妈妈发了一条消息：“小雨妈妈，谢谢你的推荐。这500块钱我收到了，但我不能收。等小雨上完第一节课，你觉得好再给我。”", "小雨妈妈的回复让他愣了很久：“张老师，你收下吧。你现在比我更需要钱。”", "他把那条消息看了三遍，然后默默地收下了那500块钱。", "那一刻，他突然明白了一个道理：有时候，接受别人的善意，也是一种善良。", "第一个月结束的时候，他的收入是23000块。", "这个数字，比他在培训机构时的工资还要高。", "他躺在那张吱呀作响的椅子上，看着天花板发呆。天花板上的那块水渍”蝴蝶”还在，在傍晚的光线里，它看起来像是要飞起来。"], ["他想起自己刚毕业那会儿，找工作四处碰壁的场景。很多培训机构一听他是农村出来的，没有背景，没有资源，直接就把他拒了。最后是这家机构收留了他——老板说：“我看重的是能力，不是背景。”", "他在这个行业干了五年。五年来，他上过的课超过三千节，批改过的作业超过一万份，帮助过的学生超过一千人。他的好评率是百分之百，他的续班率是全机构最高的。", "但这些，在政策面前，毫无意义。", "他以为自己会被这个行业抛弃。但慢手给了他一个新的机会。", "他继续做直播，继续更新课程。他的粉丝从47人，慢慢涨到了500人，又从500人涨到了3000人。三个月之后，他的付费学员突破了1000人。", "一千个学生。每个月给他带来稳定的收入。", "更重要的是，他在这件事里，找到了某种久违的东西——成就感。", "他不是那种”只会教书”的老师。他开始研究平台规则，研究用户需求，研究怎么让自己的课程更有价值。", "他发现，很多英语学习者最困惑的不是语法本身，而是不知道该怎么学习语法。他们记了很多单词，背了很多规则，但一开口还是错误百出。", "他调整了自己的课程体系，从”讲语法”变成”教学习方法”。", "他告诉学生：“语法不是用来背的，是用来理解的。你理解了规则，自然就会用了。就像骑自行车——你不需要记住平衡的原理，你只需要多摔几次，摔着摔着就会了。”", "他的课程口碑越来越好。很多人自发地在朋友圈、在微信群里推荐他的课。", "“我同事的孩子在学，说讲得特别好，你也让孩子去听听。”", "“张老师的课真的有用，我家孩子以前最讨厌英语，现在居然主动要学习了！”", "“张老师讲得比那些培训班的老师好多了，而且价格还便宜，真是良心课！”", "张小辉开始频繁地收到这类消息。每一次收到，他都觉得自己做了一件正确的事。", "但他不知道的是，更大的机会，正在悄悄向他走来。", "那天晚上，他像往常一样直播结束之后，习惯性地刷了一下慢手的首页。", "一条新闻跳了出来：", "“快手平台即将推出直播带货功能”", "他的心跳突然加速了。"], ["直播带货。这个词他听说过。抖音上有人在做，带货主播的收入高得吓人——有人一场直播能卖几百万甚至几千万的商品。", "但那都是大主播。他一个教英语的，能带什么货？", "他仔细看了一下新闻。原来，直播带货不只是卖实物商品，也可以卖虚拟商品——课程、会员、服务，都可以。", "他突然想到：他的英语课，是不是也可以走这条路？", "但他不知道该怎么做。他是一个老师，不是一个销售员。他不懂供应链，不懂选品，不懂运营。他只会教书。", "他把那条新闻反复看了三遍，然后关掉了手机。", "他不知道自己该不该走这条路。", "但他隐约感觉到，这将是一个改变命运的机会。", "而慢手平台即将推出的这个新功能，将彻底改变他的命运——也把林诗涵、马胜利和他自己，三条本来平行的人生线，推向了一个共同的焦点。", "2021年5月，慢手平台宣布推出”直播带货”功能。", "这个消息，在整个直播圈子里炸开了锅。", "所有人都在讨论：这意味着什么？流量能不能变成钱？带货该怎么带？该选什么品？怎么定价？要不要组建团队？", "林诗涵的账号在那时破了1万粉。", "一万个粉丝。", "这个数字，对她来说，是一个里程碑。三个月前，她还是一个只有12个粉丝的新人主播；三个月后，她已经有了一万个粉丝。虽然跟那些头部主播比起来，这只是九牛一毛，但对她来说，那是她一晚上一晚上熬出来的结果。", "她每天直播两小时，雷打不动。", "她的直播内容很简单：跟粉丝聊天、唱歌、教化妆。她的风格是那种”邻家姐姐”型的——不惊艳，但很亲切。没有锥子脸，没有大长腿，没有那种让人窒息的”完美感”。她就只是坐在那里，对着镜头说话，像一个普通的朋友。", "慢慢地，她的直播间里有了一批固定的老粉。", "那些老粉会准时来看她的直播，会在弹幕里跟她互动，会在她唱歌的时候刷小心心给她。有人说：“涵涵姐，我就喜欢看你这种真实的主播，那些网红看多了都腻了。”", "她每次听到这种话，都会笑。", "她知道自己的优势是什么。不是漂亮，不是才华，而是真实。"], ["她从来不装。她不会明明月薪五千，却假装自己月入百万；她不会明明吃的是泡面，却假装自己顿顿牛排；她不会明明焦虑得睡不着觉，却假装自己生活得云淡风轻。", "她就只是她——一个二十六岁、在杭州独自打拼、被渣男伤害过、正在努力重新站起来的普通女孩。", "有一天，她在直播中提到了张小辉的免费语法课。", "那是她第一次在直播中提到一个男人。", "“你们有没有人想学英语？”她问，“我推荐一个老师，讲得特别好，而且免费。不收钱那种。”", "弹幕里有人问：“涵涵姐，你英语很好吗？”", "“一般般啦，六级刚过。”她说，“但这个老师真的很厉害。我之前唱歌跑调被他批评过——对，你们没听错，他确实批评过我。但我真的很感谢他，因为他是真的在帮你，不是那种敷衍了事的。”", "她把张小辉的主页链接分享了出去。", "那天晚上，她收到了张小辉发来的私信：", "“谢谢你推荐。”", "她看着那条消息，嘴角不自觉地勾了起来。", "她回复：“不用谢。你讲得好，我才敢推荐。不然不是砸我自己招牌吗？”", "“要不要互推一下？” 他问。", "“好呀。”她回了一个笑脸。", "这是他们真正开始”认识”的开始。", "虽然他们互相关注了半年多，但这是他们第一次真正地、正式地交流。", "她发现，张小辉是一个话很少的人。他的私信永远是那种公事公办的口吻——“谢谢推荐”、“互推已做”、“方便的话帮转一下”——没有多余的寒暄，没有多余的废话。", "她一开始觉得这个人挺无聊的。但后来她发现，他是真的把心思都放在了教学上。", "她看过他的直播。他的直播从来不”整活”，从来不”要礼物”，从来不搞那些花里胡哨的东西。他就是讲课。一个知识点一个知识点地讲，讲得很慢，很细，很清楚。", "有一次，她在他直播的时候进去看了一眼。那天他讲的是”虚拟语气”，一个让很多学生头疼的语法点。他讲的时候，没有PPT，没有板书，就只是对着镜头说。", "但奇怪的是，她说不上来的那种——他说话的时候，你就想听下去。"], ["她当时想：这个人真的很适合当老师。不是那种”会表演”的老师，而是那种”会教学”的老师。", "与此同时，在千里之外的深圳，马胜利也在为即将到来的618大促做准备。", "他的”老马说建材”账号，已经有了十万粉丝。", "十万粉丝。这个数字，比他想象的要多得多。", "他的视频风格很简单：讲案例，讲干货，讲那些别人不愿意讲的”行业内幕”。他讲过”瓷砖的十大猫腻”，讲过”防水涂料的选购误区”，讲过”装修合同里的那些坑”。每一条视频都干货满满，每一个案例都有图有真相。", "他的粉丝叫他”马哥”。有人说：“看马哥的视频，感觉他就是个实在人，不像那些主播，满嘴跑火车。”", "他每次看到这种评论，都会笑一下。", "他知道自己不是什么”网红”。他只是一个卖建材的老百姓。他讲的东西，不是什么高深的大道理，只是他干了十年建材，见过的事情、踩过的坑、吃亏上过的当。", "他只是把这些东西，说了出来。", "李永盛找过他谈合作。县城最大的建材老板，愿意给他供货，让他帮忙卖。卖多少，分多少，不设上限。", "他心动了。", "他开始研究”带货”这件事。他发现，带货分两种：一种是什么都卖，挣快钱，不在乎口碑；另一种是只卖自己真正认可的产品，慢慢积累信任。", "他选择了后者。", "“我只卖我用过的东西。”他在视频里说，“如果我没用过，我不会推荐给你们。这是我给自己定的规矩。”", "他的粉丝很买账。他的带货数据，慢慢地涨了起来。", "618大促的号角即将吹响。", "平台通知，所有参与618的带货主播，必须在5月31日之前提交报品。", "林诗涵报了一个化妆品品牌——她试用了三个月，觉得产品确实不错，价格也公道。", "张小辉报了一个英语学习机品牌——他测试了一周，觉得产品确实对学习有帮助。", "马胜利报了一个瓷砖品牌——他亲自去仓库看了货，觉得质量可靠。", "三个城市的三个普通人，在同一时间，为了同一场大促，做着各自的准备。", "他们不知道的是，他们的命运，即将在这个618，产生交集。", "张小辉接到了第一个带货合作。"], ["那是五月中旬的一个下午。他正在出租屋里录课，手机屏幕亮了一下——是一条私信。", "他点开一看，是一个陌生的账号，头像是一个蓝色的学习机logo。", "“张老师你好，我是星火学习机的品牌方。我们看到您在慢手上的英语教学视频，觉得您的受众群体跟我们产品非常契合。不知道您有没有兴趣合作？”", "他盯着这条消息看了很久。", "带货？找他？", "他以前从来没想过这件事。在他的认知里，带货主播都是那种”买买买”、“oh my god”、“所有女生注意了”类型的。他一个讲英语语法的老师，带什么货？", "但他还是回复了：“可以了解一下产品吗？”", "对方很快发来了产品资料。", "他仔细看了一遍。星火学习机，是一款针对中小学生的英语学习辅助工具。内置了同步教材、真人口语纠音、智能错题本等功能。", "他想了想，答应了。", "但他提了一个条件：“我可以帮你卖，但我不卖假话。我会亲自用一周，然后告诉大家我的真实感受。如果不好用，我不会卖。”", "商家同意了他的条件。", "他花了一周时间，测试了这台学习机的每一个功能。", "那台学习机是白色的，屏幕有十英寸，拿在手里沉甸甸的。他的测试方法很简单：把自己当成一个学生，从头到尾把这台机器用一遍。", "他先试了同步教材功能。他选了一本人教版七年级英语，从第一课开始，一课一课地往下学。机器的界面很清晰，音质也不错。但他发现了一个问题：有些单词的发音不标准，特别是一些连读和弱读的地方，处理得不太好。", "他又试了口语纠音功能。他对着机器读了一段英语，机器很快给出了评分：78分。他看了一眼纠音报告，发现它把他的”th”音识别错了——他把”think”读成了”sink”，机器居然没有指出来。", "他皱了皱眉。这个功能，有待改进。", "他又试了智能错题本功能。这个功能倒是做得不错——它能自动收录做错的题目，并且根据记忆曲线安排复习时间。这一点，是人工做不到的。", "他用了一周，把这台机器的每一个功能都试了一遍。"], ["最后，他得出了一个结论：这款学习机，有优点，也有缺点。优点是界面清晰、功能齐全、性价比高；缺点是口语纠音功能还有待改进。", "他决定如实告诉粉丝。", "那场带货直播，是六月一日晚上八点。", "他像往常一样打开了摄像头，对着镜头说：“大家好，我是张小辉。今天不讲课，给大家带点货。”", "弹幕里有人说：“张老师带什么货？”“是那个学习机吗？”“张老师也开始带货了？”", "他笑了笑，说：“对，是星火学习机。我用了一周，跟大家说说我的真实感受。”", "然后他拿出那台学习机，对着镜头，一项一项地介绍。", "“先说优点：第一，界面清晰，操作简单，学生自己就能用，不需要家长帮忙；第二，同步教材很全，涵盖了市面上大部分版本；第三，智能错题本功能做得很好，能根据记忆曲线安排复习。”", "他顿了顿。", "“再说缺点：口语纠音功能还有待改进，有些发音识别不太准确，希望厂家后续能优化。”", "弹幕里有人说：“张老师居然说缺点？”“这个老师也太实在了吧”“就冲你这份真诚，我买了！”", "那场直播，他卖了23台。", "23乘以50，等于1150块。", "这是他人生中第一次，靠”卖东西”赚钱。", "他突然理解了一个道理：流量是有价值的，但流量的价值必须建立在信任的基础上。他的粉丝信任他，所以他卖的东西，他们才会买。", "他开始认真研究”带货”这件事。", "他发现，带货分两种：一种是什么都卖，挣快钱，不在乎口碑；另一种是只卖自己真正认可的产品，慢慢积累信任。", "他选择了后者。", "“我只卖我用过的东西。”他在直播间里说，“如果我没用过，我不会推荐给你们。这是我给自己定的规矩。”", "粉丝们纷纷在评论区里说：“张老师，就喜欢你这种实在的！”", "那天晚上直播结束之后，他躺在床上，看着天花板发呆。", "天花板上的那块水渍”蝴蝶”还在。三年了，它一直挂在那里，从来没有消失过。", "他想起自己刚来深圳的时候。", "那是一九年的夏天。深圳热得要命，空气里永远弥漫着一股潮湿的味道。他拖着行李箱，站在华强北的街头，看着来来往往的人群，心里既兴奋又迷茫。"], ["他不知道自己能在这个城市走多远。", "五年过去了。他换了两份工作，搬了四次家，经历了一次裁员，经历了妹妹生病，经历了失业，经历了绝望。", "但他还是挺过来了。", "他从一个失业的中年男人，变成了一个有百万粉丝的教育博主。他从一个月薪八千的打工人，变成了一个有稳定收入的创业者。", "他看着天花板，嘴角微微上扬。", "“小蝴蝶，”他对着天花板说，“你是不是也想飞起来了？”", "他没有回答。", "但他知道，答案已经不重要了。", "重要的是，他已经在飞了。", "苏小小的服装店，积压了一批夏装。", "那天下午，林诗涵正在家里练歌，突然收到了苏小小的微信消息。", "“涵涵救命！”", "她吓了一跳，赶紧回复：“怎么了？”", "“我店里的夏装卖不出去了！” 苏小小的消息连珠炮一样发来，“疫情那会儿进不了货，好不容易解封了，好不容易进了货，结果到现在还没卖出去一半！现在夏天都快过完了，再卖不出去，就只能等到明年——但明年款式早就更新了，这些旧款基本上就废了！”", "林诗涵看着手机屏幕，不知道该说什么。", "她知道苏小小这两年不容易。疫情三年，对实体店的打击太大了。苏小小的服装店从一家开到三家，又从三家缩减回一家。最惨的时候，她连房租都交不起，差点就要关门。", "好不容易熬过来了，结果又遇上这批积压的夏装。", "“涵涵，你帮我在你直播间卖一下呗。” 苏小小发来消息，“你长得好看，穿什么都好看。你帮我卖，肯定能卖出去！”", "林诗涵犹豫了一下。", "“我？卖衣服？”", "“对啊！你长得好看，穿什么都好看。你帮我卖，肯定能卖出去！”", "林诗涵看着那条消息，不知道该哭还是该笑。", "她知道苏小小说的是实话。她的粉丝里，确实有很多人夸她”有衣品”、“穿搭好看”。但”夸”和”买单”是两回事。她从来没有在直播间里卖过实物商品，她不知道自己能不能做到。", "但她也知道，苏小小帮她太多了。"], ["苏小小在她最困难的时候，借给她五千块钱，帮她买设备。苏小小在她第一场直播的时候，坐在旁边给她当托。苏小小在她无数次想放弃的时候，拍着她的肩膀说”涵涵你可以的”。", "现在轮到她了。", "“好，”她回复，“我帮你卖。”", "那场直播，她专门花了一整天去苏小小的店里选品。", "苏小小的店在诸暨市区，叫”小小服装”。门面不大，但装修得很温馨。门口挂着一块手写的招牌，上面画着一只卡通小恐龙，旁边写着”小小服装，遇见最美的你”。", "林诗涵走进店里的时候，苏小小正站在货架前，一脸焦虑地看着那些堆积如山的夏装。", "“涵涵！你来啦！”苏小小一看到她，眼睛都亮了，“来来来，我给你介绍这批货。”", "她一件一件地拿给林诗涵看。", "“这款是今年最流行的碎花裙，面料是雪纺的，穿上特别凉快，特别适合夏天；这款是休闲套装，简约大方，适合学生党，性价比特别高；这款是那种小正式的风格，适合通勤，有点小性感……”", "林诗涵一件一件地试穿，然后拍照，发给苏小小参考。", "“这款适合学生党，性价比高，但颜色有点挑肤色，白皮穿好看，黄皮就不太行；这款适合通勤，有点小正式，但价格偏高，粉丝可能接受不了；这款适合约会，斩男色，但……”", "苏小小在电话那头笑骂她：“涵涵你这是卖衣服还是教穿搭啊？”", "“卖衣服也得专业一点吧！”林诗涵说，“粉丝信任我，我不能坑她们。”", "她把每一件衣服都研究透了——面料、版型、颜色、适合人群、适合场景、价格……她把所有的信息都记在脑子里，然后在直播的时候，把这些信息用最通俗的语言讲出来。", "直播那天晚上，她架好了设备，试好了灯光，然后打开了摄像头。", "她今天穿的是一件白色的棉质T恤，扎着一个松松的马尾，化了淡淡的妆。补光灯打在她脸上，让她的皮肤看起来又白又嫩。", "“大家好，我是诗涵。”她对着镜头说，声音比平时稍微大了一点，“今天不唱歌，给大家带点货。”", "弹幕里有人说：“涵涵要带货了？”“带什么货？”“期待涵涵的选品！”", "她笑了一下。"], ["“这是我闺蜜的店，在诸暨开的，开了好几年了。她家的衣服质量特别好，价格也实在。我身上穿的这款，就是她家的。”", "她站起来，在镜头前转了一圈，展示那件T恤的每一个细节。", "“面料是纯棉的，摸起来特别舒服；版型是那种oversize的，不挑身材；颜色是米白色，很百搭。价格呢，只要49块！49块，你买不了吃亏，买不了上当，但你能买一件质量特别好的T恤！”", "她对着镜子转了一圈，展示那件衣服的每一个细节。", "弹幕里有人说：“涵涵穿得好好看！”“这个颜色显白！”“冲了冲了！”", "她笑了。", "“喜欢的话，可以点左下角的链接……”", "那天晚上，她卖了12件衣服。", "GMV（成交总额）不到两千块。扣除成本和平台抽成，她能拿到的提成大概有一百多。", "一百多块。", "这个数字，跟她平时的直播收入差不多。但这不是重点。", "重点是，她发现，带货是一件很奇妙的事情。", "它不是”卖东西”，而是”分享好东西”。", "你把自己觉得好的东西，推荐给信任你的人，这不正是朋友之间会做的事吗？", "她以前总觉得，直播带货是一件很”功利”的事情。但现在她发现，如果你真的在分享好东西，如果你真的在帮粉丝省钱省心，那这件事本身，就是有价值的。", "那天晚上直播结束之后，她在后台看到了一条私信。", "是她的一个粉丝发来的：“涵涵姐，你推荐的那件衣服我收到了，质量真的很好！谢谢你！”", "她看着那条消息，笑了很久。", "她发现，帮助别人买好东西，也是一件很快乐的事。", "618大促倒计时三天。", "林诗涵站在窗边，看着手机屏幕上的倒计时发呆。", "她的账号刚刚破了一万粉。这个数字，对于那些头部主播来说，不值一提。但对她来说，那是一年多的日日夜夜——每天两小时的直播，每晚对着那个小红点说话，说到她嗓子冒烟，说到她眼睛发酸。", "一万个粉丝，就是一万个愿意看她直播的人。", "她在心里默默感谢了每一个人。", "然后她把手机收起来，开始准备618的带货。"], ["她要带的货是一款平价的面霜。她试用了三个月——从去年冬天就开始用，一直用到现在。她的皮肤是干皮，冬天的时候容易起皮，用了这款面霜之后，明显改善了很多。", "“这是我用过最好用的平价面霜，”她在视频里说，“如果不好用，我不会推荐给你们。这是我给自己定的规矩。”", "她的粉丝很买账。618第一天，她的带货GMV破了五千。", "与此同时，在深圳的一个出租屋里，马胜利也在为618冲刺。", "他的”老马说建材”账号，已经有了十万粉丝。十万粉丝，这个数字，比他想象的要多得多。", "他带货的产品是一款瓷砖——他亲自去仓库看了货，觉得质量可靠，价格也公道。他在视频里说：“我只卖我用过的东西。如果我没用过，我不会推荐给你们。这是我给自己定的规矩。”", "他的粉丝很买账。618第一天，他的带货GMV破了三万。", "而在杭州的一个小区里，张小辉也在为618做准备。", "他的账号已经有一百万粉丝了。百万粉丝，这个数字，对于他来说，像做梦一样。", "他带货的产品是一款英语学习机——他测试了一周，觉得产品确实对学习有帮助。他在视频里说：“我只卖我用过的东西。如果我没用过，我不会推荐给你们。这是我给自己定的规矩。”", "他的粉丝很买账。618第一天，他的带货GMV破了八万。", "618结束的那天晚上，三个人都在各自的出租屋里，看着后台数据发呆。", "林诗涵的GMV：28000元。 马胜利的GMV：157000元。 张小辉的GMV：420000元。", "三个城市的三个普通人，在同一场618大促中，赚到了他们人生中的第一桶金。", "林诗涵拿到了人生中第一个七位数的存款。 马胜利拿到了人生中第一个六位数的月收入。 张小辉拿到了人生中第一个六位数的月收入。", "他们不知道的是，他们的命运，即将再次交汇。", "而这一次交汇的地点，是快手平台一年一度的年度盛典。", "慢手平台一年一度的年度盛典，定在七月的最后一天。", "林诗涵收到邀请函的时候，正在家里吃泡面。"], ["那是一款老坛酸菜味的泡面，是她在超市打折的时候买的，一包只要三块九。她已经连续吃了一周了——不是没钱，是舍不得花。618那场带货虽然让她赚了一笔，但那些钱她要存起来，以防万一。", "她把邀请函看了三遍。", "“尊敬的’氧气诗涵’用户，诚邀您参加慢手平台2021年度盛典……”", "她盯着那几个字，愣住了。", "年度盛典。她只在新闻里见过那种场合——红毯、聚光灯、成百上千万粉丝的大主播。她从来没想过，自己有一天也会收到邀请。", "她截图发给苏小小。", "苏小小说：“涵涵！你要上红毯了！你穿什么？我给你准备！”", "林诗涵看着手机屏幕，笑了。", "她想起自己刚来杭州的时候，身上只有两千块钱，租的是一个八平米的隔断间。那段时间，她每天晚上都睡不着觉，躺在床上瞪着天花板，不知道明天该怎么过。", "现在，她要去年度盛典了。", "马胜利也收到了邀请。", "他是在建材城接到电话的。电话那头是一个甜美的女声：“马先生您好，这里是慢手平台运营中心，恭喜您获得年度盛典的邀请……”", "他握着手机的手在抖。", "不是因为激动，是因为害怕。", "他看了一眼自己的穿着——一件灰色的Polo衫，上面还有昨天吃盒饭溅上去的油渍。脚上是一双黑色的凉鞋，袜子还是那种十块钱三双的地摊货。", "他要去年度盛典。", "他在心里盘算：要不要买一套新衣服？买什么牌子？去北京住哪里？要不要带上老婆孩子？", "然后他想起了一件事：他离婚了。", "去年十一月，他和陈芳协议离婚了。儿子小浩跟着陈芳，他每个月付三千块抚养费。离婚的原因很简单也很复杂——两个人在一起生活了太久，太累了。生活的重压把他们的感情磨得一点不剩，剩下的只有争吵和沉默。", "他不想让孩子看到父母吵架，所以他选择了退让。", "他净身出户。房子、车子、存款，全给了陈芳。他只带走了那个存了十万粉丝的慢手账号，和一套直播设备。", "现在，那个账号已经有了五十万粉丝。", "他要去年度盛典了。但身边没有老婆可以炫耀了。", "他拨通了王二蛋的电话：“二蛋，陪我去北京呗。”"], ["张小辉是三个人里唯一一个犹豫要不要去的。", "他的理由很简单：太忙了。", "他的英语课程卖得越来越火，付费学员已经突破了两千人。每个月稳定的收入，让他终于可以把妹妹的手术费凑齐了。上个月，他给妹妹打了十五万——那是做带货这半年攒下来的钱。", "“妹，十五万先打过去，你好好养身体，手术费我再想想办法。”他在电话里说。", "妹妹在电话那头哭了：“哥，你不用管我，你自己也要留点钱……”", "“傻丫头，”他笑了笑，“你是我妹，我不管你谁管你？”", "他挂了电话，看着窗外的月亮发呆。", "他不知道的是，妹妹的病比他想象的更严重。医生说，如果不尽快换肾，最多还能撑半年。", "他还在犹豫要不要去北京的时候，他的高中同学给他打了一个电话。", "“小辉，你是不是要去参加慢手的年度盛典？”", "“你怎么知道？”", "“我也收到了邀请！咱们高中班就咱俩被邀请了，你说巧不巧？”", "张小辉握着手机，突然觉得，也许这是命运的安排。", "他决定去。", "年度盛典的前一天，三个人分别从三个城市出发，飞向了北京。", "林诗涵穿的是苏小小给她准备的一条浅蓝色的连衣裙。那条裙子是苏小小店里的镇店之宝，苏小小说：“涵涵，你穿上这条裙子，保证全场最好看。”", "林诗涵说：“万一被说撞衫呢？”", "苏小小说：“撞衫不可怕，谁丑谁尴尬。你放心穿。”", "她站在镜子前，看着镜子里的自己。一条浅蓝色的连衣裙，衬托得她整个人像一朵盛开的花。她的皮肤白净，眼睛很大很黑，嘴唇涂了一层淡淡的唇彩，在灯光下闪闪发亮。", "她突然想起苏小小说的话：“涵涵，你知道吗，你最大的优点是什么？”", "“什么？”", "“真实。”苏小小说，“你跟那些网红不一样，你是真的在生活。”", "她深吸一口气，把那条裙子穿好，走出了门。", "马胜利穿的是王二蛋带他去买的西装。", "王二蛋说：“老马，你这身打扮去盛典，不是给人家丢人吗？走，哥带你买衣服去。”", "他们在杭州大厦逛了一下午。王二蛋眼光很毒，一眼就看中了一套藏蓝色的西装，说：“这套，衬你。”", "马胜利试穿的时候，看着镜子里的自己，突然有点恍惚。"], ["他已经很多年没有穿过西装了。上一次穿西装，还是结婚的时候。那套西装是他妈亲手缝的，蓝色的中山装，料子是那种最普通的棉布，但穿在他身上，显得特别精神。", "他对着镜子看了看，发现自己的眼角有了皱纹，鬓角也有了几根白发。三十六岁，他在这个行业里摸爬滚打了十年，从一个卖建材的小老板，变成了一个有五十万粉丝的”网红”。", "但他从来不觉得自己是个”网红”。他只是一个普通人，一个在时代洪流里挣扎求生的普通人。", "“买。”他看着镜子里的自己说。", "张小辉没有买新衣服。", "他翻遍了整个衣柜，找出了一套他保存得最好的衣服——一件白色的衬衫，是他当年大学毕业的时候买的，料子是纯棉的，穿着很舒服。他一直舍不得穿，只有在重要场合才拿出来。", "他穿着那件衬衫，踏上了去北京的飞机。", "飞机起飞的时候，他看着窗外的云层发呆。", "他想起自己第一次坐飞机的时候。那时候他刚大学毕业，要去深圳报到。他妈送他去机场，站在安检口外面，一直看着他走。他回头看了好几次，妈还站在那里，冲他挥手。", "那是他最后一次见到妈那么轻松的样子。后来，爸摔断了腿，妹妹生了大病，家里的担子全都压在他一个人身上。他再也没见过妈那么轻松地笑过。", "他在心里默默许了一个愿：妈，等我有钱了，我一定接你去大城市生活。", "年度盛典的主会场在国家会议中心。", "林诗涵走进会场的时候，整个人都懵了。", "红毯、聚光灯、闪光灯，到处都是人。她看到一个又一个她只在手机屏幕上见过的主播出现在的眼前——有的穿得很华丽，有的穿得很普通，但每个人脸上都带着一种”我很了不起”的表情。", "她站在人群里，突然觉得自己特别渺小。", "她是来干什么的？她是来干什么的？她只是一个有一万粉丝的小主播，她有什么资格站在这里？", "她想转身离开。", "就在这时，她看到了一个人。", "那是一个穿白色衬衫的男人，身材瘦削，戴着一副黑框眼镜，站在角落里，局促地搓着手。他的表情很紧张，像一个迷路的孩子。", "林诗涵突然觉得，这个人看起来很眼熟。"], ["她仔细看了一眼——那不是”张小辉教英语”吗？", "她也紧张地走了过去：“你好……请问你是张小辉老师吗？”", "男人抬起头，看了她一眼，眼睛里闪过一丝惊讶：“你是……‘氧气诗涵’？”", "“是我是我！”林诗涵激动地点头，“我是你的粉丝！”", "张小辉笑了。那种笑很腼腆，但很真诚：“我才是你的粉丝。你的歌声真的很好听——虽然有时候会跑调。”", "林诗涵愣了一下，然后笑了出来。", "这是他们第一次见面。", "而他们不知道的是，在会场的另一边，一个穿着藏蓝色西装的中年男人，也在人群中寻找着什么。", "那个人叫马胜利。", "他在寻找两个名字：林诗涵和张小辉。", "他在心里默默说：我想认识你们。", "年度盛典的颁奖环节，定在晚上八点。", "林诗涵坐在观众席的第三排，心里一直在打鼓。", "她刚才在角落里跟张小辉聊了十分钟，互相加了微信，然后就被人流冲散了。现在她一个人坐在这里，看着舞台上那些她叫不出名字的大主播领奖，心里五味杂陈。", "她是一个有一万粉丝的小主播。", "她有什么资格坐在这里？", "就在这时，她感觉到有人拍了拍她的肩膀。", "“你好，请问你是’氧气诗涵’吗？”", "她转过头，看到一个穿藏蓝色西装的中年男人站在她身后。男人的脸很宽，眉毛很粗，眼睛不大但很有神，法令纹很深，整个人看起来有一种历经沧桑的厚重感。", "“我是，”她有点紧张地站起来，“您是……？”", "“我叫马胜利，网名叫’老马说建材’。”男人笑了笑，伸出手来，“我在你直播间买过东西——那瓶面霜，我觉得很好用。”", "林诗涵愣住了。", "“老马说建材”？那个有五十万粉丝的建材大V？", "“马……马老师！”她激动地握住他的手，“我看过您的视频！您讲得特别好！”", "“哪里哪里，”马胜利摆摆手，“我就是个卖建材的，比不上你们这些年轻人。”", "他看了一眼舞台，然后转过头来：“对了，我刚才看到你和张小辉在角落里聊天，你们认识？”", "“我们刚加的微信，”林诗涵说，“今天第一次见面。”", "“那正好，”马胜利笑了笑，“我也在找他。走，我带你去。”", "张小辉站在会场的另一边，看着手机发呆。"], ["他的微信在这一晚上爆炸了——无数人加他好友，无数人发来合作邀请，无数人说”张老师我特别崇拜你”。他一条都回不过来。", "他有点后悔来参加这个盛典了。", "他是个老师，不是个商人。他不擅长社交，不擅长应酬，不擅长说那些客套话。他只想回家，安安静静地录课。", "就在这时，他感觉到有人在拍他的肩膀。", "“张老师！”", "他转过头，看到林诗涵和一个穿西装的中年男人走过来。", "“是你啊，”他笑了笑，“刚才聊得太短了，还没来得及好好认识。”", "林诗涵指着身边的男人：“马老师想见你，他是我的……哦不，他也关注了你的账号。”", "“老马说建材？”张小辉问。", "“对对对，就是我。”马胜利伸出手来，“张小辉老师，久仰大名。”", "张小辉握住他的手，有点不好意思：“久仰久仰，其实我才是久仰您的大名。我看过您讲的建材避坑视频，讲得特别实在。”", "马胜利笑了笑：“哪里哪里，我就是个卖瓷砖的，没你们这些年轻人有文化。”", "三个人站在会场的角落里，互相打量着。", "林诗涵穿着一条浅蓝色的连衣裙，皮肤白净，眼睛大而黑，扎着一个松松的马尾辫，整个人看起来清新又干净。", "马胜利穿着一套藏蓝色的西装，虽然熨得整整齐齐，但仔细看还是能看出布料是便宜货。他的眼角有皱纹，鬓角有几根白发，整个人有一种历经沧桑的厚重感。", "张小辉穿着一件白色的衬衫，虽然料子普通，但洗得很干净。他的身材瘦削，戴着一副黑框眼镜，整个人看起来斯斯文文的，像个典型的读书人。", "他们来自三个不同的城市，从事三种不同的职业，有着三种不同的人生经历。但此刻，他们站在了一起。", "“三位嘉宾，请上台领奖！”主持人的声音从舞台上传来。", "三个人对视了一眼，然后一起笑了起来。", "他们一起走上台，并排站好。", "聚光灯打在他们身上，闪光灯噼里啪啦地响着。", "那一刻，林诗涵突然觉得，自己的人生好像被点亮了一盏灯。", "她不再是一个人了。", "颁奖结束之后，三个人交换了联系方式。", "“以后有机会，我们一起合作吧。”马胜利说，“我有个想法——知识带货，这个赛道好像还没人做。”"], ["“知识带货？”林诗涵和张小辉同时问。", "“就是你们两个合作，”马胜利解释道，“诗涵负责推荐，小辉负责讲课，把知识和服务结合起来，效果应该会很好。”", "张小辉想了想：“这个思路确实不错。我讲课，你带货，把流量变现的问题解决了。”", "林诗涵也很兴奋：“对对对，这样粉丝既有获得感，又能买到好东西，一举两得！”", "三个人越聊越兴奋，当场就建了一个群，群名叫”三个人的流量江湖”。", "他们不知道的是，这个群，将在接下来的日子里，创造出一个又一个奇迹。", "那天晚上，三个人在会场外面的小酒馆里聊了很久。", "他们聊各自的经历——马胜利讲了建材城的生意、林诗涵讲了职场的PUA、张小辉讲了妹妹的病。他们聊各自的梦想——马胜利想开一家MCN公司、林诗涵想成为一个真正的主播、张小辉想让妹妹的病好起来。", "他们也聊了一些很私人的事情。", "林诗涵说：“我其实很害怕。我怕自己红不了，也怕自己红了之后变坏。我不知道自己能不能扛得住那些诱惑。”", "马胜利说：“我也怕。我怕我老婆离开我，怕我儿子不认识我，怕我到头来一场空。”", "张小辉说：“我不怕。我只怕一件事——怕我妹的病好不了。”", "他们聊到凌晨一点，才各自散去。", "林诗涵回到酒店，躺在床上，看着天花板发呆。", "她想起了自己在杭州的那段日子——一个人租房，一个人吃饭，一个人加班，一个人失眠。很多时候，她觉得自己快要撑不下去了。", "但现在，她有了两个朋友。", "两个真正的朋友。", "她拿出手机，在那个叫”三个人的流量江湖”的群里发了一条消息：“今天认识你们，是我这辈子最幸运的事。”", "张小辉秒回：“我也是。”", "马胜利说：“少来这套，赶紧睡觉，明天还要赶飞机。”", "林诗涵笑了。", "她关掉手机，闭上眼睛，第一次在这个陌生的城市里，睡了一个好觉。", "年度盛典结束后，三个人正式开始了”知识带货”的合作。"], ["这个概念说起来很简单：林诗涵负责选品和展示，张小辉负责讲解和背书，马胜利负责供应链和资源对接。他们把这种模式叫做”知识带货”——不是单纯地卖东西，而是把知识融入带货的每一个环节。", "第一场合作，是卖张小辉的英语课程。", "张小辉的英语课程是虚拟产品，成本几乎为零，利润空间极高。但问题是，怎么让更多人知道这门课？", "林诗涵想了一个办法。", "“小辉哥，你能不能在我的直播间里现场讲一节课？”她在群里问。", "张小辉有点犹豫：“在直播间讲课？那个环境能讲清楚吗？”", "“可以的！”林诗涵说，“你平时讲课都有几千人同时在线吧？我直播间有一万人，你来我这里讲，效果肯定比我单独卖课好。”", "张小辉想了想，觉得有道理。", "那场直播，是他们合作的第一场重头戏。", "林诗涵提前发了预告视频：“今晚八点，’知识带货’第一期——英语学习规划专场。我请来了慢手上最火的英语老师张小辉老师，给大家讲讲怎么规划孩子的英语学习。免费听课，不买任何东西，但听完之后，你可能会忍不住想买课。”", "直播一开始，涌入了一万三千人。", "这个数字，让林诗涵自己都吓了一跳。", "“大家好，我是张小辉。”他坐在镜头前，穿着一件深蓝色的衬衫，袖子卷到手肘，手里拿着一支白色的马克笔。他面前没有黑板，只有一面白色的墙。", "“今天我不卖课，”他开门见山，“我只想告诉大家一件事——英语学习，最重要的不是天赋，而是方法。”", "然后他开始讲。", "他讲得很快，信息量很大，但条理非常清晰。他把英语学习的核心逻辑梳理成三个层次：词汇、语法、语感。他用大量的例子来解释每一个概念，每一个例子都贴近中国学生的学习实际。", "“比如，很多同学记单词很痛苦，今天背了明天忘。但你们有没有想过，为什么会这样？因为你们在孤立地记单词。正确的做法是——把单词放进句子，把句子放进语境，把语境和生活联系起来……”", "他讲了一个半小时。"], ["直播间的弹幕从始至终没有停过——有人问问题，有人表达感谢，有人说”我听懂了”，还有人说”张老师，我要把这个视频发给我孩子看”。", "直播结束之后，张小辉的课程销量暴涨——一口气卖出了一千多份。", "一千份乘以199，等于将近20万。", "张小辉看到后台数据的时候，一个人坐在电脑前，愣了很久。", "他想起自己刚毕业那会儿，找工作四处碰壁的场景。那时候，他觉得自己的未来一片灰暗。", "但现在，他靠着自己的知识，一个月能赚二十万。", "知识带货的第一炮，打响了。", "接下来，他们趁热打铁，推出了第二场合作——林诗涵带货，张小辉讲解。", "这一次，他们带的是一款护眼台灯。", "“我不是专家，”张小辉在直播里说，“但我查了大量的资料，也问了几个做光学工程的朋友，我把关于台灯的核心参数整理成了一张表格，大家可以看一下……”", "他用他的教学能力，把一个复杂的灯具选购问题，讲成了一个半小时的科普课。", "“显色指数Ra大于90，才能保证物体颜色还原准确；色温4000K以下，对眼睛刺激最小；蓝光等级RG0，才是真正无危害……”", "那场直播，林诗涵带了一百二十台台灯。", "GMV：48000元。", "提成：9600元。", "这是她人生中第一笔过万的带货提成。", "她拿到钱的那天晚上，请苏小小吃了一顿火锅。", "“涵涵，你真的红了！”苏小小夹着毛肚，眼眶里闪着泪光，“我就知道你可以的！”", "林诗涵笑了。她没有说话，只是默默地给苏小小夹了一筷子牛肉。", "知识带货的模式，开始在圈内传开。", "很多人开始模仿他们，但大多都学不到精髓——因为真正的”知识带货”，核心不在于”带货”，而在于”知识”。你需要真正懂你的产品，真正懂你的用户，才能把东西卖出去。", "而张小辉、林诗涵、马胜利三个人，正好分别具备这三种能力：专业知识、表达能力、资源整合能力。", "他们三个人的合作，是真正的”1+1+1>3”。", "但合作的过程中，也不是没有矛盾。"], ["有一次，林诗涵想带一款护肤品。张小辉研究了一下成分表，发现有几个成分对敏感肌肤不太友好，建议不要带。", "“可是这个品牌给的佣金很高啊！”林诗涵说，“一单50块，比其他品牌高多了。”", "“佣金再高，也不能卖不好的东西给粉丝。”张小辉说，“诗涵，我们现在有影响力了，我们得对粉丝负责。”", "林诗涵愣了一下，然后点点头。", "“你说得对，”她说，“我差点就犯错了。”", "那天晚上，她拒绝了那个品牌的合作邀请。", "她在朋友圈里发了一条消息：“不赚不该赚的钱，这是我的底线。”", "很多粉丝在下面点赞。有人评论说：“涵涵姐，就喜欢你这种实在的。”", "她笑了笑，把手机放下，继续研究下一款产品。", "知识带货的成功，让马胜利看到了一个更大的机会。", "他花了整整一个月，研究了市面上所有的MCN公司。他发现，大多数MCN的模式都很简单：签约大量主播，然后帮他们接广告、带货、变现。做得好的MCN，一年能赚几个亿；做得不好的，签约的主播全跑了。", "他想做一家不一样的MCN。", "“我的目标是：帮助那些真正有本事的人，被更多人看见。”他在一次内部会议上说。", "王二蛋坐在旁边，有点担忧地看着他：“老马，你知道MCN的水有多深吗？很多公司签了主播之后，根本不管人家死活，就知道抽成。有些主播辛辛苦苦干了两年，最后发现一分钱没攒下，全被公司拿走了。”", "“所以我们不能那样做。”马胜利说，“我的想法是：分成比例要合理，主播的权益要保护，违约条款要公平。我们不坑人，也不骗人。”", "王二蛋看着他，突然笑了：“老马，你变了。”", "“哪里变了？”", "“以前你是个纯粹的商人，什么都要算账。现在你开始讲情怀了。”", "马胜利愣了一下，然后也笑了。", "他确实变了。", "这两年，他经历了太多事情——离婚、失业、被骂、涨粉、被质疑、涨薪、涨粉、再涨薪。这一路走来，他明白了一个道理：钱是赚不完的，但口碑一旦坏了，就再也回不来了。", "MCN公司注册的时候，他想了很多名字。", "最后，他取了一个很土的名字：“星火MCN”。"], ["他跟王二蛋解释这个名字的含义：“星火，可以燎原。我希望我们能帮助那些有梦想的普通人，把他们的梦想，变成现实。”", "王二蛋说：“这个名字不错，很有情怀。”", "他招聘了第一个签约主播。", "那是一个叫”大厨老刘”的账号，主打家常菜教学。厨师老刘是一个五十岁的退休工人，在家没事干，就开始拍做菜的视频。他的视频拍得很朴实——厨房是老旧的，操作台是油腻的，灶台上永远有一层洗不掉的油渍。", "但他的视频很火。因为他讲的东西，真的很实用。", "“我这个红烧肉的做法，是我爷爷传下来的，”他在视频里说，“我爷爷是村里的厨子，谁家办红烧事都请他掌勺。他做的红烧肉，我到现在都忘不了那个味道……”", "马胜利刷到他的视频的时候，愣了很久。", "他想起了自己的爷爷。他爷爷也是一个手艺人——木匠。他做的家具，村里人都说好。可惜爷爷去世得早，没能看到他现在的样子。", "他主动联系了厨师老刘，提出了合作。", "“老刘哥，你愿不愿意签我们公司？我们帮你对接资源、谈合作、做运营，分成比例是三七开——你拿七成，我们拿三成。”", "厨师老刘在电话那头沉默了很久。", "“你……你是认真的吗？”他的声音有点颤抖，“你知道有多少MCN公司找过我吗？他们都要拿五成以上，有的甚至要拿七成。你只拿三成？”", "“三成是我们的底线，”马胜利说，“我们不赚黑心钱。”", "厨师老刘沉默了很久，然后说：“好，我签。”", "第二个签约的，是一个叫”静静手工”的账号。", "静静是一个二十三岁的女孩，从贵州大山里出来的。她在工地上打过工，在电子厂里做过流水线，在餐厅里端过盘子。最后，她决定回老家，学一门手艺。", "她学的是手工编织——竹编、草编、藤编，什么都会。她把编织的过程拍成视频，发到了慢手上。", "她的视频很火。因为她编织的东西，真的太漂亮了。", "“这是我们苗族的传统手艺，”她在视频里说，“我小时候，我奶奶教过我。但后来年轻人都出去了，没人愿意学。我不想让这门手艺失传，所以我想把它拍下来，让更多人看到……”"], ["马胜利刷到她的视频的时候，眼泪差点掉下来。", "他想起了自己的奶奶。他奶奶是一个绣花高手，绣出来的花，像真的一样。可惜他奶奶去世得早，他从来没见过奶奶绣花的样子。", "他主动联系了静静，提出了合作。", "静静在电话那头哭了。", "“真的吗？”她的声音哽咽着，“你们真的愿意帮我？”", "“真的，”马胜利说，“我们有专业的团队帮你运营，有稳定的供货渠道帮你变现。你只管做好内容，其他的事情，交给我们。”", "静静说：“好，我签。”", "星火MCN，慢慢地发展起来了。", "三个月之后，公司签约了十二个主播。半年之后，签约了三十个主播。一年之后，签约了五十多个主播。", "他们不签约头部主播——因为头部主播太贵，签不起，也留不住。他们专门签约腰部主播——那些有真本事、有成长潜力、但还没有被市场充分发现的普通人。", "他们的口号是：“让每一个普通人的努力，都被看见。”", "这个口号，后来成了慢手平台上最响亮的口号之一。", "但马胜利知道，自己的野心不止于此。", "他想做一个更大的事情——一个能真正改变行业的事情。", "他想在教育赛道也布局。", "他第一个想到的合作对象，是张小辉。", "“小辉，”他在电话里说，“你有没有兴趣来我们公司？我们一起做教育赛道。”", "张小辉在电话那头沉默了很久。", "“老马，”他说，“你知道我是怎么走到今天的吗？”", "“怎么走的？”", "“我就是一个人走过来的，”张小辉说，“没有人帮我，没有人捧我，我就是靠自己的实力，一点一点做起来的。我不想签约任何公司，我只想做自己的品牌。”", "马胜利愣了一下，然后笑了。", "“我懂，”他说，“我支持你。咱们还是朋友，还是合作伙伴。”", "张小辉也笑了：“还是朋友，还是合作伙伴。”", "那天晚上，马胜利躺在床上，看着天花板发呆。", "他知道自己留不住张小辉这样的人。但他也很高兴，自己能和张小辉这样的人成为朋友。", "在这个圈子里，真正的朋友，比什么都重要。", "星火MCN越做越大，林诗涵的收入也越来越多。"], ["到了2021年底，她的账号已经突破了十万粉丝。每场直播的平均GMV稳定在五万左右，每个月的带货提成超过三万。", "她终于不再是那个吃泡面的女孩了。", "她把杭州的出租屋换成了一个四十平米的小公寓，在阳台上养了几盆绿萝。她还给自己买了一台新电脑——苹果的MacBook Pro，花了她一万多块。", "“涵涵，你现在是真的红了！”苏小小来她新家参观的时候，眼睛里闪着光，“你这房子虽然小，但收拾得真干净。”", "林诗涵笑了笑：“小是小了点，但至少是自己的。”", "她开始认真地规划自己的未来。她想，也许再过两年，她就能在杭州买一套真正的房子了。也许再过五年，她就能有自己的工作室了。也许再过十年，她就能成为这个行业里真正的大佬了。", "她不知道的是，危机正在悄悄逼近。", "危机来自一家叫”华星传媒”的MCN公司。", "华星传媒是圈子里出了名的大公司，签约了上百个主播，其中不乏粉丝过百万的头部达人。他们的运营模式很简单：签约、引流、变现、续约——或者说，续约失败。", "林诗涵收到的消息是：华星传媒看上了她的账号。", "“林小姐，”电话那头是一个甜美的女声，“我们华星传媒对您的账号很感兴趣。不知道您有没有兴趣，加入我们这个大家庭？”", "林诗涵愣了一下。", "“你们想怎么合作？”她问。", "“很简单，”对方说，“我们出资帮您做内容、投广告、买流量，您负责直播和带货。收益分成是五五开——您拿五成，我们拿五成。”", "五五开？", "林诗涵皱起了眉头。她知道这个行业的行情。五五开意味着，她辛辛苦苦做的内容，有一半的收益要归公司。而且，一旦签约，她就失去了账号的控制权——公司可以随时把她换掉，换成另一个主播。", "“不好意思，”她想了想，“我觉得时机还不太成熟。”", "对方的声音立刻冷了下来：“林小姐，我建议您好好考虑一下。您现在的体量，如果不借助资本的力量，很难做大。但如果我们合作，您很快就能突破百万粉丝。”", "“谢谢您的好意，”林诗涵说，“但我暂时不考虑。”", "她挂掉了电话。"], ["她不知道的是，这通电话，是她噩梦的开始。", "三天之后，林诗涵发现自己被举报了。", "她发的一条视频——是一条普通的穿搭分享，讲的是”怎么在换季的时候用基础款搭出高级感”——被人举报为”虚假宣传”和”误导消费者”。", "视频被下架了。", "她申诉了一次，平台回复说：“经核实，您的视频确实存在违规内容，已做下架处理。”", "她懵了。她那条视频，没有推荐任何产品，没有提到任何品牌，只是讲了一些穿搭技巧，怎么可能违规？", "她问了很多人，终于有人告诉她真相：举报她的人，是华星传媒。", "华星传媒在圈子里势力很大。他们有很多账号，可以形成矩阵效应——一个账号举报你，其他的账号就跟着转发、扩大影响，形成一种”舆论围剿”的态势。", "很多人被他们举报之后，都扛不住压力，要么和解，要么认栽。", "但林诗涵不想认栽。", "她没有和解，没有认栽，而是发了一条视频回应。", "她在视频里说：“我知道是谁在搞我。我也知道你们想要什么。但我想说：我不怕。”", "“我做这个账号，不是为了赚钱，是为了帮到更多人。如果你们觉得我挡了你们的路，那我们就走着瞧。”", "那条视频发出去之后，评论区炸了。", "有人支持她：“涵涵加油！我们相信你！”有人骂她：“你算什么东西，还敢跟华星斗？”有人观望：“这瓜有点大，坐等后续。”", "她看着那些评论，心里五味杂陈。", "她知道自己可能扛不住。但她也知道，她不能退。", "退一步，就什么都没有了。", "那天晚上，她一个人坐在阳台上，看着杭州的夜景发呆。", "城市的灯光很亮，但她觉得自己的世界很灰暗。", "她想起了自己来杭州的那一年。", "那是2019年的夏天，她刚从大学毕业，身上只有两千块钱。她租了一个八平米的隔断间，每天早上六点起床，挤两个小时的地铁去上班，晚上十点才能回到家。", "那段时间，她每天都在想：这样的日子，什么时候是个头？", "后来，她决定辞职做直播。她以为自己能一夜成名，结果第一场直播只有十二个人看。"], ["她还记得自己第一次在直播里哭的场景。那是开播第三个月的事情。那天，她收到了一条私信，是一个粉丝发来的：“涵涵姐，我也是一个正在找工作的人，我已经失业三个月了，每天都很焦虑。但看你的直播的时候，我会觉得好一点。谢谢你。”", "她看到那条消息的时候，眼泪一下子就涌了出来。", "她不是因为那条消息感动了，而是因为，她突然意识到，自己做的事情，原来是有意义的。", "她不只是在自己挣扎——她也在帮助那些跟她一样挣扎的人。", "她想起了那句话：“我不是没有软弱过，但我选择了站起来。”", "她深吸一口气，站了起来。", "她拿起手机，打开了那个叫”三个人的流量江湖”的群，发了一条消息：“兄弟们，我遇到麻烦了。”", "林诗涵的那条消息发出去之后，不到三分钟，群里就炸了。", "张小辉： 怎么了？", "马胜利： 怎么回事？谁欺负你了？", "林诗涵： 被华星传媒盯上了，他们举报了我的视频，还威胁我签约。", "她把事情的来龙去脉说了一遍。", "群里沉默了一分钟。", "然后，张小辉发了一条消息：“华星传媒？那个圈子里臭名昭著的公司？”", "“你认识他们？”林诗涵问。", "“听说过，”张小辉说，“我有一个学生，也被他们坑过。那个学生签了约之后，发现自己的账号被公司控制了，发什么内容都要经过公司同意。最后他想解约，公司开出的违约金是五十万。”", "“五十万？”林诗涵倒吸一口凉气。", "“对，”张小辉说，“这个圈子里，这种事情太常见了。很多公司就是靠违约金赚钱的——签约的时候说得天花乱坠，解约的时候狮子大开口。”", "马胜利在群里发了一条语音：“诗涵，你现在什么情况？需不需要我帮忙？”", "“我暂时还扛得住，”林诗涵说，“就是不知道后面会怎么样。”", "“好，”马胜利说，“我们一起想办法。你放心，这件事我们不会让你一个人扛。”", "那天晚上，三个人开了三个小时的语音会议。", "马胜利说：“我认识几个圈子里的人，我去打听一下，看看华星传媒到底是什么来头。”", "张小辉说：“我在平台上也有一些影响力，我发一条视频声援你，帮你撑撑场面。”"], ["林诗涵说：“谢谢你们，我真的不知道该怎么感谢……”", "“谢什么谢，”马胜利打断她，“咱们是朋友，是合作伙伴，遇到事情了互相帮忙，不是应该的吗？”", "张小辉在群里发了一个”握手”的表情。", "林诗涵看着那个表情，突然觉得心里暖暖的。", "她在这个城市里漂泊了这么多年，从来没有遇到过一个真正的朋友。但现在，她有了两个。", "第二天，马胜利就动用了自己的人脉，开始打听华星传媒的情况。", "他打了一圈电话，发现了一些让他很震惊的事情。", "华星传媒的老板姓韩，叫韩冰冰——是的，这个名字听起来像个女人，但实际上是个四十多岁的男人。韩冰冰早年在娱乐圈混过，后来转型做MCN，靠着签约和收购，积累了上百个账号。", "但他的口碑很差。", "很多被他签约的主播，最后都跟他闹翻了。有人说他克扣分成，有人说他抢注商标，有人说他威胁恐吓。圈子里有一句话：“宁可不红，也不要签华星。”", "马胜利把这些信息整理成了一份文档，发给了林诗涵。", "“你看看，”他说，“知己知彼，才能百战不殆。”", "林诗涵看完之后，心里有了底。", "她决定反击。", "她做的第一件事，是发了一条视频。", "那条视频的标题是：“一个被资本威胁的普通主播，有话说。”", "她在视频里没有点名，没有骂人，只是讲了一个故事——一个普通女孩怎么来到杭州，怎么被人欺负，怎么选择做主播，怎么一步一步走到今天。", "“我知道我的声音很小，”她在视频里说，“但我想说，这个世界上，不只有一种声音是被允许的。那些大公司可以垄断资源，可以控制舆论，可以让一个人闭嘴。但他们不能控制所有人的嘴。”", "“所以我想请大家帮我一件事：如果你们觉得我说得有道理，请帮我转发。让更多人看到，让更多人知道。”", "那条视频发出去之后，转发量在二十四小时内破了十万。", "评论区里，有人支持她，有人骂她，有人观望。但无论如何，她的声音，被更多人听见了。", "张小辉也在第一时间发了声援视频。", "他的视频很短，只有一分钟，但每一句话都很有分量。"], ["“我不是来讲道理的，我是来讲事实的。”他在视频里说，“林诗涵是我的朋友，也是我的合作伙伴。她的人品，我可以用我的信誉担保。”", "“如果有人觉得她在撒谎，欢迎来跟我对质。我张小辉这辈子没做过亏心事，我也不怕任何人来查。”", "那条视频发出去之后，张小辉的粉丝暴涨——一天之内涨了五万粉。", "很多人在评论区里说：“张老师，有担当！”“这才是真正的男人！”“支持张老师，支持林诗涵！”", "林诗涵看到那些评论的时候，眼泪又流了下来。", "她不是为自己哭。她是为这个世界上，还有这样的真心而哭。", "就在林诗涵发视频声援的同一天晚上，马胜利在刷慢手的时候，看到了一个人的直播。", "那个人叫”小暖很暖”。", "她正在跳舞。", "马胜利看到她的那一刻，心里突然咯噔了一下。", "这个女孩……好像在哪里见过？", "他仔细看了一眼她的脸。那是一张圆圆的、带着一点婴儿肥的脸，眼睛不大，但很亮，笑起来的时候会弯成两道月牙。她穿着一件白色的T恤，扎着一个马尾辫，整个人看起来干净又清爽。", "他突然想起来了。", "四年前，他还是建材城小老板的时候，有一个晚上失眠，躺在床上刷慢手。那时候他还没有离婚，老婆孩子都睡了，整个屋子黑漆漆的，只有手机屏幕的蓝光打在他脸上。", "他刷到了一个跳舞的女孩。那个女孩跳得很认真，不是那种卖弄的舞，而是那种认真编排的、带着一点青涩的舞。", "他记得她的网名叫”小暖很暖”。", "他记得她那天晚上说：“你们很多人今天也不开心，没关系，我跳一支舞给你们看。你们看看窗外，今天的月亮很亮。”", "他不知道自己为什么记得那么清楚。他只知道，那四个字——“今天的月亮很亮”——让他在那个灰暗的夜晚，流下了眼泪。", "他点进了她的直播间。", "苏小暖正在跳一支新学的舞。", "她今天穿的是一件运动背心，配一条瑜伽裤，头发扎成一个高高的丸子头，整个人看起来精神又活力。", "她是诸暨人，开了三年的舞蹈培训班。这三年，疫情反反复复，培训班开了又关，关了又开，她已经快撑不下去了。", "所以她开始做直播。"], ["她没有想过要当什么大主播，她只是想多一条收入渠道。哪怕一场直播只能赚几十块钱，也比什么都不做强。", "她不知道的是，在杭州，有一个小老板，正在千里之外看着她。", "马胜利盯着屏幕，看着苏小暖跳舞。", "他突然发现，自己好像回到了四年前的那个夜晚。", "那时候他躺在黑暗中，刷着她的直播，听她说”今天的月亮很亮”。那时候他的生活灰暗得看不到希望，老婆天天跟他吵架，工作看不到前途，整个人像一具行尸走肉。", "但就在那一刻，她的一句话，让他突然觉得，这个世界上还有一点温暖。", "他点了一下屏幕右上角的小心心。", "一个小心心，价值一分钱。", "但那是他在那段最灰暗的日子里，对任何人做过的唯一一件”主动”的事。", "马胜利看完苏小暖的直播之后，做了一件事。", "他打开了微信，给林诗涵发了一条消息：“诗涵，你认识一个叫’小暖很暖’的主播吗？”", "林诗涵秒回：“认识啊！那是我闺蜜苏小小！”", "马胜利愣住了。", "闺蜜？苏小小？", "“你说的那个苏小小，是不是在诸暨开服装店的？”", "“对啊！”林诗涵说，“怎么了？”", "“没什么，”马胜利说，“就是……她的直播很好看。”", "他发了一个微笑的表情。", "林诗涵发了一个惊讶的表情：“马哥，你该不会是……”", "“别瞎说！”马胜利赶紧打断她，“我就是觉得她跳得不错，随便看看。”", "林诗涵发了一个”看破一切”的表情。", "马胜利放下手机，看着窗外的月亮发呆。", "他想起了四年前的那个夜晚，苏小暖在直播里说的那句话——", "“你们看看窗外，今天的月亮很亮。”", "他的窗外什么都看不见。他把窗帘拉得死死的，连路灯的光都透不进来。", "但不知道为什么，那四个字，让他觉得，这个世界上还有一点光。", "他默默地关注了苏小暖的账号。", "他没有发任何评论，没有刷任何礼物。他只是静静地关注着，静静地看她直播。", "他知道自己的生活已经一塌糊涂了。他没有资格喜欢任何人。", "但他还是忍不住想：如果有一天，能亲眼见到她，该多好。", "华星传媒没有放过林诗涵。", "在林诗涵发视频声援的第三天，网暴开始了。"], ["一开始，只是零星的评论：“这个女主播真能装”“谁给她的脸，还敢说真话”“肯定是背后有人，不然怎么可能做起来”。", "然后，评论区开始被淹没。", "她的每一条视频下面，都堆满了恶评。那些评论说得很难听——有人说她是”绿茶”，有人说她是”卖肉的”，有人说她是”靠睡上去的”。", "她的私信也被轰炸了。", "无数陌生人发来消息，内容都是一样的——谩骂、诅咒、侮辱。", "“你这种人怎么不去死？”", "“婊子，滚出直播圈！”", "“我查到了你家的地址，你等着！”", "林诗涵看到那些消息的时候，手是抖的。", "她不知道为什么事情会变成这样。她只是想保护自己，她只是想讨一个公道，她不知道自己做错了什么。", "她删掉了那些评论，关掉了私信，但她知道，这只是掩耳盗铃。", "那些声音不会消失。它们只会在黑暗中越积越多，最后变成一堵墙，把她彻底压垮。", "她已经三天没有直播了。", "她不敢直播。她怕一打开摄像头，就会看到那些恶评。她怕自己会在镜头前崩溃。", "她把自己关在公寓里，拉上窗帘，不出门，不吃饭，不说话。", "她只是躺在床上，看着天花板发呆。", "她想起了自己刚来杭州的那一年。", "那时候她也是一个人生地不熟的女孩，一个人租房，一个人加班，一个人失眠。她不知道自己能不能在这个城市里活下去，她只知道，她不能回头。", "后来，她做起了直播。她以为自己找到了一条路。", "但现在，那条路好像被堵死了。", "她不知道该怎么办。", "她不知道自己能信任谁。她不知道还有谁愿意帮她。", "她害怕。", "第四天，苏小小来了。", "苏小小是她在这个城市里唯一的朋友。她知道林诗涵出事了，第一时间赶了过来。", "她用钥匙打开了林诗涵公寓的门——那是林诗涵几个月前给她的备用钥匙，说”万一哪天我忘了带钥匙，你可以来救我”。", "她推门进去，看到林诗涵躺在床上一动不动，窗帘拉得死死的，整个房间黑漆漆的。", "“涵涵？”她轻轻叫了一声。", "林诗涵没有回答。", "苏小小走过去，打开了灯。灯光刺得林诗涵眯起了眼睛。", "“涵涵，你怎么样？”苏小小蹲下来，握住了林诗涵的手。", "林诗涵的手冰凉的。"], ["“小小，”林诗涵的声音沙哑得几乎听不见，“我好累……”", "“我知道，”苏小小说，“我知道你很累。但你不能放弃。”", "“我不知道还能不能撑下去……”林诗涵的眼泪流了下来，“他们说得对，我就是个什么都没有的普通人……我凭什么跟他们斗……”", "“涵涵！”苏小小突然提高了声音，“你看着我的眼睛。”", "林诗涵慢慢地转过头，看着苏小小的眼睛。", "苏小小的眼睛很亮，里面有一种林诗涵很熟悉的东西——是那种”我不会放弃你”的东西。", "“涵涵，你听我说，”苏小小一字一句地说，“你不是一个人。你有我，有小辉哥，有马哥。我们都在你身边。”", "“他们可以封你的号，可以让你的视频下架，可以让你的评论区被淹没。但他们不能打败你。因为你是一个什么样的人，不由他们说了算，由你自己说了算。”", "林诗涵看着苏小小，眼泪不停地流。", "她知道苏小小说得对。", "她可以输，但不能认输。", "那天晚上，林诗涵做了一个决定。", "她要重新站起来。", "她打开电脑，写了一条视频的文案。", "那条视频的标题是：“我是如何从职场PUA中走出来的。”", "她要讲一个故事——一个普通女孩怎么在职场中被上司骚扰，怎么选择反抗，怎么被迫离职，怎么开始做直播，怎么一步一步走到今天。", "她不讲那些人怎么网暴她。她不讲那些恶评怎么伤害她。", "她只讲一件事：她是怎么站起来的。", "她相信，这个世界上，总有人会被她的故事打动。", "她相信，这个世界上，总有人会站在她这一边。", "她相信，这个世界上，总有人会愿意相信她。", "她点击了”发布”按钮。", "那条视频发出去之后，林诗涵没有抱太大希望。", "她以为会像之前一样——发出去，然后被淹没，然后被遗忘。", "但这一次，事情的发展，超出了她的预料。", "视频发出去不到一个小时，播放量就破了十万。", "不是花钱推广的十万，是自然流量的十万。", "那些被算法推送到的陌生人，在评论区里写下了各种各样的留言。", "有人说：“我也是被上司骚扰过的人，谢谢你讲出来。”", "有人说：“原来网红的生活也不容易，我还以为你们都是躺着赚钱。”"], ["有人说：“涵涵加油，我支持你！”", "还有人说：“那些网暴别人的人，都是什么心态啊？欺负一个女孩子算什么本事？”", "评论区里开始出现了反转——那些原本在骂她的人，突然发现自己的声音被淹没了。取而代之的，是越来越多的支持者。", "二十四小时后，那条视频的播放量突破了一百万。", "一百万。", "这是林诗涵这辈子获得过的最高播放量。", "她的粉丝数量也在一夜之间暴涨——从十万涨到了三十万。", "三十万。", "这个数字，是她做主播两年多以来，从来没有达到过的高度。", "她看着那些数据，突然觉得有点恍惚。", "她只是讲了一个自己的故事，一个她从来没有跟任何人讲过的故事。", "但就是这个故事，打动了那么多人。", "与此同时，华星传媒那边也出了状况。", "有媒体开始报道这起事件。", "一篇标题为《华星传媒”舆论围剿”产业链调查》的文章，在网上疯传。", "文章里详细披露了华星传媒的操作模式：签约前用高额分成吸引主播，签约后用各种手段控制主播，等到主播想要解约时，再用高额违约金逼迫主播就范。", "文章里还提到了林诗涵的案例——华星传媒因为想要签约林诗涵被拒，就对她进行了”舆论围剿”。", "评论区里炸了。", "“原来是这样！”“华星传媒太黑了吧！”“这些公司就是靠坑人赚钱的！”“建议有关部门查一查！”", "舆论的风向彻底反转了。", "华星传媒的老板韩冰冰，成了众矢之的。", "他的账号被扒了出来，他的黑历史被扒了出来，他跟那些被他坑过的主播的纠纷，也被一一曝光。", "最后，慢手平台发布了一则公告：华星传媒因违反平台规定，被永久封号。", "林诗涵看到这个公告的时候，一个人坐在电脑前，愣了很久。", "她赢了？", "她真的赢了？", "她没有想到事情会发展成这样。她以为自己在跟一个巨大的怪兽搏斗，但她发现，那个怪兽其实没有那么强大——它只是看起来很强大而已。", "它的强大，是靠谎言和欺骗堆起来的。", "一旦谎言被揭穿，它就什么都不是了。", "那天晚上，林诗涵做了一件事。", "她在”三个人的流量江湖”的群里，发了一条消息：", "“兄弟们，我们赢了。”", "马胜利秒回：“看到了！恭喜恭喜！”"], ["张小辉发了一个”鼓掌”的表情：“诗涵，你太棒了！”", "林诗涵看着那些消息，突然觉得鼻子有点酸。", "她想起了自己被网暴的那几天。那几天，她每天晚上都睡不着觉，躺在床上瞪着天花板，不知道明天该怎么过。", "她差点就放弃了。", "但她没有。", "因为她知道，她不是一个人在战斗。", "她有苏小小，有张小辉，有马胜利。", "她有那些愿意相信她的人。", "她有那些愿意站出来支持她的人。", "她不是因为自己强大才赢的。", "她是因为有人在背后支撑着她，才赢的。", "那天晚上，林诗涵站在阳台上，看着杭州的夜景。", "城市的灯光很亮，星星很少，但她觉得，这个世界比以前明亮了很多。", "她想起了自己刚来杭州的时候。那时候，她觉得这个城市太大了，大得让她害怕。", "但现在，她觉得这个城市很温暖。", "因为在这个城市里，有人愿意相信她，有人愿意帮助她，有人愿意跟她站在一起。", "她拿出手机，在自己的账号里发了一条动态：", "“谢谢你们。谢谢每一个愿意相信我的人。”", "“这一路走来，我遇到过很多困难，很多挫折，很多想要放弃的时刻。但每一次，我都告诉自己：再坚持一下。”", "“今天，我想对自己说：你做到了。”", "她发完之后，放下手机，看着夜空。", "她不知道明天会发生什么。她不知道未来还有多少困难在等着她。", "但她知道，无论遇到什么，她都不会再害怕了。", "因为她知道，这个世界上，总有人在背后支撑着她。", "她不再是一个人了。", "就在林诗涵打赢那场舆论战的时候，张小辉接到了一个电话。", "那是他妈打来的电话。", "“娃，你妹妹……你妹妹的病又犯了……”", "他妈的声音从电话那头传来，带着一种压抑了很久的绝望。", "张小辉的心一下子沉到了谷底。", "他妹妹张晓燕的病，他一直知道——肾功能不全，需要换肾。手术费是三十万。", "他这两年拼命做直播、做带货、做课程，攒下了将近二十万。他以为，再攒几个月，妹妹的手术费就能凑齐了。", "但现在，他妈告诉他，妹妹的病又犯了。", "“医生说什么了？”他问。", "“医生说……”他妈在电话那头哭了起来，“医生说，再不换肾就不行了……最多……最多还能撑半年……”"], ["张小辉握着手机，一句话都说不出来。", "他只有半年时间。", "三十万减去二十万，还差十万。", "十万块。", "他从哪里弄到十万块？", "那天晚上，张小辉一个人坐在出租屋里，看着天花板发呆。", "他想起了自己来深圳的那一年。", "那是一九年的夏天。深圳热得要命，空气里永远弥漫着一股潮湿的味道。他拖着行李箱，站在华强北的街头，看着来来往往的人群，心里既兴奋又迷茫。", "他不知道自己能不能在这个城市里活下去。他只知道自己必须活下去——因为家里还有妈，还有妹妹，还有那个破旧的老房子。", "他在这个城市里摸爬滚打了五年。他换了两份工作，搬了四次家，经历了一次裁员，经历了一次失业，经历了妹妹生病，经历了网暴，经历了所有的苦难。", "但他从来没有放弃过。", "他相信，只要自己足够努力，就一定能改变命运。", "但现在，他突然觉得，自己好像走到了一条死胡同。", "他做了一个决定。", "他打开了手机，打开了摄像头，开始直播。", "他没有化妆，没有准备，什么都没有。他就那样坐在那个破旧的出租屋里，面对着摄像头，开始说话。", "“大家好，我是张小辉。”", "“今天，我有一些话想跟大家说。”", "他的声音很平静，平静得不像是在讲一件生死攸关的事情。", "“我有一个妹妹，叫张晓燕，今年二十二岁。她从小体弱多病，去年被查出肾功能不全，需要换肾。手术费是三十万。”", "“我这两年做直播、做带货、做课程，攒下了将近二十万。但还差十万。”", "“我知道，我不应该在直播间里说这些。但我真的不知道该怎么办了。”", "他的声音终于开始颤抖。", "“我妹妹从小就懂事。她知道家里穷，从来不跟我要东西。她穿的每一件衣服，都是我妈亲手做的。她吃的每一顿饭，都是从牙缝里省下来的。”", "“她从来不抱怨。她只是说：‘哥，你在外面好好干，不用担心我。’”", "“但我知道她很苦。她每天都在忍受病痛的折磨。她每天都在想着明天会不会好起来。”", "“我不能让她失望。”", "他深吸了一口气。"], ["“所以我想请大家帮帮我。不是要大家捐钱——我知道大家也不容易。我只是想让大家知道，有这样一个女孩，正在等待救命。”", "“如果有哪位好心人愿意帮忙，请跟我联系。我的微信是……”", "他报出了自己的微信号。", "然后他关闭了直播。", "他一个人坐在那个破旧的出租屋里，泪流满面。", "那条直播的片段，被人录屏发到了网上。", "一开始，没有引起太大的关注。", "但慢慢地，开始有人转发，开始有人评论，开始有人联系张小辉。", "有人说：“张老师，我是你的学生，我愿意帮忙。”", "有人说：“张老师，我捐不了太多，但这是我的心意。”", "有人说：“张老师，我帮你扩散，希望更多人能看到。”", "还有人说：“张老师，我也是一个来自农村的孩子，我懂你的感受。我虽然没钱，但我愿意帮你在朋友圈扩散。”", "那条视频，在二十四小时内被转发了十万次。", "十万次。", "张小辉看着那些数据，愣了很久。", "他不知道自己该说什么。", "他只是觉得，这个世界上，还是有好人多。", "又过了三天，一个意外的电话打了进来。", "“您好，请问是张小辉先生吗？”", "“是的，我是。”", "“您好，我是央视新闻频道的记者。我们注意到了您在直播中讲述的故事，我们想要做一个报道。请问您方便接受采访吗？”", "张小辉握着手机，愣了很久。", "央视要采访他？", "他不知道该说什么。", "“我……我需要想一想……”他说。", "“好的，张先生，您慢慢考虑。如果您决定接受采访，请跟我们联系。谢谢您。”", "电话挂断了。", "张小辉一个人坐在出租屋里，看着天花板发呆。", "他不知道接受央视采访意味着什么。他只知道，有更多人知道妹妹的故事，就意味着有更大的希望。", "他做了一个决定。", "他拨回了那个电话。", "“您好，我接受采访。”", "央视记者来到深圳的那天，张小辉人生中第一次见到了”长枪短炮”。", "所谓的”长枪短炮”，不是真的枪炮，是摄像机和麦克风。记者是一个三十出头的女人，戴着黑框眼镜，说话很快，走路更快。她身后跟着一个摄像师，一个录音师，一个编导，四个人的阵仗，把张小辉那个十五平米的出租屋挤得满满当当。"], ["“张老师，我们开始吧？”女记者问。", "张小辉坐在那张他用了五年的旧沙发上，沙发弹簧已经塌了，他一坐下去，整个人就陷进去一大截。他有点紧张，手指不自觉地搓着膝盖。", "“好……好的。”他说。", "摄像师把机器架好，红色指示灯亮了起来。", "“那么，张老师，您是从什么时候开始做直播的？”女记者问。", "张小辉愣了一下。", "他想起了自己第一次做直播的场景。那是2020年的夏天，他刚刚被在线教育公司解约，一个人窝在出租屋里，不知道该怎么办。", "他每天晚上都睡不着，躺在床上瞪着天花板，脑子里一片空白。他不知道自己还能做什么。他在这个城市里混了五年，到头来还是一无所有。", "有一天晚上，他实在睡不着，就爬起来，打开了手机，开始直播。", "那场直播只有七个人看。", "但那七个人里，有一个留言说：“张老师，我也是一个失业的人，我也在迷茫。你的声音让我觉得安心。”", "他看到那条留言的时候，眼泪一下子就涌了出来。", "他不知道自己什么时候开始哭的。他只知道自己已经太久没有哭过了。", "他擦了擦眼泪，对着摄像头说：“谢谢你们。我不知道能讲多久，但我会尽力。”", "那场直播，他讲了三个小时。", "从那以后，他再也没有停过。", "女记者问了很多问题。", "她问他是如何从低谷里走出来的。他讲了那个晚上七个人的故事。", "她问他现在最大的心愿是什么。他讲了妹妹的病。", "她问他为什么要选择做老师。他说：“因为我想让别人少走弯路。”", "采访结束后，女记者握着他的手说：“张老师，您讲得很好。节目播出后，一定会有很多人帮助您。”", "张小辉笑了笑，什么也没说。", "他不敢抱太大希望。这个世界上，没有什么是理所当然的。", "节目播出是三天后的事情。", "那天晚上，张小辉守在电视机前，看完了整期节目。节目叫”直播时代的追梦人”，讲的是三个普通人在直播时代的奋斗故事。除了他，还有林诗涵和马胜利。", "节目里，林诗涵讲述了职场PUA的经历，讲了辞职做主播的艰难，讲了被华星传媒围剿的日子。她没有哭，但很多人哭了。"], ["节目里，马胜利讲了他从建材城小老板到”老马说建材”的转型之路，讲了他离婚后一个人扛过来的日子，讲了他为什么要做MCN。", "他们三个人的故事，在节目里交织在一起，像三条河流汇入大海。", "节目结束后，张小辉的手机响了。", "不是一条消息，是无数条消息。", "无数人加他微信，无数人发来鼓励，无数人说愿意帮忙。", "还有无数人说：我想学英语。", "那天晚上，他收到了两百多个报名的学生。", "两百多个学生，每人199块，就是将近四万块。", "妹妹的手术费，够了。", "张小辉做的第一件事，是把好消息告诉了妈。", "“妈，晓燕的手术费够了。”", "他妈在电话那头哭了。", "“娃，你是怎么做到的？”她问。", "张小辉笑了笑：“妈，你放心。晓燕的病，一定会好的。”", "他挂了电话，一个人坐在出租屋里，看着天花板发呆。", "他想起了自己刚来深圳的那一天。那时候，他觉得这个城市太大了，大得让他害怕。", "但现在，他觉得这个城市很温暖。", "因为在这个城市里，有人愿意相信他，有人愿意帮助他，有人愿意跟他站在一起。", "那天晚上，林诗涵、马胜利、张小辉三个人在群里开了一场视频会议。", "“兄弟们，”林诗涵说，“节目播出后，我的账号又涨了十万粉。”", "“我也是，”马胜利说，“私信都回不过来了。”", "“我也是，”张小辉说，“学生太多了，排不过来。”", "三个人在屏幕前笑了起来。", "“既然大家都涨了，”马胜利说，“那我们就趁热打铁，把知识带货做大。”", "“怎么做？”林诗涵问。", "“我想了一个方案，”马胜利说，“我们三个成立一个工作室。不是MCN，不是公司，就是一个松散的合作组织——资源共享、流量互通、收益分成。”", "“收益怎么分？”张小辉问。", "“谁贡献大谁拿多，”马胜利说，“具体比例我们再商量。但有一条原则：公平。”", "张小辉想了想：“我同意。”", "林诗涵也说：“我也同意。”", "那天晚上，三个人在视频里举起手机，拍了第一张合影。", "他们三个人的脸挤在屏幕前，每个人都在笑。", "那是他们人生中最重要的一个夜晚。", "央视节目播出后的一个月，林诗涵的人生发生了翻天覆地的变化。"], ["她的粉丝从三十万涨到了一百二十万。", "一百二十万。", "这个数字，她以前想都不敢想。她做主播两年多，最高峰也只有十万粉。那十万粉，是她一场一场直播、一点一点攒出来的。", "但现在，她用一个月的时间，走完了过去两年的路。", "有人说她是”一夜成名”。", "但她知道，那不是一夜。那是两年来无数个失眠的夜晚，无数次咬牙坚持，无数次想要放弃又重新站起来。", "那不是一夜。那是所有的积累，在那一刻，爆发了。", "她的收入也在发生变化。", "以前，她每个月带货提成最多三万块。现在，她每个月带货提成稳定在十五万以上。", "她开始接到广告了。", "那些以前看不上她的品牌，现在主动找上门来。有人说”林诗涵的账号很优质，粉丝粘性很高”，有人说”林诗涵的人设很真实，适合我们品牌调性”，有人说”林诗涵的价格很合理，性价比之王”。", "她第一次发现，原来被人认可，是这种感觉。", "她开始认真规划自己的生活。", "她把那个四十平的小公寓换成了一个八十平的大两居，地点也从城中村搬到了一个高档小区。她在阳台上养了很多绿植，还买了一张新的书桌，准备用来学习。", "她开始学化妆了——不是那种浓妆艳抹的妆，而是那种看起来很自然、但其实很精致的妆。她买了一整套护肤品，从爽肤水到精华液到面霜，一瓶比一瓶贵。", "她开始注重穿着了。她请苏小小帮她挑选衣服，每一套都是精心搭配的。她不再穿那些从地摊上淘来的便宜货，而是开始买一些有品质的品牌。", "她第一次发现，原来好好对待自己，是这种感觉。", "但与此同时，她也开始面临新的压力。", "她的每一个视频，都要精心策划。她的每一场直播，都要有话题、有内容、有亮点。她的每一条广告，都要反复审核、反复修改。", "她不能再像以前那样，随心所欲地发视频了。", "以前，她可以想播就播，不想播就不播。现在，她有团队要养，有广告主要维护，有平台要运营。", "她从一个”自由人”，变成了一个”打工人”——只不过，她给自己打工。", "她开始怀念以前的日子。"], ["那时候，她是一个人在战斗。她想播什么就播什么，想说什么就说什么。她可以穿着睡衣直播，可以素颜出镜，可以随便聊聊天。", "现在，她必须时刻保持”完美”的状态。她必须时刻记住，自己是一个有一百二十万粉丝的主播。", "她必须时刻提醒自己：不能出错。", "有一天晚上，林诗涵失眠了。", "她躺在床上，看着天花板，脑子里乱糟糟的。", "她想起了自己刚做主播的时候。那时候，她什么都没有，只有一颗想要改变命运的心。", "她每天晚上都直播，直播到凌晨两点才下播。下播之后，她还要写复盘笔记，分析今天的直播哪里做得好，哪里做得不好，明天要怎么改进。", "她记得有一次，她连续直播了十二个小时，嗓子都哑了，下播之后，她一个人坐在出租屋里，喝了一整瓶矿泉水，然后躺在地上，躺了半个小时才缓过来。", "那时候，她很累。但她很充实。", "现在，她很忙。但她很空虚。", "她不知道自己到底在追求什么。", "她不知道这样下去，她还能走多远。", "她翻了个身，把脸埋进枕头里。", "她不想了。她不敢再想了。", "她怕自己想太多，就不想干了。", "第二天早上，她醒来的时候，收到了苏小小的消息。", "“涵涵，你最近怎么了？我看你发的视频，感觉你不太对劲。”", "林诗涵愣了一下。", "“什么意思？”她问。", "“就是……感觉你变了，”苏小小说，“以前的你，很真实。现在的你，很……完美。”", "“完美不是好事吗？”", "“完美不是坏事，”苏小小说，“但我喜欢的林诗涵，不是完美的林诗涵，是真实的林诗涵。”", "林诗涵看着那条消息，沉默了很久。", "她知道自己变了。但她不知道该怎么改变。", "她只知道，她已经回不去了。", "那个穿着睡衣直播的女孩，已经不在了。", "现在的她，是一个有一百二十万粉丝的主播。", "她必须完美。", "她必须完美。", "她必须完美。", "她在心里默念了三遍，然后拿起手机，开始了新一天的工作。", "央视节目播出后，马胜利的星火MCN迎来了爆发期。", "那段时间，每天都有人找上门来——有想签约的主播，有想合作的品牌，有想投资的机构。"], ["马胜利做了一个统计：节目播出后一个月，他收到了三百多份签约申请。平均每天十份。", "“老马，你要发了！”王二蛋坐在他对面，看着那份数据，眼睛都绿了。", "马胜利没有笑。他点了一根烟，慢慢地抽了一口。", "“二蛋，”他说，“你觉得我应该签多少人？”", "“当然是越多越好！”王二蛋说，“你想想，签一百个人，每个人一个月给你赚一万，那就是一百万！”", "马胜利摇了摇头。", "“我不是这么想的。”他说，“我想做的是一件事——帮助那些真正有梦想的人，实现他们的梦想。”", "“可是理想不能当饭吃啊！”王二蛋说，“老马，我知道你有情怀，但咱们也要吃饭的。”", "马胜利想了想：“二蛋，你说得对。但我还是想坚持我的原则。”", "“什么原则？”", "“宁缺毋滥。”马胜利说，“我宁愿少签几个人，也要保证每个人的质量。”", "王二蛋叹了口气：“老马，你这人，就是太实在了。”", "马胜利笑了笑：“实在有什么不好？”", "那天晚上，马胜利做了一个重要的决定。", "他要开始扩张了。", "但他的扩张方式，不是签更多的账号，而是建更好的团队。", "他花了两个月时间，招了六个全职员工：一个运营总监，两个内容编辑，一个商务经理，两个客服。", "他还在杭州郊区租了一层写字楼，装修成了一个小型摄影棚。", "“以后，我们签约的主播，可以来这里拍视频。”他对员工们说，“我们不只是帮他们接广告，我们还要帮他们做内容、做运营、做品牌。”", "员工们都很兴奋。他们觉得老板是个有格局的人。", "但没有人知道，这个决定的背后，是马胜利长达一个月的失眠。", "他不知道自己能不能扛得住。", "他不知道自己做的到底对不对。", "他只知道，他已经没有退路了。", "扩张的效果很快就显现出来。", "三个月后，星火MCN签约的主播从五十个增加到了八十个。平均每个主播的月收入从一万增加到了两万。", "星火MCN的整体月收入，突破了五百万。", "五百万。", "这个数字，是马胜利以前想都不敢想的。", "他用了两年时间，从一个建材城小老板，变成了一个月流水五百万的MCN老板。", "他的人生，彻底改变了。"], ["但与此同时，他也面临着一个巨大的问题。", "他太累了。", "他每天早上七点起床，晚上十二点才能睡觉。白天要开会、审内容、谈合作，晚上要看数据、写方案、回复消息。", "他几乎没有休息的时间。", "他开始掉头发。三十六岁的他，鬓角已经全白了，头顶也开始稀疏。", "他开始失眠。有时候，他躺在床上，脑子里全是工作的事情，怎么都睡不着。", "他开始焦虑。他不知道明天会发生什么，不知道这个行业还能火多久，不知道自己的公司能不能活下去。", "他不敢告诉任何人。他只能一个人扛着。", "有一天晚上，马胜利一个人在办公室里加班。", "王二蛋推门进来，看到他的样子，吓了一跳。", "“老马，你脸色怎么这么差？”", "“没事，”马胜利勉强笑了笑，“就是有点累。”", "王二蛋在他旁边坐下，递给他一根烟。", "“老马，”王二蛋说，“你多久没有休息了？”", "马胜利想了想：“好像……很久了。”", "“多久？”", "“一个月？两个月？”", "王二蛋叹了口气：“老马，你不能这么干。你要是累垮了，什么都没了。”", "马胜利沉默了很久。", "他知道自己不能这么干。但他又不知道该怎么停下来。", "他已经走到了这一步，前面是悬崖，后面也是悬崖。", "他只能往前走。", "“二蛋，”他说，“你帮我盯一下公司。我出去走走。”", "“去哪里？”", "“不知道。”马胜利站起来，“随便走走。”", "他走出办公室，走进杭州的夜色里。", "城市的灯光很亮，车流不息。他一个人走在人行道上，看着来来往往的人群，突然觉得很孤独。", "他已经很久没有跟人好好聊过天了。", "他已经很久没有看过一场电影了。", "他已经很久没有陪过家人了。", "儿子小浩已经上小学了，但他已经很久没有去接过他了。", "他想起离婚前的那段日子。那时候，虽然他和陈芳天天吵架，但至少家里有人。现在，他一个人住在一套两居室里，客厅是办公室，卧室是仓库，每天晚上回来，家里冷冷清清的。", "他突然很想哭。", "但他没有哭。他只是继续往前走。", "张小辉带着妹妹去北京做手术那天，是他人生中最紧张的一天。", "他早上五点就醒了，躺在床上，看着天花板发呆。"], ["他想起了一年前，妈打电话告诉他妹妹生病的那天晚上。那时候，他觉得天都塌了。他不知道自己该怎么办，不知道该找谁帮忙，不知道该去哪里筹钱。", "他只知道，他不能倒下。", "他是家里唯一的孩子。如果他倒下了，整个家就倒了。", "他花了三天时间，把自己关在出租屋里，不出门，不吃饭，不说话。他就那样躺着，瞪着天花板，脑子里一片空白。", "第四天，他爬起来，打开电脑，开始投简历。", "他没有放弃。他只是需要一点时间，去接受这个现实。", "然后，他开始做直播。", "然后，他遇到了林诗涵和马胜利。", "然后，他上了央视。", "然后，他赚够了妹妹的手术费。", "现在，妹妹躺在病床上，被推进了手术室。", "张小辉站在手术室外面，看着那盏红色的指示灯，心里七上八下的。", "他不知道手术能不能成功。他不知道妹妹能不能挺过来。他不知道明天会发生什么。", "他只知道，他能做的都做了。剩下的，只能交给命运。", "他在手术室外面坐了八个小时。", "八个小时里，他没有吃一口东西，没有喝一口水，没有说一句话。他就那样坐着，看着那盏红色的指示灯，等待着。", "他妈坐在他旁边，一直哭。", "“娃，你说晓燕会不会有事？”她问。", "“不会的，”他说，“一定会没事的。”", "他不知道自己为什么这么说。他只是不想让妈担心。", "晚上八点，手术室的灯终于灭了。", "医生推门出来，摘下口罩，露出了一个微笑。", "“手术很成功。”他说，“恢复得好的话，三个月后就能正常生活了。”", "张小辉听到那句话的时候，愣了很久。", "他没有哭。他没有笑。他只是愣在那里，像一座雕像。", "他妈扑过来，抱着他哭：“娃！你听到了吗？晓燕没事了！晓燕没事了！”", "他抱住妈，也哭了出来。", "那是他在深圳五年来，第一次哭出声。", "他不是为自己哭。他是为妹妹哭。", "他知道，这一路走来，有太多人帮助过他们。有粉丝，有网友，有记者，有央视，有林诗涵和马胜利。", "没有这些人，就没有今天的他。", "他在心里默默发誓：将来，他一定要把这份善意传递下去。"], ["他要帮助那些像他一样的人——那些在大城市里挣扎的普通人，那些为了梦想咬牙坚持的普通人，那些不愿意放弃的普通人。", "他要把这份光，传下去。", "资本的嗅觉永远是最灵敏的。", "张小辉妹妹手术成功的事情，在网上传开了。很多媒体都报道了这个故事，标题一个比一个煽情——“寒门学子的逆袭之路”、“直播时代的追梦人”、“一个哥哥的救妹之战”。", "资本闻到了血腥味。", "第一个找上门的是一家叫”红杉资本”的投资机构。他们给张小辉发了一封邮件，说想投资他的账号，金额是五百万，换取百分之十的股份。", "张小辉看到那封邮件的时候，整个人都懵了。", "五百万？", "他这辈子都没有见过这么多钱。", "他把这封邮件转发给了林诗涵和马胜利。", "“你们怎么看？”他在群里问。", "马胜利秒回：“别急着答应。资本这东西，看起来很美好，但背后有很多坑。”", "林诗涵也说：“对，签了对赌协议没有？股权怎么算？退出机制是什么？这些都要搞清楚。”", "张小辉这才意识到，事情没有那么简单。", "红杉资本的人约他在深圳见面。", "来的是两个西装革履的年轻人，一男一女，都是名校毕业，说话的时候中英文夹杂，满嘴都是”赛道”、“打法”、“护城河”。", "“张老师，”男的开口了，“我们对您的账号非常看好。您现在的体量还很小，但我们认为，您有很大的成长空间。”", "“成长空间？”", "“是的，”女的说，“您的内容质量很高，但商业化做得不够。我们可以帮助您对接更多的品牌资源，让您的收入翻十倍、甚至百倍。”", "张小辉想了想：“具体怎么合作？”", "男的拿出一份合同，放在桌上。", "“很简单。我们投资五百万，占百分之十的股份。这意味着，您只需要出让一点点股权，就能拿到一笔巨款，用来发展您的账号。”", "张小辉拿起合同，看了看。", "合同很长，很复杂，有很多他看不懂的条款。他看到了”对赌协议”、“回购条款”、“反稀释条款”这些词，每个词他都认识，但连在一起，他就看不懂了。", "“我需要时间考虑。”他说。"], ["“当然，”男的笑了笑，“您慢慢考虑。但我们建议您尽快做决定，因为我们的资金是有限的，如果您不要的话，可能很快就会被其他人拿走。”", "张小辉笑了笑，什么也没说。", "他不懂资本。但他知道一件事：天上不会掉馅饼。", "那天晚上，张小辉把合同发给了林诗涵和马胜利。", "三个人在群里开了一场视频会议。", "“我看了这份合同，”马胜利说，“问题很大。”", "“什么问题？”", "“首先是估值，”马胜利说，“他们说你的账号值五千万，但实际上你的账号值多少，他们比你更清楚。他们只是用这个数字来忽悠你，让你觉得占了便宜。”", "“其次是对赌协议，”林诗涵说，“如果你的账号在三年内没有达到某个业绩目标，你就要回购他们的股份，价格是投资额的一倍。”", "“还有退出机制，”马胜利说，“如果公司做不下去了，他们有权把股份卖给第三方。这意味着，你的账号可能随时会被人卖掉，而你一点办法都没有。”", "张小辉听完，沉默了。", "“那我不签了。”他说。", "“不一定，”马胜利说，“资本有资本的价值，关键看你怎么谈。”", "“怎么谈？”", "“让他们让渡更多的控制权给你，”马胜利说，“股份可以稀释，但控制权必须在你自己手里。”", "张小辉想了想：“我懂了。”", "那天晚上，他拒绝了这笔投资。", "他知道自己走得很慢。但他不想被别人牵着鼻子走。", "妹妹手术成功后，张小辉做了一件事——他建立了一个公益基金。", "他把这个基金命名为”星火计划”。", "“我想帮助那些像我一样的人，”他在视频里说，“那些在大城市里挣扎的普通人，那些为了梦想咬牙坚持的普通人。我会用我的收入，去资助那些需要帮助的人。”", "星火计划第一期，他捐出了十万块，用来资助五个来自农村的大学生。", "那五个大学生里，有一个叫李明的男孩。", "李明是贵州山区出来的，考上了浙江大学，但家里交不起学费。张小辉看到了他的故事，二话不说，给他打了一万块。", "“张老师，这钱我不能要，”李明说，“你已经帮了很多人了，不需要再帮我了。”", "“拿着，”张小辉说，“等你将来工作了，再还给我。”"], ["李明在电话里哭了。", "林诗涵看到张小辉的视频之后，心里有些复杂。", "她为张小辉感到高兴。她知道张小辉一路走来的不容易，也知道这笔钱对他意味着什么。", "但同时，她也感到了一丝……失落？", "她不知道自己为什么会失落。", "她想了想，大概是因为，她觉得自己做得不够好。", "张小辉做公益，做基金，帮助那些需要帮助的人。而她呢？她只是赚钱，赚钱，赚钱。", "她突然意识到，自己好像迷失了。", "她做主播的初衷是什么？", "她不是为了帮助别人吗？她不是为了改变命运吗？她不是为了成为更好的自己吗？", "但现在，她每天想的都是：怎么涨粉，怎么带货，怎么赚钱。", "她已经很久没有想过”初心”这两个字了。", "那天晚上，林诗涵找苏小小聊天。", "“小小，”她说，“你觉得我变了没有？”", "“变了，”苏小小说，“但不是变坏了，是变复杂了。”", "“什么意思？”", "“以前的你，很简单，就是想红，”苏小小说，“现在的你，有钱了，有名了，有团队了。但你开始想更多的东西了——你开始想，我是谁？我在做什么？我要去哪里？”", "林诗涵愣住了。", "她没想到苏小小看得这么透彻。", "“那你说我应该怎么办？”她问。", "苏小小想了想：“涵涵，我给你一个建议。”", "“什么建议？”", "“想想你当初为什么做主播。”苏小小说，“不是为了赚钱，不是为了出名，而是为了什么？”", "林诗涵沉默了。", "她想起了自己第一次做直播的场景。那是2020年的春天，她刚刚被公司辞退，一个人窝在出租屋里，不知道该怎么办。", "她不知道自己还能做什么。她投了很多简历，都石沉大海。她面试了很多公司，都被拒了。", "有一天晚上，她实在无聊，就打开手机，开始直播。", "那场直播只有五个人看。但有一个粉丝留言说：“涵涵，你的声音很好听，你讲的话让我觉得安心。”", "她看到那条留言的时候，眼泪一下子就涌了出来。", "那是她第一次意识到，原来她也可以给别人带来一点温暖。", "她想起来了。", "她做主播的初衷，是给别人带来一点温暖。", "第二天，林诗涵发了一条视频。", "那条视频的标题是：“我想做一件有意义的事。”"], ["她在视频里说：“我想成立一个公益项目，专门帮助那些像当年的我一样的人——那些在大城市里漂泊的女孩，那些为了梦想咬牙坚持的女孩。”", "“我把这个项目叫做’氧气计划’。”", "“氧气，看不见，摸不着，但每个人都离不开。我想成为很多人的氧气——在她们最难的时候，给她们一点温暖，一点力量。”", "“第一期，我会捐出十万块，用来资助十个在大城市里漂泊的女孩。”", "“如果你觉得自己需要帮助，请联系我。”", "那条视频发出去之后，评论区炸了。", "有人说：“涵涵姐，你是真正的偶像！”", "有人说：“我也是一个在大城市漂泊的人，谢谢你！”", "有人说：“涵涵，我支持你！”", "林诗涵看着那些评论，眼眶有些湿润。", "她知道，这才是她真正想做的事情。", "不是为了赚钱，不是为了出名，而是为了帮助那些需要帮助的人。", "她突然觉得，自己的心，又活了过来。", "星火计划和氧气计划的消息，在网上传开之后，引来了意想不到的关注。", "有人说他们”炒作”，有人说他们”作秀”，还有人说他们”洗钱”。", "但也有人说他们”良心”，有人说他们”正能量”，还有人说他们”是直播圈的一股清流”。", "舆论的声音很大，但三个人的日子还是要继续过。", "直到有一天，出事了。", "那天早上，张小辉像往常一样打开手机，准备直播。", "他习惯性地刷了一眼后台数据——然后愣住了。", "昨天，他的视频播放量只有一万。", "他平时的视频播放量至少十万，好的能到五十万。一万是什么概念？", "他以为是系统出了bug。他刷新了页面，再看了一遍——还是一万。", "他打开自己的主页，发现粉丝数少了三千。", "他昨天涨了五千，今天怎么少了三千？", "他打开评论区，看到了很多陌生的留言——", "“骗子的课，谁买谁后悔。”", "“退款不退，气死了。”", "“这个人的课质量很差，买了根本没用。”", "张小辉愣住了。", "这些评论不是他的粉丝写的。这些评论的语气、措辞，明显是水军。", "他打开那些水军的主页，发现这些账号都是在同一天注册的，全都没有头像，全都没有发过任何内容。", "他意识到了一件事：有人在黑他。", "他给平台客服打了电话。"], ["“您好，我是’张小辉教英语’，我的账号最近被大量水军攻击，播放量也异常下降，请问是怎么回事？”", "客服的声音很客气，但很公式化：“您好，我们已经收到了您的反馈，我们会尽快核实处理。请您耐心等待。”", "“请问大概需要多久？”", "“这个我们无法确定，要看具体情况。”", "“那请问具体是什么情况？我被攻击的原因是什么？”", "“不好意思，这个信息我们无法透露。”", "电话挂断了。", "张小辉握着手机，心里凉了一截。", "他知道，平台不会帮他。", "在这个圈子里，没有永远的敌人，也没有永远的朋友，只有永远的利益。", "他不知道是谁在黑他。他也不知道平台会不会处理这件事。", "他只知道，他必须靠自己。", "那天晚上，张小辉在群里说了这件事。", "“我被黑了。”他说。", "林诗涵和马胜利几乎同时问：“怎么回事？”", "他把事情的来龙去脉说了一遍。", "“我查了一下，发现那些水军账号都是新注册的，IP地址也查不到。”他说，“这明显是有组织的攻击。”", "“你知道是谁干的吗？”马胜利问。", "“不知道，”张小辉说，“但我有一个猜测。”", "“什么猜测？”", "“是之前想投资我的那家机构。”他说，“他们被我拒绝之后，可能觉得我是个威胁，想用这种方式搞垮我。”", "林诗涵说：“有证据吗？”", "“没有，”张小辉说，“只是猜测。但我觉得八九不离十。”", "群里沉默了很久。", "然后，马胜利说了一句话：“小辉，你打算怎么办？”", "张小辉想了想：“我打算硬扛。”", "“怎么扛？”", "“继续发内容，继续直播，”他说，“我不信邪，我不信好内容没人看。”", "马胜利说：“好。我帮你扩散。”", "林诗涵也说：“我也帮你。”", "三个人在屏幕前对视了一眼，什么都没说，但什么都懂了。", "他们知道，这是他们三个人成立以来，面临的最大挑战。", "他们不知道能不能扛过去。", "但他们知道，他们不能退缩。", "接下来的一个月，张小辉过得很艰难。", "他的账号被平台限流——每次发视频，播放量都在几千到几万之间徘徊。他的评论区里永远有水军在刷屏。他的粉丝数从五十万掉到了四十万。", "但他没有放弃。"], ["他每天还是发视频，每天还是直播，每天还是回复每一条粉丝的留言。", "他知道自己没有退路了。他只有往前走。", "他想起了自己刚来深圳的那段日子。那时候，他比现在更艰难。他没有钱，没有工作，没有方向。他不知道明天在哪里。", "但他还是走过来了。", "他相信自己这一次也能走过来。", "三个人的合作关系，在张小辉被黑的第三个月，开始出现裂痕。", "那天晚上，三个人在群里开了一场视频会议。", "气氛很微妙。", "“小辉，”马胜利先开口了，“你的情况我一直在关注。我觉得你是不是应该换一个平台？”", "“换平台？”张小辉皱起了眉头，“为什么要换？”", "“你在慢手已经被针对了，”马胜利说，“继续待在这里，只会越来越难。不如去抖音，或者去B站。”", "“可是我在慢手已经积累了五十万粉丝，”张小辉说，“换平台意味着从头开始。”", "“从头开始总比被封号强，”马胜利说，“我听说平台已经在考虑永久封禁你的账
