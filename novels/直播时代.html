<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>直播时代 - 121KJ</title>
<style>*{{margin:0;padding:0;box-sizing:border-box}}
body{{font-family:"Noto Serif SC","Source Han Serif SC","方正书宋","PingFang SC",serif;background:#f5f0e8;color:#2c2c2c;line-height:2;font-size:1.05rem;-webkit-tap-highlight-color:transparent}}
.top-bar{{background:#0a0a0f;padding:10px 0;text-align:center;position:fixed;top:0;left:0;right:0;z-index:10}}
.top-bar a{{color:#818cf8;text-decoration:none;font-size:.85rem}}
.reader{{max-width:700px;margin:0 auto;padding:50px 20px 80px;min-height:100vh}}
.reader .title{{text-align:center;font-size:1.1rem;font-weight:600;margin-bottom:8px;padding-top:10px}}
.reader .page-content{{min-height:60vh;padding:10px 0}}
.reader .page-content p{{text-indent:2em;margin-bottom:6px;text-align:justify;font-size:1.02rem}}
.nav-bar{{position:fixed;bottom:0;left:0;right:0;background:#f5f0e8;border-top:1px solid #ddd;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;z-index:10}}
.nav-bar .page-info{{font-size:.8rem;color:#888}}
.nav-btn{{padding:8px 20px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#333;font-size:.9rem;cursor:pointer}}
.nav-btn:disabled{{opacity:.3;cursor:default}}
.tap-area{{position:fixed;top:50px;bottom:60px;left:0;right:0;z-index:5}}
.tap-left,.tap-right{{position:absolute;top:0;bottom:0;width:40%}}
.tap-left{{left:0}}.tap-right{{right:0}}
</style></head><body>
<div class="top-bar"><a href="/">← 返回首页</a></div>
<div class="reader"><div class="title">《直播时代》</div>
<div class="page-content" id="pc"></div></div>
<div class="nav-bar"><button class="nav-btn" id="pb" onclick="pp()">← 上一页</button><span class="page-info" id="pi"></span><button class="nav-btn" id="nb" onclick="np()">下一页 →</button></div>
<div class="tap-area"><div class="tap-left" onclick="pp()"></div><div class="tap-right" onclick="np()"></div></div>
<script>
const p={js};
let c=0;
function r(){{document.getElementById("pc").innerHTML=p[c].split("\n\n").filter(x=>x.trim()).map(x=>"<p>"+x+"</p>").join("");document.getElementById("pi").textContent="第 "+(c+1)+"/"+p.length+" 页";document.getElementById("pb").disabled=c===0;document.getElementById("nb").disabled=c===p.length-1}}
function np(){{if(c<p.length-1){{c++;r()}}}}
function pp(){{if(c>0){{c--;r()}}}}
document.addEventListener("keydown",e=>{{if(e.key==="ArrowLeft")pp();if(e.key==="ArrowRight")np()}})
r();
</script></body></html>
