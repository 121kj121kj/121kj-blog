。他侧头看了一眼坐在自己左手边的女孩——李香兰今天穿了一件月白色的旗袍，领口别着一枚小小的珍珠胸针，头发挽成松散的髻，几缕碎发垂在耳际，衬得她的侧脸愈发清丽。\n\n\"紧张什么？\"李香兰察觉到他的目光，嘴角微微上扬，\"又不是第一次约会。\"\n\n\"第一次看京剧。\"秦大宝老实回答，\"我怕看不懂。\"\n\n\"我给你讲就是了。\"李香兰轻轻握了握他的手，\"今晚演的是《桃花扇》，孔尚任的原著，你不是一直想了解明末的历史吗？这出戏讲的就是那段故事。\"\n\n秦大宝点点头，目光却飘向了戏台上正在布置的布景。一幅巨大的画轴缓缓展开，上面绘着秦淮河的水纹与画舫，远处是高低错落的楼阁，近处是一枝斜逸的桃花，笔法古拙，意境悠远。\n\n锣鼓声骤然停住，丝竹声起。\n\n一个青衣花旦从侧幕款款而出，水袖翻飞间，唱腔如泣如诉地响起：\"俺曾见金陵玉殿莺啼晓，秦淮水榭花开早，谁知道容易冰消……\"\n\n秦大宝听不懂唱词，却听出了那股苍凉。他想起下午在图书馆翻到的那本《明末遗民录》，想起那些在煤山上吊的殉国官员，想起扬州十日、嘉定三屠的历史记载，心里莫名地沉了一下。\n\n\"怎么了？\"李香兰见他出神，低声问道。\n\n\"没什么。\"秦大宝摇摇头，\"就是觉得……这段历史挺让人难受的。\"\n\n李香兰没有说话，只是把他的手握得更紧了一些。\n\n戏演到中段，剧情渐入高潮。侯方域与李香君在媚香楼相遇，一把桃花扇定情，后来国破家亡，两人失散，戏文里唱着\"俺曾见金陵玉殿莺啼晓\"的往事，听得满座唏嘘。\n\n秦大宝正看得入神，忽然感觉到口袋里有什么东西在发热。\n\n那是一块硬邦邦的、温热的东西，正贴着他的大腿，隔着裤子都能感到一股灼人的温度。\n\n他下意识地伸手去摸——是那把扇子。\n\n那把扇子是下午在戏台后台的签售会上买的。\n\n", "签售会上签名的不是什么明星，而是一位须发皆白的老先生，姓助于名良，据说是什么非遗传承人，专做戏曲道具和仿古折扇。摊位上摆着十几把各式扇子，有绢面的、纸面的，有画梅兰竹菊的、有写诗填词的。\n\n秦大宝本来只是想给李香兰买一把应景的小礼物。李香兰喜欢昆曲，平时在家里常听《牡丹亭》和《长生殿》，她说过最想要一把手工制作的精致折扇。\n\n他在摊位前站了很久，最后选中了角落里一把不起眼的扇子。\n\n那扇子的扇面是绢本的，上面绘着一枝桃花，枝干遒劲，花瓣轻盈，像是刚刚从枝头摘下来一般。扇骨是湘妃竹的，色泽温润，触手生凉。最奇特的是，扇面上除了那枝桃花之外，还题着两行小字，是小楷写就的，笔力遒劲而秀丽：\n\n\"千古秦淮东逝水，桃花扇底送南明。\"\n\n落款是一个模糊的印章，看不清楚。\n\n助于良老先生看秦大宝选中了这把扇子，浑浊的眼睛里闪过一丝异样的光芒。\n\n\"年轻人，\"老人的声音沙哑而低沉，\"这把扇子，你确定要？\"\n\n\"多少钱？\"秦大宝问。\n\n\"不要钱。\"老人摇了摇头，\"这把扇子不卖，只送有缘人。你若喜欢，便拿去。只是有一句话要告诉你——\"\n\n老人凑近了一些，压低声音说道：\"这把扇子，有些年头了。它见过的人，比你见过的电影还多。它里面……藏着一些东西。\"\n\n\"藏着什么？\"秦大宝好奇地问。\n\n老人只是笑了笑，没有回答。他接过秦大宝递来的书签，在扇柄上写下了一个日期：崇祯十七年三月初九。\n\n\"记住这个日子。\"老人说，\"也许有一天，你会需要它。\"\n\n秦大宝当时只当是老人家故弄玄虚，笑着道了谢，拿着扇子去找李香兰了。\n\n此刻，那把扇子正在他口袋里灼热地烧着，像是一块刚从炉子里取出来的铁。\n\n他忍不住悄悄把扇子掏了出来。\n\n绢本的扇面在昏暗的剧场里竟然隐隐发出柔和的光芒，像是被内部的什么东西点亮了一样。那枝桃花似乎在轻轻颤动，花瓣上的露珠折射出细碎的光点，如同星河坠落在绢面之上。\n\n", "\"大宝？\"李香兰转过头来，\"你在看什么？\"\n\n\"没……没什么。\"秦大宝下意识地合上扇子，但那光芒已经从指缝间泄了出来，引得前后左右的观众纷纷侧目。\n\n前排一个老者猛然回头，目光落在那扇子上，神色剧变。\n\n\"那是……\"老者喃喃自语，声音颤抖，\"那是那把扇子……\"\n\n秦大宝还没来得及反应，那老者已经猛然起身，挤过人群向他扑来，嘴里大喊着：\"不要打开！不要——\"\n\n话音未落，秦大宝的手指已经无意识地按在了扇骨的机关上。\n\n湘妃竹的扇骨发出轻微的咔嗒声，十二根扇骨如花绽放，扇面倏然展开——\n\n刹那间，一道白光从扇面上激射而出，将秦大宝整个人笼罩其中。\n\n那光芒温热而柔和，不刺眼，却有一种奇异的穿透力，仿佛能看透人的皮肤、血肉，直抵骨髓。秦大宝只觉得浑身一阵酥麻，像是有什么东西从扇子里涌出来，裹住了他的四肢百骸。\n\n他想喊，但喊不出声。\n\n他觉得自己的身体在变轻，在分解，在化作无数光点，然后被那把扇子吸入其中。\n\n\"大宝！大宝！\"\n\n他听到李香兰撕心裂肺的呼喊，感到她的手在拼命地抓着他的衣袖，但那力量越来越远，越来越模糊，像是从水底传来。\n\n白光越来越亮，越来越盛。\n\n戏台上的演员停住了，唱腔戛然而止。满座观众惊愕地站起，尖叫声四起。有人在喊\"失火了\"，有人在喊\"快跑\"，整个剧场乱作一团。\n\n但秦大宝已经什么都听不见了。\n\n他只看到那把扇子的扇面上，那枝桃花正在缓缓绽放，花瓣一片一片地舒展开来，露出金黄色的花蕊。花蕊中有一个小小的光点，越来越大，越来越亮，最后化作一道漩涡，将他整个人吞没了。\n\n然后，是漫长的、无边的黑暗。\n\n不知道过了多久。\n\n也许是一瞬，也许是永恒。\n\n秦大宝的意识从黑暗中缓缓浮起，像是从深水中挣扎着游向水面。\n\n", "他首先感知到的是声音——鸟鸣声、水流声、人声嘈杂声，以及一种他从未听过的、属于古代中国的声音：车轮碾过泥路的辘辘声，小贩沿街叫卖的吆喝声，远处传来的马嘶声和偶尔的鞭炮声。\n\n他睁开眼睛。\n\n天空是湛蓝色的，没有一丝云彩，太阳挂在东南方向，发出温煦的光芒。他躺在一片草地上，身下是潮湿的泥土和枯黄的野草，四周是高大的杨树和柳树，枝条在风中轻轻摇曳。\n\n他坐起身来，浑身上下检查了一遍——衣服还在，手机还在口袋里，手腕上的电子表还在走，只是时间显示让他愣住了。\n\n屏幕上的日期赫然是：**1644年4月15日。**\n\n他揉了揉眼睛，以为自己看错了。\n\n手机没有信号，GPS定位失效，屏幕右上角的电量显示还有百分之三十七。\n\n秦大宝站起身来，四下张望。\n\n他所在的地方是一片河滩，脚下是细软的沙土和鹅卵石，面前是一条宽阔的河流，河水浑浊而湍急，在阳光下泛着金色的波光。河面上有几艘小船在航行，船头站着艄公，赤膊撑篙，吆喝声随风飘来。\n\n远处的河岸上，隐约可见一座城市的轮廓——城楼高耸，城墙延绵，房屋鳞次栉比，在薄雾中若隐若现。\n\n秦大宝愣了足足有一盏茶的工夫。\n\n然后，他做了一件任何正常人都会做的事——他从口袋里掏出手机，颤抖着打开相机，对着眼前的景象拍了一张照片。\n\n按下快门的瞬间，他看到屏幕上的取景框里，一个穿着破旧棉袍的农夫正赶着牛车从他身边经过，牛车上装着几捆干柴，赶车的老农回头看了他一眼，露出困惑的神色。\n\n那目光里的困惑是真实的、真切的，因为秦大宝身上穿的是一件耐克的运动外套和一条李维斯的牛仔裤，脚上是一双阿迪达斯的跑鞋，头上还戴着无线蓝牙耳机。\n\n他在明末的河滩上，穿着全套现代品牌的运动装。\n\n这个认知像一盆冰水从头顶浇下，让他彻底清醒了。\n\n\"这是……穿越了？\"他喃喃自语，声音发抖，\"真的穿越了？\"\n\n他低头看了看自己手里的那把扇子。\n\n", "湘妃竹的扇骨静静地躺在他的掌心里，绢本的扇面上，那枝桃花依然栩栩如生，但不再发光了。扇面上那行小字清晰可见：\"千古秦淮东逝水，桃花扇底送南明。\"\n\n助于良老先生的话在他脑海中回响：\"这把扇子有些年头了。它见过的人，比你见过的电影还多。它里面……藏着一些东西。\"\n\n原来，那个看起来故弄玄虚的老人，说的全是真的。\n\n秦大宝在河滩上坐了很久，直到太阳升到头顶，他才勉强平复了狂跳的心脏，开始思考接下来该怎么办。\n\n首先，他得搞清楚自己在哪里。\n\n他顺着河滩向城市的方向走去，走了大约半个时辰，来到了一座城门前。城门上方悬挂着一块匾额，上书两个大字：\n\n**西安。**\n\n秦大宝在历史书上读到过，明末的农民起义正是从陕西开始的。李自成、张献忠，这些名字在二十一世纪的中国几乎家喻户晓。\n\n1644年，崇祯十七年——正史记载，这一年三月李自成攻破北京，崇祯帝在煤山上吊，明朝灭亡。四月，吴三桂引清军入关。五月，清军占领北京。\n\n也就是说，他穿越到的这个时间点，正好是李自成起义军势如破竹、明王朝摇摇欲坠的历史关口。\n\n秦大宝深吸了一口气。\n\n他是一个普通人，一个在南京某高中教历史的老师。他没有金手指，没有系统，没有随身空间，只有一把来历不明的桃花扇，一部没电就没用的手机，和一脑子在古代几乎毫无用处的高中历史知识。\n\n但他也是一个读过很多书的人。\n\n他记得李自成的军队在这年四月从西安出发，向北京进军。他记得一路上各地守军望风而降，农民起义的烈火燎原般蔓延。他记得那些被裹挟的流民、破败的村庄、饿殍遍野的惨状。\n\n他更记得，他不想死在这里。\n\n他还没有和李香兰结婚，还没有孩子，还没有过完他的人生。虽然刚才的穿越让一切都变得不可挽回，但他必须想办法活下去。\n\n活下去，然后想办法回去。\n\n", "他摸了摸口袋里的扇子。它凉了下来，像一把普通的古董折扇，再也没有发出任何光芒。但秦大宝隐隐觉得，这把扇子是他在这个世界唯一的凭依，也是他唯一可能回家的希望。\n\n他必须找到它运行的规律，必须弄清楚穿越的机制。\n\n但那是以后的事。现在，他得先解决一个最基本的问题：吃饭和住宿。\n\n他看了看自己这一身打扮——在二十一世纪的南京街头，这是一套再普通不过的运动装；但在1644年的西安城门前，这简直就像外星人入侵。\n\n他需要换一身衣服。\n\n秦大宝在城门外转悠了一会儿，观察着来往的行人。他发现城里出来的人大多穿着粗布棉袍，戴着棉帽，脚上蹬着布鞋。男人大多剃了前额，后面的头发扎成一条辫子垂在脑后——这是明末汉人的标准发型。女人的服饰则多种多样，有的穿着朴素，有的则锦绣华丽。\n\n他注意到城门口有几个乞丐，衣衫褴褛，蹲在墙角伸手乞讨。还有几个小贩在城门外摆摊，卖些干粮和杂货。\n\n秦大宝深吸一口气，壮着胆子走向一个小贩。\n\n\"这位……这位大哥，\"他努力让自己的语气显得自然，\"请问……\"\n\n那小贩抬头看了他一眼，瞬间愣住了。\n\n秦大宝知道原因。他低头看了看自己——运动鞋、牛仔裤、耐克外套，还有一头没有剃发、没有留辫子的黑发。在1644年的西安街头，这身打扮确实惊世骇俗得离谱。\n\n小贩张了张嘴，眼睛瞪得像铜铃，半晌才挤出一句：\"你……你是哪里来的？\"\n\n秦大宝灵机一动，露出一个自认为友善的笑容：\"我从南边来，路过西安，想打听一下城里最近有什么事情。\"\n\n\"南边？\"小贩的眼神更加疑惑，\"你这一身衣裳……我从没见过这种样式。\"\n\n秦大宝脑子飞速转动，编了一个理由：\"我是戏班子里的，前几日班子散了，我一路北上找亲戚，走到这儿盘缠用尽，只好一路卖艺。身上这身行头是戏服，专门演……演那些从海外来的角色的。\"\n\n小贩将信将疑地看了他几眼，但好奇心还是占了上风：\"你要打听什么事？\"\n\n", "\"城里最近热闹吗？有没有什么大事？\"\n\n小贩左右看了看，压低声音说道：\"大事可多了！你不知道？闯王的大军就在城外！听说不日就要开拔，打北京去了！\"\n\n秦大宝心里一凛。\n\n闯王——李自成。他真的来到了这个历史的节点上。\n\n\"闯王……大军在城外？\"秦大宝努力让自己的声音保持平静。\n\n\"可不是嘛！\"小贩打开了话匣子，\"半个月前闯王带着队伍进了城，在城里大开仓房，赈济百姓，还杀了几个贪官污吏。如今全城百姓都盼着闯王早日打倒北京城，推翻那个无道的朝廷！\"\n\n秦大宝听着这些历史书上曾经读到过的话，心里五味杂陈。\n\n历史书上用简洁的语言描述的那些\"起义军入城\"\"开仓放粮\"，背后是一个个真实的、普通百姓的生活。有人欢欣鼓舞，有人惶恐不安，有人看到了希望，有人在乱世中苦苦挣扎。\n\n而他，一个来自四百年后的穿越者，正站在这个历史漩涡的中心。\n\n\"多谢大哥指教。\"秦大宝拱了拱手，转身向城里走去。\n\n\"哎——你那身衣裳不换换？\"小贩在身后喊道，\"就这么进去，守卫不得把你当奸细抓了？\"\n\n秦大宝停下脚步。他回过头，问：\"哪里能买到衣裳？\"\n\n小贩指了指城门旁边的一条小巷：\"你往那边走，有个成衣铺子，老板娘姓周，人还和气。你就说是逃难的，她会便宜些卖给你。\"\n\n秦大宝道了谢，快步向那条小巷走去。\n\n成衣铺子不大，门脸陈旧，但收拾得还算干净。一个四十来岁的妇人正在柜台后面纳鞋底，见他进来，抬起头打量了一番。\n\n\"客官要买衣裳？\"\n\n\"是。\"秦大宝环顾四周，看到墙上挂着几件成衣，有男装有女装，有新有旧，\"有没有我这样身材能穿的？\"\n\n周老板娘放下鞋底，走过来打量了他几眼，微微皱眉：\"客官这身量，穿咱们陕西的衣裳，怕是有些紧。\"\n\n\"紧一些无妨。\"秦大宝说，\"多少钱？\"\n\n周老板娘沉吟片刻：\"一身棉袍，一顶帽子，一双布鞋，一共……三百文钱。\"\n\n", "秦大宝愣了。他身上没有铜钱，只有几张人民币——在1644年毫无用处。\n\n\"那个……\"他摸了摸口袋，尴尬地说，\"我身上没带现钱，能用别的东西抵吗？\"\n\n周老板娘狐疑地看了他一眼：\"什么东西？\"\n\n秦大宝脑子一转，从口袋里掏出了那块电子手表。\n\n这是他去年过生日时李香兰送的礼物，款式简洁，银色的表壳，皮革的表带。他本来一直舍不得戴，今天是因为想给李香兰留个好印象才特意戴上的——结果这一戴，直接戴到了三百多年前。\n\n\"这个，\"他把表递过去，\"你看这东西精巧不精巧？\"\n\n周老板娘接过手表，翻来覆去地看了看，看不出什么门道：\"这是什么东西？\"\n\n\"时辰表。\"秦大宝瞎编道，\"你看，指针会走，能看时辰。\"\n\n他按了一下表侧的按钮，表盘上的数字亮了起来——在1644年，这无疑是一个神迹。\n\n周老板娘吓得差点把手表扔了：\"它、它自己亮了！\"\n\n\"别怕别怕。\"秦大宝赶紧安抚她，\"这是南边海商从海外带回来的稀罕物件，能看时辰，还能发光。你要是帮我这一回，我就把这东西送你。\"\n\n周老板娘盯着那发光的表盘，眼睛里闪烁着好奇和贪婪的光芒。但她很快恢复了理智，把表还给了秦大宝。\n\n\"这东西虽好，但我一个妇道人家要它何用？\"她摇了摇头，\"你要真想换衣裳，我有个法子——城西有个当铺，叫'通宝典当'，专门收些稀奇古怪的物件。你去那儿问问，兴许能换几个钱。\"\n\n秦大宝想了想，把手表收回了口袋。\n\n这是他身上唯一值钱的东西，也是他和李香兰之间唯一的联系。在找到回去的方法之前，他不能轻易把它卖掉。\n\n\"多谢老板娘，\"他拱了拱手，\"我再想想别的办法。\"\n\n周老板娘打量了他一眼，忽然叹了口气：\"罢了，看你也不像坏人。这样吧——我这儿有几件旧衣裳，是我家男人以前穿的，他走得早，这些衣裳也没人穿了。你要是不嫌弃，我送给你。\"\n\n秦大宝喜出望外，连忙道谢。\n\n", "周老板娘从里屋翻出了一身旧棉袍、一顶棉帽和一双旧布鞋，虽然有些破旧，但浆洗干净，叠得整整齐齐。她把衣裳递给他，指了指铺子后面的一道帘子：\"后面有个小间，你去换上吧。\"\n\n秦大宝钻进小间，飞快地脱下了耐克外套和李维斯牛仔裤，换上了那身棉袍。棉袍有些大，穿着有些空荡，但总比穿着运动装在明末的街头招摇过市要好得多。他把帽子戴上，遮住了自己那一头不合时宜的短发，又换上了布鞋。\n\n最后，他把换下来的运动装和那把扇子一起塞进了怀里。\n\n走出小间时，周老板娘看着他，愣了一下，然后笑了。\n\n\"这么一换，还真像个陕西后生了。\"她端详了一番，\"就是这头发……你得想个办法遮一遮，不然满街的人都要看你。\"\n\n秦大宝摸了摸自己的头发，有些犯愁。明朝的男人都剃发留辫，他这一头短发，在当时人眼里简直是不男不女的怪物。\n\n\"要不这样，\"周老板娘从柜台下面翻出了一块黑色的布巾，\"把这个包在头上，像那些云游的僧人一样，虽然奇怪，但至少不会太扎眼。\"\n\n秦大宝依言把布巾包在头上，只露出半张脸。他对着铜镜照了照——镜中的人看起来像是一个逃荒的流浪汉，虽然狼狈，但至少不会太过惊世骇俗。\n\n\"多谢老板娘。\"他再次道谢。\n\n\"谢什么，出门在外，谁没个难处。\"周老板娘摆了摆手，\"你往后就自求多福吧——这年头不太平，闯王的大军要北上了，不知道要打多少仗、死多少人。你若没什么要紧事，还是往南边去吧，江南比这儿太平些。\"\n\n秦大宝把这句话记在了心里。\n\n江南。南京。秦淮河。\n\n他忽然想起了那把扇子上的诗句——\"千古秦淮东逝水，桃花扇底送南明。\"\n\n秦淮河……那是南京的秦淮河，也是那出《桃花扇》里故事发生的地方。\n\n冥冥之中，似乎有什么在指引着他。\n\n\"多谢老板娘提点。\"秦大宝深深地鞠了一躬，\"大恩不言谢，日后若有出头之日，必当涌泉相报。\"\n\n周老板娘笑了笑，没有把他的话当真，只是摆了摆手：\"去吧去吧，路上小心。\"\n\n", "秦大宝走出成衣铺子，站在明末西安的街头，看着来来往往的行人、吆喝叫卖的小贩、缓缓行进的马车，深深地吸了一口气。\n\n1644年的中国。\n\n他必须活下去。\n\n他必须找到回去的路。\n\n而这一切，都从秦淮河开始。\n\n\"千古秦淮东逝水，桃花扇底送南明。\"\n\n他默念着那两句诗，向着西安城的南门走去。\n\n身后，城墙上飘扬的旗帜在风中猎猎作响。那是闯王的旗号，大顺政权的旗帜，正要引领这支农民起义军，北上灭明，逐鹿天下。\n\n而他，一个来自四百年后的历史老师，正要在这个波澜壮阔的时代里，找到属于自己的位置。\n\n（第一章完，约5600字）\n\n第二章：乱世降临\n\n西安城南门外，官道上尘土飞扬。\n\n秦大宝裹紧了那件并不合身的旧棉袍，顺着人流向城外走去。他不敢走得太快——这具身体在二十一世纪的办公室里坐了十几年，养出了一身细皮嫩肉和高跟鞋都走不稳的腿脚，在这坑坑洼洼的官道上走了不到一个时辰，小腿就开始发酸。\n\n但他不敢停留。\n\n周老板娘的话一直在耳边回响：闯王的大军不日就要北上。这意味着什么？意味着兵荒马乱，意味着刀兵四起，意味着他这个来历不明的外地人，随时可能被当成奸细抓起来。\n\n他必须尽快离开西安。\n\n官道上人流如织，大多是逃难的百姓。扶老携幼的，推车的挑担的，牵着牲口的，扛着包袱的，人人脸上都带着惶恐和疲惫。有孩子在哭，有老人在呻吟，有妇人在低声咒骂，有男人沉默地抽着旱烟，眼神空洞地望着远方。\n\n秦大宝走在人群中，尽量让自己显得不那么扎眼。他低着头，脚步匆匆，偶尔抬头看看路标和方向——还好，历史书上学过的中国地理还没全还给老师，从西安到南京的大致方向他还是知道的。\n\n走了一上午，他终于在一处路边的茶棚里停了下来。\n\n茶棚很简陋，几根竹竿撑起一块油布，四张条凳围着一张破木桌，桌上放着几个粗瓷大碗。老板是个五十来岁的黑瘦汉子，正在灶台后面煮茶。\n\n", "\"客官请坐，喝碗茶吧？\"老板热情地招呼道，\"两文钱一碗，热乎着呢。\"\n\n秦大宝坐下来，掏出两枚从周老板娘那里顺来的铜钱——周老板娘看他可怜，又多送了他几十文钱做盘缠。他把钱放在桌上，老板端了一碗茶过来。\n\n茶是大碗茶，粗糙苦涩，但热腾腾的喝下去，胃里顿时暖和起来。\n\n秦大宝一边喝茶，一边竖起耳朵听周围人的闲聊。\n\n邻桌坐着几个脚夫打扮的汉子，正一边喝茶一边高谈阔论。\n\n\"听说了吗？闯王的大军下个月就要开拔了！\"\n\n\"可不是嘛，我表兄在城里当差，他说闯王已经下令了，让各家各户准备粮草，大军不日就往北边去！\"\n\n\"往北边？那不就是打北京？\"\n\n\"那还用说！闯王打的就是北京！听说崇祯那狗皇帝已经在皇宫里急得团团转了，连着派了好几拨人向各地催兵，可哪个将军肯去救他？\"\n\n\"哼，那狗皇帝是该死！年年加赋，岁岁征粮，百姓都快活不下去了！他倒好，在皇宫里吃香的喝辣的，哪管百姓死活！\"\n\n\"话也不能这么说……毕竟是大明的天下……\"\n\n\"什么大明不大明的！换个皇帝姓李有什么不好？闯王说了，均田免赋，不纳粮不纳税，这样的好皇帝哪里找去？\"\n\n秦大宝默默地听着，心里却在飞速盘算。\n\n历史书上记载，李自成的大顺军是在崇祯十七年（1644年）四月从西安出发，一路势如破竹，在四月底攻破北京城。崇祯帝在煤山上吊，明朝灭亡。\n\n也就是说，他还有大约半个月的时间。\n\n半个月后，北京城破，明朝灭亡。然后是吴三桂引清军入关，中国历史上最惨烈的改朝换代之一即将上演。\n\n他必须在那之前离开北方，越过黄河，进入相对安全的江南地区。\n\n但说起来容易，做起来难。\n\n他现在身上只有几十文钱，没有马，没有同伴，对这个时代的地形道路也只是一知半解。从西安到南京，直线距离超过一千里，在没有机动车的情况下，至少要走上一两个月。\n\n", "而且，1644年的中国正处于小冰河期的尾声，自然灾害频发，北方大旱，蝗灾肆虐，饿殍遍野，易子而食的惨剧在各地不断上演。这样的大环境下上路，无异于冒险。\n\n但留在西安更危险。\n\n秦大宝咬了咬牙，做出了决定——走。现在就走。趁着闯王的大军还没出发，趁着道路还算畅通，趁着还没有被卷入这场改朝换代的历史洪流。\n\n他喝完茶，问老板：\"从这里到河南，需要走哪条路？\"\n\n老板上下打量了他一眼：\"河南？客官是要往东去？\"\n\n\"是，想到开封那边去。\"\n\n\"开封啊……\"老板沉吟了一下，\"从这儿往东，先过渭南，再过华阴，就到了河南地界了。一路顺着官道走，大约七八天能到。不过……\"\n\n\"不过什么？\"\n\n\"不过客官一个人走，怕是不太安全。\"老板压低声音，\"听说华阴一带最近闹起了流寇，专门抢劫过路的商旅。你若要上路，最好找个伴，人多些才安全。\"\n\n秦大宝道了谢，又买了一个杂粮饼子充饥，然后继续上路。\n\n接下来的几天，是秦大宝人生中最艰难的几天。\n\n他沿着官道向东走，白天赶路，晚上找地方借宿。有时候能借到农家的柴房，有时候只能露宿荒野。他学会了如何用几文钱买一碗稀粥或者一块干饼，学会了如何分辨哪些人可以借宿、哪些人必须敬而远之，学会了如何在陌生的土地上辨认方向和寻找水源。\n\n他的身体也在慢慢适应。\n\n最初几天，他的脚上磨出了好几个血泡，每走一步都像踩在刀尖上。后来血泡破了，结了痂，长出了新皮，他的脚底板也慢慢变硬了，不再那么娇嫩。他学会了如何用布条把裤腿扎紧，防止荆棘和虫蚁钻进去；学会了如何在没有厕所的情况下找到隐蔽的地方解决内急；学会了如何在寒冷的夜里把棉袍裹紧，抱着膝盖取暖。\n\n第四天傍晚，他到达了渭南。\n\n渭南是个不大的县城，但城墙完整，人烟稠密，看起来比西安城外的那些乡镇要繁华一些。秦大宝在城门口交了入城税——五个铜板——然后进了城。\n\n他打算在渭南休整一晚，明天继续赶路。\n\n", "然而，事情并没有他想象的那么顺利。\n\n当他走进城里的时候，发现气氛有些不对。\n\n街道上的行人比往日少了许多，大多数店铺都半开着门，掌柜的站在门口，神色紧张地张望着什么。有士兵在街上巡逻，穿着灰布号衣，手里握着长枪，神情警惕。\n\n秦大宝心里一沉，悄悄拉住一个路人问道：\"这位大哥，城里出什么事了？\"\n\n那路人看了他一眼，压低声音说：\"你还不知道？闯王的先锋营昨天到了城外，说是要征粮征夫，城里的士绅们都吓坏了，连夜往城外搬东西呢！\"\n\n\"闯王的先锋营？\"秦大宝心里一惊，\"这么快？\"\n\n\"可不是嘛！听说闯王的主力就在后面，先锋营是来打前站的。客官若是没要紧事，还是赶紧离开吧，这地方待不得！\"\n\n秦大宝道了谢，转身就往城门方向走去。\n\n但他走得太慢了。\n\n还没等他走出两条街，街上就乱了起来。\n\n一队骑兵从城门的方向冲进来，马蹄声如雷，卷起漫天尘土。骑士们穿着杂色的衣服，有的披着羊皮袄，有的戴着斗笠，有的干脆光着膀子，手里挥舞着刀枪棍棒，嘴里发出各种怪叫。\n\n\"闯王驾到！都给我闪开！\"\n\n\"大顺天佑雄师！挡路者死！\"\n\n人群四散奔逃，惊叫声、哭喊声、东西落地的声音响成一片。秦大宝被人群裹挟着，踉踉跄跄地往街边退去。\n\n他躲进了一家布店的门廊下，探头往外看。\n\n那队骑兵约有四五十人，为首的是一个身材魁梧的大汉，满脸络腮胡子，骑着一匹高大的黑马，手里提着一柄宣花大斧，看起来凶神恶煞一般。\n\n骑兵队在街道中央停了下来，那大汉环顾四周，高声喊道：\"城里的百姓听着！我乃闯王麾下先锋营校尉铁金刚！今日大军过境，借贵地休整数日，所需粮草军饷，由城中士绅供给！凡我大顺子民，皆有义务协助义师，共创大业！有敢反抗者，杀无赦！\"\n\n说完，他猛地一挥斧头，街边一棵碗口粗的柳树应声而断，轰然倒地。\n\n围观的人群发出一阵惊呼，纷纷后退。\n\n秦大宝缩在门廊下，大气也不敢出。\n\n", "他看到那些骑兵开始分头行动，有的去各家店铺搜刮钱粮，有的在街道上设卡盘查行人，有的干脆闯进民宅，把值钱的东西往外搬。主人们的哭喊声和求饶声此起彼伏，但换来的只是粗暴的呵斥和拳脚。\n\n这就是农民起义军吗？\n\n秦大宝在心里问自己。\n\n历史书上写的\"均田免赋\"\"开仓放粮\"，和眼前的这一幕形成了鲜明的对比。他知道，农民起义从来就不是什么浪漫的事情——它是绝望者的反抗，是生存的挣扎，是血与火的洗礼。\n\n但亲眼目睹这一切，还是让他感到深深的震撼。\n\n他在门廊下躲了大约半个时辰，直到那队骑兵走得远了，才敢探出头来。\n\n街道上一片狼藉。被打翻的摊位、散落的钱币、哭泣的妇人、呆立的老人、被押走的年轻男子……秦大宝看着这一切，心里五味杂陈。\n\n他知道，自己不能再在渭南待下去了。\n\n闯王的先锋营已经到了这里，说明主力部队也就在不远处。他必须尽快离开，逃往更安全的地方。\n\n可是，城门那边肯定有人在把守，搜查出城的人。他这一身打扮，虽然换上了旧棉袍，但包头的布巾和略显白皙的皮肤还是可能引起怀疑。\n\n怎么办？\n\n他四下张望，寻找出路。\n\n布店的后面是一条狭窄的小巷，巷子尽头隐约可见一道矮墙。矮墙那边似乎是另一条街道，也许可以从那里绕到城墙边，找个僻静的地方翻墙出城。\n\n秦大宝深吸一口气，猫着腰钻进了小巷。\n\n小巷又黑又窄，两边是高高的院墙，墙头上偶尔探出几枝枯枝。秦大宝小心翼翼地走着，尽量不发出声响。\n\n走到一半的时候，他忽然听到前方传来一阵低低的呜咽声。\n\n他停下脚步，屏住呼吸，仔细听了听。\n\n那声音像是有人在哭泣，声音很轻，但充满了恐惧和绝望。\n\n秦大宝犹豫了一下，还是循着声音走了过去。\n\n巷子的尽头是一道矮墙，墙根下蹲着一个十来岁的孩子，衣衫褴褛，浑身发抖，正用手捂着嘴，无声地哭泣。\n\n", "那是一个男孩，瘦得皮包骨头，脸上黑乎乎的，分不清是泥巴还是泪水。他的身边放着一个小小的包袱，包袱散开了，里面的东西散落一地——几件破衣服、半个干馒头、还有几个铜板。\n\n秦大宝看着这个孩子，心里一阵酸楚。\n\n这不就是明末乱世中千千万万个孤儿中的一个吗？也许他的父母死于饥荒，也许他的家园毁于兵燹，他一个人流落街头，在乱兵四起的夜晚瑟瑟发抖。\n\n秦大宝走过去，蹲下身来，轻声问道：\"小兄弟，你怎么一个人在这里？\"\n\n那孩子吓了一跳，猛地抬起头，眼睛里满是惊恐。待看清秦大宝不是那些凶神恶煞的士兵，他才稍微放松了一些，但身体依然在发抖。\n\n\"我……我……\"孩子张了张嘴，说不出话来，只是哭得更厉害了。\n\n秦大宝叹了口气，伸手帮他把散落的东西捡回包袱里。\n\n\"别怕，我不是坏人。\"他尽量让自己的声音显得温和，\"你叫什么名字？家在哪里？怎么一个人在这里？\"\n\n孩子抽噎着，断断续续地说：\"我叫……叫石头……家在城东……爹娘都死了……房子也被烧了……我跑出来……没地方去……\"\n\n秦大宝心里又是一阵酸涩。\n\n\"你多大了？\"\n\n\"十……十二了。\"\n\n十二岁，看起来却只有八九岁的样子。\n\n秦大宝沉默了一会儿，做出了一个决定。\n\n\"你愿不愿意跟我走？\"他问。\n\n石头抬起头，惊恐地看着他。\n\n\"我……我不知道……\"\n\n\"我不是坏人。\"秦大宝说，\"我也要出城，这里太乱了，咱们一起走，路上也好有个照应。你认不认识出城的路？\"\n\n石头犹豫了一会儿，点了点头。\n\n\"我……我认识……城西有一段城墙年久失修，有个大豁口，可以钻出去……\"\n\n\"好。\"秦大宝伸出手，\"那就跟我走吧。\"\n\n石头迟疑地看着他伸出的手，半晌，终于伸出手来，握住了秦大宝的手。\n\n那是一只瘦弱的、冰凉的小手，握在掌心里像握住了一根细柴火棍。\n\n秦大宝把石头拉起来，两人沿着小巷继续往前走。\n\n", "城西的那段城墙果然有一处豁口，被荒草和垃圾掩盖着，不仔细看根本发现不了。秦大宝和石头在夜色的掩护下悄悄摸到那里，拨开荒草，果然看到一个刚好能容一人通过的缺口。\n\n\"就是这里。\"石头低声说，\"平时没人管，但从这里出去是乱坟岗，没人敢去。\"\n\n\"那正好。\"秦大宝说，\"走吧。\"\n\n两人依次钻过豁口，离开了渭南县城。\n\n城外是一片荒芜的坟地，杂草丛生，枯骨遍野。秦大宝借着月光，深一脚浅一脚地往前走，石头紧跟在他身后，小手紧紧攥着他的衣角。\n\n走了大约一炷香的工夫，他们终于离开了坟地，来到了一条田间小路上。\n\n秦大宝松了口气，找了棵大树，靠着树干坐了下来。\n\n\"先歇一会儿。\"他说，\"等天亮了再走。\"\n\n石头点点头，也坐了下来。\n\n月光下，秦大宝看着这个瘦弱的孩子，忽然问道：\"石头，你以后有什么打算？\"\n\n石头低着头，没有说话。\n\n\"你有没有想去的地方？有没有想找的人？\"\n\n石头沉默了很久，才轻声说：\"我想去南京。\"\n\n\"南京？\"秦大宝心里一动，\"为什么是南京？\"\n\n\"我娘以前说过，\"石头的声音低低的，像是在回忆很远的事情，\"她说南京是咱们大明最繁华的地方，有秦淮河，有夫子庙，有数不清的好吃的。她说等家里光景好了，就带我去南京看看……\"\n\n孩子的声音哽咽了，说不下去。\n\n秦大宝沉默了。\n\n南京。秦淮河。\n\n这已经是今天第二次听到这个地名了。\n\n先是周老板娘让他往南走，说江南比陕西太平；现在又是石头，说想去南京看他娘曾经描述过的地方。\n\n也许，这就是命运的安排。\n\n\"好。\"秦大宝忽然说道。\n\n石头抬起头，疑惑地看着他。\n\n\"咱们去南京。\"秦大宝说，\"不过不是现在——现在咱们得先找个安全的地方落脚，等风头过了再走。\"\n\n\"真的吗？\"石头的眼睛亮了起来，\"你……你真的愿意带我去南京？\"\n\n\"真的。\"秦大宝摸了摸他的头，\"不过你得答应我一件事。\"\n\n\"什么事？\"\n\n", "\"好好活着。\"秦大宝认真地说，\"不管遇到什么困难，都不要放弃。活着，比什么都重要。\"\n\n石头用力点了点头，眼泪又流了下来，但这次不是恐惧和绝望，而是感激和希望。\n\n秦大宝看着这个孩子，忽然想起了李香兰。\n\n他不知道李香兰现在怎么样了。她一定急疯了吧？她在剧场里眼睁睁地看着他消失，她一定以为他死了，或者以为他抛弃了她。\n\n她不知道他穿越了。她不知道他来到了三百多年前的中国。她不知道他正在为活下去而挣扎。\n\n他必须找到回去的方法。\n\n他必须找到那把扇子的秘密。\n\n但那是以后的事。现在，他有更紧迫的事情要做——带着这个孩子，离开这片战火纷飞的土地，向着安全的南方走去。\n\n\"睡吧。\"秦大宝对石头说，\"明天还要赶路。\"\n\n石头乖乖地闭上眼睛，不一会儿就睡着了。\n\n秦大宝靠着树干，看着头顶的星空。\n\n1644年的星空，和四百年后是一样的。繁星点点，银河横亘，北斗七星的勺柄指向北方。\n\n他伸出手，从怀里摸出了那把扇子。\n\n月光下，绢本的扇面泛着淡淡的光泽，那枝桃花依然栩栩如生。\n\n\"千古秦淮东逝水，桃花扇底送南明。\"\n\n他默念着这两句诗，把扇子收回了怀里。\n\n南方。南京。秦淮河。\n\n这是他唯一的出路，也是他唯一的希望。\n\n（第二章完，约6200字）\n\n第三章：初遇钱益谦\n\n黎明时分，天边刚刚泛起鱼肚白。\n\n秦大宝被一阵窸窸窣窣的声音惊醒。他猛地睁开眼，下意识地护住了怀里的扇子，然后才看清了声音的来源——是石头，这孩子正蹲在他身边，用树枝在地上划拉着什么。\n\n\"你醒了？\"石头见他睁眼，有些不好意思地笑了笑，\"我怕吵醒你，没敢出声。\"\n\n秦大宝揉了揉眼睛，打了个哈欠：\"没事，我也该醒了。几时了？\"\n\n\"我估摸着快卯时了。\"石头说，\"太阳快出来了。\"\n\n", "秦大宝点点头，从地上爬起来，活动了一下僵硬的四肢。一夜露宿让他浑身酸痛，但好在没有遇到什么危险——也许是运气好，也许是因为躲在了这处偏僻的乱坟岗边上，那些乱兵和流寇都懒得往这边来。\n\n\"走吧，趁天凉快，多赶些路。\"他拍了拍身上的泥土，对石头说。\n\n石头乖巧地点点头，把那个小包袱背到肩上，跟在了秦大宝身后。\n\n两人沿着田间小路向东南方向走去。\n\n这一带是关中平原的边缘，地势平坦，阡陌纵横。虽然正值乱世，但农人们还是在田间劳作，只是人人面带愁容，动作机械而迟缓。秦大宝注意到，很多田地都是荒芜的，长满了杂草，显然已经很久没有人打理了。\n\n\"地都荒了，没人种吗？\"他低声问石头。\n\n\"种了也收不上来。\"石头说，\"官府要征粮，闯王来了也要征粮，有时候一亩地打出来的粮食还不够交租的。还不如不种，省得白费力气。\"\n\n秦大宝沉默了。\n\n他想起历史书上写的那些关于明末农业危机的描述——土地兼并严重、赋税繁重、自然灾害频发、农民起义此起彼伏。现在看来，这些干巴巴的历史结论背后，是一个个真实的、绝望的、不得不放弃土地的中国农民。\n\n走了大约两个时辰，日头渐渐升高，气温也跟着上来了。\n\n秦大宝有些累了，正想找个地方歇歇脚，忽然听到前方传来一阵嘈杂的声音。\n\n\"快走快走！磨蹭什么！\"\n\n\"老爷，求求您开恩，我家里真的没有粮了——\"\n\n\"没有粮？那你家婆娘身上那件袄子总还是有的吧？脱下来！\"\n\n秦大宝心里一沉，连忙拉着石头躲进了路边的芦苇丛里。\n\n他透过芦苇的缝隙往外看，只见前方的道路上站着七八个人。为首的是一个穿着灰布军装的壮汉，手里提着一根鞭子，脸上带着凶神恶煞的表情。他身后还跟着几个同样打扮的人，手里拿着刀枪，正在对路边的几个百姓呼来喝去。\n\n\"是闯王的人。\"石头低声说，声音里带着明显的恐惧，\"他们……他们在抢东西。\"\n\n秦大宝点了点头，示意他别出声。\n\n", "那队士兵正在搜刮一对老夫妻的东西。老两口衣着破旧，颤颤巍巍地站在路边，任凭那些士兵翻找他们的包袱和衣物。那老太太身上穿着一件打了补丁的旧棉袄，被一个士兵粗暴地扯了下来，老太太扑上去想抢回棉袄，却被一脚踹倒在地。\n\n\"老东西，找死是不是？\"那士兵骂骂咧咧地把棉袄扔给了同伙，转身又在老人身上踢了一脚。\n\n老人倒在地上，发出痛苦的呻吟，却不敢有任何反抗。\n\n秦大宝的手紧紧攥成了拳头。\n\n他想冲出去，想制止这些暴行，但理智告诉他不能。他的身体在二十一世纪的和平年代里养尊处优了三十多年，既没有武功也没有武器，贸然冲出去只会白白送死。\n\n\"忍……\"他低声对自己说，\"得忍着……\"\n\n石头在他身边瑟瑟发抖，小手紧紧攥着他的衣角，眼睛里满是惊恐。\n\n那队士兵搜刮完毕，骂骂咧咧地继续向前走去，很快消失在了道路的尽头。\n\n秦大宝等了片刻，确认那些士兵走远了，才拉着石头从芦苇丛里钻了出来。\n\n那对老夫妻还躺在地上，老太太抱着被抢走的棉袄哭得撕心裂肺，老头子则捂着肚子，脸上的表情痛苦而绝望。\n\n秦大宝犹豫了一下，还是走了过去。\n\n\"老人家，您没事吧？\"他蹲下身来，查看老头的伤势。\n\n老头子抬起浑浊的眼睛看着他，嘴唇哆嗦着，半晌才挤出一句：\"没……没事……老朽这把老骨头，还撑得住……\"\n\n秦大宝从怀里掏出了一个小布包——那是他在渭南城外的村庄里用几文钱换来的干粮，本来打算留着路上充饥。他把布包打开，里面是两块杂粮饼子，他把它们塞到了老头手里。\n\n\"老人家，吃点东西垫垫。\"他说，\"前面找个郎中看看伤，别拖成了大病。\"\n\n老头子愣住了，看着手里的饼子，眼泪忽然就流了下来。\n\n\"这……这后生……\"他哽咽着说不出话来，\"大恩……大恩大德……\"\n\n\"举手之劳，老人家不必客气。\"秦大宝站起身，\"你们这是要去哪里？\"\n\n", "老头子抹了抹眼泪，叹了口气：\"唉，还能去哪里？老家被闯王的人占了，田产房舍都被抢光了。我们老两口没办法，只能往南边去投奔亲戚。听说江南太平些，想着去那边讨条活路……\"\n\n\"江南？\"秦大宝心里一动，\"你们也是去江南？\"\n\n\"是啊。\"老头子点点头，\"客官莫非也是？\"\n\n\"正是。\"秦大宝说，\"那咱们倒是同路。\"\n\n老头子的脸上露出了一丝喜色，但随即又黯淡下来：\"可我们老两口老的老、弱的弱，走得慢，怕是要拖累客官……\"\n\n\"无妨。\"秦大宝说，\"人多些，路上也安全些。\"\n\n他看了看老头子，又看了看还在哭泣的老太太，心里叹了口气。\n\n他不知道自己还能帮多少人。在这样一个乱世里，他自己都朝不保夕，哪里有余力去帮助别人？但看到这些无助的老人，他实在做不到视而不见。\n\n\"走吧。\"他搀起老头子，\"咱们边走边说。\"\n\n接下来的几天，秦大宝的队伍扩大了。\n\n除了石头之外，他又收留了一对老夫妻——老李头夫妇。老两口本来是要去江南投奔亲戚的，但因为年纪大了，走得很慢，已经在路上了耽搁了半个多月。\n\n四个人结伴而行，走走停停，日行三四十里路。\n\n秦大宝渐渐摸清了这个时代的出行规律——白天赶路，晚上找地方休息；尽量走小路、绕大路，避开人多的官道和城镇；遇到可疑的人就绕道走，遇到危险就躲起来。\n\n他的身体也在慢慢适应这种艰苦的旅行生活。脚底的老茧越来越厚，步子越迈越大，走长路也不再像最初那样气喘吁吁了。他的皮肤被太阳晒得黝黑，头发被布巾裹得乱糟糟的，看起来已经和这个时代的普通百姓没什么两样了。\n\n但他的心里，始终压着一块石头。\n\n那把扇子。\n\n每天晚上，当老李头夫妇和石头都睡着之后，他就会悄悄地把扇子拿出来，借着月光仔细端详。\n\n绢本的扇面，湘妃竹的扇骨，那枝桃花，那两行诗句。一切都和最初拿到的时候一样，朴素、古朴，看不出任何特别之处。\n\n但他知道，这把扇子不简单。\n\n", "它把他从2024年的南京带到了1644年的西安。它让他跨越了三百八十年的时光。它是他在这个世界唯一的凭依，也是他回家的唯一希望。\n\n他必须找到使用它的方法。\n\n他记得助于良老先生说过的话：\"这把扇子有些年头了。它见过的人，比你见过的电影还多。它里面……藏着一些东西。\"\n\n见过的人？藏着的东西？\n\n秦大宝百思不得其解。\n\n这把扇子到底是什么来历？它为什么会具有穿越时空的能力？使用它需要什么条件？有没有什么禁忌？\n\n这些问题困扰着他，让他夜不能寐。\n\n这一日，四人走到了华阴县境内。\n\n华阴在华山脚下，是从陕西进入河南的必经之路。秦大宝本来打算绕过华阴县城，从城外的小路直接往东走，但老李头夫妇实在走不动了，坚持要进城里歇一晚。\n\n\"客官，我们老两口实在走不动了。\"老太太可怜巴巴地说，\"就让我们在城里歇一晚吧，明日再赶路。我听人说，华阴县城里有家客栈，叫'福安居'，价钱公道，对我们这些逃难的人也算照顾。\"\n\n秦大宝看了看两个老人，又看了看石头，叹了口气：\"好吧，那就进城里歇一晚。不过咱们得小心些，别惹事。\"\n\n四人进了华阴县城。\n\n华阴是个小县城，但城墙高耸，街道整齐，比渭南要繁华一些。街道上人来人往，有挑担的小贩，有赶车的脚夫，有骑马的官差，也有像我他们这样衣衫褴褛的逃难者。\n\n秦大宝找到了老李头说的那家\"福安居\"客栈。客栈不大，但收拾得还算干净，掌柜是个四十来岁的胖妇人，说话和气，收的钱也不贵——四个大人住一晚，总共只要四十文钱。\n\n秦大宝付了钱，四人被安排在了客栈后院的两间小屋里。\n\n安顿好老人和孩子，秦大宝独自走出客栈，想透透气。\n\n夜幕已经降临，华阴县城里亮起了星星点点的灯火。街道上行人稀少，偶尔有更夫敲着梆子走过，喊着\"天干物燥，小心火烛\"。\n\n秦大宝沿着街道慢慢走着，忽然听到前方传来一阵争执声。\n\n", "\"你这书生，好不晓事！我看你是个读书人，好心好意请你喝酒，你却推三阻四，这是什么道理？\"\n\n\"在下已有几分薄醉，再喝下去怕是要出丑了。还请兄台见谅。\"\n\n\"出丑？出什么丑？我看你分明是看不起我！\"\n\n秦大宝循声望去，只见街边的一家酒肆门口站着几个人。为首的是一个身材魁梧的壮汉，满脸通红，显然喝了不少酒，正指着一个年轻书生的鼻子大声呵斥。\n\n那书生约莫二十五六岁的年纪，身穿一袭洗得发白的青布长衫，头戴方巾，面容清秀，气质儒雅。他站在酒肆的台阶上，神色从容，不卑不亢地面对着壮汉的呵斥。\n\n\"在下绝非看不起兄台。\"书生拱了拱手，语气平和地说，\"只是在下酒量有限，确实不能再饮了。还请兄台海涵。\"\n\n\"海涵？我海涵你个屁！\"壮汉伸手就要去揪书生的衣领，\"你这酸秀才，给你脸了是不是？\"\n\n秦大宝皱了皱眉，正想上前劝解，却见那书生不慌不忙地侧身一闪，巧妙地避开了壮汉的手。\n\n\"兄台何必动怒？\"书生依然语气平和，\"在下有一言，不知当讲不当讲。\"\n\n\"有屁快放！\"\n\n\"兄台方才说，请在下喝酒，是看在下是个读书人。\"书生说，\"读书人读的是什么书？圣贤书。圣贤书里教的是什么？是'礼'。礼者，敬人也。兄台若是真的敬重读书人，又怎会在大庭广众之下如此相待？这岂不是'礼'的反面？\"\n\n壮汉被他说得一愣，一时语塞。\n\n书生的嘴角微微上扬，继续说道：\"再者，孔子曰：'唯酒无量，不及乱。'饮酒之道，在于尽兴而不乱。兄台方才说在下推三阻四，可在下若是真的喝醉了，当街出丑，岂不是更丢脸面？兄台请在下的初衷，不过是想交个朋友，何必为了这一杯酒，反而伤了和气？\"\n\n这番话说得不卑不亢，有理有据，既给了对方台阶下，又维护了自己的尊严。围观的人群中有人开始叫好，那壮汉的脸色也渐渐缓和下来。\n\n\"你这书生……\"壮汉盯着书生看了半晌，忽然哈哈大笑起来，\"好一张利嘴！好！算你有理！今日这酒，算我请错了人！\"\n\n", "说罢，他一挥手，带着几个随从扬长而去。\n\n围观的人群渐渐散去，那书生也松了口气，整了整衣冠，准备离开。\n\n就在这时，他忽然看到了站在不远处的秦大宝。\n\n两人目光相对，书生微微一愣，然后露出了一个温和的笑容。\n\n\"这位兄台，\"他走过来拱了拱手，\"方才那一幕，想必兄台都看到了。让兄台见笑了。\"\n\n秦大宝也拱了拱手：\"哪里哪里，兄台口才了得，在下佩服。\"\n\n\"过奖了。\"书生笑了笑，\"在下钱益谦，表字子谦，浙江绍兴府人氏。敢问兄台尊姓大名？\"\n\n\"在下秦大宝，\"秦大宝想了想，\"也是……南方人。\"\n\n\"秦兄。\"钱益谦点点头，\"幸会幸会。看秦兄的装束，像是从陕西来的？\"\n\n\"正是。\"秦大宝说，\"从西安来，要往南京去。\"\n\n\"南京？\"钱益谦的眼睛亮了起来，\"真是巧了！在下的目的地也是南京！\"\n\n\"哦？\"秦大宝有些意外，\"钱兄也是去南京？\"\n\n\"是。\"钱益谦点点头，神色变得凝重起来，\"不瞒秦兄，如今北方大乱，闯王的人马四处烧杀抢掠，陕西已经待不下去了。在下虽是读书人，但也不能坐以待毙。这才变卖了家产，打算南下金陵，躲避兵祸。\"\n\n秦大宝仔细打量着这个自称钱益谦的书生。\n\n从外表上看，他确实是个普通的读书人——青衫方巾，相貌清秀，谈吐文雅，举止有度。但秦大宝总觉得他身上有一种不同于普通书生的气质——那是一种沉稳、坚毅的气质，像是一把藏在剑鞘里的利剑，不露锋芒，却自有一股凛然之气。\n\n而且，他说要去南京躲避兵祸……\n\n秦大宝想起了那把扇子上的诗句——\"千古秦淮东逝水，桃花扇底送南明。\"南明……明……\n\n\"钱兄，\"秦大宝忽然问道，\"你说的'躲避兵祸'，只是指躲避闯王的兵马吗？\"\n\n钱益谦微微一愣，然后深深地看了秦大宝一眼。\n\n\"秦兄何出此言？\"\n\n\"没什么。\"秦大宝摇摇头，\"只是随便问问。\"\n\n", "钱益谦沉默了片刻，然后轻声说道：\"秦兄，有些话不便在此处说。若秦兄不嫌弃，不如移步到在下下榻之处，咱们边喝茶边聊？\"\n\n秦大宝想了想，点了点头。\n\n两人来到钱益谦住的客栈。\n\n钱益谦的房间很简陋，只有一张床、一张桌子和两把椅子。但桌上摆着几本书和一摞宣纸，墙上挂着一幅字，写的是岳飞的《满江红》：\n\n\"怒发冲冠，凭栏处、潇潇雨歇。抬望眼、仰天长啸，壮怀激烈。三十功名尘与土，八千里路云和月。莫等闲、白了少年头，空悲切。\"\n\n字迹苍劲有力，透着一股慷慨激昂之气。\n\n\"好字。\"秦大宝由衷地赞叹。\n\n\"见笑了。\"钱益谦泡了一壶茶，给两人各倒了一杯，\"这是在下离开家乡时，族中长辈所赠。说是希望在下不要忘记故土，不要忘记先人的教诲。\"\n\n秦大宝接过茶杯，轻抿了一口：\"钱兄方才说，有些话不便在此处说。不知是什么话？\"\n\n钱益谦沉默了片刻，然后抬起头，目光灼灼地看着秦大宝。\n\n\"秦兄，在下有一言，不知当讲不当讲。\"\n\n\"钱兄请说。\"\n\n\"秦兄方才问我，躲避兵祸是否只是指躲避闯王的人马。\"钱益谦压低了声音，\"在下想说的是——不止。\"\n\n秦大宝心里一紧，但面上依然保持着平静：\"愿闻其详。\"\n\n钱益谦站起身，走到窗边，望着窗外的夜空，声音低沉而坚定：\n\n\"秦兄，你可知道，当今天下，不止闯王一路兵马？\"\n\n\"愿闻其详。\"\n\n\"关外的满洲人，\"钱益谦一字一顿地说，\"对中原大地虎视眈眈已久。他们训练有素，装备精良，铁骑纵横，所向披靡。辽东已经丢失多年，山海关外尽是敌人的土地。一旦关内的局势有变，他们必然趁虚而入。\"\n\n秦大宝沉默了。\n\n他当然知道这些。历史书上写得清清楚楚——1644年，吴三桂引清军入关，多尔衮率八旗铁骑入主中原，中国历史翻开了最屈辱的一页。\n\n\"秦兄以为，\"钱益谦转过身来，目光如炬，\"当今天下，是谁的天下？\"\n\n\"是大明的天下。\"秦大宝说出了历史上标准答案。\n\n", "\"是。\"钱益谦点点头，\"但这个天下，正在风雨飘摇之中。闯王的人马四处烧杀抢掠，朝中奸臣当道，皇帝昏庸无能。大明的江山，已经岌岌可危了。\"\n\n\"那钱兄以为，该当如何？\"\n\n钱益谦沉默了很久，然后缓缓说道：\n\n\"在下的师父曾对在下说过一句话——'天下兴亡，匹夫有责。'\"\n\n\"天下兴亡，匹夫有责。\"秦大宝在心里默念了一遍这句话。\n\n这是顾炎武的名言，也是明末清初那一代士人的精神写照。他们明知明朝已经不可救药，却依然不愿放弃，依然在苦苦挣扎，依然在寻找救国救民的道路。\n\n钱益谦看着秦大宝，忽然笑了。\n\n\"秦兄，在下与兄一见如故，不知是否有幸与兄结为异性兄弟？\"\n\n秦大宝愣了一下，然后也笑了。\n\n\"求之不得。\"\n\n那一夜，两个来自不同地方、有着不同背景的年轻人，在华阴县城的客栈里焚香结拜，义结金兰。\n\n钱益谦比秦大宝大两岁，因而做了兄长；秦大宝做了弟弟。\n\n他们不知道的是，这个夜晚的相遇，将改变两个人的命运，也将改变一段历史的走向。\n\n窗外，月光如水，洒在两个年轻人的身上。\n\n而远方的天际，乌云正在聚集。\n\n乱世，已经降临。\n\n（第三章完，约5800字）\n\n第四章：秦淮河畔\n\n从华阴向东，穿过函谷关，便进入了河南地界。\n\n秦大宝和钱益谦结伴而行，一路上两人相谈甚欢。钱益谦学识渊博，对经史子集烂熟于心，谈起天下大势来头头是道；秦大宝虽然是个历史老师，但毕竟来自四百年后，很多历史事件的来龙去脉和因果关系，他看得比这个时代的任何人都要清楚。\n\n两人的结交，可以说是互补有无，相得益彰。\n\n老李头夫妇和石头也跟着他们一起走。五个人组成了一支小小的队伍，一路上相互照应，倒也平安无事。\n\n穿过函谷关后，道路渐渐变得崎岖起来。\n\n这里是中原腹地，地势西高东低，从陕西到河南要翻过一道道山岭。秦大宝他们沿着山路走了七八天，终于在四月初的一个傍晚，到达了黄河岸边。\n\n", "黄河在这一段的水流还算平缓，渡口名为\"孟津渡\"，是南北往来的重要通道。秦大宝站在渡口边，看着眼前宽阔的河面和来往的渡船，心中感慨万千。\n\n黄河，中国的母亲河。它见证了太多的朝代更迭和历史变迁。多少帝王将相在这条河边上演出了一幕幕威武雄壮的史剧，多少黎民百姓在这条河边上流尽了血泪。\n\n而他，一个来自四百年后的穿越者，也即将渡过这条河，向着南京的方向走去。\n\n\"秦弟，在想什么？\"钱益谦走过来，站在他身边。\n\n\"没什么。\"秦大宝收回思绪，\"钱兄，你说咱们什么时候能到南京？\"\n\n\"若一路顺利，大约还要一个多月。\"钱益谦说，\"从孟津过河后，先到开封，然后沿着官道往东南走，经归德、徐州、凤阳，便可到达南京。\"\n\n\"一个多月……\"秦大宝叹了口气，\"真是漫漫长路。\"\n\n\"是啊。\"钱益谦望着黄河对岸，神色有些凝重，\"不过，这已经算是好的了。若是赶上兵荒马乱的时节，道路阻绝，半年都到不了也是常事。\"\n\n秦大宝点点头，没有说话。\n\n他想起了那些在路上遇到的逃难者。他们说，江南是太平之地，南京是繁华之都。可真正到了南京，又会怎样呢？在这个乱世之中，哪有什么真正的太平之地？\n\n\"走吧，过河。\"钱益谦拍了拍他的肩膀，\"天色不早了，早点过河，找个地方歇息。\"\n\n过了黄河，五人继续向东南方向走去。\n\n河南境内的情况比陕西好不了多少。田地荒芜，村庄凋敝，到处都是逃难的百姓。秦大宝注意到，很多村庄都已经空了，只剩下残垣断壁和野草荒藤。有些地方甚至还能看到没来得及掩埋的尸体，发出阵阵腐臭，引来成群的乌鸦在天空中盘旋。\n\n\"唉，这世道……\"老李头看着这些景象，忍不住老泪纵横，\"老天爷不开眼啊！\"\n\n秦大宝沉默着，心里却很沉重。\n\n", "他想起了历史书上关于明末人口锐减的记载。小冰河期的极端气候、连年的旱灾蝗灾、农民起义的兵燹之灾、清军入关后的屠杀和镇压——据估计，从1620年到1660年的四十年间，中国人口从一亿五千万锐减到了一亿左右，减少了将近三分之一。\n\n这减少的三分之一，就是三千万人。\n\n三千万人。\n\n每一个数字背后，都是一个鲜活的生命，一个破碎的家庭，一个永远无法愈合的伤口。\n\n\"秦弟。\"钱益谦的声音打断了他的思绪。\n\n\"嗯？\"\n\n\"你看那边。\"\n\n秦大宝顺着钱益谦的目光望去，只见远处的山坡上，有几个黑点在缓缓移动。仔细看去，那是一支小小的队伍，约有十来个人，扶老携幼，正在艰难地向南走去。\n\n\"是和我们一样的逃难者。\"秦大宝说。\n\n\"是。\"钱益谦点点头，\"不过你看他们的装束——\"\n\n秦大宝仔细看去，发现那支队伍里的人穿得比普通百姓要讲究一些。虽然也是破衣烂衫，但举手投足间透着一股书卷气。尤其是走在队伍中间的那个人，身材修长，气质儒雅，头戴方巾，身穿一件虽然破旧但浆洗得干干净净的青布长衫，走路的姿态从容不迫，完全不像其他逃难者那样狼狈。\n\n\"那是个读书人。\"秦大宝说。\n\n\"不止。\"钱益谦眯起眼睛，仔细辨认着，\"那应该是……一队塾师和学生。\"\n\n\"塾师和学生？\"\n\n\"你看他们背着的东西。\"钱益谦指着那支队伍，\"有的背着书箱，有的挑着担子，担子里隐约能看到笔墨纸砚。他们应该是从北方逃出来的私塾先生，带着学生南下避难。\"\n\n秦大宝点点头，觉得钱益谦的分析有道理。\n\n\"走吧，别看了。\"钱益谦说，\"咱们走咱们的路。\"\n\n然而，事情的发展往往出人意料。\n\n三天后，在归德府的郊外，秦大宝和钱益谦又一次遇到了那支队伍。\n\n这一次，他们已经不再是擦肩而过的陌生人，而是有了更深入的交集。\n\n", "那是在一个破败的村庄里。村庄里的大部分房屋都已经坍塌，只剩下几间勉强还能遮风挡雨的土屋。那支队伍正好也在村子里歇脚，双方在村口的井边相遇了。\n\n\"这位兄台，\"钱益谦上前拱手，\"敢问可是从北边来的？\"\n\n那为首的读书人抬起头，打量了钱益谦一番，然后还礼道：\"正是。在下姓方，名孝孺——\"\n\n他话还没说完，钱益谦就惊讶地叫了起来：\"方孝孺？你就是方孝孺？\"\n\n那读书人愣了一下，然后苦笑起来：\"怎么，兄台认识在下？\"\n\n\"不是那个方孝孺。\"钱益谦连忙解释，\"在下说的是大名府的方孝孺，方子衿先生。在下曾听说过先生的名号，说先生是河南有名的经学大师，桃李满天下。没想到今日竟在此处相遇，真是三生有幸。\"\n\n那读书人——方孝孺，字子衿——谦虚地摆了摆手：\"虚名而已，不值一提。看兄台的装束气度，应该也是读书人？\"\n\n\"在下钱益谦，浙江绍兴人，也是个穷书生。\"钱益谦说，\"这位是我的义弟，秦大宝。\"\n\n方孝孺看了看秦大宝，微微点头致意。\n\n秦大宝也在打量着这位传说中的经学大师。方孝孺看起来五十来岁，面容清癯，颌下留着一缕山羊胡，眼睛不大但很有神，透着一股睿智和沉稳。他的衣服虽然破旧，但浆洗得干干净净，举手投足间自有一股文人的风骨。\n\n\"方先生，\"钱益谦问道，\"您这是要往哪里去？\"\n\n\"唉，一言难尽啊。\"方孝孺叹了口气，\"北方大乱，闯王的兵马四处烧杀，我那私塾也办不下去了。无奈之下，只好带着几个学生南下，想去南京谋条生路。\"\n\n\"去南京？\"钱益谦眼睛一亮，\"在下和秦弟也是去南京！不如结伴同行，路上也好有个照应？\"\n\n方孝孺看了看钱益谦，又看了看秦大宝，沉吟片刻，点了点头：\"也好。如今兵荒马乱，路上多一个人就多一份安全。既然钱公子不嫌弃，老夫就恭敬不如从命了。\"\n\n于是，两支队伍合为一支，人数从五人变成了十五人。\n\n", "队伍里除了方孝孺之外，还有他的四个学生。四个学生都是十五六岁的少年，大的叫方文清，小的叫方文远，中间两个分别叫方文渊和方文博。他们都是方孝孺的同族子弟或者亲戚家的孩子，自幼跟着方孝孺读书识字，如今也跟着先生南下避难。\n\n此外，队伍里还有一个意想不到的成员——方孝孺的女儿方若兰。\n\n方若兰今年十六岁，长得清秀俊俏，皮肤白皙，眉目如画。她穿着朴素的布衣荆钗，头发简单地挽成一个髻，没有涂脂抹粉，但依然掩不住天生的丽质。\n\n秦大宝第一眼看到她的时候，心里莫名地动了一下。\n\n那种感觉很奇怪，像是在哪里见过，又像是似曾相识。\n\n\"那是小女若兰。\"方孝孺介绍道，\"内人在战乱中……走了。若兰是她唯一的骨血，我不能丢下她不管。\"\n\n秦大宝看着那个安静地站在父亲身后的少女，忽然想起了李香兰。\n\n她们不一样。李香兰是现代都市里的职业女性，时尚、干练、充满活力；方若兰是明末乱世中的大家闺秀，娴静、温柔、知书达理。但她们身上有一种相似的气质——那种让人看了就忍不住想要保护的温柔。\n\n\"秦弟？\"钱益谦的声音打断了他的思绪。\n\n\"啊？\"秦大宝回过神来，\"钱兄说什么？\"\n\n\"我说，咱们该出发了。\"钱益谦意味深长地看了他一眼，嘴角微微上扬。\n\n秦大宝老脸一红，连忙跟着大家上路。\n\n从归德到南京，还要走大约半个月。\n\n一路上，秦大宝和方若兰渐渐熟络起来。\n\n方若兰虽然是个大家闺秀，但并不娇气。她跟着父亲和学生们在乱世中逃难，吃尽了苦头，但从来没有抱怨过。她的性格温柔善良，总是默默地照顾着队伍里的老人和孩子。有时候石头走不动了，她会把自己的干粮分给他；有时候老太太累得走不动了，她会扶着她一步一步地往前挪。\n\n秦大宝有时候会帮她做一些力气活，比如挑水、捡柴、找路。他发现方若兰读过很多书，虽然比不上她父亲那样博学，但比起一般的闺阁女子已经强了太多。她不仅会背四书五经，还会吟诗作对，偶尔还会弹几曲古琴。\n\n", "\"方姑娘的琴艺是谁教的？\"有一天晚上，秦大宝忍不住问道。\n\n\"是我娘。\"方若兰轻声说，眼睛里闪过一丝悲伤，\"我娘以前是书香门第的小姐，琴棋书画样样精通。她教了我很多，可惜……\"\n\n她没有说下去，但秦大宝明白她的意思。\n\n\"节哀。\"他轻声说，\"你娘在天之灵，一定不希望你难过。\"\n\n方若兰抬起头，感激地看了他一眼：\"多谢秦公子。\"\n\n\"叫我大宝就行。\"秦大宝说，\"'秦公子'听着怪别扭的。\"\n\n方若兰微微一笑：\"那你也叫我若兰吧。'方姑娘'听着也很别扭。\"\n\n两人相视一笑，关系又近了一步。\n\n五月初，五人终于到达了南京城外。\n\n南京，古称金陵、建康、江宁，是六朝古都，虎踞龙盘之地。这里北临长江，西接皖赣，地理位置十分重要。自古以来，就是东南地区的政治、经济、文化中心。\n\n明太祖朱元璋定都应天府（南京），建立了大一统的明朝。虽然后来永乐帝迁都北京，但南京一直作为\"留都\"存在，保留着一套完整的中央官僚体系，是江南地区的行政中心。\n\n秦大宝站在南京城外，看着眼前巍峨的城墙和川流不息的人群，心中百感交集。\n\n他终于到了。\n\n从西安到南京，他走了整整一个多月。一路上风餐露宿，历经艰辛，几次险些丧命。但他活下来了，带着那把神秘的桃花扇，带着石头和老李头夫妇，带着义兄钱益谦和他的学生们，安全地抵达了这座江南重镇。\n\n\"南京……\"钱益谦望着眼前的城墙，神色复杂，\"终于到了。\"\n\n\"是啊。\"秦大宝说，\"总算到了。\"\n\n方孝孺和他的学生们也长舒了一口气，脸上露出了劫后余生的喜悦。方若兰站在父亲身边，望着这座陌生的城市，眼睛里闪烁着好奇和期待。\n\n只有石头，紧紧攥着秦大宝的衣角，小脸上满是紧张。\n\n\"大宝哥，\"他小声说，\"这里就是南京？\"\n\n\"是。\"秦大宝摸了摸他的头，\"这里就是南京。你娘说的那个南京。\"\n\n石头抬起头，眼睛亮了起来。\n\n\"那……秦淮河在哪里？\"\n\n", "秦大宝愣了一下，然后笑着指向城内的一个方向：\"就在那边。等咱们安顿下来，我就带你去看看。\"\n\n石头用力点了点头，脸上露出了天真的笑容。\n\n五月的阳光洒在南京城上，给这座古老的城市镀上了一层金色的光芒。\n\n秦大宝站在城门前，深吸了一口气。\n\n南京，秦淮河。\n\n新的生活，开始了。\n\n（第四章完，约5500字）\n\n第五章：饭馆开张\n\n南京城的繁华，超出了秦大宝的想象。\n\n进城之后，他才知道什么叫\"江南富庶之地\"。街道宽阔整齐，两旁的店铺鳞次栉比，茶馆、酒楼、布庄、书肆、当铺、药铺……各行各业应有尽有。街上行人如织，有穿长衫的读书人，有挑担的小贩，有坐轿的官宦人家，也有穿金戴银的富商巨贾。叫卖声、吆喝声、讨价还价声交织在一起，热闹非凡。\n\n\"不愧是六朝古都！\"钱益谦感叹道，\"这繁华景象，北方那些城市拍马也赶不上。\"\n\n秦大宝点点头，心里却在盘算着更实际的问题。\n\n他们一行十五人，从陕西一路逃难到南京，身上的盘缠早就花得七七八八了。老李头夫妇的那点积蓄早在路上就用光了，方孝孺变卖家产换来的一些银两也所剩无几。再这样坐吃山空下去，用不了多久，大家就要饿肚子了。\n\n他必须想办法赚钱。\n\n可是，一个从三百多年后穿越来的人，能在这个时代做什么呢？\n\n他没有本钱，没有背景，没有关系，甚至连这个时代的很多规矩都不懂。他唯一拥有的，就是一脑子来自未来的知识和一个不知有什么用的桃花扇。\n\n知识……对了，知识！\n\n秦大宝忽然想到了什么。\n\n他是二十一世纪的历史老师，对明末清初的历史了如指掌。他知道李自成会在什么时候攻破北京，知道吴三桂会在什么时候引清军入关，知道南明小朝廷会在什么时候建立、又会在什么时候覆灭……\n\n这些知识，在普通人眼里毫无用处。但对于那些想要在乱世中趋利避害的人来说，却是无价之宝。\n\n", "可是，他又不能把这些事情到处说。一来没人会相信他这个来历不明的\"穿越者\"；二来，泄露天机这种事情，搞不好会惹来杀身之祸。\n\n他需要找一个更安全的、可以利用现代知识的赚钱方式。\n\n开饭馆。\n\n这个念头忽然从脑海中冒了出来。\n\n他是南京人（穿越前），对南京的饮食文化多少有些了解。而且，他虽然不会做饭，但他知道很多现代的餐饮理念——比如外卖服务、共享经济、会员制度、品牌营销……这些东西在古代闻所未闻，如果运用得当，一定能脱颖而出。\n\n当然，开饭馆需要本钱。他身上没多少钱，但如果能说服钱益谦和方孝孺一起出资，凑一凑应该能凑出开店的启动资金。\n\n当务之急，是找一个合适的铺面。\n\n接下来的几天，秦大宝带着石头在南京城里四处转悠，寻找合适的店面。\n\n南京城很大，分为府城和城外两部分。府城又分为几块：最北边是皇宫和官府衙门，中部是商业区，南边是居民区。秦淮河则流经城南，是整个南京城最繁华的地带——河的两岸遍布酒楼、茶肆、青楼、赌坊，夜夜笙歌，灯火通明。\n\n这就是著名的\"十里秦淮\"。\n\n秦大宝在秦淮河边走了一圈，发现这里的店面租金贵得离谱。一个普通的铺面，月租就要二三十两银子，根本不是他们这些穷光蛋能承受的。\n\n后来，他在一个偶然的机会，发现了一个好地方。\n\n那是在秦淮河的一条支流旁边，靠近水西门附近的一个小巷子里。巷子不深，两旁是普通的民居，住的都是在城里做工的普通百姓。巷子尽头有一间空置的屋子，门脸不大，但位置还算显眼。\n\n秦大宝打听了一下，得知这间屋子的主人是个老寡妇，儿子在外地做官，她一个人在城里住着嫌冷清，想把屋子租出去换些银两养老。租金很便宜——每月只要五两银子。\n\n五两银子，虽然对他们来说也不算少，但咬咬牙还能承受。\n\n秦大宝当场付了一个月的定金，然后把大家叫来商量。\n\n\"我想开一间饭馆。\"他开门见山地说。\n\n\"饭馆？\"钱益谦有些意外，\"秦弟还会做饭？\"\n\n", "\"不会。\"秦大宝老实回答，\"但我会一些……不一样的东西。\"\n\n\"什么不一样的东西？\"\n\n秦大宝把他在路上想好的计划说了出来。\n\n他的计划很简单——开一间面向普通百姓的小饭馆，主打物美价廉的家常菜。但不同的是，他要引入一些\"创新\"的服务模式。\n\n第一，外卖服务。他打算雇佣几个跑腿的小厮，专门给附近的住户和店铺送餐。客户只需要在饭馆下单，就能在家里等着饭菜送上门，不用亲自跑来跑去。\n\n第二，共享马车配送。他攒够钱之后，要买几辆马车，专门用来给远距离的客户送餐。这样一来，饭馆的覆盖面就能从一条巷子扩展到整个南京城。\n\n第三，会员制度。他打算推出一种\"会员卡\"，客户预存一定金额的钱，可以享受打折优惠。这样既能锁定客户，又能提前回笼资金。\n\n第四，特色经营。他打算把饭馆装修成有特色的风格，挂一些字画，摆一些绿植，让客人吃得不只是饭，还有环境和氛围。\n\n钱益谦听完，半晌没说话。\n\n\"秦弟，\"他缓缓开口，\"你这脑子是怎么长的？这些东西，我闻所未闻啊！\"\n\n方孝孺也点了点头：\"确实新颖。老夫活了五十多年，还没见过哪家饭馆这么做的。\"\n\n秦大宝笑了笑，没有解释。\n\n这些东西，在二十一世纪是常识，但在这个时代，却是\"创新\"。他只不过是降维打击而已。\n\n\"那就这么定了？\"他问。\n\n\"定了！\"钱益谦一拍大腿，\"我出钱五两，算我入股！\"\n\n方孝孺想了想，也说：\"我出三两。虽然不多，但也是我的一点心意。\"\n\n老李头夫妇和方孝孺的学生们也纷纷解囊，你出一两，我出五百文，凑来凑去，竟然凑了将近二十两银子。\n\n秦大宝把这些钱收好，心里既感动又沉重。\n\n这是大家最后的积蓄，是他们在乱世中的保命钱。大家愿意把这些钱交给他，是因为信任他。他绝不能让大家失望。\n\n接下来的半个月，是秦大宝穿越以来最忙的一段时间。\n\n", "他先找了几个工匠，把那间空置的屋子好好地装修了一番。屋子不大，只能摆五六张桌子，但他要求工匠把墙壁刷得雪白，地面铺上青砖，窗户装上明亮的玻璃——是的，玻璃窗，这在当时的饭馆里是绝无仅有的。他还从旧货市场淘了一些字画和绿植，把饭馆布置得简洁而雅致。\n\n然后，他去租了一口大锅、几套碗筷和一些厨具，又去菜市场买了一些米面油盐和新鲜蔬菜。\n\n至于厨师——他不会做饭，但他认识一个会做饭的人。\n\n那是在水西门附近的一个菜市场里，秦大宝遇到了一个卖烧饼的中年汉子。汉子姓马名大勺，是个独臂的残疾人，但烧饼做得非常好吃。秦大宝买了他几个烧饼，边吃边和他聊天，得知他以前是南京城里一家大酒楼的厨师，后来因为得罪了东家被赶了出来，这才流落到菜市场卖烧饼。\n\n\"老马，\"秦大宝问，\"你想不想换个地方干活？\"\n\n马大勺愣了一下：\"换什么地方？\"\n\n\"我开了一间饭馆，正缺一个厨师。\"秦大宝说，\"你要是愿意，就来我这儿干。工钱好商量。\"\n\n马大勺狐疑地看了他一眼：\"你那饭馆叫什么名字？\"\n\n\"还没取名呢。\"秦大宝说，\"要不……你给取一个？\"\n\n马大勺想了想，说：\"就叫'秦记'吧。你姓秦，简单好记。\"\n\n\"秦记……\"秦大宝念了念，\"好，就叫秦记饭馆！\"\n\n五月中旬，\"秦记饭馆\"正式开张了。\n\n开张那天，秦大宝在门口挂了一块红绸，贴了一副对联：\n\n上联：秦淮河畔尝百味\n\n下联：记里坊间暖千家\n\n横批：宾至如归\n\n这副对联是他自己编的，虽然对仗不算工整，但意思还算贴切。\n\n他还让马大勺做了几道拿手好菜——红烧肉、清蒸鱼、炒青菜、蛋花汤，都是家常菜，但色香味俱全，价格也很便宜。\n\n开张的第一天，生意不算好，也不算差。来了十几桌客人，大多是附近的街坊邻居，有的是来尝鲜的，有的是来捧场的。大家对饭馆的装修和环境赞不绝口，但对\"外卖服务\"这个新概念还有些陌生。\n\n\"啥？饭菜还能送到家里去？\"有人好奇地问。\n\n", "\"能。\"秦大宝笑着解释，\"您在我们这儿点菜，我们派人给您送到家里去，饭菜还是热的。您要是懒得出门，或者家里来了客人不方便做饭，就叫我们的外卖，保证又快又好！\"\n\n\"那……怎么叫？\"\n\n\"您只需要派个人来说一声，或者让街上的小厮跑一趟腿就行。我们收费也很便宜，比您亲自来吃多不了几个钱。\"\n\n那人将信将疑地点了点头，说：\"那下次试试。\"\n\n秦大宝知道，创新需要时间让大家接受。他不着急，慢慢来。\n\n开张的第二天，一个意外的客人让秦大宝的生意出现了转机。\n\n那是一个穿着华丽的商人，坐着轿子来的，一进门就要最好的包间、最好的菜。秦大宝亲自接待了他，殷勤备至。\n\n\"客官想吃点什么？\"他问。\n\n\"把你们店里最好的菜都端上来！\"商人挥了挥手，一副财大气粗的样子，\"银钱不是问题！\"\n\n秦大宝不敢怠慢，让马大勺做了七八道拿手好菜，又亲自给商人斟茶倒水。商人吃得满嘴流油，连连叫好。\n\n吃完饭，商人问：\"多少钱？\"\n\n\"一共二两银子。\"秦大宝说。\n\n\"这么便宜？\"商人有些意外，\"我还以为至少要五六两。\"\n\n\"我们饭馆走的是薄利多销的路子。\"秦大宝笑道，\"菜好价实，童叟无欺。\"\n\n商人点点头，从袖子里掏出一锭银子放在桌上：\"这是五两，不用找了。多的算你的赏钱。\"\n\n秦大宝连忙道谢。\n\n商人正要离开，忽然看到了墙角挂着的\"外卖服务\"的牌子，来了兴趣：\"这是什么？\"\n\n秦大宝把外卖服务的模式详细解释了一遍，商人听完，眼睛一亮。\n\n\"有意思！\"他说，\"我在城东开了一间绸缎庄，平时忙着做生意，吃饭都是让伙计去外面买回来。有时候生意忙起来，连吃饭的时间都没有。如果你们能给我送餐，那我可就省事多了！\"\n\n\"完全可以！\"秦大宝说，\"客官留下地址，我每天派小厮给您送饭。您想吃什么，提前说一声就行。\"\n\n\"好！\"商人当场和秦大宝定下了送餐协议，\"每天午时和酉时，各送一顿。一个月多少钱？\"\n\n", "秦大宝想了想，报了个价：\"每月三两，包括每日的两顿正餐，外加茶水点心。\"\n\n\"成交！\"商人爽快地付了定金。\n\n这第一笔\"外卖订单\"，就这样谈成了。\n\n接下来的几天，秦大宝又接连接了几笔类似的订单。他的外卖服务渐渐有了名气，很多附近的商户和住户都来询问。\n\n他还推出了\"会员卡\"制度——客户预存五两银子，可以成为\"秦记\"的会员，享受九折优惠；预存十两，可以成为\"贵宾会员\"，享受八五折优惠；预存二十两，可以成为\"钻石会员\"，享受八折优惠，而且可以优先预订包间、优先享受送餐服务。\n\n这种\"先收钱后消费\"的模式，在当时简直是闻所未闻。很多人觉得新奇，但也有人担心被骗，不敢预存太多钱。\n\n秦大宝不着急。他知道，口碑需要慢慢积累。\n\n开张半个月后，秦记饭馆的生意渐渐稳定下来。每天能接待二三十桌客人，外卖订单也从最初的零星几单增加到了十几单。每个月的净利润，虽然不算丰厚，但足够养活这十几口人了。\n\n更重要的是，他开始攒钱了。\n\n按照他的计划，等攒够了本钱，他就要买马车、扩大经营，把外卖服务从巷子里扩展到整个南京城。\n\n那时候，\"秦记\"就不只是一间小饭馆，而是一个商业网络的雏形了。\n\n（第五章完，约5500字）\n\n第六章：八艳初识\n\n秦记饭馆开业一个多月后，秦大宝终于有时间去秦淮河边走走了。\n\n南京的六月，已经是初夏时节。秦淮河的水在阳光下泛着粼粼波光，河面上画舫点点，丝竹声声。两岸的楼阁在绿树的掩映下若隐若现，青砖黛瓦，飞檐翘角，透着一股说不出的风流韵味。\n\n这就是著名的\"十里秦淮\"。\n\n秦大宝站在秦淮河畔的文德桥上，看着眼前的景色，心中感慨万千。\n\n他想起了那把扇子上的诗句——\"千古秦淮东逝水，桃花扇底送南明。\"如今，他终于来到了诗句中所描绘的地方。\n\n\"千古秦淮东逝水……\"他喃喃地念着，思绪飘远。\n\n", "四百年后的秦淮河，早已没有了这种古典的风韵。那里只剩下窄窄的河道和两旁的仿古建筑，以及络绎不绝的游客。真正的秦淮河，在历史的变迁中消失得无影无踪。\n\n而眼前这条河，是真的。\n\n是真的秦淮河。\n\n是真的明末。\n\n是真的乱世。\n\n\"大宝哥！\"石头的声音从身后传来，\"你怎么一个人跑出来了？\"\n\n秦大宝回过头，看到石头正气喘吁吁地跑过来，身后还跟着方若兰。\n\n\"我出来透透气。\"他笑了笑，\"饭馆里闷得慌。\"\n\n\"我也想透透气。\"石头跑到他身边，趴在桥栏上，好奇地打量着河面上的画舫，\"大宝哥，那些船好漂亮啊！\"\n\n\"那是画舫。\"秦大宝解释道，\"秦淮河上特有的一种游船。坐在上面可以听曲看戏，赏景品茗，是南京城里最时兴的娱乐。\"\n\n\"我听说秦淮河上有'八艳'，\"方若兰忽然开口，声音轻轻的，\"是整个江南最有名的八位才女，是不是真的？\"\n\n秦大宝看了她一眼，点点头：\"是真的。\"\n\n关于秦淮八艳，秦大宝当然不陌生。他是个历史老师，对这段历史了如指掌。秦淮八艳指的是明末清初活跃在秦淮河畔的八位名妓——柳如是、董小宛、李香君、顾横波、卞玉京、寇白门、马湘兰、陈圆圆。她们不仅美貌绝伦，而且才情出众，诗词歌赋、琴棋书画样样精通，是那个时代最耀眼的女性。\n\n更重要的是，她们中的很多人都和明末清初的政治风云有着千丝万缕的联系。柳如是嫁给了大文豪钱谦益，董小宛嫁给了\"明末四公子\"之一的冒辟疆，李香君血溅桃花扇的故事更是流传千古。\n\n\"她们都住在秦淮河畔吗？\"方若兰好奇地问。\n\n\"大部分是的。\"秦大宝说，\"她们大多住在河两岸的青楼画舫里，专门接待文人墨客和达官贵人。\"\n\n方若兰低下头，若有所思。\n\n秦大宝看出了她的心思，轻声说：\"若兰，我知道你想去看看。但那些地方……不太适合你。\"\n\n\"我知道。\"方若兰轻声说，\"我只是想……好奇而已。\"\n\n", "石头忽然指着河面上的一艘画舫叫了起来：\"大宝哥！你看！那艘船上有人在唱曲！\"\n\n秦大宝顺着石头指的方向看去，果然看到一艘装饰华丽的画舫正从河面上缓缓驶过。画舫的船舱里，一个年轻女子正在抚琴轻唱，声音婉转动听，引得两岸的行人纷纷驻足观看。\n\n\"那是谁？\"秦大宝问身边的一个路人。\n\n\"那是马湘兰马大家！\"路人的眼睛亮了起来，\"今儿个是她'兰香阁'开张的日子，她在画舫上设宴待客呢！据说城里的文人墨客都去了！\"\n\n马湘兰。秦大宝心里一动。\n\n马湘兰是秦淮八艳之一，以画兰闻名，据说她的兰花画得极好，有\"兰圣\"之称。没想到今日竟然能在这里遇到。\n\n\"走，咱们去看看。\"秦大宝对石头和方若兰说。\n\n三人沿着河岸走了一段路，来到了一座临水的楼阁前。楼阁高两层，雕梁画栋，门口挂着一块匾额，上书\"兰香阁\"三个大字，笔力遒劲，据说是哪位名家所题。\n\n楼阁的门口已经聚集了不少人，大多是文人墨客打扮，穿着长衫，手持折扇，三五成群地交头接耳。楼阁里面隐隐传出丝竹声和人声，热闹非凡。\n\n\"好多人啊！\"石头踮着脚尖往里张望，\"他们都在干什么？\"\n\n\"在等着见马大家。\"一个穿着青衫的年轻人回过头来，看了石头一眼，又看了看秦大宝和方若兰，\"你们是外地来的吧？今儿个是马大家的好日子，她要在阁里举办'兰花诗会'，邀请南京城的文人墨客前来吟诗作对。听说第一名可以获得马大家的亲笔兰花图一幅，价值连城呢！\"\n\n\"兰花诗会？\"秦大宝来了兴趣，\"怎么参加？\"\n\n\"交十两银子的入场费，就能进去。\"年轻人说，\"不过……\"\n\n他打量了一下秦大宝的装束，有些迟疑地说：\"这位兄台，看你的打扮……不像是有钱人。十两银子可不是小数目啊。\"\n\n秦大宝笑了笑。他确实没什么钱——秦记饭馆虽然生意不错，但一个多月下来，他攒下的净利润也不过十几两银子。十两银子的入场费，对他来说还是有些奢侈的。\n\n", "\"算了，咱们还是回去吧。\"他对方若兰和石头说，\"看看热闹就行了，不必花那个冤枉钱。\"\n\n\"可是……\"石头有些失望，\"我想看看马大家长什么样……\"\n\n\"以后有的是机会。\"秦大宝摸了摸石头的头，\"等你大宝哥赚了大钱，带你天天来！\"\n\n三人正要走，忽然听到身后传来一个清脆的声音：\n\n\"这位公子，请留步。\"\n\n秦大宝回过头，只见一个年轻女子正从楼阁里走出来。\n\n那女子约莫二十岁上下，身穿一袭淡紫色的罗裙，腰间系着一条白色的丝带，头发挽成一个流云髻，斜插着一支玉簪。她的容貌算不上绝美，但五官清秀，气质出尘，尤其是那双眼睛，明亮如水，顾盼生辉。\n\n\"你是……\"秦大宝有些疑惑。\n\n\"小女子是马大家的侍女，名叫翠儿。\"女子福了一福，\"我家小姐方才在楼上看到公子，觉得公子气度不凡，想请公子上楼一叙。\"\n\n\"我？\"秦大宝更疑惑了，\"我不认识你家小姐啊，她怎么会邀请我？\"\n\n翠儿抿嘴一笑：\"公子有所不知。我家小姐最喜结交天下英才，方才看到公子站在人群中，虽然衣着朴素，但气宇轩昂，谈吐不凡，便想与公子结交一番。公子若是不弃，请上楼饮一杯茶，如何？\"\n\n秦大宝犹豫了一下，看了看方若兰。\n\n方若兰微微点头，轻声说：\"大宝，去吧。我带石头先回去。\"\n\n\"那……好吧。\"秦大宝点点头，转向翠儿，\"有劳姑娘带路。\"\n\n兰香阁的二楼上，一间雅致的房间里，秦大宝终于见到了传说中的马湘兰。\n\n马湘兰坐在一张古琴后面，正在轻轻拨弄琴弦。她约莫三十来岁，容貌算不上绝美，但自有一股成熟女人的风韵。她的眼睛很特别，又黑又亮，像是两潭深不见底的秋水，让人一看就忍不住想要沉溺其中。\n\n\"公子请坐。\"她抬起头，看了秦大宝一眼，嘴角微微上扬，\"翠儿，上茶。\"\n\n", "秦大宝在翠儿搬来的椅子上坐下，打量着房间的陈设。房间不大，但布置得极为雅致。墙上挂着几幅兰花图，笔法细腻，栩栩如生；角落里摆着一盆素心兰，正在盛放，清香四溢；窗边有一张书案，案上放着笔墨纸砚，还有几本线装书。\n\n\"公子贵姓？\"马湘兰问。\n\n\"在下秦大宝。\"秦大宝拱手道，\"今日冒昧叨扰，还请马大家见谅。\"\n\n\"秦公子客气了。\"马湘兰微微一笑，\"是我请公子来的，该是我叨扰才对。\"\n\n\"不知马大家为何要请在下来？\"秦大宝直接问道，\"在下与马大家素昧平生，这……\"\n\n\"公子可听说过一句话？\"马湘兰忽然问。\n\n\"什么话？\"\n\n\"'物以类聚，人以群分。'\"马湘兰说，\"我观公子的气度，不像是一般的凡夫俗子。公子的眼神里，有一种……我说不上来的东西。\"\n\n\"什么东西？\"\n\n马湘兰沉吟片刻，说：\"像是……见过很多事的样子。不是那种道听途说的'见过'，而是真正亲身经历过的'见过'。\"\n\n秦大宝心里一凛，面上却不动声色：\"马大家过奖了。在下不过是个开饭馆的普通人，哪有什么经历。\"\n\n\"开饭馆？\"马湘兰来了兴趣，\"南京城里的饭馆成千上万，能让马某另眼相看的人可不多。公子的饭馆叫什么名字？\"\n\n\"秦记饭馆。\"\n\n\"秦记饭馆……\"马湘兰念了念，忽然笑了，\"我听说过这个名字。据说公子的饭馆推出了一种叫'外卖'的服务，还发行什么'会员卡'，在南京城里引起了不小的轰动？\"\n\n\"马大家消息灵通。\"秦大宝有些意外。\n\n\"秦淮河畔，三教九流，无所不有。\"马湘兰说，\"什么消息传不到我耳朵里？\"\n\n她端起茶杯，轻轻抿了一口，然后说：\"秦公子，我今日请你来，有一事相求。\"\n\n\"马大家请说。\"\n\n", "\"我想和公子合作。\"马湘兰说，\"我的兰香阁每天要接待很多客人，这些客人里面有很多是达官贵人和富商巨贾。他们吃饭、喝酒、听曲、看戏，开销很大。如果公子愿意，我可以介绍他们到公子的饭馆去消费。当然，我也不是白介绍的——每介绍一单生意，我要抽两成的成。\"\n\n秦大宝想了想，觉得这笔买卖可以做。\n\n马湘兰的客人都是有钱人，消费能力强。如果能把这些人吸引到秦记饭馆来，他的生意肯定能更上一层楼。而且，有马湘兰这个秦淮名妓做背书，秦记饭馆的名气也能更大。\n\n\"成交。\"秦大宝说。\n\n\"痛快。\"马湘兰满意地点点头，\"我就喜欢和爽快人打交道。\"\n\n\"不过，在下也有一个条件。\"秦大宝忽然说。\n\n\"什么条件？\"\n\n\"日后若是马大家想吃秦记的饭菜，只需派人来说一声，我亲自给您送上门。\"秦大宝说，\"不收钱。\"\n\n马湘兰愣了一下，然后笑了：\"秦公子果然与众不同。\"\n\n\"那就这么定了？\"秦大宝问。\n\n\"定了。\"马湘兰伸出手，\"击掌为誓？\"\n\n秦大宝伸出手，和她击了一掌。\n\n从兰香阁出来，秦大宝心情大好。\n\n他没想到，一次偶然的相遇，竟然给他带来了一个意想不到的合作伙伴。有了马湘兰的支持，秦记饭馆的生意肯定会越来越好。\n\n他沿着秦淮河往回走，一边走一边想着下一步的计划。\n\n外卖服务已经有了起色，但规模还是太小。他需要更多的马车、更多的跑腿小厮，把送餐网络覆盖到整个南京城。等攒够了钱，他还要开分店，把秦记做成南京城里最大的餐饮品牌。\n\n正当他沉浸在美好的憧憬中时，忽然听到前方传来一阵喧哗声。\n\n\"抓住她！别让她跑了！\"\n\n\"快！从那边包抄！\"\n\n秦大宝抬头看去，只见前方的街口聚集了一群人，正对着什么人大呼小叫。他挤进人群一看，只见几个家丁模样的人正在追捕一个年轻女子。\n\n那女子约莫十七八岁，穿着一身淡蓝色的衣裙，头发散乱，脸上带着惊恐的神色。她拼命地往前跑，但脚下一滑，摔倒在地。\n\n", "\"抓住她！\"领头的家丁狞笑着扑上来，\"看你往哪儿跑！\"\n\n那女子挣扎着想爬起来，但已经来不及了——几个家丁一拥而上，把她按倒在地。\n\n\"放开我！\"女子大喊，\"你们认错人了！我不是……\"\n\n\"不是？\"领头的家丁冷笑一声，\"你从我家院子里跑出来，还说不是？给我带走！\"\n\n秦大宝看着这一幕，眉头紧皱。\n\n他不知道这女子是什么来历，也不知道她和那几个家丁之间有什么瓜葛。但直觉告诉他，这事情有些蹊跷——那女子穿着普通，但皮肤白皙，手指细嫩，一看就不是干粗活的下人。更重要的是，她的眼神里没有心虚，只有恐惧和委屈。\n\n\"且慢！\"他忍不住出声喊道。\n\n几个家丁愣了一下，纷纷回过头来。\n\n\"你是谁？\"领头的家丁打量着他，\"少管闲事！\"\n\n\"在下只是觉得奇怪。\"秦大宝说，\"这位姑娘说她不是你们要找的人，你们凭什么抓她？\"\n\n\"她是我家老爷的小妾，偷了老爷的银子想跑！\"家丁说，\"这事和你有什么关系？\"\n\n\"小妾？\"秦大宝看向那女子，\"姑娘，你是他的小妾吗？\"\n\n那女子拼命摇头：\"不是！我不是！我只是……我只是……\"\n\n\"你只是什么？\"秦大宝追问。\n\n女子咬了咬嘴唇，眼泪忽然流了下来：\"我只是个卖艺的……是他们硬把我抢来的……求求你，救救我……\"\n\n秦大宝心里一沉。\n\n强抢民女。这在明末的乱世里，并不是什么稀奇的事情。那些有权有势的大户人家，看上了哪家姑娘，直接派人抢回去的事屡见不鲜。\n\n\"听到了吗？\"他转向那领头的家丁，\"这位姑娘说她是被人抢来的。\"\n\n\"她放屁！\"家丁恼羞成怒，\"兄弟们，给我连这个人一起打！\"\n\n几个家丁挥舞着拳头向秦大宝扑来。秦大宝虽然不会武功，但他毕竟年轻力壮，而且在这个时代待了一个多月，也学了一些基本的防身技巧。他侧身一闪，躲过了第一个家丁的拳头，然后一脚踢在了他的膝盖上。\n\n那家丁惨叫一声，摔倒在地。\n\n", "其他几个家丁见状，愣了一下，然后更加凶狠地扑了上来。秦大宝寡不敌众，很快就被按倒在地，一顿拳打脚踢。\n\n\"让你多管闲事！\"领头的家丁一边踢一边骂，\"找死是不是！\"\n\n秦大宝抱着头，蜷缩在地上，任由他们踢打。\n\n他知道自己在做一件蠢事——为了一个素不相识的女子得罪权贵，这实在不是什么明智的选择。但他就是忍不住。\n\n那个女子的眼神让他想起了方若兰，想起了李香兰，想起了这个乱世中所有被欺凌的女性。\n\n\"住手！\"\n\n一个清脆的声音忽然响起。\n\n踢打停止了。秦大宝从地上爬起来，抹了抹嘴角的血迹，抬头看去。\n\n只见一个年轻女子正从人群中走出来。她约莫二十岁上下，身穿一袭水绿色的长裙，腰间系着一条银色的丝带，头发挽成一个堕马髻，斜插着一支碧玉簪。她的容貌清丽绝伦，皮肤白皙如玉，眉目如画，气质高雅。\n\n最让秦大宝震撼的是她的眼睛——那是一双又黑又亮的眼睛，像是夜空中最明亮的星星，又像是深潭中最清澈的泉水，让人一看就移不开目光。\n\n\"你是谁？\"领头的家丁看着那女子，\"关你什么事？\"\n\n\"我是蓝百合。\"女子淡淡地说，\"这座桥归我管。你们在我的地盘上闹事，是不是太不给我面子了？\"\n\n\"蓝百合？\"家丁的脸色变了，\"你是……秦淮八艳的蓝大家？\"\n\n\"不错。\"蓝百合微微颔首，\"回去告诉你们家老爷，就说这位姑娘我留下了。有什么话，让他亲自来找我。\"\n\n\"这……\"家丁面露难色，\"蓝大家，这姑娘是我们老爷花了三百两银子买来的，您这么做……\"\n\n\"三百两？\"蓝百合冷笑一声，\"我给你六百两，把人交给我。\"\n\n\"这……\"家丁犹豫了一下，看了看蓝百合，又看了看秦大宝，最终咬了咬牙，\"好！蓝大家既然开口了，我们也不敢不给面子。这姑娘，您带走！\"\n\n说罢，他招呼手下人，头也不回地走了。\n\n蓝百合转过身，看着那个被救下的女子，轻声说：\"没事了，跟我走吧。\"\n\n那女子感激涕零，连连道谢。\n\n", "蓝百合扶起她，正要走，忽然想起了什么，转过身来，看着秦大宝。\n\n\"你叫什么名字？\"她问。\n\n\"秦……秦大宝。\"秦大宝说。\n\n\"秦大宝？\"蓝百合念了念，嘴角微微上扬，\"你倒是胆子不小。为了一个素不相识的女子，敢和那些人动手。\"\n\n\"路见不平，拔刀相助。\"秦大宝说，\"换作是任何人，都会这么做的。\"\n\n\"任何人？\"蓝百合似笑非笑地看着他，\"未必。\"\n\n她深深地看了秦大宝一眼，然后说：\"你受伤了。跟我来，我那里有跌打损伤的药。\"\n\n\"这……不太方便吧？\"\n\n\"有什么不方便的？\"蓝百合说，\"你救了我的妹妹，我请你喝杯茶、敷敷药，难道不应该吗？\"\n\n秦大宝想了想，点了点头：\"那就多谢蓝大家了。\"\n\n蓝百合微微一笑，转身向河边走去。\n\n那被救的女子跟在她身后，秦大宝也跟了上去。\n\n走了几步，秦大宝忽然想起了什么，回头看了一眼。\n\n人群中，有一个穿着青衫的身影正静静地站在那里，望着他离去的方向。\n\n那是钱益谦。\n\n钱益谦看着他，嘴角带着一丝意味深长的笑容，然后转身消失在人群中。\n\n秦大宝愣了一下，心里隐隐有些不安。\n\n那个蓝百合……钱益谦为什么要看她？\n\n但他很快就打消了这个念头。也许只是巧合吧。\n\n他转过头，跟着蓝百合向前走去。\n\n夕阳的余晖洒在秦淮河上，把河水染成了一片金红。\n\n河畔的楼阁在落日的映照下，显得格外美丽。\n\n这就是秦淮河畔。\n\n这就是明末的南京。\n\n这就是他新生活的开始。\n\n（第六章完，约5800字）\n\n第七章：情感萌芽\n\n蓝百合住的地方叫\"紫烟阁\"，是秦淮河畔一座精致的小楼。\n\n楼不高，只有两层，但布置得极为雅致。门前种着几竿修竹，青翠欲滴；窗下放着一盆兰花，清香四溢。整个建筑透露着一股出尘的气质，和秦淮河畔其他青楼画舫的喧嚣浮华截然不同。\n\n\"这里是我的住处。\"蓝百合推开门，侧身让秦大宝进去，\"平时不见客，只有少数几个朋友能进来。你是第三个。\"\n\n", "\"第三个？\"秦大宝有些意外，\"在下何德何能？\"\n\n蓝百合没有回答，只是微微一笑：\"坐吧。\"\n\n房间里陈设简单，但处处透着主人的品味。一张檀木书案靠在窗边，案上摆着笔墨纸砚和几本线装书；墙上挂着一幅字，写的是李清照的《一剪梅》：\"红藕香残玉簟秋，轻解罗裳，独上兰舟。云中谁寄锦书来？雁字回时，月满西楼。\"\n\n字迹娟秀清丽，一看就是女子的手笔。\n\n\"是你写的？\"秦大宝问。\n\n\"是。\"蓝百合给他倒了一杯茶，\"闲来无事，写着玩的。\"\n\n秦大宝接过茶杯，喝了一口。茶是上好的龙井，入口清香，回味悠长。\n\n\"好茶。\"他由衷地赞叹。\n\n\"喜欢就好。\"蓝百合坐在他对面，仔细打量着他的伤势，\"你脸上的伤不轻，得好好敷药。\"\n\n她从柜子里取出一个瓷瓶，倒出一些药膏，轻轻地涂在秦大宝的伤口上。她的手指又凉又软，触碰到他的皮肤时，让他不由自主地紧张起来。\n\n\"疼吗？\"蓝百合问。\n\n\"不疼。\"秦大宝说，\"多谢蓝大家。\"\n\n\"叫我百合就行。\"蓝百合说，\"'大家'什么的，太客气了。\"\n\n\"那……百合。\"秦大宝念了念这个名字，\"这名字很好听。\"\n\n蓝百合的嘴角微微上扬：\"我娘给我取的。她说，百合花象征着纯洁和永恒，希望我能一辈子保持一颗纯净的心。\"\n\n\"你娘一定是个很有文化的人。\"秦大宝说。\n\n\"是。\"蓝百合的眼神黯淡下来，\"可惜她走得早。我五岁那年，她就去世了。\"\n\n\"抱歉，我不知道……\"\n\n\"没关系。\"蓝百合摇摇头，\"都是很久以前的事了。\"\n\n她涂好药，站起身来，走到窗边，望着窗外的秦淮河。\n\n夕阳的余晖洒在她的侧脸上，给她的轮廓镀上了一层金色的光芒。秦大宝看着她的背影，心里忽然涌起一股奇怪的感觉。\n\n那是一种似曾相识的感觉。\n\n\"你……\"蓝百合忽然开口，却没有说完。\n\n\"我什么？\"\n\n\"没什么。\"蓝百合转过身来，微微一笑，\"只是觉得，你很像一个人。\"\n\n\"像谁？\"\n\n", "\"一个……我认识的人。\"蓝百合说，\"他也是个读书人，说话的方式和你很像。\"\n\n秦大宝心里一动：\"那个人是谁？\"\n\n蓝百合沉默了片刻，然后轻声说：\"他已经不在了。\"\n\n气氛忽然有些凝重。\n\n秦大宝不知道该说什么，只能默默地喝茶。\n\n\"对了，\"蓝百合打破了沉默，\"你还没告诉我，你是怎么来到南京的？\"\n\n秦大宝想了想，决定半真半假地说：\"我从西安来，一路上经历了很多磨难，好不容易才到了南京。现在在城里开了一间小饭馆，勉强糊口。\"\n\n\"饭馆？\"蓝百合来了兴趣，\"什么饭馆？\"\n\n\"秦记饭馆。\"\n\n\"秦记饭馆……\"蓝百合念了念，忽然笑了，\"我听说过这个名字。据说你们推出了'外卖'服务，还发行什么'会员卡'，在南京城里引起了不小的轰动？\"\n\n\"是。\"秦大宝有些意外，\"你消息很灵通。\"\n\n\"秦淮河畔，什么消息传不到我耳朵里？\"蓝百合说，\"我听说，你们的菜做得很好吃，什么时候让我尝尝？\"\n\n\"随时欢迎。\"秦大宝说，\"只要百合想吃的，我亲自给你送。\"\n\n蓝百合看着他，眼神有些复杂：\"你这个人……倒是和其他人不一样。\"\n\n\"怎么不一样？\"\n\n\"其他人接近我，要么是为了我的美貌，要么是为了我的才名，要么是为了……\"她顿了顿，没有说下去。\n\n\"为了什么？\"\n\n\"为了我的钱。\"蓝百合冷笑一声，\"我在秦淮河畔这么多年，见过太多人了。那些表面上文质彬彬的读书人，一转身就露出了贪婪的本性。他们写诗夸我美貌，转头就去和别人攀比谁给我的赏钱多；他们说仰慕我的才情，其实只是想把我当成炫耀的资本。\"\n\n秦大宝沉默了。\n\n他不知道该说什么。他相信蓝百合说的是真的——在这个物欲横流的社会里，真心本来就是个稀缺品。\n\n\"但你不一样。\"蓝百合忽然说。\n\n\"我？\"\n\n\"是。\"蓝百合看着他，\"你救人的时候，根本不知道会有什么回报。你挨打的时候，也没有想过要退缩。你请我吃饭，只是因为一时兴起，不求任何回报。\"\n\n", "\"你怎么知道我不求回报？\"\n\n\"直觉。\"蓝百合说，\"我在这行当里摸爬滚打了这么多年，看人还是很准的。你是个好人，秦大宝。\"\n\n秦大宝被她的直白弄得有些不好意思：\"百合过奖了。\"\n\n\"不是过奖，是实话。\"蓝百合说，\"从今以后，你就是我的朋友了。有什么需要帮忙的，尽管开口。\"\n\n\"那……多谢了。\"秦大宝说。\n\n\"不用谢。\"蓝百合微微一笑，\"你帮了我妹妹，我帮你也是应该的。\"\n\n\"对了，你那个妹妹……\"秦大宝忽然想起，\"她叫什么名字？怎么会被人抓走？\"\n\n蓝百合叹了口气：\"她叫小翠，是我从小的朋友。我们都是孤儿，在同一个倡寮里长大。后来我到了秦淮河畔，想办法把她赎了出来，让她在我身边做些轻省的活计。没想到……\"\n\n\"没想到她被人看上了？\"\n\n\"是。\"蓝百合的眼神变得冰冷，\"城里有个姓王的盐商，看上了她的美貌，出钱买通了她所在的倡寮，把她抢了去。我找了很久才找到她，今天正好遇到你出手相救。\"\n\n\"那个盐商……\"秦大宝有些担心，\"他不会来找麻烦吧？\"\n\n\"他不敢。\"蓝百合冷笑一声，\"我在秦淮河畔也有些根基，不是他一个盐商能惹得起的。\"\n\n秦大宝点点头，心里却隐隐有些担忧。\n\n他知道，这个时代的商人虽然有钱，但社会地位并不高。一个盐商敢光天化日之下强抢民女，背后肯定有人撑腰。蓝百合虽然有些名气，但真要和那些权贵硬碰硬，吃亏的未必是对方。\n\n\"别担心了。\"蓝百合似乎看出了他的心思，\"这点小事，我还应付得来。\"\n\n\"那就好。\"秦大宝说。\n\n\"天色不早了，\"蓝百合站起身来，\"你该回去了。改天有空，来我这里坐坐。\"\n\n\"好。\"秦大宝也站起来，\"那我先告辞了。\"\n\n他向门口走去，走到门口时，忽然回过头来。\n\n\"百合。\"\n\n\"嗯？\"\n\n\"你刚才说，我像一个人。\"秦大宝说，\"那个人……对你很重要吗？\"\n\n蓝百合愣了一下，然后轻声说：\"很重要。\"\n\n\"他是怎么死的？\"\n\n", "蓝百合沉默了片刻，然后说：\"他是被乱兵杀死的。\"\n\n\"对不起。\"\n\n\"没什么好对不起的。\"蓝百合说，\"那是三年前的事了。\"\n\n\"三年前……\"秦大宝心里一动，\"那是……\"\n\n\"崇祯十四年。\"蓝百合说，\"那一年，清军南下，攻破了凤阳。乱兵所过之处，烧杀抢掠，无恶不作。他……他是为了救我，被乱兵杀死的。\"\n\n秦大宝沉默了。\n\n他想起了1641年（崇祯十四年）清军第二次入塞的历史。那一次，清军深入中原腹地，攻破了济南、凤阳等重镇，掠走人口三十余万，创造了明清战争史上的记录。\n\n\"他叫什么名字？\"秦大宝问。\n\n\"沈怀远。\"蓝百合说，\"他是个书生，也是我……这辈子唯一爱过的人。\"\n\n秦大宝看着蓝百合的眼睛，看到了深深的悲伤和思念。\n\n\"他一定是个很好的人。\"他说。\n\n\"是。\"蓝百合轻声说，\"他是这世上最好的人。\"\n\n两人对视了片刻，然后秦大宝转身离去。\n\n走出紫烟阁的时候，天已经黑了。\n\n秦淮河上的画舫点起了灯笼，灯火辉煌，丝竹声声。秦大宝沿着河岸往回走，心里却久久不能平静。\n\n蓝百合……\n\n她是个奇女子。\n\n她美丽、聪明、善良，但又有着不为人知的悲伤。她在这风月场所里摸爬滚打，却始终保持着一颗纯净的心。\n\n她让他想起了李香兰。\n\n不，不一样。\n\n李香兰是现代的，是明亮的，是充满活力的；而蓝百合是古代的，是忧郁的，是让人忍不住想要心疼的。\n\n他对蓝百合是什么感情？\n\n他不知道。\n\n他只知道，今天见到她的时候，他的心跳加速了。\n\n这是对李香兰的背叛吗？\n\n他不知道。\n\n他只知道，他来到了这个时代，有些事情，已经身不由己了。\n\n回到秦记饭馆的时候，已经是深夜了。\n\n饭馆已经打烊，只有几个伙计还在收拾桌椅。钱益谦坐在柜台后面看书，看到秦大宝回来，放下书，意味深长地笑了笑。\n\n\"回来了？\"\n\n\"回来了。\"秦大宝说。\n\n\"见到蓝百合了？\"\n\n\"见到了。\"\n\n\"怎么样？\"\n\n\"什么怎么样？\"\n\n", "\"她是个什么样的人？\"钱益谦问。\n\n秦大宝想了想，说：\"是个……很好的女人。\"\n\n钱益谦看着他的表情，忽然笑了：\"秦弟，你动心了？\"\n\n\"没有！\"秦大宝连忙否认，\"我只是……\"\n\n\"只是什么？\"\n\n\"只是觉得她很特别。\"秦大宝说，\"和其他人不一样。\"\n\n\"当然不一样。\"钱益谦说，\"她是秦淮八艳之首，才貌双全，多少达官贵人想见她一面都见不到。你能让她另眼相看，是你的福气。\"\n\n\"可她是……\"秦大宝犹豫了一下，\"她是那种地方的人。\"\n\n\"那种地方怎么了？\"钱益谦说，\"出淤泥而不染，濯清涟而不妖。她虽然身在青楼，但洁身自好，从不趋炎附势。这样的女子，比那些道貌岸然的大家闺秀强多了。\"\n\n秦大宝沉默了。\n\n他知道钱益谦说的是对的。蓝百合虽然身在风尘，但她的品格和才情，远非一般的女子可比。\n\n\"秦弟，\"钱益谦拍了拍他的肩膀，\"你是个聪明人，应该知道什么才是最重要的。身份地位，不过是身外之物。真正的感情，不应该被这些东西束缚。\"\n\n\"可是……\"秦大宝欲言又止。\n\n\"可是什么？\"\n\n\"可是我在想一个人。\"秦大宝终于说出了心里话，\"她是我在……老家认识的。我们一起看过一场戏，然后就……\"\n\n他没有把话说完，但钱益谦已经明白了他的意思。\n\n\"你和她……有婚约？\"\n\n\"还没有。\"秦大宝说，\"但我们……\"\n\n\"那你打算怎么办？\"钱益谦问，\"是回去找她，还是……\"\n\n\"我不知道。\"秦大宝说，\"我甚至不知道还能不能回去。\"\n\n钱益谦沉默了。\n\n他不知道秦大宝口中的\"回去\"是什么意思，但他能感受到秦大宝的迷茫和痛苦。\n\n\"秦弟，\"他说，\"有些事情，不是你想怎样就能怎样的。命运这东西，往往出人意料。你现在想得再多，也没用。不如顺其自然，走一步看一步。\"\n\n\"顺其自然……\"秦大宝念了念这句话，\"你说得对。\"\n\n\"那就别想那么多了。\"钱益谦站起身来，\"早点休息吧，明天还要忙呢。\"\n\n", "\"好。\"秦大宝点点头，\"钱兄晚安。\"\n\n\"晚安。\"\n\n钱益谦走了，秦大宝独自坐在柜台后面，陷入了沉思。\n\n他想起了和李香兰在一起的点点滴滴。\n\n他们是在大学里认识的，那是十五年前的事了。那时候他还是历史系的大一新生，她是中文系的新生，在一次社团活动上偶然相遇。\n\n他们一起上课、一起自习、一起吃饭、一起看电影。四年大学，两年研究生，三年工作，他们一路走来，风风雨雨，却始终没有分开。\n\n他们说好，等攒够了钱就结婚。他们说好，要一起去看更多的风景。他们说好，这辈子都不分开。\n\n可是现在……\n\n他从口袋里掏出那把扇子，借着微弱的灯光看着它。\n\n湘妃竹的扇骨，绢本的扇面，那枝桃花，那两行诗句。\n\n\"千古秦淮东逝水，桃花扇底送南明。\"\n\n他必须找到回去的方法。\n\n他必须回到李香兰身边。\n\n可是……\n\n他看了一眼窗外的秦淮河，又想起了蓝百合的眼睛。\n\n那双眼睛，那么明亮，那么清澈，又那么悲伤。\n\n如果……\n\n不，不行。\n\n他摇了摇头，把扇子收回了怀里。\n\n他不能背叛李香兰。\n\n他不能。\n\n可是……\n\n他的心里，隐隐有些动摇。\n\n（第七章完，约5200字）\n\n第八章：车行兴起\n\n自从和蓝百合相识之后，秦大宝的生活发生了微妙的变化。\n\n他开始经常去紫烟阁坐坐，有时候是送饭，有时候是喝茶，有时候什么理由都没有，就是想去看看她。蓝百合也不拒绝，每次他来，都让翠儿上茶，陪着他说说话、聊聊天。\n\n两人的关系，在这种平淡的交往中渐渐加深。\n\n\"你的饭馆生意怎么样了？\"有一天，蓝百合问他。\n\n\"还不错。\"秦大宝说，\"这两个月攒了些钱，我想扩大经营。\"\n\n\"怎么扩大？\"\n\n\"买马车。\"秦大宝说，\"现在我送外卖只能靠人走路，速度慢，覆盖范围也小。如果有了马车，就能把送餐网络扩展到整个南京城。\"\n\n蓝百合想了想，说：\"这倒是个好主意。不过，买马车的成本不低吧？\"\n\n", "\"是。\"秦大宝说，\"一匹普通的马要二三十两银子，一辆结实的大车也要十几两。再加上马夫的人工费用，开销很大。\"\n\n\"那你现在攒了多少钱？\"\n\n\"差不多有五十两了。\"\n\n\"五十两……\"蓝百合沉吟片刻，\"不够吧？\"\n\n\"是不够。\"秦大宝叹了口气，\"所以我想找人合伙。\"\n\n\"找谁？\"\n\n\"还在想。\"秦大宝说，\"钱兄和方先生都在为生计发愁，我不好意思开口向他们借钱。找外人的话，又怕被人骗。\"\n\n蓝百合看着他，忽然说：\"我借你。\"\n\n\"什么？\"秦大宝愣住了。\n\n\"我借你一百两。\"蓝百合说，\"不要利息，什么时候有钱什么时候还。\"\n\n\"这……\"秦大宝有些不知所措，\"百合，你我萍水相逢，我怎么能……\"\n\n\"怎么不能？\"蓝百合微微一笑，\"你救了我的妹妹，我借你点钱应急，有什么不可以的？\"\n\n\"可是……\"\n\n\"别可是了。\"蓝百合打断他，\"你是个有本事的人，我相信你将来一定能发达。这点钱，就当是我投资你了。\"\n\n\"投资？\"秦大宝苦笑，\"我又不是什么生意人……\"\n\n\"你比那些生意人强多了。\"蓝百合说，\"你脑子里的那些主意，什么外卖、会员卡，我活了这么多年，还是第一次听说。这说明你有眼光、有魄力，是个能做大事的人。\"\n\n秦大宝看着她，不知道该说什么。\n\n\"拿着吧。\"蓝百合从柜子里取出一个布包，递给他，\"里面是一百两银子，你点点。\"\n\n秦大宝接过布包，打开一看，里面整整齐齐地码着十锭银子，每锭十两，一共一百两。\n\n\"多谢了。\"他把布包收好，深深鞠了一躬，\"这份恩情，我记下了。\"\n\n\"不用客气。\"蓝百合说，\"等你发达了，请我吃顿好的就行。\"\n\n\"一定。\"秦大宝说，\"等我发达了，天天请你吃秦记的招牌菜！\"\n\n蓝百合笑了，笑容明媚如春日的阳光。\n\n有了蓝百合的资金支持，秦大宝的扩张计划得以顺利实施。\n\n", "他花了四十两银子买了四匹马，又花了二十两银子打造了四辆结实的马车，又花了十两银子雇了四个马夫。这样，\"秦记车行\"的雏形就建立起来了。\n\n车行开业的第一天，秦大宝亲自赶着一辆马车在南京城里转了一圈，向沿途的商户和住户发放传单，宣传他的\"共享马车\"服务。\n\n他的服务模式很简单：客户只需要付少量的费用，就可以雇佣秦记的马车和马夫，用来运货或者载人。费用按里程和货物重量计算，明码标价，童叟无欺。\n\n这个模式在当时简直是闻所未闻。\n\n在传统社会里，马车是稀缺资源，只有大户人家才养得起。一般百姓出行，要么走路，要么租借有钱人家的马车，租金贵得离谱。而秦大宝的\"共享马车\"服务，让普通百姓也能用得起马车，这无疑是一个巨大的创新。\n\n开业第一天，车行就接到了十几单生意。虽然都是些小单子——帮人送几件货物、载几个人去某地——但这让秦大宝看到了希望。\n\n\"这个点子好！\"钱益谦听说后，连连称赞，\"秦弟，你真是商业奇才！\"\n\n\"过奖了。\"秦大宝说，\"这不过是把饭馆的模式搬到了车行上而已。\"\n\n\"话虽这么说，但能想到这一层的人可不多。\"钱益谦说，\"你这种'共享'的思路，简直是……简直是……\"\n\n他一时找不到合适的词来形容，只能啧啧称奇。\n\n秦大宝笑了笑，没有解释。\n\n他当然知道这些\"共享经济\"的概念在二十一世纪是常识，但在1644年的中国，却是划时代的创新。他只是站在巨人的肩膀上，用四百年后的知识来降维打击这个时代而已。\n\n车行的生意渐渐好起来。\n\n到七月底的时候，车行每天能接三四十单生意，月净利润达到了三十两银子。加上饭馆的收入，秦大宝每个月能攒下五六十两银子。\n\n他还清了蓝百合借给他的一百两银子，并且额外送了十两作为感谢。\n\n\"这是做什么？\"蓝百合看着那十两银子，有些意外。\n\n\"利息。\"秦大宝说，\"你说不收利息，但我不能真的不收。朋友之间，也要明算账。\"\n\n", "蓝百合看着他，眼神有些复杂：\"你这个人……真是……\"\n\n\"真是什么？\"\n\n\"真是让人捉摸不透。\"蓝百合说，\"别人借钱给朋友，都巴不得赖掉不还；你倒好，主动送利息来。\"\n\n\"那是因为我把你当朋友。\"秦大宝说，\"真正的朋友，不应该占对方的便宜。\"\n\n蓝百合沉默了片刻，然后轻轻笑了：\"你啊，真是个怪人。\"\n\n\"怪人？\"\n\n\"是啊，怪人。\"蓝百合说，\"不过，我喜欢这样的怪人。\"\n\n秦大宝的心跳漏了一拍。\n\n他看着蓝百合的笑容，忽然觉得，这笑容比秦淮河上的灯火还要明亮。\n\n车行开张一个月后，秦大宝开始筹划下一步的计划。\n\n他要把车行和饭馆结合起来，打造一个\"餐饮+物流\"的商业网络。\n\n具体来说，就是用马车送外卖。客户在秦记饭馆点餐，饭馆做好菜之后，用马车送到客户家里。这样一来，送餐的速度大大加快，覆盖范围也从巷子里扩展到了整个南京城。\n\n这个模式在二十一世纪是外卖服务的标准配置，但在1644年的中国，却是前所未有的创举。\n\n\"妙！\"钱益谦听说后，拍案叫绝，\"这样一来，饭馆和车行就能互相促进、相得益彰了！\"\n\n\"是。\"秦大宝说，\"而且，这个模式还有一个好处——\"\n\n\"什么好处？\"\n\n\"信息。\"秦大宝说，\"马车每天在城里跑来跑去，会经过很多地方、遇到很多人。如果我在每辆马车上都印上秦记的标志，那整个南京城都会知道秦记的名字。\"\n\n钱益谦眼睛一亮：\"你是说……广告？\"\n\n\"对，广告。\"秦大宝说，\"我要让秦记的名字传遍南京城的大街小巷。\"\n\n这个想法很简单，但在当时却是革命性的。\n\n传统社会中，商人做广告的方式不外乎在店铺门口挂招牌、在街上发传单等，效果有限。而秦大宝的\"马车广告\"模式，把广告和物流结合起来，让秦记的名字随着马车的足迹传遍全城，这是一个巨大的创新。\n\n说干就干。\n\n", "秦大宝请人在四辆马车的车厢两侧都漆上了大大的\"秦记\"二字，还在下面写上了\"外卖专送\"\"日日送达\"等字样。这样，每当马车驶过街道，都会引起路人的注目。\n\n效果立竿见影。\n\n自从马车广告推出之后，秦记饭馆的生意一下子好了起来。每天来吃饭的客人增加了三成，外卖订单更是翻了两番。很多人都是看到马车上的广告之后，专门找过来的。\n\n\"秦记的名号算是打出去了！\"马大勺乐得合不拢嘴，\"这几天的活儿可把我累坏了！\"\n\n\"累点好。\"秦大宝笑着说，\"累说明生意好。给你涨工钱。\"\n\n\"真的？\"马大勺眼睛一亮。\n\n\"真的。每月多给你五百文。\"\n\n\"多谢老板！\"马大勺高兴得差点跳起来。\n\n生意越来越好，秦大宝也开始琢磨着招更多的人。\n\n他招了六个跑腿的小厮，专门负责送外卖；又招了四个伙计，负责饭馆的日常运营；还招了两个账房先生，负责记账和收银。这样，秦记饭馆和车行的员工总数达到了将近二十人。\n\n他的手下人虽然不多，但在当时的南京城里，已经算是一支像样的队伍了。\n\n更重要的是，他开始建立一套管理制度。\n\n他制定了《秦记员工守则》，规定了员工的作息时间、工作内容、奖惩制度等。他实行\"底薪+提成\"的薪酬模式，调动员工的工作积极性。他还定期召开\"员工大会\"，听取员工的意见和建议，改进服务质量。\n\n这套管理模式，在二十一世纪是企业的标配，但在1644年的中国，却是破天荒的创举。\n\n\"秦弟，你这套管理办法，是跟谁学的？\"钱益谦看了他制定的《员工守则》后，啧啧称奇。\n\n\"自己琢磨的。\"秦大宝说，\"人多事杂，不立规矩不成方圆。\"\n\n\"自己琢磨的？\"钱益谦难以置信地看着他，\"你这种管理思路，我闻所未闻啊！\"\n\n秦大宝笑了笑，没有解释。\n\n他当然不能解释。这套管理思路，是他在二十一世纪的公司里学到的，是他二十多年人生经验的结晶。他只是把它\"借鉴\"到了这个时代而已。\n\n", "七月底的时候，秦大宝的账上已经有了将近二百两银子的积蓄。他还清了所有的债务，还有了稳定的收入来源。\n\n他终于在这个乱世中站稳了脚跟。\n\n\"下一步，该做什么呢？\"有一天晚上，他独自坐在饭馆的后院里，望着满天的星斗，陷入了沉思。\n\n开分店？收购竞争对手？做更大的物流网络？\n\n还是……\n\n他想起了那把扇子。\n\n那把把他从2024年带到1644年的神秘扇子。\n\n他必须找到它的秘密。\n\n他必须找到回家的路。\n\n可是……\n\n他又想起了蓝百合。\n\n那个美丽的、忧郁的、让他忍不住想要心疼的女子。\n\n他和她的关系，已经不只是普通的朋友了。\n\n他知道，她对他也有好感。每次他去看她，她的眼睛里都会闪烁着异样的光芒。每次他离开的时候，她都会送到门口，依依不舍地看着他离去。\n\n他对她是什么感情？\n\n是同情？是欣赏？还是……8\n\n他不知道。\n\n他只知道，每次想到她，他的心就会跳得很快。\n\n这算什么？\n\n他对得起李香兰吗？\n\n他不知道。\n\n他只知道，在这个乱世中，有些事情，他已经无法控制了。\n\n（第八章完，约4800字）\n\n第九章：快递网络\n\n八月初，南京城里发生了一件大事。\n\n李自成的大顺军攻破了北京城，崇祯帝在煤山上吊自杀，明朝灭亡了。\n\n这个消息传到南京的时候，全城哗然。\n\n\"北京城破了！皇上驾崩了！\"\n\n\"闯王进城了！大顺朝要取代大明了！\"\n\n\"完了完了，大明完了……\"\n\n街头巷尾，到处都是议论声、哭泣声、叹息声。那些忠于明朝的士绅们痛哭流涕，那些心怀鬼胎的投机分子则蠢蠢欲动，准备改换门庭，投靠新朝。\n\n秦大宝听到这个消息的时候，正在饭馆里算账。\n\n他放下算盘，长长地叹了一口气。\n\n这一天，终于来了。\n\n历史书上记载得清清楚楚：崇祯十七年三月十九日，李自成攻破北京，崇祯帝朱由检在煤山自缢殉国，明朝灭亡。\n\n这一天，是1644年4月25日。\n\n而在南京，人们得到这个消息，已经是半个月之后了。\n\n", "\"秦弟，大事不好了！\"钱益谦慌慌张张地跑进饭馆，脸色煞白，\"北京城破了！皇上驾崩了！\"\n\n\"我知道。\"秦大宝平静地说。\n\n\"你知道？\"钱益谦愣了一下，\"你怎么知道的？\"\n\n\"我猜的。\"秦大宝说，\"北方大乱，北京城迟早守不住。\"\n\n\"那……那咱们怎么办？\"钱益谦急得像热锅上的蚂蚁，\"大明亡了，咱们这些读书人该怎么办？\"\n\n\"钱兄，\"秦大宝看着他，\"你打算怎么办？\"\n\n\"我……\"钱益谦咬了咬牙，\"我要反清复明！\"\n\n\"反清复明？\"秦大宝有些意外，\"钱兄，现在反清还早了点吧？清军还没入关呢。\"\n\n\"迟早的事！\"钱益谦说，\"李自成那帮草寇，能成什么大事？迟早会被清军赶出北京。到时候，天下就要落入满洲人的手中了！我绝不能眼睁睁地看着祖宗的江山落入异族之手！\"\n\n秦大宝沉默了。\n\n他知道钱益谦说的是对的。\n\n历史书上记载得清清楚楚：李自成在北京只待了四十二天，就被吴三桂和清军联合击败，仓皇逃往西安。清军入关后，一路南下，所向披靡，最终在1645年攻破了南京，南明弘光政权覆灭。\n\n\"钱兄，\"秦大宝说，\"你想反清复明，我支持你。但是，现在不是时候。\"\n\n\"那什么时候才是时候？\"\n\n\"等清军入关之后。\"秦大宝说，\"现在李自成刚进城，局势还不明朗。咱们要静观其变，等待时机。\"\n\n钱益谦想了想，点了点头：\"你说得对。现在贸然行动，只会打草惊蛇。\"\n\n\"是。\"秦大宝说，\"咱们先按兵不动，暗中积蓄力量。等时机成熟，再一举而起。\"\n\n\"好！\"钱益谦握紧拳头，\"秦弟，从今以后，你就是我的左膀右臂。咱们一起，为反清复明的大业奋斗！\"\n\n秦大宝看着他，心里有些复杂。\n\n他知道，钱益谦的理想是注定失败的。历史书上写得清清楚楚，南明政权只存在了不到一年就被清军消灭了。反清复明的斗争，是一场注定失败的悲剧。\n\n但是，他不能告诉钱益谦这些。\n\n他只能默默地支持他，尽自己的一份力量。\n\n", "\"钱兄，\"他说，\"要反清复明，需要钱。\"\n\n\"我知道。\"钱益谦说，\"我正在想办法筹集资金。\"\n\n\"不用想了。\"秦大宝说，\"我来出。\"\n\n\"你？\"钱益谦愣住了，\"你有多少钱？\"\n\n\"不多，但也不少。\"秦大宝说，\"我的饭馆和车行，每个月能挣五六十两银子。我愿意把一半的利润拿出来，支持钱兄的事业。\"\n\n\"秦弟……\"钱益谦感动得热泪盈眶，\"你……你真是我的好兄弟！\"\n\n\"钱兄不必客气。\"秦大宝说，\"咱们是结拜兄弟，你的事就是我的事。\"\n\n两人相视而笑，一切尽在不言中。\n\n北京陷落的消息，在南京城里引起了轩然大波。\n\n那些忠于明朝的士绅们开始秘密串联，准备拥立新的皇帝，建立南明政权。而那些投机分子则开始观望，看看风向再做决定。\n\n秦大宝没有参与这些政治活动，他有自己的事情要做。\n\n他要建立一个快递网络。\n\n这个念头，是在和钱益谦的谈话中产生的。\n\n钱益谦说，反清复明需要传递情报、联络义士、运送物资。而秦大宝的车行，正好可以用来做这些事情。\n\n\"秦弟，你的马车每天都在城里跑来跑去，能不能顺便帮我们传递一些消息？\"钱益谦问。\n\n\"当然可以。\"秦大宝说，\"不过，如果只是传递消息，效率太低了。\"\n\n\"什么意思？\"\n\n\"我想建立一个专门的快递网络。\"秦大宝说，\"不只是送外卖，还要送信、送包裹、送任何需要送的东西。这样一来，我们既能赚钱，又能为反清复明的事业服务。\"\n\n钱益谦眼睛一亮：\"好主意！\"\n\n\"而且，\"秦大宝继续说，\"这个快递网络还可以成为情报网络。我们的马车和伙计遍布南京城的大街小巷，可以收集各种消息，为钱兄的反清复明大业提供情报支持。\"\n\n\"妙！\"钱益谦拍案叫绝，\"秦弟，你真是天才！\"\n\n秦大宝笑了笑，没有解释。\n\n这个\"快递+情报\"的模式，在二十一世纪是物流企业的标配。他只是把它\"借鉴\"到了这个时代而已。\n\n说干就干。\n\n", "秦大宝在秦记饭馆旁边租了一间铺面，挂上了\"秦记快递\"的招牌。他招了十几个伙计，专门负责收发信件和包裹。他还在南京城的几个主要区域设立了\"快递站点\"，方便客户寄送和领取物品。\n\n这个模式在当时简直是闻所未闻。\n\n传统社会中，人们传递消息主要依靠驿站和镖局。驿站是官方的，只负责传递公文；镖局是民间的，主要护送贵重物品，收费昂贵。而秦大宝的\"快递\"服务，面向普通百姓，价格低廉，服务周到，很快就受到了欢迎。\n\n开业第一个月，秦记快递就接到了上百单生意。虽然都是些小单子——送信、送包裹、送货物——但这让秦大宝看到了希望。\n\n更重要的是，这个快递网络真的成为了情报网络。\n\n秦大宝的伙计们每天在城里跑来跑去，能听到各种各样的消息。哪家大户人家在招兵买马，哪个官员在囤积粮食，哪支军队在调动……这些消息都被汇总到秦大宝这里，然后转交给钱益谦。\n\n\"秦弟，你这个快递网络，比我想象的还要有用！\"钱益谦兴奋地说，\"有了这些情报，我们就能掌握南京城的动向，为反清复明的大业做好准备！\"\n\n\"是。\"秦大宝说，\"不过，咱们要小心。这些事情不能让人知道，否则会有杀身之祸。\"\n\n\"我知道。\"钱益谦点点头，\"我会小心的。\"\n\n九月初，清军入关的消息传到了南京。\n\n吴三桂引清军入关，在山海关击败了李自成的大顺军。李自成仓皇逃往西安，清军一路追击，所向披靡。\n\n南京城里再次陷入了恐慌。\n\n\"清军来了！清军来了！\"\n\n\"完了完了，这下真的完了……\"\n\n\"怎么办？咱们该怎么办？\"\n\n街头巷尾，到处都是惊慌失措的人群。那些有钱人开始收拾细软，准备逃往南方；那些穷人则只能听天由命，祈祷战火不要烧到自己头上。\n\n秦大宝听到这个消息的时候，正在紫烟阁和蓝百合喝茶。\n\n\"清军入关了吗……\"他喃喃自语，\"这一天，终于来了。\"\n\n\"你在说什么？\"蓝百合问。\n\n\"没什么。\"秦大宝收回思绪，\"百合，你打算怎么办？\"\n\n", "\"我？\"蓝百合苦笑一声，\"我能怎么办？我不过是个风尘女子，生死由命，富贵在天。\"\n\n\"不，你不是。\"秦大宝认真地说，\"你比任何人都坚强。\"\n\n蓝百合看着他，眼神有些复杂：\"大宝，你……你是不是知道些什么？\"\n\n\"我知道一些。\"秦大宝说，\"我知道清军会南下，知道南京迟早会沦陷，知道这个时代……注定是个乱世。\"\n\n\"那你打算怎么办？\"\n\n\"我打算……\"秦大宝想了想，\"我打算带着你一起走。\"\n\n蓝百合愣住了。\n\n\"你……你说什么？\"\n\n\"我说，我打算带着你一起走。\"秦大宝重复道，\"等局势恶化，我就带你离开南京，去一个安全的地方。\"\n\n\"安全的地方？\"蓝百合苦笑，\"这世上，还有安全的地方吗？\"\n\n\"有。\"秦大宝说，\"只要咱们在一起，哪里都是安全的。\"\n\n蓝百合看着他，眼眶忽然红了。\n\n\"你……你为什么要对我这么好？\"\n\n\"因为……\"秦大宝顿了顿，\"因为你是我的朋友。\"\n\n\"只是朋友？\"\n\n秦大宝沉默了。\n\n他不知道该怎么回答。\n\n他对蓝百合的感情，已经不只是朋友那么简单了。每次看到她，他的心就会跳得很快；每次想到她，他就会忍不住微笑。他想保护她，想照顾她，想和她在一起。\n\n但是，他能这样做吗？\n\n他还有李香兰。\n\n那个在2024年的南京等着他的女人。\n\n\"大宝……\"蓝百合轻声说，\"你不用回答。我知道，你有你的难处。\"\n\n\"百合……\"\n\n\"没关系。\"蓝百合微微一笑，\"能做你的朋友，我已经很满足了。\"\n\n两人相视而笑，一切尽在不言中。\n\n窗外，秋风萧瑟，落叶纷飞。\n\n乱世，已经降临。\n\n（第九章完，约5200字）\n\n第十章：历史波澜\n\n九月下旬，南京城里发生了一件大事。\n\n福王朱由崧在南京登基称帝，建立了南明弘光政权。\n\n这个消息传到秦大宝耳朵里的时候，他正在快递站里检查账目。\n\n\"福王登基了？\"他放下账本，眉头紧锁。\n\n", "历史书上记载得清清楚楚：福王朱由崧是个昏庸无能的君主，他在位期间，沉湎酒色，不理朝政，最终导致南明政权迅速覆灭。\n\n\"秦弟，好消息！\"钱益谦兴冲冲地跑进快递站，\"福王登基了！咱们大明又有皇帝了！\"\n\n\"钱兄，\"秦大宝看着他，\"你觉得这是好消息吗？\"\n\n\"当然是好消息！\"钱益谦说，\"有了皇帝，咱们就有了主心骨。只要咱们团结一心，一定能赶走清军，恢复大明的江山！\"\n\n秦大宝沉默了。\n\n他不知道该怎么告诉钱益谦，这个\"好消息\"其实是个坏消息。福王朱由崧是个扶不起的阿斗，他的登基不仅不能挽救明朝，反而会加速南明的灭亡。\n\n但是，他不能说。\n\n他只能默默地支持钱益谦，尽自己的一份力量。\n\n\"钱兄，\"他说，\"福王登基，咱们应该做些什么？\"\n\n\"当然是响应号召，为国效力！\"钱益谦说，\"我已经联络了一些志同道合的朋友，准备组织一支义军，协助朝廷抵抗清军！\"\n\n\"义军？\"秦大宝有些意外，\"钱兄，你有这个能力吗？\"\n\n\"我没有，但你有。\"钱益谦说，\"秦弟，你的快递网络遍布南京城，你的马车和伙计可以随时调动。如果你愿意，我们可以利用你的网络来传递情报、运送物资、联络义士。\"\n\n秦大宝想了想，点了点头：\"好。我愿意。\"\n\n\"太好了！\"钱益谦兴奋地说，\"秦弟，从今以后，你就是咱们义军的后勤总管！\"\n\n秦大宝苦笑一声。他没想到，自己一个穿越来的历史老师，竟然成了明末义军的后勤总管。\n\n但是，既然已经卷入了这场历史洪流，他就只能硬着头皮走下去了。\n\n福王登基后，南京城里表面上恢复了秩序，但实际上暗流涌动。\n\n那些忠于明朝的士绅们忙着拥立新君、争权夺利；那些投机分子则在观望风向，随时准备改换门庭；而那些真正的爱国志士，则在暗中积蓄力量，准备抵抗清军的南下。\n\n秦大宝的快递网络，成为了这些爱国志士的重要工具。\n\n", "他的马车和伙计遍布南京城的大街小巷，可以传递情报、运送物资、联络义士。他的快递站点成为了秘密联络点，他的员工成为了地下交通员。\n\n当然，这些事情都是秘密进行的，外人根本看不出来。\n\n表面上，秦记快递还是一家普通的快递公司，每天忙着送信、送包裹、送货物。只有秦大宝和钱益谦知道，这个网络背后隐藏着怎样的秘密。\n\n十月初，清军攻破了山东，开始向江苏进军。\n\n消息传到南京，全城震动。\n\n\"清军来了！清军来了！\"\n\n\"怎么办？咱们该怎么办？\"\n\n\"朝廷怎么还不派兵抵抗？\"\n\n街头巷尾，到处都是惊慌失措的人群。那些有钱人开始收拾细软，准备逃往南方；那些穷人则只能听天由命，祈祷战火不要烧到自己头上。\n\n秦大宝听到这个消息的时候，正在紫烟阁和蓝百合下棋。\n\n\"清军攻破山东了……\"他放下棋子，长长地叹了一口气。\n\n\"你早就知道会这样，对吗？\"蓝百合问。\n\n\"对。\"秦大宝说，\"我知道清军会南下，知道南京迟早会沦陷，知道这个时代……注定是个悲剧。\"\n\n\"那你为什么还要留下来？\"蓝百合问，\"你明明可以走的。\"\n\n\"因为我不能走。\"秦大宝说，\"我有我的朋友，有我的兄弟，有我的……\"\n\n他看了蓝百合一眼，没有说下去。\n\n\"有我？\"蓝百合轻声问。\n\n秦大宝沉默了片刻，然后点了点头：\"有你。\"\n\n蓝百合的眼眶红了。\n\n\"大宝……\"她轻声说，\"你为什么要对我这么好？\"\n\n\"因为……\"秦大宝顿了顿，\"因为我喜欢你。\"\n\n这句话一出口，两人都愣住了。\n\n秦大宝没想到自己会说出这句话。他明明还有李香兰，明明还在想着怎么回到2024年，明明不应该对蓝百合产生感情……\n\n但是，他说出来了。\n\n在这个乱世中，在这个生死未卜的时刻，他终于说出了自己的心里话。\n\n\"大宝……\"蓝百合的眼泪夺眶而出，\"你……你说的是真的吗？\"\n\n\"是真的。\"秦大宝说，\"我知道我不应该这样说，我知道我有我的责任，我知道……\"\n\n", "\"别说了。\"蓝百合打断他，\"我懂。\"\n\n她站起身来，走到窗边，望着窗外的秦淮河。\n\n\"大宝，\"她背对着他说，\"我也喜欢你。\"\n\n秦大宝的心跳漏了一拍。\n\n\"从第一次见到你的时候，我就喜欢你了。\"蓝百合说，\"你和其他人不一样。你不趋炎附势，不贪图富贵，不觊觎我的美貌。你只是……只是把我当成一个普通人，一个值得尊重的朋友。\"\n\n\"百合……\"\n\n\"但是，\"蓝百合转过身来，眼睛里闪烁着泪光，\"我知道你有你的难处。你说过，你在老家有喜欢的人。我不会强求你什么，我只希望……只希望在你心里，能给我留一个小小的位置。\"\n\n秦大宝站起身来，走到她身边。\n\n\"百合，\"他说，\"我不知道未来会怎样。我不知道能不能回到我的家乡，不知道能不能再见到她，不知道咱们能不能在一起……\"\n\n他顿了顿，继续说：\"但是，我知道一件事——在这个乱世中，能遇到你，是我最大的幸运。\"\n\n蓝百合看着他，眼泪止不住地流下来。\n\n\"大宝……\"\n\n\"百合，\"秦大宝握住她的手，\"不管未来怎样，我都会保护你。我发誓。\"\n\n两人相视而笑，一切尽在不言中。\n\n窗外，秋风萧瑟，落叶纷飞。\n\n乱世之中，两颗心终于靠在了一起。\n\n十月底，清军攻破了徐州，距离南京只有一步之遥。\n\n南京城里一片混乱。那些有钱人纷纷逃往南方，那些官员们则在忙着争权夺利，根本无暇顾及即将到来的战火。\n\n钱益谦的义军终于组建起来了。\n\n这支义军只有几百人，大多是城里的普通百姓和一些热血青年。他们没有正规的武器装备，没有受过专业的军事训练，只有一腔热血和对大明的忠诚。\n\n\"秦弟，\"钱益谦找到秦大宝，\"清军马上就要打到南京了。咱们的义军准备出城迎敌，你愿意跟我们一起吗？\"\n\n秦大宝沉默了。\n\n他知道，这支义军根本不是清军的对手。几百个乌合之众，怎么可能抵挡得住八旗铁骑的冲击？\n\n但是，他不能拒绝。\n\n\"我愿意。\"他说。\n\n", "\"好！\"钱益谦拍了拍他的肩膀，\"秦弟，咱们一起，为大明尽最后一份力！\"\n\n秦大宝点点头，心里却充满了悲壮。\n\n他知道，这是一场注定失败的战斗。但是，即使是失败，也要战斗到底。\n\n因为，这是他的选择。\n\n因为，这是他的命运。\n\n十一月初，清军兵临南京城下。\n\n钱益谦的义军出城迎敌，在城外与清军展开了一场惨烈的战斗。\n\n秦大宝也参加了这场战斗。他没有武器，只能拿着一根木棍，跟着义军们一起冲锋。\n\n战斗进行得异常惨烈。义军们虽然英勇，但根本不是清军的对手。八旗铁骑如同潮水一般涌来，义军们一个个倒下，鲜血染红了大地。\n\n秦大宝在战斗中受了伤，被一支流箭射中了肩膀。他倒在地上，看着身边的同伴一个个死去，心里充满了绝望。\n\n\"难道……就这样结束了吗？\"\n\n他摸向怀里，想要掏出那把扇子。\n\n也许，这把扇子能救他。\n\n也许，他能用这把扇子回到2024年。\n\n但是，当他摸到扇子的时候，他忽然想起了蓝百合。\n\n他想起了她的笑容，想起了她的眼泪，想起了她说的那句话——\"我只希望，在你心里，能给我留一个小小的位置。\"\n\n他不能走。\n\n他不能丢下她。\n\n他咬紧牙关，从地上爬起来，继续战斗。\n\n战斗持续了整整一天。\n\n最终，义军全军覆没，钱益谦战死沙场，秦大宝身负重伤，被清军俘虏。\n\n当他被押进南京城的时候，他看到城里已经是一片火海。清军正在烧杀抢掠，百姓们在哭喊奔逃，到处都是尸体和废墟。\n\n\"大明……亡了……\"\n\n他喃喃自语，眼泪夺眶而出。\n\n历史书上记载得清清楚楚：1645年，清军攻破南京，南明弘光政权覆灭。从此，中国进入了清朝的统治时期。\n\n而他，一个来自四百年后的穿越者，亲眼见证了这一切。\n\n他被押进了一间牢房，和其他俘虏关在一起。\n\n牢房里阴暗潮湿，散发着腐臭的气息。秦大宝靠在墙上，闭着眼睛，等待着命运的审判。\n\n他不知道自己的未来会怎样。\n\n他只知道，他必须活下去。\n\n为了蓝百合。\n\n", "为了钱益谦的遗志。\n\n为了……他自己。\n\n（第十章完，约4800字）\n\n第十一章：狱中求生\n\n阴暗潮湿的牢房里，秦大宝靠在冰冷的墙壁上，肩膀上的伤口还在隐隐作痛。\n\n他被关押已经三天了。\n\n三天前，清军攻破南京，钱益谦的义军全军覆没，他自己也被俘入狱。这三天里，他经历了搜身、审讯、拷打，但清军似乎对他这个\"小人物\"并不感兴趣，只是把他和其他俘虏关在一起，听天由命。\n\n牢房里关押着二十多个人，大多是钱益谦义军的残部，也有一些是南京城里的普通百姓，被清军抓来充数。他们挤在狭小的空间里，吃喝拉撒都在一起，空气中弥漫着一股令人作呕的恶臭。\n\n\"秦哥，你的伤怎么样了？\"一个年轻的声音在耳边响起。\n\n秦大宝睁开眼睛，看到石头正蹲在他身边，小脸上满是担忧。\n\n石头也跟着义军出城了。虽然他只有十二岁，但坚持要跟着秦大宝，说什么也不肯离开。秦大宝拗不过他，只好让他跟着。没想到，这一跟，就一起进了牢房。\n\n\"没事，死不了。\"秦大宝勉强笑了笑，\"你呢？没受伤吧？\"\n\n\"我没事。\"石头摇摇头，\"那些清兵没打我，只是把我关进来了。\"\n\n\"那就好。\"秦大宝松了口气。\n\n他环顾四周，看着牢房里那些或坐或躺的俘虏，心里充满了悲凉。\n\n这些人，几天前还是活生生的人，有自己的家庭、自己的梦想。现在，他们成了阶下囚，生死未卜。有些人已经在等死了，眼神空洞，面如死灰；有些人还在苟延残喘，祈祷着奇迹的发生。\n\n\"秦哥，\"石头压低声音说，\"我听说……清军要把咱们都杀了。\"\n\n\"你听谁说的？\"\n\n\"隔壁牢房的人说的。他说清军抓了很多俘虏，准备集体处决，以儆效尤。\"\n\n秦大宝沉默了。\n\n他知道石头说的是真的。历史上，清军入关后进行了多次大屠杀，扬州十日、嘉定三屠，都是血淋淋的例子。南京虽然没有被屠城，但俘虏的命运也好不到哪里去。\n\n\"别怕，\"他摸了摸石头的头，\"有我在，不会让你有事的。\"\n\n", "\"嗯。\"石头点点头，靠在他身边。\n\n秦大宝闭上眼睛，开始在脑海里盘算逃生的办法。\n\n他的怀里还藏着那把桃花扇。这几天，他一直在研究这把扇子，试图找出使用它的方法。但扇子始终没有任何反应，就像一把普通的古董折扇。\n\n\"难道……只有在特定的时候才能触发？\"他喃喃自语。\n\n他想起了第一次穿越时的情景——那是在剧场里，他无意中按下了扇骨的机关，扇子就发出了白光，把他带到了这个时代。\n\n\"机关……\"他摸了摸扇骨，试图找到那个隐藏的机关。\n\n湘妃竹的扇骨光滑温润，摸上去没有任何异常。他试着按压、扭转、拉扯，但扇骨始终纹丝不动。\n\n\"该死……\"他低声咒骂。\n\n就在这时，牢房外传来一阵脚步声。\n\n\"开门！提审犯人！\"\n\n几个清兵走了进来，手里拿着名册，开始点名。\n\n\"张三！\"\n\n\"到……\"\n\n\"李四！\"\n\n\"到……\"\n\n\"秦大宝！\"\n\n秦大宝心里一凛，站起身来：\"到。\"\n\n\"出来！\"\n\n两个清兵走过来，一左一右架住他的胳膊，把他拖出了牢房。\n\n\"秦哥！\"石头想跟上来，被清兵一脚踹开。\n\n\"老实点！\"清兵骂道，\"再动就打死你！\"\n\n秦大宝被押着穿过长长的走廊，来到一间审讯室。\n\n审讯室里坐着一个穿着官服的满人，四十来岁，面容冷峻，眼神锐利。他的身边站着几个汉人师爷，正在低声说着什么。\n\n\"跪下！\"清兵一脚踢在秦大宝的腿弯处，强迫他跪了下来。\n\n那满人官员抬起头，打量了秦大宝一番，然后用生硬的汉语问道：\"你叫秦大宝？\"\n\n\"是。\"\n\n\"你是做什么的？\"\n\n\"开饭馆的。\"\n\n\"开饭馆的？\"满人官员冷笑一声，\"开饭馆的为什么要参加义军？\"\n\n\"我……\"秦大宝顿了顿，\"我是被逼的。\"\n\n\"被逼的？\"\n\n\"是。\"秦大宝说，\"义军的人抓了我，强迫我给他们运送粮草。我不愿意，他们就威胁要杀我全家。我没办法，只好从了。\"\n\n满人官员盯着他看了半晌，似乎在判断他话里的真假。\n\n", "\"你说你是开饭馆的，\"他忽然问，\"南京城里哪家饭馆？\"\n\n\"秦记饭馆。\"\n\n\"秦记饭馆……\"满人官员念了念，转向身边的师爷，\"你们听说过吗？\"\n\n一个师爷点点头：\"回大人，听说过。这家饭馆最近几个月在南京城里很有名，据说推出了一种叫'外卖'的新奇服务，生意很好。\"\n\n满人官员重新打量了秦大宝一番，眼神里多了一丝兴趣。\n\n\"有点意思。\"他说，\"一个开饭馆的，竟然能想出'外卖'这种点子。你脑子挺活的嘛。\"\n\n秦大宝低着头，没有说话。\n\n\"这样吧，\"满人官员说，\"我给你一个机会。只要你肯归顺大清，为我效力，我就饶你一命，还让你继续开你的饭馆。怎么样？\"\n\n秦大宝心里一震。\n\n归顺大清？\n\n他可是穿越来的历史老师，知道清军入关后会给中国带来怎样的灾难。扬州十日、嘉定三屠、文字狱、剃发易服……这些历史事件，他烂熟于心。\n\n他能归顺这样的政权吗？\n\n但是，如果不归顺，他就会死。石头也会死。蓝百合……\n\n蓝百合！\n\n他突然想起了蓝百合。南京城破的时候，她在哪里？她安全吗？\n\n\"大人，\"他抬起头，\"我可以归顺，但我有一个条件。\"\n\n\"什么条件？\"\n\n\"我要知道紫烟阁的蓝百合现在在哪里。\"\n\n满人官员愣了一下，然后哈哈大笑起来。\n\n\"好一个情种！\"他笑着说，\"自己都性命难保了，还想着女人！\"\n\n他笑够了，才说：\"好，我答应你。只要你肯归顺，我就帮你打听那个蓝百合的下落。\"\n\n\"谢大人。\"秦大宝低下头，心里五味杂陈。\n\n他知道，自己这样做是背叛。背叛了钱益谦的遗志，背叛了反清复明的大业，背叛了自己的良心。\n\n但是，他别无选择。\n\n他要活下去。\n\n他要找到蓝百合。\n\n他要……回家。\n\n（第十一章完，约5200字）\n\n第十二章：重逢\n\n归顺大清后的第七天，秦大宝终于得到了蓝百合的消息。\n\n那满人官员名叫阿济格，是多尔衮的亲信，负责南京城的善后事宜。他倒是说话算话，真的派人去打听蓝百合的下落。\n\n", "\"你的那个蓝百合，\"阿济格说，\"还活着。\"\n\n秦大宝心里一松，但随即又紧张起来：\"她在哪里？\"\n\n\"在城外的难民营里。\"阿济格说，\"南京城破的时候，她趁乱逃出了紫烟阁，躲进了难民营。现在城里正在清查'逆党'，她那种身份的人，暂时还不能进城。\"\n\n\"我可以去见她吗？\"\n\n阿济格看了他一眼：\"可以。不过，你得先帮我办一件事。\"\n\n\"什么事？\"\n\n\"我的军队需要粮草。\"阿济格说，\"南京城里的粮仓大多被烧毁了，剩下的粮草只够维持半个月。我需要你在十天之内，筹集到足够一万大军吃一个月的粮草。\"\n\n秦大宝心里一沉。\n\n一万大军一个月的粮草，那是天文数字。南京城刚刚经历战乱，百姓流离失所，田地荒芜，到哪里去筹集这么多粮食？\n\n但是，为了见到蓝百合，他必须答应。\n\n\"好，我答应你。\"他说。\n\n接下来的十天，是秦大宝人生中最艰难的十天。\n\n他动用了所有的关系网，四处筹集粮草。他去找了马湘兰，请她帮忙联络秦淮河畔的富商；他去找了方孝孺，请他用读书人的身份向士绅们募捐；他甚至去找了以前秦记饭馆的老客户，请他们慷慨解囊。\n\n但是，效果甚微。\n\n战乱之后，人人自危，谁还有余力去管军队的粮草？更何况，那是清军的粮草，是侵略者的粮草。很多南京百姓宁愿把粮食藏起来烂掉，也不愿意交给清军。\n\n十天过去了，秦大宝只筹集到了不到三分之一的粮草。\n\n\"大人，\"他跪在阿济格面前，\"卑职无能，只筹集到了这么多……\"\n\n阿济格的脸色阴沉得可怕。\n\n\"秦大宝，\"他冷冷地说，\"我给了你机会，是你自己不珍惜。\"\n\n\"大人，求您再给我一些时间……\"\n\n\"时间？\"阿济格冷笑，\"我的大军等着米下锅，你给我谈时间？\"\n\n他站起身来，走到秦大宝面前，居高临下地看着他。\n\n\"本来，我是想杀了你的。\"他说，\"但是，我改变主意了。\"\n\n秦大宝心里一凛。\n\n", "\"你这个人，有点意思。\"阿济格说，\"脑子活，胆子大，为了一个女人敢跟我谈条件。这样的人，杀了可惜。\"\n\n他顿了顿，继续说：\"这样吧，我再给你一次机会。你去难民营，把你的蓝百合接回来。然后，你们一起帮我办一件事。办成了，我饶你们不死；办不成，你们就一起死。\"\n\n\"什么事？\"\n\n\"江南还有很多反抗势力，\"阿济格说，\"我需要有人帮我潜入他们内部，收集情报。你熟悉南京城的情况，又认识很多三教九流的人，是最合适的人选。\"\n\n秦大宝沉默了。\n\n这是让他当汉奸，当间谍。\n\n但是，他别无选择。\n\n\"好，我答应你。\"他说。\n\n难民营在城外的一片荒地上，用破布和竹竿搭成了密密麻麻的棚子。这里聚集了数万名从南京城里逃出来的难民，他们缺衣少食，疾病流行，每天都有人死去。\n\n秦大宝在难民营里找了整整一天，终于在角落里的一间破棚子里找到了蓝百合。\n\n她瘦了很多，脸色苍白，头发凌乱，身上穿着一件破旧的棉袄，完全没有了往日秦淮名妓的风采。但是，当她看到秦大宝的时候，眼睛里还是闪出了光芒。\n\n\"大宝！\"她扑进他的怀里，眼泪夺眶而出，\"我以为……我以为你死了……\"\n\n\"我没事。\"秦大宝紧紧抱着她，\"我没事，我来了……\"\n\n两人相拥而泣，久久不愿分开。\n\n\"南京城破的时候，我到处找你，\"蓝百合抽泣着说，\"但是到处都是清兵，我没办法进城……我以为你战死了……\"\n\n\"我没有战死，我被俘了。\"秦大宝说，\"然后……我归顺了清军。\"\n\n蓝百合的身体僵了一下。\n\n\"你……归顺了清军？\"\n\n\"是。\"秦大宝低下头，\"我没有选择。如果不归顺，我就会死。我死了，就再也见不到你了。\"\n\n蓝百合沉默了。\n\n她推开秦大宝，退后一步，用一种复杂的眼神看着他。\n\n\"大宝，\"她说，\"你知道你在做什么吗？\"\n\n\"我知道。\"秦大宝说，\"我在做汉奸。\"\n\n\"那你为什么还要做？\"\n\n", "\"因为我想活下去。\"秦大宝说，\"因为我想见你。因为……我想带你回家。\"\n\n\"回家？\"蓝百合苦笑，\"哪里还有家？紫烟阁被烧了，我的姐妹们死的死、逃的逃，哪里还有家？\"\n\n\"有。\"秦大宝说，\"只要我们在一起，哪里都是家。\"\n\n蓝百合看着他，眼泪又流了下来。\n\n\"大宝，\"她说，\"你是个傻子。\"\n\n\"我知道。\"秦大宝说。\n\n\"但是，\"蓝百合擦了擦眼泪，\"我喜欢这样的傻子。\"\n\n两人再次相拥，这一次，更加紧密。\n\n回到城里后，秦大宝和蓝百合开始了他们的\"间谍\"生涯。\n\n阿济格给他们安排了一个任务：潜入江南的抗清势力内部，收集情报。\n\n秦大宝利用自己以前的关系网，很快就联系上了几个抗清义士。他假装自己是死里逃生的义军残部，成功打入了他们的内部。\n\n但是，他并没有把情报交给阿济格。\n\n他交给阿济格的，都是一些无关紧要的消息——比如某支义军有多少人、某个据点在哪里。真正重要的情报，比如义军的作战计划、首领的身份、武器的来源，他都偷偷藏了起来，找机会传递给义军方面。\n\n他在玩一个危险的游戏——双面间谍。\n\n一方面，他要应付阿济格的盘查，不能让他起疑心；另一方面，他要帮助抗清义士，不能让他们遭受太大的损失。\n\n这需要极高的智慧和勇气，稍有不慎，就会万劫不复。\n\n蓝百合也参与了这个游戏。她利用自己以前的人脉，在秦淮河畔收集各种消息，然后传递给秦大宝。她的身份特殊，很多达官贵人愿意在她面前吐露秘密，这让他们获得了很多宝贵的情报。\n\n日子一天天过去，秦大宝和蓝百合在刀尖上跳舞，在生死边缘徘徊。\n\n但是，他们从未后悔。\n\n因为他们知道，他们在做正确的事情。\n\n因为他们知道，他们在一起。\n\n（第十二章完，约5100字）\n\n第十三章：情报暗战\n\n秦大宝的双面间谍生涯，持续了整整三个月。\n\n", "这三个月里，他周旋于清军和义军之间，如履薄冰。每一次传递情报，都是一次生死考验；每一次面对阿济格的盘问，都是一场心理博弈。\n\n但他撑过来了。\n\n不仅如此，他还建立了一个庞大的情报网络。\n\n利用秦记快递的残余势力，他在南京城及周边地区设立了多个秘密联络点。这些联络点表面上是小商贩、茶馆、客栈，实际上是情报传递的中转站。通过这个网络，他可以快速地把消息传递给义军，也可以及时掌握清军的动向。\n\n\"大宝，\"有一天，蓝百合问他，\"你这样做，不怕被阿济格发现吗？\"\n\n\"怕。\"秦大宝说，\"但是我更怕看到无辜的人死去。\"\n\n\"可是，如果阿济格发现了，你会死的。\"\n\n\"我知道。\"秦大宝说，\"但是如果我不这样做，会有更多人死。义军里有很多热血青年，他们为了反清复明，不惜牺牲生命。我不能眼睁睁地看着他们被清军剿灭。\"\n\n蓝百合沉默了。\n\n她看着秦大宝，眼神里充满了复杂的情感。\n\n\"大宝，\"她说，\"你变了。\"\n\n\"变了？\"\n\n\"是。\"蓝百合说，\"刚认识你的时候，你只是个开饭馆的小老板，满脑子都是赚钱的主意。现在……你像个真正的义士。\"\n\n秦大宝苦笑一声：\"我只是做了我应该做的事。\"\n\n\"不，\"蓝百合摇头，\"你做的远远超过了'应该'。你在用自己的生命，去保护那些素不相识的人。这不是普通人能做到的。\"\n\n秦大宝没有说话。\n\n他知道蓝百合说的是对的。这三个月里，他经历了太多的事情，看到了太多的生死离别。他的心态已经发生了很大的变化。\n\n刚穿越来的时候，他只想活下去，只想找到回家的路。但是现在，他开始思考更深层次的问题——什么是正义？什么是责任？什么是牺牲？\n\n他想起了钱益谦。\n\n那个为了反清复明不惜牺牲生命的义兄。如果他还在，会怎么做？\n\n他一定会支持自己的做法吧。\n\n\"百合，\"秦大宝忽然说，\"如果有一天我死了，你会怎么办？\"\n\n蓝百合愣了一下，然后坚定地说：\"我会陪你一起死。\"\n\n", "\"不，\"秦大宝摇头，\"我不要你死。如果我死了，你要活下去，要替我完成未竟的事业。\"\n\n\"什么事业？\"\n\n\"反清复明。\"秦大宝说，\"虽然我知道这很难，几乎不可能成功。但是，只要还有一个人坚持，大明的精神就不会灭亡。\"\n\n蓝百合看着他，眼泪夺眶而出。\n\n\"大宝，\"她说，\"我答应你。如果你死了，我会替你活下去，替你完成你的事业。\"\n\n两人相视而笑，一切尽在不言中。\n\n十二月，阿济格给秦大宝安排了一个新的任务。\n\n\"江南有一支很大的抗清势力，\"阿济格说，\"首领叫张煌言，是鲁王朱以海的心腹。他们在舟山群岛建立了基地，经常派人到大陆上来骚扰。我需要你潜入他们的内部，搞清楚他们的作战计划。\"\n\n秦大宝心里一凛。\n\n张煌言，那是南明历史上著名的抗清将领，坚持抗清斗争长达二十年，直到康熙年间才被俘牺牲。他是真正的民族英雄，是秦大宝最敬佩的人之一。\n\n让他去对付张煌言？\n\n\"大人，\"他说，\"张煌言是鲁王的心腹，身边戒备森严，我恐怕……\"\n\n\"你不用担心，\"阿济格打断他，\"我已经安排好了。张煌言最近要在宁波召开一次秘密会议，召集各地的抗清义士商议大事。我会派人护送你去宁波，然后你自己想办法混进去。\"\n\n秦大宝沉默了。\n\n这是一个危险的任务，但也是一个机会。如果他能把情报传递给张煌言，就能帮助义军避免一次重大的损失。\n\n\"好，我答应。\"他说。\n\n宁波，位于浙江东部，是江南重要的港口城市。\n\n秦大宝到达宁波的时候，已经是腊月了。天气寒冷，北风呼啸，街上行人稀少。\n\n他按照阿济格的安排，住进了一家客栈。这家客栈是清军的秘密联络点，掌柜的是阿济格的眼线。\n\n\"客官，\"掌柜的压低声音说，\"张煌言的会议三天后在城南的白云观举行。到时候，各地的义士都会来。你想混进去，就得想办法搞到请帖。\"\n\n\"请帖在哪里？\"\n\n", "\"在白云观的住持手里。\"掌柜的说，\"那个住持叫慧明，是张煌言的旧识。他手里有几十张请帖，专门发给可靠的义士。\"\n\n秦大宝点点头，心里开始盘算。\n\n要搞到请帖，就得接近慧明。但是，慧明是个出家人，深居简出，怎么才能接近他？\n\n他想了想，决定从白云观的香火入手。\n\n第二天，他换上一身素衣，扮成香客，去了白云观。\n\n白云观是宁波城里最大的道观，香火鼎盛。秦大宝在观里转了一圈，观察了一下地形，然后来到大殿，上了一炷香。\n\n\"施主，\"一个小道士走过来，\"请问施主要求什么？\"\n\n\"我想见慧明住持。\"秦大宝说。\n\n\"住持正在闭关，不见外客。\"\n\n\"闭关？\"秦大宝皱了皱眉，\"那什么时候能见他？\"\n\n\"这个……说不准。\"小道士说，\"住持闭关，短则三五日，长则三五个月。施主若有急事，可以留下姓名，等住持出关了，我替施主通报。\"\n\n秦大宝想了想，说：\"我叫秦大宝，是从南京来的。我有重要的事情要见住持，麻烦小师傅通报一声。\"\n\n小道士点点头，记下了他的名字。\n\n秦大宝离开白云观，回到客栈，开始等待。\n\n第二天晚上，秦大宝正在客栈里休息，忽然听到窗外有动静。\n\n他警觉地坐起身，手摸向枕边的匕首。\n\n\"秦大宝？\"窗外传来一个低沉的声音，\"出来，有人要见你。\"\n\n秦大宝心里一凛，但表面上不动声色。他穿好衣服，悄悄打开窗户，跳了出去。\n\n窗外站着两个黑衣人，蒙着面，只露出一双眼睛。\n\n\"跟我来。\"其中一个黑衣人说，\"不要出声。\"\n\n秦大宝跟着他们，穿过几条小巷，来到一座废弃的宅院里。\n\n宅院里站着一个人，背对着他，身材修长，气质儒雅。\n\n\"秦大宝？\"那人转过身来，露出一张清癯的面容，\"我是张煌言。\"\n\n秦大宝愣住了。\n\n张煌言？他怎么知道自己在宁波？他怎么知道自己在找他？\n\n\"张……张先生，\"他结结巴巴地说，\"您……您怎么知道……\"\n\n", "\"我怎么知道你是阿济格的间谍？\"张煌言微微一笑，\"因为我一直在看着你。\"\n\n秦大宝心里一沉。\n\n完了，被发现了。\n\n\"张先生，\"他低下头，\"我……我可以解释……\"\n\n\"不用解释。\"张煌言说，\"我知道你在做什么。你虽然是阿济格的间谍，但你一直在暗中帮助我们。你传递给阿济格的情报，都是假的；你传递给我们的情报，都是真的。我说得对吗？\"\n\n秦大宝愣住了。\n\n\"你……你怎么知道？\"\n\n\"因为我有我的情报网。\"张煌言说，\"南京城里发生的事情，我都知道。我知道你是个好人，知道你一直在帮助我们。所以，我决定见你一面。\"\n\n秦大宝看着他，不知道该说什么。\n\n\"秦大宝，\"张煌言走到他面前，\"你愿意为我们做一件事吗？\"\n\n\"什么事？\"\n\n\"一件很危险的事。\"张煌言说，\"阿济格让你来刺探我们的情报，对吧？那我们就将计就计，给他一些假情报。但是，这些假情报要看起来像是真的，要让他深信不疑。\"\n\n\"您的意思是……\"\n\n\"我的意思是，\"张煌言说，\"我们要演一出戏，让阿济格以为他掌握了我们的作战计划，然后在他按照计划行动的时候，给他致命一击。\"\n\n秦大宝明白了。\n\n这是反间计。\n\n\"我愿意。\"他说。\n\n\"好。\"张煌言满意地点点头，\"从明天开始，你就是我们的双面间谍。表面上，你继续为阿济格效力；实际上，你为我们传递情报。\"\n\n\"我明白。\"\n\n\"还有，\"张煌言说，\"这件事很危险，一旦被发现，你会死。你怕吗？\"\n\n秦大宝想了想，说：\"怕。但是，我更怕看到无辜的人死去。\"\n\n张煌言看着他，眼神里多了一丝赞赏。\n\n\"秦大宝，\"他说，\"你是个真正的义士。\"\n\n（第十三章完，约5300字）\n\n第十四章：将计就计\n\n与张煌言会面后的第二天，秦大宝开始了他的新任务。\n\n按照计划，他要向阿济格传递一份\"重要情报\"——关于张煌言作战计划的假情报。\n\n", "这份假情报是张煌言亲自拟定的，内容详实，看起来完全像是真的。情报里说，张煌言准备在正月里发动一次大规模的进攻，目标是宁波城。义军会从三个方向同时进攻，主力从东门入城，另外两路分别从南门和北门策应。\n\n\"这份情报，要让阿济格深信不疑。\"张煌言说，\"你要表现得像是费了很大劲才搞到的，不能让他起疑心。\"\n\n秦大宝点点头：\"我明白。\"\n\n\"还有，\"张煌言叮嘱道，\"情报里要留一个破绽，让阿济格觉得这是他自己的发现。这样，他会更加相信这份情报的真实性。\"\n\n\"什么破绽？\"\n\n\"情报里说，义军的主力会从东门入城。但实际上，东门防守严密，不是最佳的进攻方向。阿济格如果有点脑子，就会发现这个破绽，然后自己'纠正'过来，认为义军的主力其实会从南门入城。\"\n\n秦大宝明白了。\n\n这是心理学上的技巧——让人们自己\"发现\"真相，比直接告诉他们真相更有说服力。\n\n\"我懂了。\"他说。\n\n回到客栈后，秦大宝开始准备向阿济格传递情报。\n\n他故意表现得小心翼翼，像是做了什么见不得人的事情。他在客栈里待了两天，足不出户，然后才找到掌柜的，说要求见阿济格派来的联络人。\n\n\"你有情报？\"联络人问。\n\n\"有。\"秦大宝压低声音，\"很重要的情报。\"\n\n\"说。\"\n\n\"这里不方便。\"秦大宝看了看四周，\"我要亲自向大人汇报。\"\n\n联络人想了想，说：\"好，你跟我来。\"\n\n秦大宝被带到了宁波城外的一座军营里。阿济格不在，但有一个副将接待了他。\n\n\"你有什么情报？\"副将问。\n\n秦大宝从怀里掏出一份折叠的纸条，递给副将：\"这是张煌言的作战计划。我费了好大劲才搞到的。\"\n\n副将接过纸条，展开看了看，脸色变了。\n\n\"你确定这是真的？\"\n\n\"确定。\"秦大宝说，\"我是从一个义军的小头目那里搞到的。他喝醉了酒，不小心说漏了嘴。\"\n\n副将盯着他看了半晌，然后说：\"你在这里等着，我去禀报大人。\"\n\n副将走了，秦大宝在军营里等了整整一天。\n\n", "第二天，副将回来了，脸色凝重。\n\n\"大人看了你的情报，\"他说，\"他觉得有问题。\"\n\n秦大宝心里一凛，但表面上不动声色：\"什么问题？\"\n\n\"情报里说，义军的主力会从东门入城。但是，东门防守严密，不是最佳的进攻方向。大人觉得，这可能是张煌言故意放出来的假情报。\"\n\n秦大宝心里暗笑。\n\n果然，阿济格上当了。\n\n\"那大人的意思是……\"\n\n\"大人的意思是，义军的主力其实会从南门入城。\"副将说，\"东门只是佯攻，真正的杀招在南门。\"\n\n\"这……\"秦大宝装作惊讶的样子，\"大人英明！我怎么没想到这一点？\"\n\n\"你当然想不到。\"副将冷笑，\"你只是个开饭馆的，懂什么军事？\"\n\n秦大宝低下头，装作羞愧的样子。\n\n\"好了，\"副将说，\"你的任务完成了。这是大人给你的赏银。\"\n\n他扔给秦大宝一个钱袋，里面装着五十两银子。\n\n\"谢大人。\"秦大宝接过钱袋，退了出去。\n\n回到客栈后，秦大宝立刻把情况告诉了张煌言派来的联络人。\n\n\"阿济格果然上当了。\"他说，\"他认为义军的主力会从南门入城。\"\n\n联络人点点头：\"好。张先生已经安排好了，正月里，咱们给他来个将计就计。\"\n\n\"怎么将计就计？\"\n\n\"到时候你就知道了。\"联络人神秘地笑了笑，\"你只需要继续做你的双面间谍，其他的事情，交给我们。\"\n\n秦大宝点点头，心里充满了期待。\n\n正月里，宁波城发生了一场大战。\n\n按照阿济格的部署，清军把主力都调到了南门，准备迎击义军的\"主力\"。但是，义军并没有从南门进攻，而是从防守空虚的西门突然杀入，打了清军一个措手不及。\n\n阿济格这才发现自己上当了，但为时已晚。义军已经攻入城内，清军节节败退。\n\n\"秦大宝！\"阿济格在败退的路上，咬牙切齿地念着这个名字，\"我要把你碎尸万段！\"\n\n但是，他找不到秦大宝了。\n\n秦大宝在战斗开始之前，就已经离开了宁波，回到了南京。\n\n南京城里，蓝百合正在焦急地等待秦大宝的归来。\n\n她已经等了整整一个月。\n\n", "这一个月里，她每天都在担心秦大宝的安危。她知道他在执行危险的任务，知道他随时可能被发现、被杀死。\n\n\"百合！\"\n\n一个熟悉的声音在门外响起。\n\n蓝百合猛地站起身，冲到门口，打开了门。\n\n秦大宝站在门外，风尘仆仆，但笑容灿烂。\n\n\"大宝！\"蓝百合扑进他的怀里，眼泪夺眶而出，\"你终于回来了！我担心死了！\"\n\n\"我没事。\"秦大宝紧紧抱着她，\"任务完成了，我回来了。\"\n\n\"任务？什么任务？\"\n\n秦大宝把宁波发生的事情告诉了蓝百合。蓝百合听完，又惊又喜。\n\n\"你……你真的帮助义军打败了清军？\"\n\n\"是。\"秦大宝说，\"张煌言先生设了一个局，让阿济格上了当。义军趁机攻入了宁波城，清军大败。\"\n\n\"太好了！\"蓝百合高兴地说，\"这是咱们抗清斗争的一次大胜！\"\n\n\"是。\"秦大宝说，\"但是，阿济格不会善罢甘休的。他一定会追查是谁泄露了情报，到时候……\"\n\n\"到时候怎么办？\"\n\n\"到时候，咱们就得跑路了。\"秦大宝苦笑，\"我已经想好了，如果阿济格追查到我头上，我就带你离开南京，去一个安全的地方。\"\n\n\"去哪里？\"\n\n\"舟山。\"秦大宝说，\"张煌言先生邀请我去舟山，他说那里是抗清的基地，比大陆安全。\"\n\n蓝百合沉默了。\n\n\"大宝，\"她说，\"你真的决定要走？\"\n\n\"是。\"秦大宝说，\"南京已经不安全了。阿济格迟早会查到我头上，到时候咱们就走不了了。\"\n\n\"可是……\"蓝百合犹豫了一下，\"我的姐妹们还在这里……\"\n\n\"她们可以一起走。\"秦大宝说，\"我已经联系好了，张煌言先生会派人接应咱们。\"\n\n蓝百合想了想，点了点头：\"好，我跟你走。\"\n\n两人相视而笑，一切尽在不言中。\n\n窗外，雪花纷飞，新年将至。\n\n在这个乱世中，他们终于找到了一丝希望。\n\n（第十四章完，约5000字）\n\n第十五章：舟山基地\n\n正月过后，秦大宝和蓝百合秘密离开了南京，前往舟山。\n\n", "与他们同行的，还有石头、方若兰，以及蓝百合的几个姐妹。秦大宝本来还想带上老李头夫妇，但老两口年纪大了，经不起海上的颠簸，只好留在南京，托人照应。\n\n\"大宝哥，舟山是什么样的地方？\"在船上，石头好奇地问。\n\n\"舟山是海上的一群岛屿，\"秦大宝说，\"那里远离大陆，清军很难攻打。张煌言先生在那里建立了抗清基地，很多不愿投降的义士都聚集在那里。\"\n\n\"那咱们以后就在舟山住下了？\"\n\n\"暂时是的。\"秦大宝说，\"等局势稳定了，咱们再想办法。\"\n\n船在海上航行了三天三夜，终于到达了舟山群岛。\n\n舟山群岛位于浙江省东北部，由一千多个岛屿组成，是中国最大的群岛。这里远离大陆，地势险要，易守难攻，是理想的海上基地。\n\n张煌言的基地设在舟山岛的主岛上。岛上建有一座城堡，城墙高耸，炮台林立，戒备森严。城堡里驻扎着数千名义军，还有大量的百姓，俨然是一个小型的海上王国。\n\n\"秦大宝！\"张煌言亲自到码头迎接他们，\"欢迎你们来到舟山！\"\n\n\"张先生。\"秦大宝拱手行礼，\"多谢先生的收留。\"\n\n\"不必客气。\"张煌言说，\"你们是为抗清事业做出贡献的人，这里就是你的家。\"\n\n他看了看秦大宝身后的人，问道：\"这些都是你的朋友？\"\n\n\"是。\"秦大宝介绍道，\"这位是蓝百合，我的……我的伴侣。这位是石头，是我在路上收养的孤儿。这位是方若兰，是我义兄钱益谦的……\"\n\n他说到这里，顿了顿。\n\n钱益谦已经战死了，方若兰现在无依无靠，只能跟着他。\n\n\"方姑娘是我的朋友。\"他改口道。\n\n张煌言点点头，一一问候。\n\n\"各位，\"他说，\"欢迎来到舟山。从今以后，这里就是你们的家。\"\n\n在舟山安顿下来后，秦大宝开始了新的生活。\n\n张煌言给他安排了一个职务——后勤总管，负责管理基地的粮草、物资和财政。这个职务虽然不高，但权力很大，相当于基地的\"大管家\"。\n\n秦大宝接受了这个职务，开始发挥自己的才能。\n\n", "他首先改革了基地的财政制度。以前，基地的财政管理混乱，收支不明，经常出现贪污浪费的情况。秦大宝建立了严格的账目制度，每一笔收支都要登记在册，定期审计。他还实行了\"预算制度\"，每年的开支都要提前制定预算，超支要说明理由。\n\n这些制度在二十一世纪是常识，但在十七世纪的中国，却是破天荒的创举。张煌言看了秦大宝的改革方案后，赞不绝口。\n\n\"秦大宝，\"他说，\"你这些办法，是从哪里学来的？\"\n\n\"自己琢磨的。\"秦大宝说，\"以前开饭馆的时候，也是这么管理的。\"\n\n\"开饭馆？\"张煌言笑了，\"开饭馆能学到这么多东西？\"\n\n\"只要用心，开饭馆也能开出大学问。\"秦大宝说。\n\n张煌言点点头，对他的回答很满意。\n\n除了财政改革，秦大宝还做了另一件重要的事情——建立海上贸易网络。\n\n舟山群岛虽然偏远，但地理位置优越，是海上贸易的重要节点。秦大宝利用这一点，建立了一个覆盖东海、南海的贸易网络。\n\n他派出商船，与福建、广东、台湾，甚至日本、东南亚的商人进行贸易。用舟山的特产——海鲜、盐、茶叶——换取粮食、布匹、铁器等物资。通过这个贸易网络，基地不仅解决了物资短缺的问题，还积累了大量的财富。\n\n\"秦大宝，\"张煌言看着账本上不断增加的数字，感慨地说，\"你真是个人才。我打了这么多年的仗，从来没见过像你这样会赚钱的人。\"\n\n\"张先生过奖了。\"秦大宝说，\"我只是做了我应该做的事。\"\n\n\"不，你做的远远超过了'应该'。\"张煌言说，\"有了你的支持，咱们抗清的事业就有了坚实的物质基础。这是多少将士用鲜血都换不来的。\"\n\n秦大宝沉默了。\n\n他知道张煌言说的是对的。战争打的是钱粮，没有钱粮，再英勇的将士也打不了仗。他虽然不能上阵杀敌，但他可以用自己的方式，为抗清事业做出贡献。\n\n在舟山的日子里，秦大宝和蓝百合的感情也越来越深。\n\n", "他们住在城堡附近的一座小院里，过着平静而幸福的生活。白天，秦大宝忙着处理公务；晚上，他和蓝百合一起散步、聊天、看星星。\n\n\"大宝，\"有一天晚上，蓝百合靠在他的肩膀上，轻声说，\"你有没有想过，以后怎么办？\"\n\n\"以后？\"\n\n\"是啊。\"蓝百合说，\"咱们总不能一辈子待在舟山吧？\"\n\n秦大宝沉默了。\n\n他知道蓝百合说的是对的。舟山虽然安全，但终究是个孤岛。他们不可能永远待在这里。\n\n\"我想过。\"他说，\"等抗清事业成功了，我就带你回南京，开一间大大的饭馆，生几个孩子，过安稳的日子。\"\n\n\"抗清事业成功？\"蓝百合苦笑，\"那要等到什么时候？\"\n\n\"不知道。\"秦大宝说，\"也许十年，也许二十年，也许……永远等不到。\"\n\n\"那如果等不到呢？\"\n\n\"那就一直等下去。\"秦大宝说，\"只要咱们在一起，等多久我都愿意。\"\n\n蓝百合看着他，眼泪夺眶而出。\n\n\"大宝，\"她说，\"我爱你。\"\n\n\"我也爱你。\"秦大宝说。\n\n两人相拥而吻，在星空下许下了永恒的誓言。\n\n然而，平静的日子并没有持续太久。\n\n顺治三年（1646年）夏天，清军开始大规模进攻舟山。\n\n阿济格调集了数万大军，数百艘战船，对舟山群岛发动了猛烈的攻击。张煌言率领义军奋勇抵抗，但寡不敌众，节节败退。\n\n\"秦大宝！\"张煌言在战局危急的时候找到他，\"你带着百姓先撤，我们断后！\"\n\n\"张先生，\"秦大宝说，\"我要和你们一起战斗！\"\n\n\"不行！\"张煌言厉声说，\"你是后勤总管，不是战斗人员。你的任务是保护百姓，不是上阵杀敌！\"\n\n\"可是……\"\n\n\"没有可是！\"张煌言说，\"这是命令！\"\n\n秦大宝咬了咬牙，点了点头：\"是！\"\n\n他转身去组织百姓撤退，但心里充满了不甘。\n\n他想战斗，想和张煌言一起，为了抗清事业流尽最后一滴血。\n\n但是，他不能。\n\n因为他还有蓝百合，还有石头，还有方若兰。他要保护他们，要带他们安全离开。\n\n这就是他的责任。\n\n", "撤退的路上，到处都是战火和硝烟。\n\n秦大宝带着蓝百合、石头、方若兰，以及数百名百姓，乘坐小船向南方逃去。他们的目的地是福建，那里还有南明的残余势力。\n\n\"大宝，\"蓝百合看着身后燃烧的舟山岛，眼泪止不住地流，\"咱们的家……没了……\"\n\n\"家还在。\"秦大宝紧紧握着她的手，\"只要咱们在一起，哪里都是家。\"\n\n蓝百合看着他，点了点头。\n\n\"是，\"她说，\"只要咱们在一起，哪里都是家。\"\n\n小船在波涛中颠簸，向着未知的远方驶去。\n\n秦大宝望着渐渐远去的舟山岛，心里充满了悲壮。\n\n抗清的事业，还没有结束。\n\n他的使命，还没有完成。\n\n他会继续战斗，直到最后一刻。\n\n（第十五章完，约5100字）\n\n第十六章：流亡岁月\n\n从舟山撤退后，秦大宝一行人辗转来到了福建。\n\n此时的福建，是南明隆武政权的所在地。隆武帝朱聿键在福州称帝，试图重整旗鼓，恢复大明的江山。\n\n但是，局势并不乐观。\n\n清军已经占领了浙江、江西的大部分地区，正在向福建推进。隆武政权内部也是矛盾重重，文臣武将各怀鬼胎，难以形成合力。\n\n秦大宝到达福州的时候，已经是秋天了。\n\n他在福州城外的一个小镇上安顿下来，暂时避开了战火。蓝百合、石头、方若兰都跟着他，还有几十个从舟山一起逃出来的百姓。\n\n\"大宝，咱们接下来怎么办？\"蓝百合问。\n\n\"先安顿下来，\"秦大宝说，\"然后想办法联系张煌言先生。\"\n\n\"张先生还活着吗？\"\n\n\"应该还活着。\"秦大宝说，\"我听说他突围成功了，正在福建沿海活动。\"\n\n\"那咱们去找他？\"\n\n\"暂时不行。\"秦大宝说，\"现在兵荒马乱，路上太危险。咱们先在这里安顿下来，等局势稳定了再说。\"\n\n蓝百合点点头，没有再说什么。\n\n在小镇上，秦大宝重操旧业，开了一间小饭馆。\n\n饭馆不大，只有几张桌子，但收拾得干干净净。秦大宝亲自下厨，做一些简单的家常菜。虽然比不上南京的秦记饭馆，但味道还不错，很快就有了一些固定的客人。\n\n", "\"老板，来一碗面！\"\n\n\"好嘞，马上就来！\"\n\n秦大宝在厨房里忙碌着，蓝百合在前台招呼客人，石头帮忙跑堂，方若兰则在后厨帮忙洗菜切菜。四个人配合默契，小饭馆的生意渐渐好了起来。\n\n\"大宝哥，\"有一天，石头问，\"咱们以后就一直在这里开饭馆吗？\"\n\n\"暂时是的。\"秦大宝说，\"等局势稳定了，咱们再想办法。\"\n\n\"那……咱们还能回南京吗？\"\n\n秦大宝沉默了。\n\n南京……那个他穿越而来的城市，那个有秦淮河、有夫子庙、有他最初记忆的地方。\n\n他还能回去吗？\n\n\"不知道。\"他说，\"也许能，也许不能。\"\n\n石头低下头，没有再说什么。\n\n在小镇上住了几个月，秦大宝渐渐打听到了张煌言的消息。\n\n张煌言确实还活着，他正在福建沿海组织义军，继续抗清斗争。但是，他的处境很艰难——兵力不足，粮草匮乏，还要面对清军的围剿。\n\n\"我要去帮他。\"秦大宝对蓝百合说。\n\n\"你要去找张先生？\"\n\n\"是。\"秦大宝说，\"他在抗清的第一线，我不能坐视不管。\"\n\n\"可是……\"蓝百合犹豫了一下，\"你去了，我怎么办？\"\n\n\"你留在这里，\"秦大宝说，\"和石头、若兰一起，继续经营饭馆。等我安顿好了，就接你们过去。\"\n\n\"不，\"蓝百合摇头，\"我要跟你一起去。\"\n\n\"百合，那里很危险……\"\n\n\"我知道危险。\"蓝百合说，\"但是，我不能让你一个人去。咱们说好要在一起的，生死都要在一起。\"\n\n秦大宝看着她，心里充满了感动。\n\n\"好，\"他说，\"咱们一起去。\"\n\n顺治四年（1647年）春天，秦大宝和蓝百合告别了石头和方若兰，前往福建沿海，投奔张煌言。\n\n张煌言的义军驻扎在一个叫\"鼓浪屿\"的小岛上。这个小岛位于厦门附近，地势险要，易守难攻，是理想的海上基地。\n\n\"秦大宝！\"张煌言见到他们，又惊又喜，\"你们还活着！\"\n\n\"张先生，\"秦大宝拱手行礼，\"我们来投奔您了。\"\n\n\"好，好！\"张煌言激动地说，\"有你们在，咱们的力量又壮大了！\"\n\n", "他看了看秦大宝身后的蓝百合，问道：\"这位是？\"\n\n\"这是我的妻子，蓝百合。\"\n\n蓝百合脸一红，但心里却是甜滋滋的。\n\n这是秦大宝第一次在外人面前称她为\"妻子\"。\n\n\"原来是秦夫人。\"张煌言拱手行礼，\"失敬失敬。\"\n\n\"张先生客气了。\"蓝百合还礼。\n\n加入张煌言的义军后，秦大宝再次担任了后勤总管的职务。\n\n这一次，他的任务更加艰巨。义军的粮草严重不足，很多士兵连饭都吃不饱。秦大宝必须想办法解决这个问题。\n\n他想起了在舟山时的经验——海上贸易。\n\n\"张先生，\"他提议道，\"咱们可以通过海上贸易来获取粮草。\"\n\n\"海上贸易？\"张煌言皱了皱眉，\"现在清军封锁了海路，怎么贸易？\"\n\n\"清军封锁的是大陆的海路，\"秦大宝说，\"但台湾、东南亚的海路还是通的。咱们可以派船去台湾，用咱们的特产换取粮食。\"\n\n\"台湾？\"张煌言想了想，\"你是说郑成功？\"\n\n\"是。\"秦大宝说，\"郑成功现在占据台湾，实力雄厚。咱们可以和他合作，互通有无。\"\n\n张煌言沉吟片刻，点了点头：\"好，就按你说的办。\"\n\n秦大宝派出商船，前往台湾与郑成功联络。\n\n郑成功，原名郑森，是明末著名的抗清将领。他的父亲郑芝龙是海上霸主，拥有庞大的船队和贸易网络。郑成功继承了父亲的基业，占据台湾，继续抗清斗争。\n\n秦大宝的商船到达台湾后，受到了郑成功的热情接待。\n\n\"秦大宝？\"郑成功看着来使，\"我听说过你的名字。你在舟山的时候，帮张煌言管理后勤，做得不错。\"\n\n\"郑将军过奖了。\"来使说，\"我们张先生派我来，是想和将军商议合作之事。\"\n\n\"合作？\"\n\n\"是。\"来使说，\"我们愿意用福建的特产——茶叶、丝绸、瓷器——换取台湾的粮食。这对双方都有利。\"\n\n郑成功想了想，点了点头：\"好，我答应你们。\"\n\n就这样，秦大宝建立了与郑成功的贸易关系。通过这个关系，义军获得了稳定的粮食供应，解决了后顾之忧。\n\n", "\"秦大宝，\"张煌言感慨地说，\"你真是我的福星。每次遇到困难，你都能想出办法解决。\"\n\n\"张先生过奖了。\"秦大宝说，\"我只是做了我应该做的事。\"\n\n\"不，你做的远远超过了'应该'。\"张煌言说，\"如果没有你，咱们的义军早就散了。\"\n\n秦大宝沉默了。\n\n他知道张煌言说的是对的。在这个乱世中，一个人的力量是有限的。但是，只要每个人都能尽自己的一份力，就能汇聚成改变历史的力量。\n\n在鼓浪屿的日子里，秦大宝和蓝百合过着艰苦但充实的生活。\n\n白天，秦大宝忙着处理公务；晚上，他和蓝百合一起散步、聊天、看海。\n\n\"大宝，\"有一天晚上，蓝百合靠在他的肩膀上，轻声说，\"你有没有后悔过？\"\n\n\"后悔什么？\"\n\n\"后悔来到这个时代，后悔卷入这场战争，后悔……遇到我。\"\n\n秦大宝转过头，看着她的眼睛。\n\n\"百合，\"他说，\"我从来没有后悔过。\"\n\n\"真的？\"\n\n\"真的。\"秦大宝说，\"虽然这个时代很乱，虽然这场战争很残酷，但是……我遇到了你。这是我这辈子最幸运的事情。\"\n\n蓝百合的眼泪流了下来。\n\n\"大宝，\"她说，\"我也从来没有后悔过。遇到你，是我这辈子最幸运的事情。\"\n\n两人相拥而吻，在海风中许下了永恒的誓言。\n\n（第十六章完，约5000字）\n\n第十七章：郑成功\n\n顺治六年（1649年），秦大宝接到了郑成功的邀请，前往台湾商议大事。\n\n\"郑成功要见我？\"秦大宝有些意外，\"他有什么事？\"\n\n\"不清楚。\"来使说，\"将军只说，有重要的事情要和秦先生商议。\"\n\n秦大宝想了想，决定前往台湾。\n\n\"百合，\"他对蓝百合说，\"我要去台湾一趟，可能要些日子。你在这里等我。\"\n\n\"我跟你一起去。\"蓝百合说。\n\n\"这次不行。\"秦大宝说，\"郑成功只邀请了我一个人，带你一起去不合适。\"\n\n蓝百合有些失望，但还是点了点头：\"好吧，你早点回来。\"\n\n\"我会的。\"秦大宝说。\n\n台湾，位于中国大陆东南沿海，是中国第一大岛。\n\n", "此时的台湾，还处于开发初期。郑成功率领部下从荷兰人手中收复台湾后，开始大规模移民开垦，把台湾建设成了抗清的重要基地。\n\n秦大宝到达台湾的时候，被眼前的景象震撼了。\n\n台湾的土地上，到处都是新开垦的农田，种植着水稻、甘蔗、茶叶。港口里停满了商船，来自日本、东南亚、甚至欧洲的商人在这里交易。城市里街道整齐，房屋林立，一派繁荣景象。\n\n\"郑成功真是个了不起的人物。\"秦大宝心里感叹。\n\n在郑成功的府邸，秦大宝见到了这位传奇人物。\n\n郑成功三十来岁，身材魁梧，面容刚毅，眉宇间透着一股英气。他穿着一身戎装，腰悬宝剑，看起来威风凛凛。\n\n\"秦大宝？\"郑成功打量了他一番，\"果然是一表人才。\"\n\n\"郑将军过奖了。\"秦大宝拱手行礼。\n\n\"坐吧。\"郑成功示意他坐下，\"我请你来，是有一件大事要和你商议。\"\n\n\"将军请说。\"\n\n郑成功沉吟片刻，说：\"我想北伐。\"\n\n\"北伐？\"\n\n\"是。\"郑成功说，\"清军虽然占据了大陆，但他们的根基还不稳。我想趁这个机会，率领大军北伐，收复南京，恢复大明的江山。\"\n\n秦大宝心里一凛。\n\n历史上，郑成功确实进行过北伐。1659年，他率领大军进攻南京，一度兵临城下，但最终还是失败了。这是郑成功一生最大的遗憾。\n\n\"将军，\"秦大宝说，\"北伐是好事，但现在时机还不成熟。\"\n\n\"时机不成熟？\"郑成功皱了皱眉，\"为什么？\"\n\n\"清军在北方的根基虽然不稳，但他们的军事实力还是很强的。\"秦大宝说，\"咱们现在兵力不足，粮草匮乏，贸然北伐，胜算不大。\"\n\n\"那你的意思是？\"\n\n\"我的意思是，\"秦大宝说，\"咱们要先巩固根基，积蓄力量。等时机成熟了，再一举北伐。\"\n\n\"什么时候时机才成熟？\"\n\n\"等咱们的兵力达到十万，战船达到千艘，粮草足够支撑三年的时候。\"秦大宝说。\n\n郑成功沉默了。\n\n他知道秦大宝说的是对的。现在的台湾，虽然发展得不错，但和清军相比，还是太弱小了。\n\n", "\"秦大宝，\"他说，\"你说得有道理。但是，我等不了那么久了。\"\n\n\"为什么？\"\n\n\"因为……\"郑成功叹了口气，\"因为隆武帝已经驾崩了。\"\n\n\"什么？\"秦大宝愣住了。\n\n隆武帝朱聿键，是南明最后一位有作为的皇帝。他在福州称帝后，励精图治，试图恢复大明的江山。但是，由于内部矛盾和清军的进攻，他的努力最终失败了。\n\n\"隆武帝在汀州被清军俘虏，绝食殉国。\"郑成功说，\"现在南明已经没有皇帝了，各地势力各自为政，一盘散沙。如果再不北伐，恢复大明的旗帜，咱们就真的要亡了。\"\n\n秦大宝沉默了。\n\n他知道郑成功说的是对的。南明的局势，已经到了最危急的时刻。\n\n\"将军，\"他说，\"我理解您的心情。但是，北伐不是儿戏，必须做好充分的准备。否则，不仅收复不了失地，还会把咱们辛苦积攒的家底赔进去。\"\n\n郑成功看着他，眼神里多了一丝赞赏。\n\n\"秦大宝，\"他说，\"你果然是个有见识的人。好，我听你的，先巩固根基，再图北伐。\"\n\n\"谢将军。\"秦大宝说。\n\n\"不过，\"郑成功话锋一转，\"我有一个条件。\"\n\n\"什么条件？\"\n\n\"我要你留下来，帮我管理后勤。\"郑成功说，\"你的才能，我早有耳闻。有你帮忙，我相信台湾会发展得更快。\"\n\n秦大宝犹豫了。\n\n他当然知道郑成功的邀请意味着什么。如果留下来，他就能获得更大的平台，发挥更大的作用。但是，他还有蓝百合，还有张煌言，还有他在鼓浪屿的事业。\n\n\"将军，\"他说，\"我需要考虑一下。\"\n\n\"好，我给你三天时间。\"郑成功说，\"三天后，你给我答复。\"\n\n回到住处后，秦大宝陷入了沉思。\n\n郑成功的邀请，对他来说是一个巨大的诱惑。但是，他不能丢下蓝百合，不能丢下张煌言。\n\n\"也许，\"他想，\"我可以两边兼顾。\"\n\n他想出了一个办法——在台湾和鼓浪屿之间建立定期的航线，这样他就可以两边跑，既帮郑成功管理后勤，又不离开蓝百合和张煌言。\n\n第二天，他把这个想法告诉了郑成功。\n\n", "\"两边兼顾？\"郑成功想了想，\"这倒是个办法。但是，你不觉得太累了吗？\"\n\n\"累是累一点，\"秦大宝说，\"但是，我不想丢下我的妻子和朋友。\"\n\n郑成功看着他，点了点头：\"好，我答应你。从今以后，你就是我的后勤总管，负责台湾和鼓浪屿两地的后勤事务。\"\n\n\"谢将军。\"秦大宝说。\n\n从台湾回来后，秦大宝开始了两边跑的生活。\n\n他每个月在台湾待半个月，在鼓浪屿待半个月。在台湾，他帮郑成功管理后勤，发展经济；在鼓浪屿，他帮张煌言筹集粮草，组织义军。\n\n虽然很累，但他觉得很充实。\n\n\"大宝，\"蓝百合心疼地说，\"你太累了，要注意身体。\"\n\n\"我知道。\"秦大宝说，\"但是，现在是非常时期，我不能休息。\"\n\n\"可是……\"\n\n\"百合，\"秦大宝握住她的手，\"等这一切结束了，我就带你回南京，过安稳的日子。\"\n\n\"真的？\"\n\n\"真的。\"秦大宝说，\"我发誓。\"\n\n蓝百合看着他，点了点头。\n\n\"好，\"她说，\"我等你。\"\n\n（第十七章完，约4800字）\n\n第十八章：北伐风云\n\n顺治十六年（1659年），郑成功决定北伐。\n\n此时，距离秦大宝穿越到明末，已经过去了十五年。\n\n十五年的时间，发生了太多的变化。\n\n郑成功的实力已经足够强大——兵力达到十万，战船超过千艘，粮草储备充足。台湾和鼓浪屿已经连成一片，成为了一个坚不可摧的海上王国。\n\n而清军方面，虽然依然强大，但内部矛盾日益激化，战斗力有所下降。\n\n更重要的是，各地反清势力此起彼伏，形成了对清军的包围态势。\n\n时机已经成熟。\n\n\"秦大宝，\"郑成功在战前动员大会上说，\"这一次北伐，我要你担任后勤总指挥，负责整个军队的粮草供应。\"\n\n\"将军，\"秦大宝说，\"我一定会竭尽全力。\"\n\n\"好！\"郑成功环顾四周，大声道，\"各位将士，今日我们就要出发北伐，收复南京，恢复大明！\"\n\n\"收复南京！恢复大明！\"\n\n将士们群情激昂，呼声震天。\n\n北伐的大军从厦门出发，沿着海岸线北上。\n\n", "秦大宝坐在船舱里，看着手中的地图，心里充满了感慨。\n\n十五年前，他还是一个刚刚穿越到明末的普通人，一无所有，孤立无援。现在，他成为了郑成功的重要助手，掌握着数十万大军的粮草供应。\n\n这是他从未想过的。\n\n\"大宝，\"蓝百合走到他身边，\"在想什么？\"\n\n\"在想过去的事情。\"秦大宝说，\"十五年前，我从南京穿越到这个时代，以为一切都要完了。没想到，我现在竟然成为了北伐大军的一员。\"\n\n\"是啊，\"蓝百合也感慨地说，\"时间过得真快。\"\n\n\"百合，\"秦大宝握住她的手，\"等北伐成功了，我就带你回南京。\"\n\n\"回南京？\"蓝百合的眼睛亮了，\"真的？\"\n\n\"真的。\"秦大宝说，\"我要在秦淮河边开一间最大的饭馆，让全天下的人都知道你的名字。\"\n\n\"我不需要全天下的人知道我的名字，\"蓝百合说，\"我只需要你知道就够了。\"\n\n秦大宝看着她，心里充满了感动。\n\n\"百合，\"他说，\"我爱你。\"\n\n\"我也爱你。\"蓝百合说。\n\n两人相拥而吻，在战船上许下了誓言。\n\n北伐的大军进展顺利。\n\n郑成功率军连克定海、镇江，直抵南京城下。\n\n秦大宝负责的粮草供应也跟得上，没有出现断粮的情况。\n\n\"秦大宝，\"郑成功看着南京城坚固的城墙，\"你说，咱们能打下南京吗？\"\n\n\"能。\"秦大宝说，\"只要咱们坚持不懈，就一定能成功。\"\n\n\"但是，清军不会坐视不管的。\"郑成功说，\"他们一定会派援军来。\"\n\n\"我知道。\"秦大宝说，\"所以，咱们要在援军到来之前，尽快攻下南京。\"\n\n郑成功点点头，下达了总攻的命令。\n\n攻城战进行得异常惨烈。\n\n清军据城顽抗，炮火如雨，义军伤亡惨重。但是，义军将士们奋勇向前，前赴后继，攻势一浪高过一浪。\n\n秦大宝在后方指挥粮草运输，看着一批批伤员被抬下来，心里充满了焦虑。\n\n\"伤亡太大了。\"他对蓝百合说，\"照这样打下去，咱们的兵力会耗尽的。\"\n\n\"怎么办？\"\n\n", "\"我不知道。\"秦大宝说，\"只能希望郑成功能尽快攻下南京。\"\n\n然而，天不遂人愿。\n\n就在攻城的关键时刻，清军的援军到了。\n\n数十万清军从北方蜂拥而来，把南京城外的义军团团围住。\n\n\"撤！\"郑成功下达了撤退的命令。\n\n北伐，失败了。\n\n撤退的路上，秦大宝看着身后伤痕累累的军队，心里充满了悲凉。\n\n十五年的准备，三个月的战斗，最终还是失败了。\n\n\"大宝，\"蓝百合握住他的手，\"别难过。\"\n\n\"我不难过。\"秦大宝说，\"我只是觉得……很无力。\"\n\n\"你已经尽力了。\"\n\n\"我知道。\"秦大宝说，\"但是，我还能做什么？\"\n\n蓝百合沉默了。\n\n她也回答不了这个问题。\n\n北伐失败后，郑成功率军退回了厦门。\n\n清军虽然取得了胜利，但也元气大伤，无力追击。双方形成了对峙态势。\n\n秦大宝回到厦门后，开始重新整顿后勤体系，准备迎接下一场战斗。\n\n他知道，反清复明的道路还很漫长，他不能放弃。\n\n（第十八章完，约4500字）\n\n第十九章：隐居\n\n北伐失败后，秦大宝开始重新思考自己的人生。\n\n十五年的战斗生涯，让他身心俱疲。他从一个意气风发的年轻人，变成了一个饱经沧桑的中年人。他的头发开始花白，皱纹也悄悄爬上了额头。\n\n\"大宝，\"有一天，蓝百合对他说，\"你累了吗？\"\n\n\"累了。\"秦大宝老实回答。\n\n\"那……你想不想休息？\"蓝百合问。\n\n\"休息？\"\n\n\"是。\"蓝百合说，\"咱们离开这里，去一个安静的地方，过平淡的生活。\"\n\n秦大宝沉默了。\n\n他知道蓝百合说的是什么。这些年来，她一直跟着他东奔西走，吃了太多的苦。现在北伐失败了，她也累了，想找个地方安顿下来。\n\n但是，他能放下吗？\n\n\"百合，\"他说，\"我还有未完成的事业。\"\n\n\"我明白。\"蓝百合说，\"但是，你已经努力了十五年了。该做的都做了，该尽的力都尽了。即使现在停下来，你也没有遗憾了。\"\n\n秦大宝沉默了。\n\n蓝百合的话触动了他。\n\n", "是啊，他已经努力了十五年。北伐虽然失败了，但他已经尽了最大的力量。他还有什么遗憾呢？\n\n\"好，\"他说，\"我们走。\"\n\n顺治十八年（1661年），秦大宝和蓝百合离开了厦门，来到了一个偏僻的小渔村。\n\n这个渔村位于福建和广东交界的地方，远离战火，交通闭塞，几乎与世隔绝。秦大宝用这些年攒下的一些积蓄，在村里盖了一座小院，过起了隐居的生活。\n\n\"大宝，\"蓝百合看着新建的小院，\"这里真美。\"\n\n\"是啊。\"秦大宝说，\"以后咱们就在这里生活了。\"\n\n\"只有我们两个人？\"\n\n\"还有石头。\"秦大宝说，\"他已经长大了，有自己的事情要做。不过，他说他会经常来看我们。\"\n\n蓝百合点点头。\n\n石头现在已经二十多岁了，不再是当年那个瘦弱的孤儿。他在秦大宝的培养下，成为了一个有用的人。现在他在厦门管理秦大宝名下的产业，做得有声有色。\n\n\"对了，\"蓝百合忽然想起一件事，\"若兰呢？她怎么办？\"\n\n方若兰……\n\n秦大宝沉默了。\n\n方若兰今年也二十多岁了。这些年，她一直跟着他们，照顾他们的生活。她从未嫁人，把全部的青春都耗在了他们身上。\n\n\"她……\"秦大宝叹了口气，\"她有自己的选择。\"\n\n方若兰曾经表示过想和他们一起生活，但秦大宝拒绝了。他知道，这样对她不公平。她应该有自己的生活，而不是永远跟着他们。\n\n\"她她说她想留在这里。\"蓝百合说，\"她说她要照顾我们。\"\n\n\"这……\"秦大宝犹豫了。\n\n\"让她来吧。\"蓝百合说，\"多个人，也多个照应。\"\n\n秦大宝想了想，点了点头：\"好。\"\n\n在渔村的生活，简单而平静。\n\n秦大宝每天早上出海打鱼，下午回家种地，晚上和蓝百合一起看星星、聊聊天。方若兰也搬来了小院，帮忙料理家务，照顾他们的生活。\n\n这种平淡的生活，是秦大宝从未体验过的。\n\n在前世（2024年），他每天忙忙碌碌，为了生活奔波；穿越到明末后，他更是经历了无数的风风雨雨，从未有过片刻的安宁。\n\n", "而现在，他终于可以停下来了。\n\n\"大宝，\"有一天晚上，蓝百合靠在他的肩膀上，\"你快乐吗？\"\n\n\"快乐。\"秦大宝说，\"和你在一起，我很快乐。\"\n\n\"我也是。\"蓝百合说。\n\n两人相视而笑，在月光下许下了永恒的誓言。\n\n然而，平静的生活并没有持续太久。\n\n康熙元年（1662年），秦大宝得到消息：郑成功在台湾病逝了。\n\n\"什么？\"秦大宝听到这个消息，犹如晴天霹雳。\n\n\"郑将军……病逝了。\"来使说，\"他在台湾驾崩了。\"\n\n秦大宝沉默了。\n\n郑成功是他在这个时代最敬佩的人之一。他抗清复明，驱逐荷兰人，建设台湾，是真正的民族英雄。他的去世，是整个中华民族的损失。\n\n\"我知道了。\"秦大宝沉重地说。\n\n来使走后，秦大宝独自坐在房间里，一言不发。\n\n\"大宝，\"蓝百合走进来，看到他的样子，心里已经明白了七八分。\n\n\"郑将军……走了。\"秦大宝说。\n\n\"我知道。\"蓝百合说。\n\n\"他……他是我最敬佩的人。\"秦大宝说，\"他为了抗清复明，奋斗了一辈子，最后……\"\n\n\"他死而无憾。\"蓝百合说，\"他为了自己的理想，付出了全部的努力。即使失败了，他也是英雄。\"\n\n秦大宝沉默了。\n\n蓝百合说得对。郑成功虽然北伐失败，但他已经尽了最大的努力。他是一个真正的英雄，值得后人敬仰。\n\n\"百合，\"秦大宝说，\"我想去台湾祭拜他。\"\n\n\"我跟你一起去。\"蓝百合说。\n\n秦大宝和蓝百合来到了台湾，参加了郑成功的葬礼。\n\n葬礼在台湾城举行，各地的抗清势力都派来了代表。秦大宝作为郑成功的旧部，也受邀参加了葬礼。\n\n\"秦大宝，\"张煌言也来了，\"你也来了。\"\n\n\"张先生。\"秦大宝拱手行礼。\n\n两人相见，恍如隔世。\n\n张煌言现在已经五十多岁了，头发花白，但精神矍铄。这些年，他一直在沿海坚持抗清，从未放弃。\n\n\"你怎么样？\"张煌言问。\n\n\"我很好。\"秦大宝说，\"我在一个小渔村里隐居，过着平淡的生活。\"\n\n", "\"平淡是福啊。\"张煌言感慨地说，\"不像我，还要继续战斗。\"\n\n\"张先生，您还要继续？\"\n\n\"当然。\"张煌言说，\"只要我还活着一天，我就要和满洲人战斗到底。\"\n\n秦大宝沉默了。\n\n他理解张煌言的选择。这是他的理想，他的信念，他活着的意义。\n\n\"张先生，\"秦大宝说，\"您多保重。\"\n\n\"你也是。\"张煌言说。\n\n两人相视而笑，一切尽在不言中。\n\n祭拜完郑成功后，秦大宝和蓝百合回到了渔村。\n\n日子继续平淡地过着。\n\n秦大宝每天出海打鱼、回家种地，和蓝百合一起慢慢变老。\n\n他知道，自己的日子不多了。\n\n他已经在这个时代生活了将近二十年。这二十年来，他经历了太多的事情，看到了太多的悲欢离合。他从一个普通人，成为了一个重要的历史人物。他见证了南明的灭亡、郑成功的北伐、抗清斗争的失败。\n\n但是，他并不后悔。\n\n因为，他遇到了蓝百合。\n\n因为，他找到了真爱。\n\n因为，他活出了自己的价值。\n\n（第十九章完，约4500字）\n\n第二十章：桃花扇再现\n\n康熙三年（1664年），秦大宝已经在这个时代生活了二十三年。\n\n二十三年，弹指一挥间。\n\n他已经从一个三十出头的年轻人，变成了一个五十多岁的老人。他的头发全白了，背也驼了，走路都需要拄着拐杖。\n\n蓝百合也老了。她今年四十多岁，虽然风韵犹存，但眼角的皱纹和鬓边的白发，已经掩盖不住岁月的痕迹。\n\n\"大宝，\"有一天，蓝百合对他说，\"我想回南京看看。\"\n\n\"南京？\"秦大宝愣了一下，\"为什么？\"\n\n\"我想看看秦淮河，\"蓝百合说，\"看看咱们最初相遇的地方。\"\n\n秦大宝沉默了。\n\n南京……那个他穿越而来的城市，那个有秦淮河、有夫子庙、有他最初记忆的地方。\n\n他已经二十三年没有回去过了。\n\n\"好，\"他说，\"咱们回去看看。\"\n\n从渔村到南京，路途遥远。\n\n秦大宝和蓝百合乘坐商船，沿着海岸线北上，用了将近一个月的时间，才到达南京。\n\n南京城已经变了。\n\n", "二十三年前，这里还是南明政权的留都，繁华热闹。现在，这里已经是清朝的统治中心之一，虽然依然繁华，但已经失去了往日的气象。\n\n秦淮河还在，河水依然流淌，但两岸的楼阁已经换了主人。那些曾经名噪一时的青楼画舫，现在大多已经关闭，只剩下少数几家还在营业。\n\n\"紫烟阁还在吗？\"蓝百合问。\n\n\"不知道。\"秦大宝说，\"咱们去看看。\"\n\n他们沿着秦淮河走了一段路，来到了紫烟阁的旧址。\n\n紫烟阁已经不在了。\n\n原来的地方，现在变成了一家茶馆。茶馆的门脸很普通，和周围的店铺没有什么区别。\n\n\"不在了……\"蓝百合的眼泪流了下来。\n\n\"百合，别难过。\"秦大宝安慰她，\"紫烟阁虽然不在了，但咱们的记忆还在。\"\n\n\"我知道。\"蓝百合擦了擦眼泪，\"只是……有些伤感。\"\n\n秦大宝握住她的手，两人默默地站在河边，看着流淌的河水。\n\n\"大宝，\"蓝百合忽然说，\"那把扇子……你还留着吗？\"\n\n\"扇子？\"秦大宝愣了一下，然后从怀里掏出了那把桃花扇。\n\n二十三年了，他一直把这把扇子带在身边。无论走到哪里，无论经历什么，他都没有丢下它。\n\n这把扇子，是他穿越到这个时代的媒介，也是他回家的唯一希望。\n\n\"你还留着……\"蓝百合看着那把扇子，眼神复杂。\n\n\"我一直留着。\"秦大宝说，\"这是我唯一的念想。\"\n\n\"你想回去吗？\"蓝百合问，\"回到你原来的时代？\"\n\n秦大宝沉默了。\n\n他想回去吗？\n\n当然想。\n\n那里有他的父母，有他的朋友，有他的李香兰。那里有他熟悉的一切，有他原本的生活。\n\n但是，这里有蓝百合。\n\n有他们一起经历的风风雨雨，有他们一起度过的日日夜夜，有他们一起许下的誓言。\n\n他能丢下她吗？\n\n\"百合，\"他说，\"我不知道。\"\n\n\"如果你有机会回去，你会走吗？\"\n\n秦大宝看着她的眼睛，看到了里面的恐惧和不安。\n\n\"不会。\"他说，\"我不会丢下你。\"\n\n蓝百合的眼泪又流了下来。\n\n\"大宝，\"她说，\"我爱你。\"\n\n", "\"我也爱你。\"秦大宝说。\n\n两人相拥而泣，在秦淮河边许下了永恒的誓言。\n\n回到渔村后，秦大宝开始研究那把扇子。\n\n二十三年了，他一直没有放弃寻找回去的方法。虽然他已经决定留在这个时代，但他还是想知道，这把扇子到底藏着什么秘密。\n\n他仔细观察扇子的每一个细节——扇面的绢布、扇骨的湘妃竹、那枝桃花、那两行诗句。\n\n\"千古秦淮东逝水，桃花扇底送南明。\"\n\n他默念着这两句诗，忽然发现了一些以前没有注意到的东西。\n\n扇面上的那枝桃花，花瓣的排列似乎有某种规律。他仔细数了数，发现花瓣一共有二十四片，正好对应二十四节气。\n\n\"二十四……\"他喃喃自语。\n\n他又看了看扇骨，发现湘妃竹的纹理也有某种规律。那些斑点，似乎组成了某种图案。\n\n\"这是……地图？\"\n\n他仔细辨认，发现那些斑点确实组成了一幅简略的地图——南京城的地图。\n\n\"原来如此……\"他恍然大悟。\n\n这把扇子，不仅仅是一个穿越的媒介，它还藏着南京城的秘密地图，以及某种与时间相关的密码。\n\n\"大宝，\"蓝百合走进来，看到他对着扇子发呆，\"你在干什么？\"\n\n\"我在研究这把扇子。\"秦大宝说，\"我发现了一些秘密。\"\n\n\"什么秘密？\"\n\n秦大宝把自己的发现告诉了蓝百合。蓝百合听完，也是惊讶不已。\n\n\"你是说，这把扇子藏着南京城的地图？\"\n\n\"是。\"秦大宝说，\"而且，我还发现，这二十四片花瓣，可能对应着某种时间密码。\"\n\n\"时间密码？\"\n\n\"是。\"秦大宝说，\"我怀疑，只有在特定的时间、特定的地点，这把扇子才能触发穿越。\"\n\n\"特定的时间？什么时候？\"\n\n秦大宝想了想，说：\"可能是……桃花盛开的季节。\"\n\n\"桃花盛开的季节？\"\n\n\"是。\"秦大宝说，\"这把扇子上画的是桃花，名字也叫'桃花扇'。我怀疑，只有在桃花盛开的时候，它才能发挥作用。\"\n\n蓝百合沉默了。\n\n\"大宝，\"她说，\"如果你找到了回去的方法，你会走吗？\"\n\n", "秦大宝看着她，坚定地说：\"不会。我说过，我不会丢下你。\"\n\n蓝百合笑了，笑容里带着泪光。\n\n\"大宝，\"她说，\"谢谢你。\"\n\n从那以后，秦大宝每年桃花盛开的时候，都会拿着扇子到秦淮河边试一试。\n\n但是，扇子始终没有反应。\n\n\"也许，时机还没到。\"他对自己说。\n\n他并不着急。反正他已经决定留在这个时代了，能不能回去，已经不重要了。\n\n重要的是，他和蓝百合在一起。\n\n重要的是，他们还有彼此。\n\n（第二十章完，约4500字）\n\n第二十一章：张煌言的末路\n\n康熙三
