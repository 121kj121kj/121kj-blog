<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>秦淮烟云录 - 121KJ</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Noto Serif SC","Source Han Serif SC","方正书宋",serif;background:#f5f0e8;color:#2c2c2c;line-height:2;font-size:1.05rem}.top-bar{background:#0a0a0f;padding:10px 0;text-align:center;position:fixed;top:0;left:0;right:0;z-index:10}.top-bar a{color:#818cf8;text-decoration:none;font-size:.85rem}.reader{max-width:700px;margin:0 auto;padding:50px 20px 80px;min-height:100vh}.reader .title{text-align:center;font-size:1.1rem;font-weight:600;padding-top:10px}.reader .page-content{min-height:60vh;padding:10px 0}.reader .page-content p{text-indent:2em;margin-bottom:6px;text-align:justify;font-size:1.02rem}.nav-bar{position:fixed;bottom:0;left:0;right:0;background:#f5f0e8;border-top:1px solid #ddd;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;z-index:10}.nav-bar .page-info{font-size:.8rem;color:#888}.nav-btn{padding:8px 20px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#333;font-size:.9rem;cursor:pointer}.nav-btn:disabled{opacity:.3;cursor:default}.tap-area{position:fixed;top:50px;bottom:60px;left:0;right:0;z-index:5}.tap-left,.tap-right{position:absolute;top:0;bottom:0;width:40%}.tap-left{left:0}.tap-right{right:0}</style></head><body><div class="top-bar"><a href="/">← 返回首页</a></div><div class="reader"><div class="title">《秦淮烟云录》</div><div class="page-content" id="pc"></div></div><div class="nav-bar"><button class="nav-btn" id="pb" onclick="pp()">← 上一页</button><span class="page-info" id="pi"></span><button class="nav-btn" id="nb" onclick="np()">下一页 →</button></div><div class="tap-area"><div class="tap-left" onclick="pp()"></div><div class="tap-right" onclick="np()"></div></div><script>const p=["《秦淮烟云录》第一章至第五章\n\n第一章：桃花扇缘\n\n暮春时节，金陵城笼罩在一片朦胧的烟雨之中。\n\n淅淅沥沥的小雨轻柔地敲打着秦淮河畔的柳树，新抽的嫩芽绿得耀眼，在雨幕中舒展着柔韧的枝条，宛如少女含羞的笑靥。秦淮河水泛着碧波，画舫在河面上轻轻摇曳，桨声欸乃，从雾霭深处传来，时而清晰，时而缥缈。青石板路被雨水浸润得发亮，倒映着两岸飞檐翘角的古建筑，构成一幅流动的、充满诗情画意的江南水墨画。\n\n空气中弥漫着潮湿的泥土气息，混合着远处传来的淡淡桂花香——这本不是桂花开放的季节，但那香气却若有若无，仿佛穿越了时空的阻隔，从某个古老的梦境中飘散而来。偶尔有几声吴侬软语的叫卖声从巷弄深处传来，又很快被雨声淹没。\n\n金陵大剧院坐落在秦淮河畔最繁华的地段，这座融合了古典与现代建筑风格的剧院，今晚灯火辉煌。巨大的霓虹灯牌上，“《桃花扇》收官之夜”几个大字在雨幕中闪烁着温润的光芒。剧院门口，撑着各色雨伞的观众排成长队，缓缓入场。他们的交谈声、笑声与雨声交织在一起，形成一种奇特的交响。\n\n剧院内，穹顶上的水晶吊灯将整个大厅照得如同白昼。观众席上已经坐满了人，空气中弥漫着淡淡的香水味和期待的气息。人们低声交谈着，翻阅着手中的节目单，眼神中闪烁着对今晚演出的憧憬。\n\n第五排中间的位置上，一对年轻的情侣正襟危坐。男的约莫二十七八岁，浓眉大眼，鼻梁挺直，穿着一件洗得发白的浅蓝色休闲衬衫，袖口微微卷起，露出结实的小臂。他的坐姿笔挺，眼神清澈，即便在人群中，也难掩那份书卷气与阳光般的气质。他叫秦大宝，是金陵市第一中学的历史教师，尤其偏爱明清史，对那个时代的兴衰变迁有着独到的见解。\n\n", "坐在他身旁的女子明眸皓齿，秀丽端庄，一袭淡蓝色长裙更衬托出她清新脱俗的气质。她的长发在脑后挽成一个简单的发髻，几缕碎发垂在耳侧，随着她的动作轻轻晃动。她是李香兰，在一家外贸公司担任项目经理，从小受祖母影响酷爱戏曲艺术，尤其对昆曲和京剧情有独钟。\n\n“大宝，你看这里。”李香兰兴奋地指着节目单上的演员介绍，声音轻柔却难掩激动，“饰演李香君的是梅派青衣的当家花旦顾盼儿，她才二十八岁，已经是国家一级演员了。你看这剧照，眼神里的哀怨与坚毅，简直把李香君演活了。”\n\n秦大宝接过节目单，仔细端详着顾盼儿的剧照。照片上的女子身着戏服，手持桃花扇，眉目如画，眼神中确实有一种穿越时空的哀愁。他点了点头：“确实很有神韵。我记得史料记载，李香君虽为秦淮歌妓，却有着一般男子都难以企及的气节。侯方域赠她桃花扇定情，后来阮大铖逼婚，她血溅扇面，以死明志——这等刚烈，令人敬佩。”\n\n“是啊。”李香兰轻叹一声，将头靠在秦大宝肩上，“我每次看《桃花扇》都会哭。明明知道是戏，可就是忍不住。那个时代的女子，命运总是身不由己。”\n\n秦大宝握住了她的手，温热的掌心传递着安慰：“所以我们要珍惜现在。至少在这个时代，我们可以自由地相爱，自由地选择自己的人生。”\n\n李香兰抬起头，眼中闪烁着幸福的光芒：“遇见你，就是我人生最好的选择。”\n\n两人相视一笑，十指紧扣。\n\n此时，剧院内的灯光逐渐暗了下来，观众席上的交谈声也渐渐平息。悠扬的京胡声从乐池中响起，如泣如诉，仿佛在诉说着一个古老而悲伤的故事。大幕缓缓拉开，舞台上的灯光骤然亮起，将整个舞台渲染成一片金碧辉煌。\n\n第一幕：媚香楼。\n\n舞台布景精致绝伦，再现了明末秦淮河畔的繁华景象。雕花窗棂、红木家具、轻纱帷幔，处处透着江南的婉约与奢华。顾盼儿饰演的李香君身着淡粉色绣花裙，手持团扇，从舞台左侧缓缓走出。她的步态轻盈如柳，眼神流转间既有少女的娇羞，又有风尘女子的妩媚。\n\n", "“原来姹紫嫣红开遍，似这般都付与断井颓垣……”顾盼儿的唱腔婉转动听，每一个字都咬得清晰圆润，尾音处带着梅派特有的韵味，如珠落玉盘，余音绕梁。\n\n秦大宝屏住呼吸，完全被舞台上的表演吸引。作为一名历史教师，他曾在无数史料中读到过秦淮八艳的故事，但那些文字终究是冰冷的。而此刻，舞台上的李香君仿佛真的从历史中走了出来，她的喜怒哀乐如此真实，她的爱情与抉择如此震撼人心。\n\n侯方域出场了。王景山饰演的侯方域身着青衫，手持折扇，风流倜傥中带着书生的儒雅。他与李香君的初见，眼神交汇的瞬间，整个剧场仿佛都静止了。那种一见钟情的悸动，跨越了舞台与观众席的界限，感染了在场的每一个人。\n\n“小姐芳名，小生侯方域，这厢有礼了。”\n\n“奴家李香君，侯公子万福。”\n\n简单的对白，却因演员精湛的演技而显得深情款款。秦大宝感觉到李香兰握着他的手紧了紧，转头看去，发现她的眼眶已经微微泛红。\n\n剧情推进得很快。侯方域题诗扇面，赠予李香君作为定情信物；两人在秦淮河畔私定终身；侯方域因得罪权贵被迫离开金陵；阮大铖逼婚李香君；李香君誓死不从，血溅桃花扇……\n\n当演到血溅桃花扇那一幕时，顾盼儿的表演达到了高潮。她站在舞台中央，手持那柄染血的扇子，眼神从最初的绝望转为决绝，最后化为一种超脱的平静。她的唱腔陡然拔高，如裂帛般凄厉：\n\n“桃花扇底江南泪，血染丹心照汗青！\n\n此生不负侯郎意，来世再续未了情！”\n\n最后一个“情”字拖得极长，声音由强转弱，最终化作一声几乎听不见的叹息。顾盼儿缓缓倒下，桃花扇从她手中滑落，在舞台灯光下，扇面上的血迹红得刺眼。\n\n足足三秒钟后，雷鸣般的掌声爆发出来，经久不息。观众席上许多人都在擦拭眼泪，包括李香兰。她靠在秦大宝肩上，低声抽泣着：“太感人了……真的太感人了……”\n\n", "秦大宝轻轻拍着她的背，自己的眼眶也有些发热。他忽然想到，如果自己生活在那个时代，会做出怎样的选择？是像侯方域一样，在国难当头时选择逃避，还是像李香君一样，以死明志？\n\n“这只是戏。”他轻声对李香兰说，也像是对自己说，“但戏中的气节，却是真实的。”\n\n演出在演员的谢幕中结束。顾盼儿和王景山携手走出，向观众深深鞠躬。掌声再次响起，这次更加热烈，持续了将近五分钟。\n\n散场时，剧院广播通知，在一楼大厅举办《桃花扇》周边纪念品签售会，主演和部分主创人员将到场与观众互动。\n\n“我们去看看吧！”李香兰眼睛一亮，拉着秦大宝就往楼下走。\n\n大厅里已经排起了长队。签售台布置得古色古香，背景是一幅巨大的《秦淮胜景图》。台上摆放着各种周边产品：剧本精装本、主演签名照、原声大碟，以及——最引人注目的——一柄制作精美的桃花扇。\n\n这柄桃花扇被单独陈列在玻璃展柜中，在灯光下散发着柔和的光泽。扇面以缂丝工艺织就，粉色的桃花栩栩如生，仿佛刚刚从枝头摘下，还带着晨露。花瓣的渐变、花蕊的细微纹理，都织得一丝不苟。扇骨选用上等紫竹，打磨得温润如玉，雕刻着缠枝莲纹，工艺精湛得令人叹为观止。\n\n展柜旁的介绍牌上写着：“非物质文化遗产传承人、工艺美术大师助于良先生亲制《桃花扇》限量复刻版，全球仅99柄，本场签售会特供3柄。”\n\n李香兰几乎将脸贴在了玻璃上，眼中满是痴迷：“太美了……这工艺，这细节……大宝你看，这桃花像是真的一样。”\n\n秦大宝也被这柄扇子吸引了。作为一名历史爱好者，他对传统工艺品有着特殊的感情。这柄扇子不仅是一件艺术品，更像是一把钥匙，能够打开通往那个时代的大门。\n\n“喜欢吗？”他问。\n\n李香兰用力点头，但看到标价牌上的数字后，又犹豫了：“可是……太贵了。”\n\n标价：8888元。\n\n", "对两人来说，这确实不是一个小数目。秦大宝是中学教师，月薪不过六千；李香兰虽然收入高些，但也要还房贷。一柄扇子近万元，实在奢侈。\n\n但秦大宝看着李香兰恋恋不舍的眼神，又看了看那柄在灯光下仿佛有生命般的桃花扇，忽然下定了决心。他想起刚才李香兰看戏时流泪的样子，想起她每次提到戏曲时眼中的光芒，想起两人相恋三年来她对自己的包容与支持。\n\n“等我一下。”他说着，走向了收银台。\n\n“大宝！”李香兰想拉住他，但已经晚了。\n\n五分钟后，秦大宝拿着一个精致的木盒回来了。盒子是紫檀木的，雕刻着与扇骨相同的缠枝莲纹，散发着淡淡的木香。他打开盒子，那柄桃花扇静静地躺在红色丝绒衬垫上，在灯光下流转着温润的光泽。\n\n“送给你。”秦大宝将盒子递到李香兰面前，“纪念我们第一次一起看《桃花扇》，也纪念我们在一起三周年——虽然还有两个月才到，但提前送了吧。”\n\n李香兰愣住了，眼睛慢慢睁大，随即蒙上了一层水雾：“你……你真的买了？这么贵……”\n\n“值得。”秦大宝微笑着说，“你喜欢，就值得。”\n\n泪水终于从李香兰眼中滑落。她小心翼翼地接过木盒，取出桃花扇，轻轻展开。扇面在空气中微微颤动，上面的桃花仿佛活了过来，在灯光下呈现出奇妙的立体感。她轻轻扇动，一股淡淡的、似有若无的桃花香气飘散开来。\n\n“谢谢……”她哽咽着说，“这是我收到过的最好的礼物。”\n\n两人拿着扇子排队等待签名。轮到他们时，顾盼儿刚刚签完前一位观众的海报，抬起头，目光落在了李香兰手中的桃花扇上。\n\n“好漂亮的扇子。”顾盼儿的声音比舞台上柔和许多，带着一丝疲惫，但依然悦耳，“是助于良大师的作品吧？我也有幸收藏了一柄。”\n\n“是的。”李香兰激动地说，“顾老师，您今晚的表演太精彩了，我……我都看哭了。”\n\n顾盼儿微微一笑，那笑容中有欣慰，也有一种难以言说的哀愁：“能打动观众，是我的荣幸。这出戏我演了八年，每次演到血溅桃花扇，都还是会心痛。”\n\n", "她接过李香兰递上的节目单，在上面签下自己的名字，又写了一句寄语：“愿有情人终成眷属。”\n\n轮到秦大宝时，他递上的是自己带来的《桃花扇》原著。顾盼儿有些惊讶地看了他一眼——大多数观众都会选择节目单或海报，带原著的很少。\n\n“您对这部作品很了解？”她一边签名一边问。\n\n“我是历史老师。”秦大宝回答，“对明末清初的历史有些研究。”\n\n顾盼儿点点头，在扉页上写下：“历史不会重复，但会押韵。——顾盼儿”\n\n签完名，两人走出剧院。雨已经停了，夜空被洗得清澈，几颗星星在云隙间闪烁。秦淮河上的画舫亮起了灯笼，点点灯火倒映在水中，随波荡漾。\n\n“我们拍张照吧。”李香兰提议，“用这柄桃花扇当道具。”\n\n两人走到剧院门口的一棵桃树下——这棵树是剧院特意栽种的，每年春天都会开满桃花，虽然此时花期已过，但枝叶依然繁茂。李香兰展开桃花扇，遮住半边脸，只露出一双含笑的眼睛。秦大宝站在她身旁，温柔地搂着她的肩膀。\n\n路过的行人主动提出帮他们拍照。那是一位背着相机的老人，看起来像是一位摄影爱好者。\n\n“来，看这里，笑一个！”老人举起相机。\n\n李香兰将头靠在秦大宝肩上，秦大宝则微微侧身，让两人的脸都朝向镜头。夕阳的余晖从云层缝隙中透出，为他们的轮廓镀上了一层金边。桃花扇在光线下泛着柔和的粉色，扇面上的桃花仿佛在缓缓绽放。\n\n就在快门即将按下的瞬间，秦大宝的右手无意中碰到了桃花扇的扇面。他的指尖抚过那些缂丝桃花，忽然感觉到一阵轻微的刺痛——像是被针扎了一下。\n\n他下意识地想缩回手，但已经晚了。\n\n一股奇异的感觉从指尖传来，迅速蔓延至全身。那感觉不是疼痛，而是一种深沉的、仿佛从骨髓里透出来的寒意。紧接着，天旋地转，眼前的景象开始扭曲、变形。剧院门口的灯光拉长成一道道流光，行人的身影模糊成色块，李香兰的脸在视野中逐渐远去、淡去。\n\n“大宝？大宝你怎么了？”李香兰的声音仿佛从很远的地方传来，带着惊恐。\n\n", "秦大宝想回答，却发不出声音。他看到李香兰伸手想要抓住他，但她的手穿过他的身体，像是穿过一道幻影。他低头看向自己的手，发现它们正在变得透明，在夕阳下泛着奇异的光泽。\n\n而握在他左手中的桃花扇，此刻正爆发出耀眼的光芒。那光芒不是白色，也不是金色，而是一种深邃的、仿佛能吸收一切光线的暗红色。扇面上的桃花在光芒中仿佛活了过来，花瓣片片飘落，在空中旋转、飞舞，形成一个粉红色的漩涡。\n\n漩涡越来越大，越来越深，将秦大宝整个人吸入其中。\n\n最后一刻，他看到的是李香兰惊恐万分的脸，和她伸向自己的、徒劳的手。她的嘴张着，在呼喊什么，但他已经听不见了。世界在眼前碎裂成无数片，然后陷入无边的黑暗。\n\n只有那柄桃花扇，依然握在他手中，散发着灼热的光芒。\n\n第二章：乱世降临\n\n黑暗持续了多久，秦大宝不知道。\n\n时间在失去参照的空间里失去了意义。他感觉自己像是在深海中下沉，又像是在虚空中漂浮。耳边有风声，又像是无数人在低语，那些声音模糊不清，夹杂着哭泣、呐喊、金铁交鸣。\n\n然后，坠落感突然袭来。\n\n秦大宝猛地睁开眼睛，剧烈的眩晕让他几乎呕吐。他趴在地上，双手撑着粗糙的地面，指尖传来沙砾和碎石的触感。他大口喘着气，过了好一会儿，眩晕感才稍稍缓解。\n\n他抬起头，眼前的景象让他瞬间僵住了。\n\n这里不是金陵大剧院门口，不是秦淮河畔，甚至不是他熟悉的任何一个地方。\n\n他正趴在一片荒凉的黄土地上，周围是低矮破败的土坯茅屋，大多数已经坍塌，只剩下残垣断壁。几棵枯树立在远处，枝桠光秃秃地指向灰蒙蒙的天空。空气中弥漫着浓重的烟尘味，混合着一种难以形容的、像是铁锈又像是腐败物的气息。\n\n更让他心惊的是四周的人。\n\n那些人穿着破旧不堪的粗布衣服，颜色灰暗，补丁摞补丁。男人们大多剃着前额光秃、后脑留辫的发型——那是他在历史书中见过的，清朝初年的发型。女人们则衣衫褴褛，面色蜡黄，抱着瘦骨嶙峋的孩子，眼神空洞地望着远方。\n\n", "远处传来隐约的喊杀声，还有凄厉的哭嚎。一股黑烟从地平线上升起，在灰暗的天空中扭曲、扩散。\n\n秦大宝猛地站起身，发现自己还穿着那件浅蓝色休闲衬衫和牛仔裤，在这片土地上显得格格不入。他下意识地摸向口袋——手机还在，但屏幕漆黑，按开机键毫无反应。钱包也在，里面的身份证、银行卡、几张百元钞票，都在。\n\n还有那柄桃花扇。\n\n他低头看向左手，桃花扇依然紧紧握在手中。扇面在昏暗的光线下泛着幽微的光泽，那些缂丝桃花似乎比之前更加鲜艳了，红得像是要滴出血来。\n\n“这……这是哪里？”秦大宝喃喃自语，声音干涩。\n\n他环顾四周，试图找到任何熟悉的标志物，但什么都没有。没有高楼大厦，没有电线杆，没有柏油马路，只有黄土、茅屋、枯树，和那些面黄肌瘦、眼神惊恐的人们。\n\n一个念头如同闪电般劈进他的脑海：穿越。\n\n作为历史老师，秦大宝读过不少穿越小说，也曾在课堂上与学生半开玩笑地讨论过这种可能性。但他从未想过，这种事会真的发生在自己身上。\n\n“冷静，秦大宝，冷静。”他对自己说，强迫自己深呼吸，“先弄清楚情况。”\n\n他走向最近的一群人——几个老人蹲在一处断墙下，围着一小堆篝火，火上架着一个破瓦罐，里面煮着些看不出是什么的东西。\n\n“老人家，”秦大宝尽量让自己的声音听起来平和，“请问这里是什么地方？”\n\n老人们抬起头，浑浊的眼睛里满是警惕和恐惧。其中一个缺了门牙的老者打量了他一番，目光在他怪异的衣着上停留了很久，才用沙哑的声音说：“后生，你是外乡人吧？快走吧，这里待不得了。”\n\n“这里到底是哪儿？”秦大宝追问。\n\n“商丘。”另一个老者低声说，“快走吧，闯王的兵就要打过来了，见人就杀，见东西就抢……”\n\n商丘。闯王。\n\n这两个词像重锤一样砸在秦大宝心上。他是明清史专家，太清楚这两个词组合在一起意味着什么。\n\n明崇祯十五年，李自成攻破商丘，屠城。\n\n", "如果这里真的是明末的商丘，那么现在就是公元1642年，距离明朝灭亡还有两年，距离那场惨绝人寰的屠杀，可能只有几天，甚至几个小时。\n\n“今天是哪年哪月？”秦大宝的声音有些发颤。\n\n老人们奇怪地看着他，但还是回答了：“崇祯十五年，三月。”\n\n秦大宝闭上眼睛。崇祯十五年三月，李自成围困开封，分兵攻掠河南各州县。商丘作为豫东重镇，必然是目标之一。\n\n他睁开眼，看向远处升起的黑烟。那不是炊烟，\n\n"];let c=0;function r(){document.getElementById("pc").innerHTML=p[c].split("\n\n").filter(x=>x.trim()).map(x=>"<p>"+x+"</p>").join("");document.getElementById("pi").textContent="第 "+(c+1)+"/"+p.length+" 页";document.getElementById("pb").disabled=c===0;document.getElementById("nb").disabled=c===p.length-1}function np(){if(c<p.length-1){c++;r()}}function pp(){if(c>0){c--;r()}}document.addEventListener("keydown",e=>{if(e.key==="ArrowLeft")pp();if(e.key==="ArrowRight")np()})r();</script></body></html>
